<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" font-family="SF Pro Display, -apple-system, sans-serif">
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/></filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#64748B"/>
    </marker>
  </defs>
  <rect width="1000" height="600" fill="white"/>

  <text x="500" y="36" text-anchor="middle" font-size="20" font-weight="600" fill="#1E293B">Citations — Every Claim Traced Back to the Source</text>
  <text x="500" y="58" text-anchor="middle" font-size="13" fill="#6B7280">Enable citations on a document block; Claude returns cited_text, document_title and page/char ranges</text>

  <!-- Step 1: Document -->
  <rect x="40" y="92" width="260" height="170" rx="10" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="40" y="92" width="260" height="32" rx="10" fill="#3B82F6"/>
  <rect x="40" y="112" width="260" height="12" fill="#3B82F6"/>
  <text x="170" y="113" text-anchor="middle" font-size="12" font-weight="600" fill="white">1. Document block</text>

  <rect x="56" y="136" width="228" height="116" rx="6" fill="#0F172A"/>
  <text x="66" y="154" font-size="10" font-family="Menlo, monospace" fill="#34D399">{</text>
  <text x="66" y="168" font-size="10" font-family="Menlo, monospace" fill="#E2E8F0">  "type": "document",</text>
  <text x="66" y="182" font-size="10" font-family="Menlo, monospace" fill="#E2E8F0">  "source": { ... pdf ... },</text>
  <text x="66" y="196" font-size="10" font-family="Menlo, monospace" fill="#FCD34D">  "title": "earth.pdf",</text>
  <text x="66" y="210" font-size="10" font-family="Menlo, monospace" fill="#FCD34D">  "citations": {</text>
  <text x="66" y="224" font-size="10" font-family="Menlo, monospace" fill="#FCD34D">    "enabled": True</text>
  <text x="66" y="238" font-size="10" font-family="Menlo, monospace" fill="#FCD34D">  }</text>
  <text x="66" y="252" font-size="10" font-family="Menlo, monospace" fill="#34D399">}</text>

  <!-- Arrow -->
  <line x1="305" y1="178" x2="340" y2="178" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 2: Claude -->
  <rect x="345" y="140" width="140" height="72" rx="10" fill="#1E293B"/>
  <text x="415" y="167" text-anchor="middle" font-size="13" font-weight="700" fill="white">Claude</text>
  <text x="415" y="186" text-anchor="middle" font-size="10" fill="#94A3B8">answers +</text>
  <text x="415" y="200" text-anchor="middle" font-size="10" fill="#94A3B8">tracks sources</text>

  <line x1="490" y1="176" x2="525" y2="176" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 3: Response -->
  <rect x="530" y="92" width="430" height="170" rx="10" fill="#F0FDF4" stroke="#22C55E" stroke-width="2" filter="url(#shadow)"/>
  <rect x="530" y="92" width="430" height="32" rx="10" fill="#22C55E"/>
  <rect x="530" y="112" width="430" height="12" fill="#22C55E"/>
  <text x="745" y="113" text-anchor="middle" font-size="12" font-weight="600" fill="white">2. Structured response with citations</text>

  <rect x="546" y="136" width="398" height="116" rx="6" fill="#0F172A"/>
  <text x="556" y="154" font-size="10" font-family="Menlo, monospace" fill="#E2E8F0">content: [{</text>
  <text x="556" y="168" font-size="10" font-family="Menlo, monospace" fill="#E2E8F0">  "type": "text",</text>
  <text x="556" y="182" font-size="10" font-family="Menlo, monospace" fill="#FCD34D">  "text": "Earth's atmosphere...",</text>
  <text x="556" y="196" font-size="10" font-family="Menlo, monospace" fill="#E2E8F0">  "citations": [{</text>
  <text x="556" y="210" font-size="10" font-family="Menlo, monospace" fill="#86EFAC">    "cited_text": "Volcanoes released...",</text>
  <text x="556" y="224" font-size="10" font-family="Menlo, monospace" fill="#86EFAC">    "document_index": 0,</text>
  <text x="556" y="238" font-size="10" font-family="Menlo, monospace" fill="#86EFAC">    "document_title": "earth.pdf",</text>
  <text x="556" y="252" font-size="10" font-family="Menlo, monospace" fill="#86EFAC">    "start_page_number": 2 }]}]</text>

  <!-- Bottom: Rendered UI experience -->
  <rect x="40" y="284" width="920" height="256" rx="12" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/>
  <rect x="40" y="284" width="920" height="32" rx="12" fill="#64748B"/>
  <rect x="40" y="304" width="920" height="12" fill="#64748B"/>
  <text x="500" y="305" text-anchor="middle" font-size="12" font-weight="600" fill="white">3. Render in UI — users can verify every claim</text>

  <!-- UI: Answer + hover popover -->
  <rect x="60" y="332" width="520" height="188" rx="8" fill="white" stroke="#CBD5E1"/>
  <text x="72" y="352" font-size="10" font-weight="700" fill="#64748B">Claude's answer</text>
  <text x="72" y="374" font-size="12" fill="#1E293B">Earth's early atmosphere was formed by volcanic</text>
  <text x="72" y="392" font-size="12" fill="#1E293B">outgassing, releasing water vapor and CO₂</text>
  <text x="72" y="410" font-size="12" fill="#1E293B">over hundreds of millions of years</text>
  <!-- cite marker -->
  <circle cx="415" cy="406" r="9" fill="#22C55E"/>
  <text x="415" y="410" text-anchor="middle" font-size="10" font-weight="700" fill="white">1</text>

  <text x="72" y="446" font-size="10" font-weight="700" fill="#64748B">Citation [1]</text>
  <rect x="72" y="452" width="490" height="56" rx="6" fill="#DCFCE7" stroke="#22C55E"/>
  <text x="82" y="470" font-size="10" font-weight="700" fill="#14532D">earth.pdf · pages 2-3</text>
  <text x="82" y="486" font-size="10" fill="#166534">"Volcanoes released water vapor and carbon dioxide,</text>
  <text x="82" y="500" font-size="10" fill="#166534">forming the primitive atmosphere."</text>

  <!-- UI: PDF doc visual -->
  <rect x="600" y="332" width="340" height="188" rx="8" fill="white" stroke="#CBD5E1"/>
  <text x="612" y="352" font-size="10" font-weight="700" fill="#64748B">Source document</text>

  <rect x="612" y="360" width="140" height="150" rx="4" fill="#F8FAFC" stroke="#94A3B8"/>
  <text x="682" y="378" text-anchor="middle" font-size="9" font-weight="700" fill="#1E293B">earth.pdf</text>
  <text x="682" y="390" text-anchor="middle" font-size="8" fill="#6B7280">page 2</text>
  <line x1="620" y1="400" x2="744" y2="400" stroke="#CBD5E1"/>
  <line x1="620" y1="412" x2="744" y2="412" stroke="#CBD5E1"/>
  <rect x="618" y="420" width="128" height="18" fill="#FEF3C7" stroke="#F59E0B"/>
  <text x="620" y="432" font-size="8" fill="#78350F">Volcanoes released water...</text>
  <line x1="620" y1="446" x2="744" y2="446" stroke="#CBD5E1"/>
  <line x1="620" y1="458" x2="744" y2="458" stroke="#CBD5E1"/>
  <line x1="620" y1="470" x2="744" y2="470" stroke="#CBD5E1"/>
  <line x1="620" y1="482" x2="744" y2="482" stroke="#CBD5E1"/>
  <line x1="620" y1="494" x2="744" y2="494" stroke="#CBD5E1"/>

  <!-- Arrow from citation to pdf -->
  <path d="M 565 480 Q 600 450 618 430" fill="none" stroke="#22C55E" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <!-- Right panel: fields -->
  <rect x="770" y="360" width="160" height="150" rx="6" fill="#F8FAFC" stroke="#CBD5E1"/>
  <text x="780" y="378" font-size="10" font-weight="700" fill="#1E40AF">Citation fields</text>
  <text x="780" y="396" font-size="9" fill="#1E293B">- cited_text</text>
  <text x="780" y="410" font-size="9" fill="#1E293B">- document_index</text>
  <text x="780" y="424" font-size="9" fill="#1E293B">- document_title</text>
  <text x="780" y="438" font-size="9" fill="#1E293B">- start_page_number</text>
  <text x="780" y="452" font-size="9" fill="#1E293B">- end_page_number</text>
  <line x1="780" y1="462" x2="920" y2="462" stroke="#CBD5E1"/>
  <text x="780" y="478" font-size="9" fill="#6B7280">(plain text → char</text>
  <text x="780" y="490" font-size="9" fill="#6B7280">positions instead of</text>
  <text x="780" y="502" font-size="9" fill="#6B7280">page numbers)</text>

  <text x="500" y="578" text-anchor="middle" font-size="11" fill="#6B7280">Citations transform Claude from a black box into a transparent research assistant — grounded, verifiable, trustworthy.</text>
</svg>
