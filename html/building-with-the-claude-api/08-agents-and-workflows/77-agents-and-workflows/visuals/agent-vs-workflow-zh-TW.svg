<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="SF Pro Display, -apple-system, sans-serif">
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/></filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748B"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3B82F6"/>
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8B5CF6"/>
    </marker>
  </defs>
  <rect width="900" height="520" fill="white"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="20" font-weight="600" fill="#1E293B">Workflow vs Agent</text>
  <text x="450" y="60" text-anchor="middle" font-size="13" fill="#6B7280">預定程式碼路徑 vs LLM 動態決策路徑</text>

  <!-- LEFT: Workflow column (Blue) -->
  <rect x="30" y="85" width="400" height="400" rx="8" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="30" y="85" width="400" height="44" rx="8" fill="#3B82F6"/>
  <rect x="30" y="121" width="400" height="8" fill="#3B82F6"/>
  <text x="230" y="113" text-anchor="middle" font-size="16" font-weight="600" fill="white">Workflow（工作流）</text>

  <rect x="115" y="144" width="230" height="26" rx="13" fill="#DBEAFE"/>
  <text x="230" y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#3B82F6">路徑由程式碼決定</text>

  <!-- Workflow steps (vertical) -->
  <rect x="135" y="185" width="190" height="38" rx="6" fill="white" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="230" y="208" text-anchor="middle" font-size="12" font-weight="600" fill="#1E293B">步驟 1：解析輸入</text>

  <line x1="230" y1="225" x2="230" y2="243" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <rect x="135" y="247" width="190" height="38" rx="6" fill="white" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="230" y="270" text-anchor="middle" font-size="12" font-weight="600" fill="#1E293B">步驟 2：呼叫 LLM A</text>

  <line x1="230" y1="287" x2="230" y2="305" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <rect x="135" y="309" width="190" height="38" rx="6" fill="white" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="230" y="332" text-anchor="middle" font-size="12" font-weight="600" fill="#1E293B">步驟 3：呼叫 LLM B</text>

  <line x1="230" y1="349" x2="230" y2="367" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <rect x="135" y="371" width="190" height="38" rx="6" fill="white" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="230" y="394" text-anchor="middle" font-size="12" font-weight="600" fill="#1E293B">步驟 4：回傳結果</text>

  <text x="230" y="445" text-anchor="middle" font-size="11" fill="#6B7280">可預測 - 便宜 - 易於除錯</text>
  <text x="230" y="463" text-anchor="middle" font-size="11" fill="#6B7280">彈性有限</text>

  <!-- RIGHT: Agent column (Purple) -->
  <rect x="470" y="85" width="400" height="400" rx="8" fill="#FAF5FF" stroke="#8B5CF6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="470" y="85" width="400" height="44" rx="8" fill="#8B5CF6"/>
  <rect x="470" y="121" width="400" height="8" fill="#8B5CF6"/>
  <text x="670" y="113" text-anchor="middle" font-size="16" font-weight="600" fill="white">Agent（代理）</text>

  <rect x="555" y="144" width="230" height="26" rx="13" fill="#EDE9FE"/>
  <text x="670" y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#8B5CF6">路徑由 LLM 決定</text>

  <!-- Agent loop -->
  <circle cx="670" cy="295" r="55" fill="white" stroke="#8B5CF6" stroke-width="2"/>
  <text x="670" y="290" text-anchor="middle" font-size="14" font-weight="700" fill="#8B5CF6">LLM</text>
  <text x="670" y="308" text-anchor="middle" font-size="11" fill="#6B7280">決定下一步</text>

  <!-- Tool nodes around LLM -->
  <rect x="555" y="190" width="100" height="30" rx="6" fill="white" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="605" y="210" text-anchor="middle" font-size="11" font-weight="600" fill="#1E293B">tool: search</text>

  <rect x="685" y="190" width="100" height="30" rx="6" fill="white" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="735" y="210" text-anchor="middle" font-size="11" font-weight="600" fill="#1E293B">tool: read</text>

  <rect x="555" y="370" width="100" height="30" rx="6" fill="white" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="605" y="390" text-anchor="middle" font-size="11" font-weight="600" fill="#1E293B">tool: write</text>

  <rect x="685" y="370" width="100" height="30" rx="6" fill="white" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="735" y="390" text-anchor="middle" font-size="11" font-weight="600" fill="#1E293B">tool: done</text>

  <!-- Arrows forming a loop -->
  <path d="M 625 240 Q 615 265 625 290" stroke="#8B5CF6" stroke-width="2" fill="none" marker-end="url(#arrowPurple)"/>
  <path d="M 715 240 Q 725 265 715 290" stroke="#8B5CF6" stroke-width="2" fill="none" marker-end="url(#arrowPurple)"/>
  <path d="M 625 350 Q 615 325 625 302" stroke="#8B5CF6" stroke-width="2" fill="none" marker-end="url(#arrowPurple)"/>
  <path d="M 715 350 Q 725 325 715 302" stroke="#8B5CF6" stroke-width="2" fill="none" marker-end="url(#arrowPurple)"/>

  <!-- Loop indicator -->
  <text x="670" y="360" text-anchor="middle" font-size="10" fill="#8B5CF6" font-style="italic">while not done</text>

  <text x="670" y="445" text-anchor="middle" font-size="11" fill="#6B7280">彈性高 - 開放式 - 處理新情境</text>
  <text x="670" y="463" text-anchor="middle" font-size="11" fill="#6B7280">成本較高 - 除錯較困難</text>

</svg>
