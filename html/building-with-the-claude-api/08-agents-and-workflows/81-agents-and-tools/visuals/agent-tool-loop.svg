<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" font-family="SF Pro Display, -apple-system, sans-serif">
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/></filter>
    <marker id="arrowP" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8B5CF6"/>
    </marker>
  </defs>
  <rect width="800" height="560" fill="white"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-size="20" font-weight="600" fill="#1E293B">The Agent Tool Loop</text>
  <text x="400" y="60" text-anchor="middle" font-size="13" fill="#6B7280">Decide - Act - Observe - Reflect (until done)</text>

  <!-- Outer task box -->
  <rect x="250" y="85" width="300" height="50" rx="8" fill="#F1F5F9" stroke="#94A3B8" stroke-width="2"/>
  <text x="400" y="108" text-anchor="middle" font-size="13" font-weight="600" fill="#1E293B">Task</text>
  <text x="400" y="125" text-anchor="middle" font-size="11" fill="#6B7280">e.g. "fix the failing test"</text>

  <!-- Central LLM -->
  <circle cx="400" cy="310" r="70" fill="#FAF5FF" stroke="#8B5CF6" stroke-width="3" filter="url(#shadow)"/>
  <text x="400" y="305" text-anchor="middle" font-size="18" font-weight="700" fill="#8B5CF6">LLM</text>
  <text x="400" y="326" text-anchor="middle" font-size="11" fill="#6B7280">Claude</text>

  <!-- Four nodes around LLM -->
  <!-- Top: Decide -->
  <rect x="315" y="160" width="170" height="60" rx="8" fill="white" stroke="#8B5CF6" stroke-width="2" filter="url(#shadow)"/>
  <text x="400" y="184" text-anchor="middle" font-size="13" font-weight="600" fill="#8B5CF6">1. Decide</text>
  <text x="400" y="203" text-anchor="middle" font-size="10" fill="#6B7280">pick next tool to call</text>

  <!-- Right: Act -->
  <rect x="575" y="280" width="170" height="60" rx="8" fill="white" stroke="#8B5CF6" stroke-width="2" filter="url(#shadow)"/>
  <text x="660" y="304" text-anchor="middle" font-size="13" font-weight="600" fill="#8B5CF6">2. Act</text>
  <text x="660" y="323" text-anchor="middle" font-size="10" fill="#6B7280">execute tool_use</text>

  <!-- Bottom: Observe -->
  <rect x="315" y="400" width="170" height="60" rx="8" fill="white" stroke="#8B5CF6" stroke-width="2" filter="url(#shadow)"/>
  <text x="400" y="424" text-anchor="middle" font-size="13" font-weight="600" fill="#8B5CF6">3. Observe</text>
  <text x="400" y="443" text-anchor="middle" font-size="10" fill="#6B7280">receive tool_result</text>

  <!-- Left: Reflect -->
  <rect x="55" y="280" width="170" height="60" rx="8" fill="white" stroke="#8B5CF6" stroke-width="2" filter="url(#shadow)"/>
  <text x="140" y="304" text-anchor="middle" font-size="13" font-weight="600" fill="#8B5CF6">4. Reflect</text>
  <text x="140" y="323" text-anchor="middle" font-size="10" fill="#6B7280">done? or loop again?</text>

  <!-- Arrows: clockwise loop -->
  <!-- Decide -> Act -->
  <path d="M 485 205 Q 620 230 645 280" stroke="#8B5CF6" stroke-width="2.5" fill="none" marker-end="url(#arrowP)"/>
  <!-- Act -> Observe -->
  <path d="M 645 340 Q 620 400 485 430" stroke="#8B5CF6" stroke-width="2.5" fill="none" marker-end="url(#arrowP)"/>
  <!-- Observe -> Reflect -->
  <path d="M 315 430 Q 180 400 155 340" stroke="#8B5CF6" stroke-width="2.5" fill="none" marker-end="url(#arrowP)"/>
  <!-- Reflect -> Decide (back to top) -->
  <path d="M 155 280 Q 180 220 315 205" stroke="#8B5CF6" stroke-width="2.5" fill="none" marker-end="url(#arrowP)"/>

  <!-- Task feed into Decide -->
  <line x1="400" y1="135" x2="400" y2="155" stroke="#8B5CF6" stroke-width="2" stroke-dasharray="3 2" marker-end="url(#arrowP)"/>

  <!-- Exit condition label -->
  <rect x="580" y="460" width="200" height="70" rx="8" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.5"/>
  <text x="680" y="483" text-anchor="middle" font-size="11" font-weight="700" fill="#22C55E">Exit Condition</text>
  <text x="680" y="501" text-anchor="middle" font-size="10" fill="#1E293B">stop_reason == "end_turn"</text>
  <text x="680" y="517" text-anchor="middle" font-size="10" fill="#6B7280">no more tool_use blocks</text>

  <rect x="20" y="460" width="200" height="70" rx="8" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="120" y="483" text-anchor="middle" font-size="11" font-weight="700" fill="#3B82F6">Loop Invariant</text>
  <text x="120" y="501" text-anchor="middle" font-size="10" fill="#1E293B">accumulate messages</text>
  <text x="120" y="517" text-anchor="middle" font-size="10" fill="#6B7280">growing conversation</text>
</svg>
