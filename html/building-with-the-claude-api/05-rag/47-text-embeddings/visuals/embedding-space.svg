<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" font-family="SF Pro Display, -apple-system, sans-serif">
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/></filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#64748B"/>
    </marker>
  </defs>
  <rect width="1000" height="600" fill="white"/>

  <text x="500" y="36" text-anchor="middle" font-size="20" font-weight="600" fill="#1E293B">Text Embeddings — Meaning as Coordinates</text>
  <text x="500" y="58" text-anchor="middle" font-size="13" fill="#6B7280">Voyage AI turns text into vectors; similar meanings cluster together, cosine similarity measures closeness</text>

  <!-- Left: encoder flow -->
  <rect x="40" y="90" width="380" height="470" rx="12" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="40" y="90" width="380" height="44" rx="12" fill="#3B82F6"/>
  <rect x="40" y="122" width="380" height="12" fill="#3B82F6"/>
  <text x="230" y="118" text-anchor="middle" font-size="15" font-weight="600" fill="white">Text → Embedding</text>

  <rect x="60" y="152" width="340" height="42" rx="6" fill="white" stroke="#93C5FD"/>
  <text x="70" y="170" font-size="11" fill="#6B7280">Input text:</text>
  <text x="70" y="186" font-size="11" font-family="Menlo, monospace" fill="#1E293B">"Dogs make great pets"</text>

  <line x1="230" y1="202" x2="230" y2="222" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="100" y="228" width="260" height="48" rx="8" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="230" y="248" text-anchor="middle" font-size="12" font-weight="700" fill="#1E40AF">voyage-3-large</text>
  <text x="230" y="264" text-anchor="middle" font-size="10" fill="#1E3A8A">embedding model</text>

  <line x1="230" y1="282" x2="230" y2="302" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="60" y="308" width="340" height="60" rx="6" fill="white" stroke="#93C5FD"/>
  <text x="70" y="326" font-size="11" fill="#6B7280">Output vector (truncated):</text>
  <text x="70" y="346" font-size="10" font-family="Menlo, monospace" fill="#1E293B">[0.12, -0.87, 0.44, 0.03, ...]</text>
  <text x="70" y="362" font-size="9" fill="#6B7280">each value in [-1, +1], ~1024 dimensions</text>

  <!-- Code -->
  <rect x="60" y="386" width="340" height="96" rx="6" fill="#0F172A"/>
  <text x="70" y="404" font-size="10" font-family="Menlo, monospace" fill="#34D399">import voyageai</text>
  <text x="70" y="420" font-size="10" font-family="Menlo, monospace" fill="#E2E8F0">client = voyageai.Client()</text>
  <text x="70" y="438" font-size="10" font-family="Menlo, monospace" fill="#E2E8F0">result = client.embed(</text>
  <text x="70" y="454" font-size="10" font-family="Menlo, monospace" fill="#E2E8F0">  [text],</text>
  <text x="70" y="468" font-size="10" font-family="Menlo, monospace" fill="#FCD34D">  model="voyage-3-large",</text>
  <text x="70" y="482" font-size="10" font-family="Menlo, monospace" fill="#FCD34D">  input_type="query")</text>

  <rect x="60" y="494" width="340" height="52" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="70" y="513" font-size="10" font-weight="700" fill="#92400E">Key caveat</text>
  <text x="70" y="529" font-size="9" fill="#78350F">Each dimension encodes SOME feature, but we</text>
  <text x="70" y="541" font-size="9" fill="#78350F">don't know exactly what. Model learns it at training.</text>

  <!-- Right: 2D vector space -->
  <rect x="440" y="90" width="520" height="470" rx="12" fill="#F0FDF4" stroke="#22C55E" stroke-width="2" filter="url(#shadow)"/>
  <rect x="440" y="90" width="520" height="44" rx="12" fill="#22C55E"/>
  <rect x="440" y="122" width="520" height="12" fill="#22C55E"/>
  <text x="700" y="118" text-anchor="middle" font-size="15" font-weight="600" fill="white">Vector Space (similar meanings cluster)</text>

  <!-- Axes -->
  <line x1="490" y1="480" x2="920" y2="480" stroke="#CBD5E1" stroke-width="1.5"/>
  <line x1="490" y1="480" x2="490" y2="160" stroke="#CBD5E1" stroke-width="1.5"/>
  <text x="925" y="484" font-size="10" fill="#64748B">dim 1</text>
  <text x="490" y="155" text-anchor="middle" font-size="10" fill="#64748B">dim 2</text>

  <!-- grid -->
  <line x1="490" y1="400" x2="920" y2="400" stroke="#E2E8F0" stroke-dasharray="2,3"/>
  <line x1="490" y1="320" x2="920" y2="320" stroke="#E2E8F0" stroke-dasharray="2,3"/>
  <line x1="490" y1="240" x2="920" y2="240" stroke="#E2E8F0" stroke-dasharray="2,3"/>
  <line x1="580" y1="160" x2="580" y2="480" stroke="#E2E8F0" stroke-dasharray="2,3"/>
  <line x1="720" y1="160" x2="720" y2="480" stroke="#E2E8F0" stroke-dasharray="2,3"/>
  <line x1="830" y1="160" x2="830" y2="480" stroke="#E2E8F0" stroke-dasharray="2,3"/>

  <!-- Pet cluster (top-left region) -->
  <ellipse cx="580" cy="230" rx="90" ry="70" fill="#DCFCE7" stroke="#22C55E" stroke-width="1.5" stroke-dasharray="4,3"/>
  <circle cx="555" cy="215" r="7" fill="#16A34A"/>
  <text x="565" y="211" font-size="11" font-weight="600" fill="#14532D">dog</text>
  <circle cx="605" cy="235" r="7" fill="#16A34A"/>
  <text x="615" y="231" font-size="11" font-weight="600" fill="#14532D">cat</text>
  <circle cx="570" cy="265" r="7" fill="#16A34A"/>
  <text x="580" y="261" font-size="11" font-weight="600" fill="#14532D">pet</text>
  <text x="580" y="315" text-anchor="middle" font-size="10" fill="#14532D" font-weight="600">"pets" cluster</text>

  <!-- Vehicles cluster (bottom-right) -->
  <ellipse cx="830" cy="410" rx="80" ry="55" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5" stroke-dasharray="4,3"/>
  <circle cx="810" cy="395" r="7" fill="#D97706"/>
  <text x="820" y="391" font-size="11" font-weight="600" fill="#78350F">car</text>
  <circle cx="850" cy="420" r="7" fill="#D97706"/>
  <text x="860" y="416" font-size="11" font-weight="600" fill="#78350F">truck</text>
  <text x="830" y="448" text-anchor="middle" font-size="10" fill="#78350F" font-weight="600">"vehicles" cluster</text>

  <!-- Far concepts -->
  <circle cx="720" cy="180" r="7" fill="#8B5CF6"/>
  <text x="730" y="184" font-size="11" font-weight="600" fill="#5B21B6">ocean</text>

  <!-- Cosine similarity visual -->
  <g>
    <line x1="490" y1="480" x2="580" y2="230" stroke="#22C55E" stroke-width="2"/>
    <line x1="490" y1="480" x2="830" y2="410" stroke="#F59E0B" stroke-width="2"/>
    <!-- angle arc small -->
    <path d="M 540 432 A 70 70 0 0 1 560 410" fill="none" stroke="#EF4444" stroke-width="2"/>
    <text x="560" y="450" font-size="10" fill="#EF4444" font-weight="700">θ</text>
  </g>

  <!-- Legend / formula -->
  <rect x="500" y="498" width="400" height="52" rx="6" fill="white" stroke="#BBF7D0"/>
  <text x="510" y="516" font-size="11" font-weight="700" fill="#166534">Cosine similarity</text>
  <text x="510" y="532" font-size="10" font-family="Menlo, monospace" fill="#1E293B">cos(θ) = (A · B) / (‖A‖ · ‖B‖)</text>
  <text x="510" y="546" font-size="9" fill="#6B7280">1 = identical · 0 = unrelated · -1 = opposite</text>

  <text x="500" y="582" text-anchor="middle" font-size="11" fill="#6B7280">dog ↔ cat: high similarity (~0.9). dog ↔ car: low similarity (~0.1). The angle tells you.</text>
</svg>
