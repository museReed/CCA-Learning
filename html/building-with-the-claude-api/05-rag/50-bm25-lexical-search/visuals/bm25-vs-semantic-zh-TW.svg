<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" font-family="PingFang TC, -apple-system, sans-serif">
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/></filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#64748B"/>
    </marker>
  </defs>
  <rect width="1000" height="600" fill="white"/>

  <text x="500" y="36" text-anchor="middle" font-size="20" font-weight="600" fill="#1E293B">BM25 Lexical vs Semantic Search — 互補的優勢</text>
  <text x="500" y="58" text-anchor="middle" font-size="13" fill="#6B7280">Semantic 理解語意;BM25 精確比對 ID、代號、罕見詞</text>

  <rect x="40" y="90" width="440" height="470" rx="12" fill="#F3E8FF" stroke="#8B5CF6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="40" y="90" width="440" height="44" rx="12" fill="#8B5CF6"/>
  <rect x="40" y="122" width="440" height="12" fill="#8B5CF6"/>
  <text x="260" y="118" text-anchor="middle" font-size="15" font-weight="600" fill="white">Semantic Search(embeddings)</text>

  <rect x="60" y="148" width="400" height="24" rx="12" fill="#EDE9FE"/>
  <text x="260" y="165" text-anchor="middle" font-size="11" font-weight="600" fill="#5B21B6">語意比對:用向量相似度</text>

  <rect x="60" y="186" width="400" height="42" rx="6" fill="white" stroke="#A78BFA"/>
  <text x="70" y="204" font-size="10" font-weight="700" fill="#5B21B6">查詢</text>
  <text x="70" y="220" font-size="11" font-family="Menlo, monospace" fill="#1E293B">"What happened with INC-2023-Q4-011?"</text>

  <text x="60" y="248" font-size="11" font-weight="600" fill="#6B7280">運作方式 →</text>

  <rect x="60" y="256" width="400" height="92" rx="6" fill="white" stroke="#C4B5FD"/>
  <circle cx="80" cy="278" r="10" fill="#8B5CF6"/>
  <text x="80" y="282" text-anchor="middle" font-size="11" fill="white" font-weight="700">1</text>
  <text x="98" y="282" font-size="10" fill="#1E293B">查詢 embedding → 向量</text>
  <circle cx="80" cy="302" r="10" fill="#8B5CF6"/>
  <text x="80" y="306" text-anchor="middle" font-size="11" fill="white" font-weight="700">2</text>
  <text x="98" y="306" font-size="10" fill="#1E293B">在 vector DB 找 cosine 最近的段落</text>
  <circle cx="80" cy="326" r="10" fill="#8B5CF6"/>
  <text x="80" y="330" text-anchor="middle" font-size="11" fill="white" font-weight="700">3</text>
  <text x="98" y="330" font-size="10" fill="#1E293B">回傳概念上相關的內容</text>

  <text x="60" y="372" font-size="11" font-weight="600" fill="#6B7280">結果 →</text>
  <rect x="60" y="380" width="400" height="24" rx="3" fill="#DCFCE7" stroke="#22C55E"/>
  <text x="72" y="397" font-size="10" fill="#14532D">✓ 資安章節(含 ID — 命中)</text>
  <rect x="60" y="408" width="400" height="24" rx="3" fill="#FEE2E2" stroke="#EF4444"/>
  <text x="72" y="425" font-size="10" fill="#991B1B">✗ 財務分析章節(語意接近但沒 ID)</text>

  <rect x="60" y="446" width="400" height="98" rx="8" fill="white" stroke="#DDD6FE"/>
  <text x="72" y="466" font-size="11" font-weight="700" fill="#166534">擅長場景</text>
  <text x="72" y="484" font-size="10" fill="#1E293B">• 查詢用同義詞或換句話說</text>
  <text x="72" y="500" font-size="10" fill="#1E293B">• 使用者問概念性問題</text>
  <text x="72" y="516" font-size="10" fill="#1E293B">• 主題式檢索(如「風險因素」)</text>
  <text x="72" y="534" font-size="10" fill="#991B1B">弱點:ID、罕見代號、產品編號</text>

  <rect x="520" y="90" width="440" height="470" rx="12" fill="#F0FDF4" stroke="#22C55E" stroke-width="2" filter="url(#shadow)"/>
  <rect x="520" y="90" width="440" height="44" rx="12" fill="#22C55E"/>
  <rect x="520" y="122" width="440" height="12" fill="#22C55E"/>
  <text x="740" y="118" text-anchor="middle" font-size="15" font-weight="600" fill="white">BM25 Lexical Search(詞頻)</text>

  <rect x="540" y="148" width="400" height="24" rx="12" fill="#DCFCE7"/>
  <text x="740" y="165" text-anchor="middle" font-size="11" font-weight="600" fill="#14532D">精確比對:按稀有度加權</text>

  <rect x="540" y="186" width="400" height="42" rx="6" fill="white" stroke="#86EFAC"/>
  <text x="550" y="204" font-size="10" font-weight="700" fill="#14532D">查詢</text>
  <text x="550" y="220" font-size="11" font-family="Menlo, monospace" fill="#1E293B">"What happened with INC-2023-Q4-011?"</text>

  <text x="540" y="248" font-size="11" font-weight="600" fill="#6B7280">運作方式 →</text>

  <rect x="540" y="256" width="400" height="92" rx="6" fill="white" stroke="#86EFAC"/>
  <circle cx="560" cy="278" r="10" fill="#22C55E"/>
  <text x="560" y="282" text-anchor="middle" font-size="11" fill="white" font-weight="700">1</text>
  <text x="578" y="278" font-size="10" fill="#1E293B">Tokenize:["what", "happened",</text>
  <text x="578" y="290" font-size="10" font-family="Menlo, monospace" fill="#166534">  "INC-2023-Q4-011"]</text>
  <circle cx="560" cy="308" r="10" fill="#22C55E"/>
  <text x="560" y="312" text-anchor="middle" font-size="11" fill="white" font-weight="700">2</text>
  <text x="578" y="312" font-size="10" fill="#1E293B">稀有詞給較高權重 (IDF)</text>
  <circle cx="560" cy="332" r="10" fill="#22C55E"/>
  <text x="560" y="336" text-anchor="middle" font-size="11" fill="white" font-weight="700">3</text>
  <text x="578" y="336" font-size="10" fill="#1E293B">依加權詞頻排序</text>

  <text x="540" y="372" font-size="11" font-weight="600" fill="#6B7280">結果 →</text>
  <rect x="540" y="380" width="400" height="24" rx="3" fill="#DCFCE7" stroke="#22C55E"/>
  <text x="552" y="397" font-size="10" fill="#14532D">✓ 資安章節(ID 在這裡)</text>
  <rect x="540" y="408" width="400" height="24" rx="3" fill="#DCFCE7" stroke="#22C55E"/>
  <text x="552" y="425" font-size="10" fill="#14532D">✓ 軟體工程章節(ID 也在這裡)</text>

  <rect x="540" y="446" width="400" height="98" rx="8" fill="white" stroke="#BBF7D0"/>
  <text x="552" y="466" font-size="11" font-weight="700" fill="#166534">擅長場景</text>
  <text x="552" y="484" font-size="10" fill="#1E293B">• 查詢含 ID、代號、產品編號</text>
  <text x="552" y="500" font-size="10" fill="#1E293B">• 技術術語、罕見專業詞</text>
  <text x="552" y="516" font-size="10" fill="#1E293B">• 使用者引用原文字句</text>
  <text x="552" y="534" font-size="10" fill="#991B1B">弱點:同義詞、換句話說的問題</text>

  <text x="500" y="582" text-anchor="middle" font-size="11" fill="#6B7280">單獨用都不夠完整。下一課的 Hybrid 做法可以同時發揮兩者優勢。</text>
</svg>
