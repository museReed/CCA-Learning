<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" font-family="PingFang TC, -apple-system, sans-serif">
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/></filter>
  </defs>
  <rect width="1000" height="600" fill="white"/>

  <text x="500" y="36" text-anchor="middle" font-size="20" font-weight="600" fill="#1E293B">文字切塊策略 — 三種作法</text>
  <text x="500" y="58" text-anchor="middle" font-size="13" fill="#6B7280">切得不好 = 檢索也會不好。Size-based、Sentence-based、Structure-based 各自在精準度與可靠度之間取捨</text>

  <rect x="30" y="90" width="300" height="470" rx="12" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="30" y="90" width="300" height="44" rx="12" fill="#3B82F6"/>
  <rect x="30" y="122" width="300" height="12" fill="#3B82F6"/>
  <text x="180" y="118" text-anchor="middle" font-size="15" font-weight="600" fill="white">Size-based(等長切塊)</text>

  <rect x="45" y="148" width="270" height="22" rx="11" fill="#DBEAFE"/>
  <text x="180" y="164" text-anchor="middle" font-size="10" font-weight="600" fill="#1E40AF">切成等長的字串片段</text>

  <text x="45" y="190" font-size="10" font-weight="600" fill="#6B7280">文件(325 字元)</text>
  <rect x="45" y="198" width="270" height="20" fill="#E0F2FE" stroke="#93C5FD" stroke-width="1"/>
  <text x="180" y="212" text-anchor="middle" font-size="9" fill="#0C4A6E">原始文字流</text>

  <text x="45" y="240" font-size="10" font-weight="600" fill="#6B7280">加上 overlap 的切塊</text>
  <rect x="45" y="248" width="108" height="22" rx="3" fill="#3B82F6"/>
  <text x="99" y="263" text-anchor="middle" font-size="9" fill="white">chunk 1 (108字)</text>
  <rect x="135" y="248" width="108" height="22" rx="3" fill="#60A5FA" opacity="0.85"/>
  <text x="189" y="263" text-anchor="middle" font-size="9" fill="white">chunk 2 (108字)</text>
  <rect x="225" y="248" width="90" height="22" rx="3" fill="#3B82F6"/>
  <text x="270" y="263" text-anchor="middle" font-size="9" fill="white">chunk 3</text>
  <rect x="135" y="248" width="18" height="22" fill="#1D4ED8" opacity="0.4"/>
  <rect x="225" y="248" width="18" height="22" fill="#1D4ED8" opacity="0.4"/>
  <text x="180" y="288" text-anchor="middle" font-size="9" fill="#6B7280">深色 = overlap 區段</text>

  <rect x="45" y="302" width="270" height="76" rx="6" fill="#0F172A"/>
  <text x="55" y="320" font-size="9" font-family="Menlo, monospace" fill="#34D399">def chunk_by_char(text,</text>
  <text x="55" y="334" font-size="9" font-family="Menlo, monospace" fill="#34D399">  chunk_size=150,</text>
  <text x="55" y="348" font-size="9" font-family="Menlo, monospace" fill="#34D399">  chunk_overlap=20):</text>
  <text x="55" y="362" font-size="9" font-family="Menlo, monospace" fill="#E2E8F0">  while start &lt; len(text):</text>
  <text x="55" y="376" font-size="9" font-family="Menlo, monospace" fill="#E2E8F0">    ...</text>

  <rect x="45" y="392" width="270" height="154" rx="8" fill="white" stroke="#BFDBFE"/>
  <text x="56" y="412" font-size="10" font-weight="700" fill="#166534">+ 優點</text>
  <text x="56" y="428" font-size="9" fill="#1E293B">• 超簡單,適用任何文件類型</text>
  <text x="56" y="442" font-size="9" fill="#1E293B">• 可靠的 fallback(連 code 都行)</text>
  <text x="56" y="456" font-size="9" fill="#1E293B">• Overlap 可補救被切斷的語意</text>
  <text x="56" y="476" font-size="10" font-weight="700" fill="#991B1B">- 缺點</text>
  <text x="56" y="492" font-size="9" fill="#1E293B">• 會把單字切在一半</text>
  <text x="56" y="506" font-size="9" fill="#1E293B">• 標題可能與內文分離</text>
  <text x="56" y="520" font-size="9" fill="#1E293B">• 失去周邊 context</text>
  <text x="56" y="538" font-size="9" fill="#3B82F6" font-weight="600">最適合:production fallback</text>

  <rect x="350" y="90" width="300" height="470" rx="12" fill="#F3E8FF" stroke="#8B5CF6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="350" y="90" width="300" height="44" rx="12" fill="#8B5CF6"/>
  <rect x="350" y="122" width="300" height="12" fill="#8B5CF6"/>
  <text x="500" y="118" text-anchor="middle" font-size="15" font-weight="600" fill="white">Sentence-based(按句子)</text>

  <rect x="365" y="148" width="270" height="22" rx="11" fill="#EDE9FE"/>
  <text x="500" y="164" text-anchor="middle" font-size="10" font-weight="600" fill="#5B21B6">每個 chunk 包含 N 個句子</text>

  <text x="365" y="190" font-size="10" font-weight="600" fill="#6B7280">以 [.!?] 分句</text>
  <g transform="translate(365,200)">
    <rect x="0"   y="0" width="66" height="18" rx="3" fill="#EDE9FE" stroke="#A78BFA"/>
    <text x="33" y="13" text-anchor="middle" font-size="9" fill="#5B21B6">句 1</text>
    <rect x="70"  y="0" width="66" height="18" rx="3" fill="#EDE9FE" stroke="#A78BFA"/>
    <text x="103" y="13" text-anchor="middle" font-size="9" fill="#5B21B6">句 2</text>
    <rect x="140" y="0" width="66" height="18" rx="3" fill="#EDE9FE" stroke="#A78BFA"/>
    <text x="173" y="13" text-anchor="middle" font-size="9" fill="#5B21B6">句 3</text>
    <rect x="210" y="0" width="60" height="18" rx="3" fill="#EDE9FE" stroke="#A78BFA"/>
    <text x="240" y="13" text-anchor="middle" font-size="9" fill="#5B21B6">...</text>
  </g>

  <text x="365" y="242" font-size="10" font-weight="600" fill="#6B7280">max_sentences=5, overlap=1</text>
  <rect x="365" y="250" width="144" height="22" rx="3" fill="#8B5CF6"/>
  <text x="437" y="265" text-anchor="middle" font-size="9" fill="white">chunk 1 (s1-s5)</text>
  <rect x="491" y="250" width="144" height="22" rx="3" fill="#A78BFA"/>
  <text x="563" y="265" text-anchor="middle" font-size="9" fill="white">chunk 2 (s5-s9)</text>
  <text x="500" y="290" text-anchor="middle" font-size="9" fill="#6B7280">overlap = 1 句</text>

  <rect x="365" y="302" width="270" height="76" rx="6" fill="#0F172A"/>
  <text x="375" y="320" font-size="9" font-family="Menlo, monospace" fill="#C4B5FD">sents = re.split(</text>
  <text x="375" y="334" font-size="9" font-family="Menlo, monospace" fill="#C4B5FD">  r"(?&lt;=[.!?])\s+", text)</text>
  <text x="375" y="348" font-size="9" font-family="Menlo, monospace" fill="#E2E8F0">每 5 句一組,滑動</text>
  <text x="375" y="362" font-size="9" font-family="Menlo, monospace" fill="#E2E8F0">(5 - overlap) 句</text>

  <rect x="365" y="392" width="270" height="154" rx="8" fill="white" stroke="#DDD6FE"/>
  <text x="376" y="412" font-size="10" font-weight="700" fill="#166534">+ 優點</text>
  <text x="376" y="428" font-size="9" fill="#1E293B">• 尊重句子邊界</text>
  <text x="376" y="442" font-size="9" fill="#1E293B">• 穩健的折衷方案</text>
  <text x="376" y="456" font-size="9" fill="#1E293B">• 任何散文都適用</text>
  <text x="376" y="476" font-size="10" font-weight="700" fill="#991B1B">- 缺點</text>
  <text x="376" y="492" font-size="9" fill="#1E293B">• Regex 會漏掉 edge case</text>
  <text x="376" y="506" font-size="9" fill="#1E293B">• Chunk 長度變動很大</text>
  <text x="376" y="520" font-size="9" fill="#1E293B">• 沒有語意感知</text>
  <text x="376" y="538" font-size="9" fill="#8B5CF6" font-weight="600">最適合:一般散文</text>

  <rect x="670" y="90" width="300" height="470" rx="12" fill="#F0FDF4" stroke="#22C55E" stroke-width="2" filter="url(#shadow)"/>
  <rect x="670" y="90" width="300" height="44" rx="12" fill="#22C55E"/>
  <rect x="670" y="122" width="300" height="12" fill="#22C55E"/>
  <text x="820" y="118" text-anchor="middle" font-size="15" font-weight="600" fill="white">Structure-based(按結構)</text>

  <rect x="685" y="148" width="270" height="22" rx="11" fill="#DCFCE7"/>
  <text x="820" y="164" text-anchor="middle" font-size="10" font-weight="600" fill="#14532D">依 header / 章節切分</text>

  <text x="685" y="190" font-size="10" font-weight="600" fill="#6B7280">Markdown 文件</text>
  <rect x="685" y="198" width="270" height="86" rx="4" fill="white" stroke="#86EFAC"/>
  <text x="695" y="214" font-size="9" font-family="Menlo, monospace" fill="#16A34A">## 醫學研究</text>
  <text x="695" y="228" font-size="9" fill="#1E293B">This year saw XDR-47...</text>
  <text x="695" y="246" font-size="9" font-family="Menlo, monospace" fill="#16A34A">## 軟體工程</text>
  <text x="695" y="260" font-size="9" fill="#1E293B">infection vectors in...</text>
  <text x="695" y="278" font-size="9" font-family="Menlo, monospace" fill="#16A34A">## 法務</text>

  <g transform="translate(685,298)">
    <rect x="0"  y="0" width="84" height="22" rx="3" fill="#22C55E"/>
    <text x="42" y="15" text-anchor="middle" font-size="9" fill="white">醫學 §</text>
    <rect x="92" y="0" width="84" height="22" rx="3" fill="#22C55E"/>
    <text x="134" y="15" text-anchor="middle" font-size="9" fill="white">軟體 §</text>
    <rect x="184" y="0" width="84" height="22" rx="3" fill="#22C55E"/>
    <text x="226" y="15" text-anchor="middle" font-size="9" fill="white">法務 §</text>
  </g>

  <rect x="685" y="336" width="270" height="46" rx="6" fill="#0F172A"/>
  <text x="695" y="354" font-size="9" font-family="Menlo, monospace" fill="#86EFAC">pattern = r"\n## "</text>
  <text x="695" y="368" font-size="9" font-family="Menlo, monospace" fill="#86EFAC">re.split(pattern, text)</text>

  <rect x="685" y="392" width="270" height="154" rx="8" fill="white" stroke="#BBF7D0"/>
  <text x="696" y="412" font-size="10" font-weight="700" fill="#166534">+ 優點</text>
  <text x="696" y="428" font-size="9" fill="#1E293B">• 最乾淨、最有意義</text>
  <text x="696" y="442" font-size="9" fill="#1E293B">• 每個 chunk = 完整章節</text>
  <text x="696" y="456" font-size="9" fill="#1E293B">• Markdown / 內部文件超適合</text>
  <text x="696" y="476" font-size="10" font-weight="700" fill="#991B1B">- 缺點</text>
  <text x="696" y="492" font-size="9" fill="#1E293B">• 需要結構保證</text>
  <text x="696" y="506" font-size="9" fill="#1E293B">• 純文字 / PDF 會失敗</text>
  <text x="696" y="520" font-size="9" fill="#1E293B">• 章節可能過長</text>
  <text x="696" y="538" font-size="9" fill="#22C55E" font-weight="600">最適合:格式完整的文件</text>

  <text x="500" y="582" text-anchor="middle" font-size="11" fill="#6B7280">沒有絕對最好的策略 — 根據文件保證與查詢模式來挑選。</text>
</svg>
