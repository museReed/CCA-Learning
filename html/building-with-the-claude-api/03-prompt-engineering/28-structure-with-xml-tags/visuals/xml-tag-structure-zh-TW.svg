<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" font-family="PingFang TC, -apple-system, sans-serif">
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/></filter>
  </defs>
  <rect width="1000" height="600" fill="white"/>

  <text x="500" y="36" text-anchor="middle" font-size="20" font-weight="600" fill="#1E293B">XML Tag 結構 — 給 Claude 清楚的段落界線</text>
  <text x="500" y="58" text-anchor="middle" font-size="13" fill="#6B7280">整片文字容易讓 Claude 混淆。用自訂 tag 如 &lt;instructions&gt; / &lt;document&gt; / &lt;example&gt; 讓意圖一目了然。</text>

  <rect x="30" y="90" width="460" height="430" rx="12" fill="#FEF2F2" stroke="#EF4444" stroke-width="2" filter="url(#shadow)"/>
  <rect x="30" y="90" width="460" height="44" rx="12" fill="#EF4444"/>
  <rect x="30" y="120" width="460" height="14" fill="#EF4444"/>
  <text x="260" y="118" text-anchor="middle" font-size="15" font-weight="600" fill="white">✗ 整片文字(沒有界線)</text>

  <rect x="50" y="150" width="420" height="350" rx="8" fill="#0F172A"/>
  <text x="64" y="172" font-size="10" font-family="Menlo, monospace" fill="#E2E8F0">I need you to debug the following</text>
  <text x="64" y="186" font-size="10" font-family="Menlo, monospace" fill="#E2E8F0">code using this documentation.</text>
  <text x="64" y="200" font-size="10" font-family="Menlo, monospace" fill="#94A3B8">def fetch_user(id):</text>
  <text x="64" y="214" font-size="10" font-family="Menlo, monospace" fill="#94A3B8">    r = requests.get(url)</text>
  <text x="64" y="228" font-size="10" font-family="Menlo, monospace" fill="#94A3B8">    return r.json()</text>
  <text x="64" y="242" font-size="10" font-family="Menlo, monospace" fill="#E2E8F0">The requests library's get</text>
  <text x="64" y="256" font-size="10" font-family="Menlo, monospace" fill="#E2E8F0">method raises HTTPError on</text>
  <text x="64" y="270" font-size="10" font-family="Menlo, monospace" fill="#E2E8F0">4xx or 5xx responses when</text>
  <text x="64" y="284" font-size="10" font-family="Menlo, monospace" fill="#E2E8F0">raise_for_status is called.</text>
  <text x="64" y="298" font-size="10" font-family="Menlo, monospace" fill="#94A3B8">def process_order(o):</text>
  <text x="64" y="312" font-size="10" font-family="Menlo, monospace" fill="#94A3B8">    total = sum(o.items)</text>
  <text x="64" y="326" font-size="10" font-family="Menlo, monospace" fill="#94A3B8">    return total</text>
  <text x="64" y="340" font-size="10" font-family="Menlo, monospace" fill="#E2E8F0">Please fix the bugs and</text>
  <text x="64" y="354" font-size="10" font-family="Menlo, monospace" fill="#E2E8F0">return updated code.</text>

  <rect x="55" y="160" width="410" height="44" rx="4" fill="none" stroke="#EF4444" stroke-dasharray="4,3" stroke-width="1.5"/>
  <text x="460" y="172" text-anchor="end" font-size="9" fill="#FCA5A5" font-style="italic">← 是指令嗎?</text>
  <rect x="55" y="192" width="410" height="44" rx="4" fill="none" stroke="#F59E0B" stroke-dasharray="4,3" stroke-width="1.5"/>
  <text x="460" y="204" text-anchor="end" font-size="9" fill="#FCD34D" font-style="italic">← 是程式碼?</text>
  <rect x="55" y="234" width="410" height="56" rx="4" fill="none" stroke="#8B5CF6" stroke-dasharray="4,3" stroke-width="1.5"/>
  <text x="460" y="264" text-anchor="end" font-size="9" fill="#C4B5FD" font-style="italic">← 是文件?</text>
  <rect x="55" y="290" width="410" height="42" rx="4" fill="none" stroke="#F59E0B" stroke-dasharray="4,3" stroke-width="1.5"/>
  <text x="460" y="304" text-anchor="end" font-size="9" fill="#FCD34D" font-style="italic">← 又是程式碼?</text>

  <text x="64" y="442" font-size="11" fill="#FCA5A5" font-weight="700">問題</text>
  <text x="64" y="460" font-size="10" fill="#E2E8F0">• Claude 需要猜每一段從哪開始到哪結束</text>
  <text x="64" y="476" font-size="10" fill="#E2E8F0">• 分不出程式、文件、指令的界線</text>
  <text x="64" y="492" font-size="10" fill="#E2E8F0">• 複雜 prompt 下輸出品質下降</text>

  <rect x="510" y="90" width="460" height="430" rx="12" fill="#F0FDF4" stroke="#22C55E" stroke-width="2" filter="url(#shadow)"/>
  <rect x="510" y="90" width="460" height="44" rx="12" fill="#22C55E"/>
  <rect x="510" y="120" width="460" height="14" fill="#22C55E"/>
  <text x="740" y="118" text-anchor="middle" font-size="15" font-weight="600" fill="white">✓ XML Tag(界線清楚)</text>

  <rect x="530" y="150" width="420" height="350" rx="8" fill="#0F172A"/>

  <text x="544" y="172" font-size="10" font-family="Menlo, monospace" fill="#8B5CF6">&lt;instructions&gt;</text>
  <text x="544" y="186" font-size="10" font-family="Menlo, monospace" fill="#FDE68A">  Debug the code using the docs.</text>
  <text x="544" y="200" font-size="10" font-family="Menlo, monospace" fill="#FDE68A">  Return only the fixed Python.</text>
  <text x="544" y="214" font-size="10" font-family="Menlo, monospace" fill="#8B5CF6">&lt;/instructions&gt;</text>

  <text x="544" y="236" font-size="10" font-family="Menlo, monospace" fill="#3B82F6">&lt;my_code&gt;</text>
  <text x="544" y="250" font-size="10" font-family="Menlo, monospace" fill="#94A3B8">  def fetch_user(id):</text>
  <text x="544" y="264" font-size="10" font-family="Menlo, monospace" fill="#94A3B8">      r = requests.get(url)</text>
  <text x="544" y="278" font-size="10" font-family="Menlo, monospace" fill="#94A3B8">      return r.json()</text>
  <text x="544" y="292" font-size="10" font-family="Menlo, monospace" fill="#94A3B8">  def process_order(o):</text>
  <text x="544" y="306" font-size="10" font-family="Menlo, monospace" fill="#94A3B8">      total = sum(o.items)</text>
  <text x="544" y="320" font-size="10" font-family="Menlo, monospace" fill="#94A3B8">      return total</text>
  <text x="544" y="334" font-size="10" font-family="Menlo, monospace" fill="#3B82F6">&lt;/my_code&gt;</text>

  <text x="544" y="356" font-size="10" font-family="Menlo, monospace" fill="#22C55E">&lt;docs&gt;</text>
  <text x="544" y="370" font-size="10" font-family="Menlo, monospace" fill="#94A3B8">  requests.get().raise_for_status()</text>
  <text x="544" y="384" font-size="10" font-family="Menlo, monospace" fill="#94A3B8">  → raises HTTPError on 4xx/5xx</text>
  <text x="544" y="398" font-size="10" font-family="Menlo, monospace" fill="#22C55E">&lt;/docs&gt;</text>

  <text x="544" y="420" font-size="10" font-family="Menlo, monospace" fill="#F59E0B">&lt;format&gt;</text>
  <text x="544" y="434" font-size="10" font-family="Menlo, monospace" fill="#94A3B8">  python only, no commentary</text>
  <text x="544" y="448" font-size="10" font-family="Menlo, monospace" fill="#F59E0B">&lt;/format&gt;</text>

  <text x="544" y="472" font-size="11" fill="#86EFAC" font-weight="700">為什麼有效</text>
  <text x="544" y="488" font-size="10" fill="#E2E8F0">• Claude 把 tag 邊界視為段落切分</text>

  <rect x="30" y="535" width="940" height="50" rx="10" fill="#F8FAFC" stroke="#CBD5E1"/>
  <text x="500" y="555" text-anchor="middle" font-size="11" font-weight="700" fill="#1E293B">Claude 如何解析 tag</text>
  <rect x="50" y="562" width="290" height="16" rx="4" fill="#F3E8FF"/>
  <text x="195" y="574" text-anchor="middle" font-size="9" fill="#6B21A8">Tag 名稱 → Claude 推斷該段落用途</text>
  <rect x="355" y="562" width="290" height="16" rx="4" fill="#DBEAFE"/>
  <text x="500" y="574" text-anchor="middle" font-size="9" fill="#1E40AF">可自訂命名(&lt;my_code&gt;, &lt;athlete_info&gt;)</text>
  <rect x="660" y="562" width="290" height="16" rx="4" fill="#DCFCE7"/>
  <text x="805" y="574" text-anchor="middle" font-size="9" fill="#166534">對長、多段落的 prompt 最有效</text>
</svg>
