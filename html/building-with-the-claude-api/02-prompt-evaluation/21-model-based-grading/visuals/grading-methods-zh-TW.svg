<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" font-family="PingFang TC, -apple-system, sans-serif">
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/></filter>
  </defs>
  <rect width="1000" height="600" fill="white"/>

  <text x="500" y="36" text-anchor="middle" font-size="20" font-weight="600" fill="#1E293B">三種 Grading 方法 — Code、Model、Human</text>
  <text x="500" y="58" text-anchor="middle" font-size="13" fill="#6B7280">每個 grader 都回傳 1-10 分。依據評分標準選擇:格式 ≠ 語氣 ≠ 幫助度。</text>

  <rect x="30" y="90" width="310" height="360" rx="12" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="30" y="90" width="310" height="44" rx="12" fill="#3B82F6"/>
  <rect x="30" y="120" width="310" height="14" fill="#3B82F6"/>
  <text x="185" y="119" text-anchor="middle" font-size="15" font-weight="600" fill="white">Code Grader</text>

  <rect x="50" y="150" width="270" height="30" rx="6" fill="white" stroke="#BFDBFE"/>
  <text x="185" y="170" text-anchor="middle" font-size="11" fill="#1E40AF" font-weight="600">寫程式做確定性檢查</text>

  <text x="50" y="204" font-size="11" font-weight="700" fill="#1E293B">適用於</text>
  <text x="50" y="222" font-size="10" fill="#1E293B">• 精確比對 / regex</text>
  <text x="50" y="238" font-size="10" fill="#1E293B">• 長度、字數</text>
  <text x="50" y="254" font-size="10" fill="#1E293B">• JSON / Python 語法檢查</text>
  <text x="50" y="270" font-size="10" fill="#1E293B">• 可讀性分數</text>
  <text x="50" y="286" font-size="10" fill="#1E293B">• 禁用字檢查</text>

  <rect x="50" y="302" width="270" height="80" rx="4" fill="#0F172A"/>
  <text x="60" y="320" font-size="9" font-family="Menlo, monospace" fill="#94A3B8">def grade(output):</text>
  <text x="60" y="334" font-size="9" font-family="Menlo, monospace" fill="#94A3B8">  try:</text>
  <text x="60" y="348" font-size="9" font-family="Menlo, monospace" fill="#FDE68A">    json.loads(output)</text>
  <text x="60" y="362" font-size="9" font-family="Menlo, monospace" fill="#34D399">    return 10</text>
  <text x="60" y="376" font-size="9" font-family="Menlo, monospace" fill="#F87171">  except: return 1</text>

  <text x="50" y="404" font-size="10" font-weight="700" fill="#6B7280">Trade-offs</text>
  <text x="50" y="422" font-size="9" fill="#6B7280">速度</text>
  <rect x="110" y="414" width="200" height="8" rx="4" fill="#DBEAFE"/>
  <rect x="110" y="414" width="196" height="8" rx="4" fill="#3B82F6"/>
  <text x="50" y="436" font-size="9" fill="#6B7280">成本</text>
  <rect x="110" y="428" width="200" height="8" rx="4" fill="#DBEAFE"/>
  <rect x="110" y="428" width="20" height="8" rx="4" fill="#3B82F6"/>
  <text x="50" y="450" font-size="9" fill="#6B7280">主觀性</text>
  <rect x="110" y="442" width="200" height="8" rx="4" fill="#DBEAFE"/>
  <rect x="110" y="442" width="20" height="8" rx="4" fill="#3B82F6"/>

  <rect x="345" y="90" width="310" height="360" rx="12" fill="#F0FDF4" stroke="#22C55E" stroke-width="2" filter="url(#shadow)"/>
  <rect x="345" y="90" width="310" height="44" rx="12" fill="#22C55E"/>
  <rect x="345" y="120" width="310" height="14" fill="#22C55E"/>
  <text x="500" y="119" text-anchor="middle" font-size="15" font-weight="600" fill="white">Model Grader(LLM-as-judge)</text>

  <rect x="365" y="150" width="270" height="30" rx="6" fill="white" stroke="#BBF7D0"/>
  <text x="500" y="170" text-anchor="middle" font-size="11" fill="#166534" font-weight="600">另呼叫一次 Claude 來評分</text>

  <text x="365" y="204" font-size="11" font-weight="700" fill="#1E293B">適用於</text>
  <text x="365" y="222" font-size="10" fill="#1E293B">• 任務遵循品質</text>
  <text x="365" y="238" font-size="10" fill="#1E293B">• 指令遵守度</text>
  <text x="365" y="254" font-size="10" fill="#1E293B">• 完整性 / 幫助度</text>
  <text x="365" y="270" font-size="10" fill="#1E293B">• 安全性檢查</text>
  <text x="365" y="286" font-size="10" fill="#1E293B">• 開放式品質 rubric</text>

  <rect x="365" y="302" width="270" height="80" rx="4" fill="#0F172A"/>
  <text x="375" y="320" font-size="9" font-family="Menlo, monospace" fill="#94A3B8">eval_prompt = """Evaluate:</text>
  <text x="375" y="334" font-size="9" font-family="Menlo, monospace" fill="#FDE68A">Task: {task}</text>
  <text x="375" y="348" font-size="9" font-family="Menlo, monospace" fill="#FDE68A">Solution: {output}</text>
  <text x="375" y="362" font-size="9" font-family="Menlo, monospace" fill="#34D399">Return JSON: strengths,</text>
  <text x="375" y="376" font-size="9" font-family="Menlo, monospace" fill="#34D399">weaknesses, reasoning, score"""</text>

  <text x="365" y="404" font-size="10" font-weight="700" fill="#6B7280">Trade-offs</text>
  <text x="365" y="422" font-size="9" fill="#6B7280">速度</text>
  <rect x="425" y="414" width="200" height="8" rx="4" fill="#DCFCE7"/>
  <rect x="425" y="414" width="120" height="8" rx="4" fill="#22C55E"/>
  <text x="365" y="436" font-size="9" fill="#6B7280">成本</text>
  <rect x="425" y="428" width="200" height="8" rx="4" fill="#DCFCE7"/>
  <rect x="425" y="428" width="100" height="8" rx="4" fill="#22C55E"/>
  <text x="365" y="450" font-size="9" fill="#6B7280">主觀性</text>
  <rect x="425" y="442" width="200" height="8" rx="4" fill="#DCFCE7"/>
  <rect x="425" y="442" width="160" height="8" rx="4" fill="#22C55E"/>

  <rect x="660" y="90" width="310" height="360" rx="12" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2" filter="url(#shadow)"/>
  <rect x="660" y="90" width="310" height="44" rx="12" fill="#F59E0B"/>
  <rect x="660" y="120" width="310" height="14" fill="#F59E0B"/>
  <text x="815" y="119" text-anchor="middle" font-size="15" font-weight="600" fill="white">Human Grader</text>

  <rect x="680" y="150" width="270" height="30" rx="6" fill="white" stroke="#FDE68A"/>
  <text x="815" y="170" text-anchor="middle" font-size="11" fill="#92400E" font-weight="600">真人讀過並給每筆輸出評分</text>

  <text x="680" y="204" font-size="11" font-weight="700" fill="#1E293B">適用於</text>
  <text x="680" y="222" font-size="10" fill="#1E293B">• 微妙品質判斷</text>
  <text x="680" y="238" font-size="10" fill="#1E293B">• 全面性</text>
  <text x="680" y="254" font-size="10" fill="#1E293B">• 語氣與風格</text>
  <text x="680" y="270" font-size="10" fill="#1E293B">• 相關性、深度</text>
  <text x="680" y="286" font-size="10" fill="#1E293B">• 上線前最終確認</text>

  <rect x="680" y="302" width="270" height="80" rx="4" fill="white" stroke="#FDE68A"/>
  <text x="815" y="324" text-anchor="middle" font-size="11" fill="#78350F" font-weight="600">「這個答案感覺對」</text>
  <text x="815" y="342" text-anchor="middle" font-size="10" fill="#6B7280">— 專家複審</text>
  <text x="815" y="362" text-anchor="middle" font-size="10" fill="#6B7280">試算表 + rubric + 審閱者</text>
  <text x="815" y="376" text-anchor="middle" font-size="10" fill="#6B7280">黃金標準,但昂貴</text>

  <text x="680" y="404" font-size="10" font-weight="700" fill="#6B7280">Trade-offs</text>
  <text x="680" y="422" font-size="9" fill="#6B7280">速度</text>
  <rect x="740" y="414" width="200" height="8" rx="4" fill="#FEF3C7"/>
  <rect x="740" y="414" width="30" height="8" rx="4" fill="#F59E0B"/>
  <text x="680" y="436" font-size="9" fill="#6B7280">成本</text>
  <rect x="740" y="428" width="200" height="8" rx="4" fill="#FEF3C7"/>
  <rect x="740" y="428" width="195" height="8" rx="4" fill="#F59E0B"/>
  <text x="680" y="450" font-size="9" fill="#6B7280">主觀性</text>
  <rect x="740" y="442" width="200" height="8" rx="4" fill="#FEF3C7"/>
  <rect x="740" y="442" width="195" height="8" rx="4" fill="#F59E0B"/>

  <rect x="30" y="470" width="940" height="90" rx="12" fill="#F8FAFC" stroke="#CBD5E1" filter="url(#shadow)"/>
  <text x="500" y="494" text-anchor="middle" font-size="12" font-weight="700" fill="#1E293B">典型組合:三種一起上</text>
  <rect x="50" y="506" width="290" height="42" rx="6" fill="#EFF6FF" stroke="#BFDBFE"/>
  <text x="195" y="525" text-anchor="middle" font-size="11" fill="#1E40AF" font-weight="600">Code grader:格式與語法</text>
  <text x="195" y="540" text-anchor="middle" font-size="9" fill="#6B7280">每筆資料都跑(便宜)</text>
  <rect x="355" y="506" width="290" height="42" rx="6" fill="#F0FDF4" stroke="#BBF7D0"/>
  <text x="500" y="525" text-anchor="middle" font-size="11" fill="#166534" font-weight="600">Model grader:任務品質</text>
  <text x="500" y="540" text-anchor="middle" font-size="9" fill="#6B7280">依 rubric 批量評分並附理由</text>
  <rect x="660" y="506" width="290" height="42" rx="6" fill="#FEF3C7" stroke="#FDE68A"/>
  <text x="805" y="525" text-anchor="middle" font-size="11" fill="#92400E" font-weight="600">Human:抽樣 + 最終把關</text>
  <text x="805" y="540" text-anchor="middle" font-size="9" fill="#6B7280">上線前的理智檢查</text>
</svg>
