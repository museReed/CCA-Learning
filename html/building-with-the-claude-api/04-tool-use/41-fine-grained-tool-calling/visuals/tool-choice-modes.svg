<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" font-family="SF Pro Display, -apple-system, sans-serif">
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/></filter>
  </defs>
  <rect width="1000" height="560" fill="white"/>

  <!-- Title -->
  <text x="500" y="40" text-anchor="middle" font-size="20" font-weight="600" fill="#1E293B">The Four tool_choice Modes</text>
  <text x="500" y="62" text-anchor="middle" font-size="13" fill="#6B7280">Fine-grained control over when and how Claude invokes tools</text>

  <!-- Column 1: auto (Blue) -->
  <rect x="30" y="85" width="225" height="380" rx="10" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="30" y="85" width="225" height="44" rx="10" fill="#3B82F6"/>
  <rect x="30" y="121" width="225" height="8" fill="#3B82F6"/>
  <text x="142" y="113" text-anchor="middle" font-size="16" font-weight="600" fill="white">auto</text>

  <rect x="70" y="145" width="145" height="26" rx="13" fill="#DBEAFE"/>
  <text x="142" y="163" text-anchor="middle" font-size="11" font-weight="600" fill="#3B82F6">default behavior</text>

  <!-- Icon: brain -->
  <circle cx="142" cy="200" r="22" fill="white" stroke="#3B82F6" stroke-width="2"/>
  <text x="142" y="207" text-anchor="middle" font-size="16" fill="#3B82F6">?</text>

  <text x="142" y="245" text-anchor="middle" font-size="12" fill="#1E293B" font-weight="500">Claude decides</text>
  <text x="142" y="260" text-anchor="middle" font-size="12" fill="#1E293B" font-weight="500">if a tool is needed</text>

  <line x1="55" y1="280" x2="230" y2="280" stroke="#BFDBFE" stroke-width="1"/>

  <text x="142" y="302" text-anchor="middle" font-size="11" fill="#6B7280" font-weight="500">Response can be:</text>
  <text x="142" y="320" text-anchor="middle" font-size="11" fill="#1E293B">TextBlock (chat)</text>
  <text x="142" y="338" text-anchor="middle" font-size="11" fill="#1E293B">or ToolUseBlock</text>

  <text x="142" y="370" text-anchor="middle" font-size="11" fill="#6B7280" font-weight="500">Use case:</text>
  <text x="142" y="388" text-anchor="middle" font-size="10" fill="#1E293B">General agents where</text>
  <text x="142" y="403" text-anchor="middle" font-size="10" fill="#1E293B">Claude judges when a</text>
  <text x="142" y="418" text-anchor="middle" font-size="10" fill="#1E293B">tool helps.</text>

  <rect x="55" y="432" width="175" height="22" rx="4" fill="#0F172A"/>
  <text x="142" y="447" text-anchor="middle" font-size="10" font-family="Menlo, monospace" fill="#34D399">{"type": "auto"}</text>

  <!-- Column 2: any (Green) -->
  <rect x="275" y="85" width="225" height="380" rx="10" fill="#F0FDF4" stroke="#22C55E" stroke-width="2" filter="url(#shadow)"/>
  <rect x="275" y="85" width="225" height="44" rx="10" fill="#22C55E"/>
  <rect x="275" y="121" width="225" height="8" fill="#22C55E"/>
  <text x="387" y="113" text-anchor="middle" font-size="16" font-weight="600" fill="white">any</text>

  <rect x="315" y="145" width="145" height="26" rx="13" fill="#DCFCE7"/>
  <text x="387" y="163" text-anchor="middle" font-size="11" font-weight="600" fill="#22C55E">must use a tool</text>

  <!-- Icon: lightning -->
  <circle cx="387" cy="200" r="22" fill="white" stroke="#22C55E" stroke-width="2"/>
  <polygon points="384,187 378,202 386,202 383,215 395,198 387,198 391,187" fill="#22C55E"/>

  <text x="387" y="245" text-anchor="middle" font-size="12" fill="#1E293B" font-weight="500">Claude MUST pick</text>
  <text x="387" y="260" text-anchor="middle" font-size="12" fill="#1E293B" font-weight="500">one of your tools</text>

  <line x1="300" y1="280" x2="475" y2="280" stroke="#BBF7D0" stroke-width="1"/>

  <text x="387" y="302" text-anchor="middle" font-size="11" fill="#6B7280" font-weight="500">Response is always:</text>
  <text x="387" y="320" text-anchor="middle" font-size="11" fill="#1E293B">ToolUseBlock</text>
  <text x="387" y="338" text-anchor="middle" font-size="11" fill="#1E293B">(Claude picks which)</text>

  <text x="387" y="370" text-anchor="middle" font-size="11" fill="#6B7280" font-weight="500">Use case:</text>
  <text x="387" y="388" text-anchor="middle" font-size="10" fill="#1E293B">Structured workflows</text>
  <text x="387" y="403" text-anchor="middle" font-size="10" fill="#1E293B">where every turn must</text>
  <text x="387" y="418" text-anchor="middle" font-size="10" fill="#1E293B">produce a tool call.</text>

  <rect x="300" y="432" width="175" height="22" rx="4" fill="#0F172A"/>
  <text x="387" y="447" text-anchor="middle" font-size="10" font-family="Menlo, monospace" fill="#34D399">{"type": "any"}</text>

  <!-- Column 3: tool (Purple) -->
  <rect x="520" y="85" width="225" height="380" rx="10" fill="#FAF5FF" stroke="#8B5CF6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="520" y="85" width="225" height="44" rx="10" fill="#8B5CF6"/>
  <rect x="520" y="121" width="225" height="8" fill="#8B5CF6"/>
  <text x="632" y="113" text-anchor="middle" font-size="16" font-weight="600" fill="white">tool (forced)</text>

  <rect x="555" y="145" width="155" height="26" rx="13" fill="#EDE9FE"/>
  <text x="632" y="163" text-anchor="middle" font-size="11" font-weight="600" fill="#8B5CF6">forced specific tool</text>

  <!-- Icon: target -->
  <circle cx="632" cy="200" r="22" fill="white" stroke="#8B5CF6" stroke-width="2"/>
  <circle cx="632" cy="200" r="13" fill="none" stroke="#8B5CF6" stroke-width="2"/>
  <circle cx="632" cy="200" r="5" fill="#8B5CF6"/>

  <text x="632" y="245" text-anchor="middle" font-size="12" fill="#1E293B" font-weight="500">You name THE tool</text>
  <text x="632" y="260" text-anchor="middle" font-size="12" fill="#1E293B" font-weight="500">Claude must call it</text>

  <line x1="545" y1="280" x2="720" y2="280" stroke="#DDD6FE" stroke-width="1"/>

  <text x="632" y="302" text-anchor="middle" font-size="11" fill="#6B7280" font-weight="500">Response is always:</text>
  <text x="632" y="320" text-anchor="middle" font-size="11" fill="#1E293B">ToolUseBlock for</text>
  <text x="632" y="338" text-anchor="middle" font-size="11" fill="#1E293B">that specific name</text>

  <text x="632" y="370" text-anchor="middle" font-size="11" fill="#6B7280" font-weight="500">Use case:</text>
  <text x="632" y="388" text-anchor="middle" font-size="10" fill="#1E293B">Extract structured data</text>
  <text x="632" y="403" text-anchor="middle" font-size="10" fill="#1E293B">via a schema tool (JSON</text>
  <text x="632" y="418" text-anchor="middle" font-size="10" fill="#1E293B">mode equivalent).</text>

  <rect x="545" y="432" width="180" height="22" rx="4" fill="#0F172A"/>
  <text x="635" y="447" text-anchor="middle" font-size="9" font-family="Menlo, monospace" fill="#34D399">{"type":"tool","name":"x"}</text>

  <!-- Column 4: none (Red) -->
  <rect x="765" y="85" width="225" height="380" rx="10" fill="#FEF2F2" stroke="#EF4444" stroke-width="2" filter="url(#shadow)"/>
  <rect x="765" y="85" width="225" height="44" rx="10" fill="#EF4444"/>
  <rect x="765" y="121" width="225" height="8" fill="#EF4444"/>
  <text x="877" y="113" text-anchor="middle" font-size="16" font-weight="600" fill="white">none</text>

  <rect x="805" y="145" width="145" height="26" rx="13" fill="#FEE2E2"/>
  <text x="877" y="163" text-anchor="middle" font-size="11" font-weight="600" fill="#EF4444">no tool calls</text>

  <!-- Icon: circle slash -->
  <circle cx="877" cy="200" r="22" fill="white" stroke="#EF4444" stroke-width="2"/>
  <line x1="862" y1="185" x2="892" y2="215" stroke="#EF4444" stroke-width="3"/>

  <text x="877" y="245" text-anchor="middle" font-size="12" fill="#1E293B" font-weight="500">Tools disabled</text>
  <text x="877" y="260" text-anchor="middle" font-size="12" fill="#1E293B" font-weight="500">Claude only chats</text>

  <line x1="790" y1="280" x2="965" y2="280" stroke="#FECACA" stroke-width="1"/>

  <text x="877" y="302" text-anchor="middle" font-size="11" fill="#6B7280" font-weight="500">Response is always:</text>
  <text x="877" y="320" text-anchor="middle" font-size="11" fill="#1E293B">TextBlock</text>
  <text x="877" y="338" text-anchor="middle" font-size="11" fill="#1E293B">(stop_reason end_turn)</text>

  <text x="877" y="370" text-anchor="middle" font-size="11" fill="#6B7280" font-weight="500">Use case:</text>
  <text x="877" y="388" text-anchor="middle" font-size="10" fill="#1E293B">Keep tools in context</text>
  <text x="877" y="403" text-anchor="middle" font-size="10" fill="#1E293B">but temporarily force a</text>
  <text x="877" y="418" text-anchor="middle" font-size="10" fill="#1E293B">chat-only turn.</text>

  <rect x="790" y="432" width="175" height="22" rx="4" fill="#0F172A"/>
  <text x="877" y="447" text-anchor="middle" font-size="10" font-family="Menlo, monospace" fill="#34D399">{"type": "none"}</text>

  <!-- Bottom summary -->
  <rect x="100" y="495" width="800" height="50" rx="8" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1"/>
  <text x="500" y="520" text-anchor="middle" font-size="13" fill="#1E293B" font-weight="500">auto = let Claude decide  |  any = force a tool  |  tool = force a specific one  |  none = disable tools</text>
  <text x="500" y="538" text-anchor="middle" font-size="11" fill="#6B7280">Also: set disable_parallel_tool_use=true to force one tool call per turn.</text>
</svg>
