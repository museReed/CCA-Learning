<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" font-family="SF Pro Display, -apple-system, sans-serif">
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/></filter>
  </defs>
  <rect width="1000" height="560" fill="white"/>

  <!-- Title -->
  <text x="500" y="40" text-anchor="middle" font-size="20" font-weight="600" fill="#1E293B">四種 tool_choice 模式</text>
  <text x="500" y="62" text-anchor="middle" font-size="13" fill="#6B7280">精細控制 Claude 何時與如何呼叫工具</text>

  <!-- Column 1: auto (Blue) -->
  <rect x="30" y="85" width="225" height="380" rx="10" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="30" y="85" width="225" height="44" rx="10" fill="#3B82F6"/>
  <rect x="30" y="121" width="225" height="8" fill="#3B82F6"/>
  <text x="142" y="113" text-anchor="middle" font-size="16" font-weight="600" fill="white">auto</text>

  <rect x="70" y="145" width="145" height="26" rx="13" fill="#DBEAFE"/>
  <text x="142" y="163" text-anchor="middle" font-size="11" font-weight="600" fill="#3B82F6">預設行為</text>

  <!-- Icon: brain -->
  <circle cx="142" cy="200" r="22" fill="white" stroke="#3B82F6" stroke-width="2"/>
  <text x="142" y="207" text-anchor="middle" font-size="16" fill="#3B82F6">?</text>

  <text x="142" y="245" text-anchor="middle" font-size="12" fill="#1E293B" font-weight="500">由 Claude 自行判斷</text>
  <text x="142" y="260" text-anchor="middle" font-size="12" fill="#1E293B" font-weight="500">是否需要使用工具</text>

  <line x1="55" y1="280" x2="230" y2="280" stroke="#BFDBFE" stroke-width="1"/>

  <text x="142" y="302" text-anchor="middle" font-size="11" fill="#6B7280" font-weight="500">回應可能是:</text>
  <text x="142" y="320" text-anchor="middle" font-size="11" fill="#1E293B">TextBlock (對話)</text>
  <text x="142" y="338" text-anchor="middle" font-size="11" fill="#1E293B">或 ToolUseBlock</text>

  <text x="142" y="370" text-anchor="middle" font-size="11" fill="#6B7280" font-weight="500">適用情境:</text>
  <text x="142" y="388" text-anchor="middle" font-size="10" fill="#1E293B">通用代理程式, 讓</text>
  <text x="142" y="403" text-anchor="middle" font-size="10" fill="#1E293B">Claude 自己判斷工具</text>
  <text x="142" y="418" text-anchor="middle" font-size="10" fill="#1E293B">是否有幫助。</text>

  <rect x="55" y="432" width="175" height="22" rx="4" fill="#0F172A"/>
  <text x="142" y="447" text-anchor="middle" font-size="10" font-family="Menlo, monospace" fill="#34D399">{"type": "auto"}</text>

  <!-- Column 2: any (Green) -->
  <rect x="275" y="85" width="225" height="380" rx="10" fill="#F0FDF4" stroke="#22C55E" stroke-width="2" filter="url(#shadow)"/>
  <rect x="275" y="85" width="225" height="44" rx="10" fill="#22C55E"/>
  <rect x="275" y="121" width="225" height="8" fill="#22C55E"/>
  <text x="387" y="113" text-anchor="middle" font-size="16" font-weight="600" fill="white">any</text>

  <rect x="315" y="145" width="145" height="26" rx="13" fill="#DCFCE7"/>
  <text x="387" y="163" text-anchor="middle" font-size="11" font-weight="600" fill="#22C55E">強制使用工具</text>

  <!-- Icon: lightning -->
  <circle cx="387" cy="200" r="22" fill="white" stroke="#22C55E" stroke-width="2"/>
  <polygon points="384,187 378,202 386,202 383,215 395,198 387,198 391,187" fill="#22C55E"/>

  <text x="387" y="245" text-anchor="middle" font-size="12" fill="#1E293B" font-weight="500">Claude 必須從你的</text>
  <text x="387" y="260" text-anchor="middle" font-size="12" fill="#1E293B" font-weight="500">工具中挑一個呼叫</text>

  <line x1="300" y1="280" x2="475" y2="280" stroke="#BBF7D0" stroke-width="1"/>

  <text x="387" y="302" text-anchor="middle" font-size="11" fill="#6B7280" font-weight="500">回應一定是:</text>
  <text x="387" y="320" text-anchor="middle" font-size="11" fill="#1E293B">ToolUseBlock</text>
  <text x="387" y="338" text-anchor="middle" font-size="11" fill="#1E293B">(Claude 自選哪一個)</text>

  <text x="387" y="370" text-anchor="middle" font-size="11" fill="#6B7280" font-weight="500">適用情境:</text>
  <text x="387" y="388" text-anchor="middle" font-size="10" fill="#1E293B">結構化工作流, 每</text>
  <text x="387" y="403" text-anchor="middle" font-size="10" fill="#1E293B">回合都必須產出工</text>
  <text x="387" y="418" text-anchor="middle" font-size="10" fill="#1E293B">具呼叫。</text>

  <rect x="300" y="432" width="175" height="22" rx="4" fill="#0F172A"/>
  <text x="387" y="447" text-anchor="middle" font-size="10" font-family="Menlo, monospace" fill="#34D399">{"type": "any"}</text>

  <!-- Column 3: tool (Purple) -->
  <rect x="520" y="85" width="225" height="380" rx="10" fill="#FAF5FF" stroke="#8B5CF6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="520" y="85" width="225" height="44" rx="10" fill="#8B5CF6"/>
  <rect x="520" y="121" width="225" height="8" fill="#8B5CF6"/>
  <text x="632" y="113" text-anchor="middle" font-size="16" font-weight="600" fill="white">tool (指定)</text>

  <rect x="555" y="145" width="155" height="26" rx="13" fill="#EDE9FE"/>
  <text x="632" y="163" text-anchor="middle" font-size="11" font-weight="600" fill="#8B5CF6">強制特定工具</text>

  <!-- Icon: target -->
  <circle cx="632" cy="200" r="22" fill="white" stroke="#8B5CF6" stroke-width="2"/>
  <circle cx="632" cy="200" r="13" fill="none" stroke="#8B5CF6" stroke-width="2"/>
  <circle cx="632" cy="200" r="5" fill="#8B5CF6"/>

  <text x="632" y="245" text-anchor="middle" font-size="12" fill="#1E293B" font-weight="500">你指定特定工具</text>
  <text x="632" y="260" text-anchor="middle" font-size="12" fill="#1E293B" font-weight="500">Claude 一定要呼叫它</text>

  <line x1="545" y1="280" x2="720" y2="280" stroke="#DDD6FE" stroke-width="1"/>

  <text x="632" y="302" text-anchor="middle" font-size="11" fill="#6B7280" font-weight="500">回應一定是:</text>
  <text x="632" y="320" text-anchor="middle" font-size="11" fill="#1E293B">指定名稱的</text>
  <text x="632" y="338" text-anchor="middle" font-size="11" fill="#1E293B">ToolUseBlock</text>

  <text x="632" y="370" text-anchor="middle" font-size="11" fill="#6B7280" font-weight="500">適用情境:</text>
  <text x="632" y="388" text-anchor="middle" font-size="10" fill="#1E293B">用 schema 工具萃取</text>
  <text x="632" y="403" text-anchor="middle" font-size="10" fill="#1E293B">結構化資料 (等同</text>
  <text x="632" y="418" text-anchor="middle" font-size="10" fill="#1E293B">JSON 模式)。</text>

  <rect x="545" y="432" width="180" height="22" rx="4" fill="#0F172A"/>
  <text x="635" y="447" text-anchor="middle" font-size="9" font-family="Menlo, monospace" fill="#34D399">{"type":"tool","name":"x"}</text>

  <!-- Column 4: none (Red) -->
  <rect x="765" y="85" width="225" height="380" rx="10" fill="#FEF2F2" stroke="#EF4444" stroke-width="2" filter="url(#shadow)"/>
  <rect x="765" y="85" width="225" height="44" rx="10" fill="#EF4444"/>
  <rect x="765" y="121" width="225" height="8" fill="#EF4444"/>
  <text x="877" y="113" text-anchor="middle" font-size="16" font-weight="600" fill="white">none</text>

  <rect x="805" y="145" width="145" height="26" rx="13" fill="#FEE2E2"/>
  <text x="877" y="163" text-anchor="middle" font-size="11" font-weight="600" fill="#EF4444">禁用工具呼叫</text>

  <!-- Icon: circle slash -->
  <circle cx="877" cy="200" r="22" fill="white" stroke="#EF4444" stroke-width="2"/>
  <line x1="862" y1="185" x2="892" y2="215" stroke="#EF4444" stroke-width="3"/>

  <text x="877" y="245" text-anchor="middle" font-size="12" fill="#1E293B" font-weight="500">停用工具</text>
  <text x="877" y="260" text-anchor="middle" font-size="12" fill="#1E293B" font-weight="500">Claude 僅進行對話</text>

  <line x1="790" y1="280" x2="965" y2="280" stroke="#FECACA" stroke-width="1"/>

  <text x="877" y="302" text-anchor="middle" font-size="11" fill="#6B7280" font-weight="500">回應一定是:</text>
  <text x="877" y="320" text-anchor="middle" font-size="11" fill="#1E293B">TextBlock</text>
  <text x="877" y="338" text-anchor="middle" font-size="11" fill="#1E293B">(stop_reason: end_turn)</text>

  <text x="877" y="370" text-anchor="middle" font-size="11" fill="#6B7280" font-weight="500">適用情境:</text>
  <text x="877" y="388" text-anchor="middle" font-size="10" fill="#1E293B">工具定義保留在</text>
  <text x="877" y="403" text-anchor="middle" font-size="10" fill="#1E293B">context 中, 但暫時</text>
  <text x="877" y="418" text-anchor="middle" font-size="10" fill="#1E293B">強制只做對話。</text>

  <rect x="790" y="432" width="175" height="22" rx="4" fill="#0F172A"/>
  <text x="877" y="447" text-anchor="middle" font-size="10" font-family="Menlo, monospace" fill="#34D399">{"type": "none"}</text>

  <!-- Bottom summary -->
  <rect x="100" y="495" width="800" height="50" rx="8" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1"/>
  <text x="500" y="520" text-anchor="middle" font-size="13" fill="#1E293B" font-weight="500">auto = 讓 Claude 決定  |  any = 強制用工具  |  tool = 強制用指定工具  |  none = 禁用工具</text>
  <text x="500" y="538" text-anchor="middle" font-size="11" fill="#6B7280">另可設 disable_parallel_tool_use=true, 每回合只允許一次工具呼叫。</text>
</svg>
