<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" font-family="SF Pro Display, -apple-system, sans-serif">
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/></filter>
    <linearGradient id="tempGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="33%" stop-color="#8B5CF6"/>
      <stop offset="66%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#EF4444"/>
    </linearGradient>
  </defs>
  <rect width="1000" height="600" fill="white"/>

  <!-- Title -->
  <text x="500" y="40" text-anchor="middle" font-size="20" font-weight="600" fill="#1E293B">The Temperature Spectrum</text>
  <text x="500" y="62" text-anchor="middle" font-size="13" fill="#6B7280">0.0 to 1.0 — controls how Claude samples from the token probability distribution</text>

  <!-- Main gradient bar -->
  <rect x="80" y="120" width="840" height="48" rx="24" fill="url(#tempGradient)" filter="url(#shadow)"/>

  <!-- Ticks + value labels -->
  <line x1="100" y1="120" x2="100" y2="180" stroke="#1E293B" stroke-width="2"/>
  <text x="100" y="200" text-anchor="middle" font-size="14" font-weight="700" fill="#1E293B">0.0</text>

  <line x1="320" y1="120" x2="320" y2="180" stroke="#1E293B" stroke-width="2"/>
  <text x="320" y="200" text-anchor="middle" font-size="14" font-weight="700" fill="#1E293B">0.3</text>

  <line x1="550" y1="120" x2="550" y2="180" stroke="#1E293B" stroke-width="2"/>
  <text x="550" y="200" text-anchor="middle" font-size="14" font-weight="700" fill="#1E293B">0.7</text>

  <line x1="900" y1="120" x2="900" y2="180" stroke="#1E293B" stroke-width="2"/>
  <text x="900" y="200" text-anchor="middle" font-size="14" font-weight="700" fill="#1E293B">1.0</text>

  <!-- Endpoint labels -->
  <text x="100" y="108" text-anchor="middle" font-size="11" fill="#3B82F6" font-weight="600">cold · deterministic</text>
  <text x="900" y="108" text-anchor="middle" font-size="11" fill="#EF4444" font-weight="600">hot · creative</text>

  <!-- Default marker -->
  <polygon points="900,112 895,98 905,98" fill="#EF4444"/>
  <text x="780" y="88" font-size="10" fill="#6B7280">default on Claude 3+ is 1.0</text>

  <!-- Four marker cards -->
  <!-- 0.0 card -->
  <rect x="30" y="230" width="220" height="240" rx="10" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="30" y="230" width="220" height="38" rx="10" fill="#3B82F6"/>
  <rect x="30" y="260" width="220" height="8" fill="#3B82F6"/>
  <text x="140" y="254" text-anchor="middle" font-size="14" font-weight="600" fill="white">0.0 — Deterministic</text>
  <text x="140" y="287" text-anchor="middle" font-size="11" fill="#1E40AF" font-weight="600">"Same answer, every time"</text>

  <text x="50" y="315" font-size="11" font-weight="700" fill="#1E40AF">Best for</text>
  <circle cx="57" cy="332" r="3" fill="#3B82F6"/>
  <text x="67" y="336" font-size="11" fill="#1E293B">Data extraction</text>
  <circle cx="57" cy="352" r="3" fill="#3B82F6"/>
  <text x="67" y="356" font-size="11" fill="#1E293B">Classification</text>
  <circle cx="57" cy="372" r="3" fill="#3B82F6"/>
  <text x="67" y="376" font-size="11" fill="#1E293B">Code generation</text>
  <circle cx="57" cy="392" r="3" fill="#3B82F6"/>
  <text x="67" y="396" font-size="11" fill="#1E293B">Schema-strict output</text>
  <circle cx="57" cy="412" r="3" fill="#3B82F6"/>
  <text x="67" y="416" font-size="11" fill="#1E293B">Unit-test reliable calls</text>

  <rect x="45" y="432" width="190" height="24" rx="4" fill="#0F172A"/>
  <text x="140" y="448" text-anchor="middle" font-size="10" font-family="Menlo, monospace" fill="#34D399">temperature=0.0</text>

  <!-- 0.3 card -->
  <rect x="265" y="230" width="220" height="240" rx="10" fill="#FAF5FF" stroke="#8B5CF6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="265" y="230" width="220" height="38" rx="10" fill="#8B5CF6"/>
  <rect x="265" y="260" width="220" height="8" fill="#8B5CF6"/>
  <text x="375" y="254" text-anchor="middle" font-size="14" font-weight="600" fill="white">0.3 — Low Creativity</text>
  <text x="375" y="287" text-anchor="middle" font-size="11" fill="#5B21B6" font-weight="600">"Mostly consistent, slight variation"</text>

  <text x="285" y="315" font-size="11" font-weight="700" fill="#5B21B6">Best for</text>
  <circle cx="292" cy="332" r="3" fill="#8B5CF6"/>
  <text x="302" y="336" font-size="11" fill="#1E293B">Customer support bots</text>
  <circle cx="292" cy="352" r="3" fill="#8B5CF6"/>
  <text x="302" y="356" font-size="11" fill="#1E293B">Factual Q&amp;A</text>
  <circle cx="292" cy="372" r="3" fill="#8B5CF6"/>
  <text x="302" y="376" font-size="11" fill="#1E293B">Document summaries</text>
  <circle cx="292" cy="392" r="3" fill="#8B5CF6"/>
  <text x="302" y="396" font-size="11" fill="#1E293B">Technical explanations</text>
  <circle cx="292" cy="412" r="3" fill="#8B5CF6"/>
  <text x="302" y="416" font-size="11" fill="#1E293B">Compliance / policy text</text>

  <rect x="280" y="432" width="190" height="24" rx="4" fill="#0F172A"/>
  <text x="375" y="448" text-anchor="middle" font-size="10" font-family="Menlo, monospace" fill="#34D399">temperature=0.3</text>

  <!-- 0.7 card -->
  <rect x="500" y="230" width="220" height="240" rx="10" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2" filter="url(#shadow)"/>
  <rect x="500" y="230" width="220" height="38" rx="10" fill="#F59E0B"/>
  <rect x="500" y="260" width="220" height="8" fill="#F59E0B"/>
  <text x="610" y="254" text-anchor="middle" font-size="14" font-weight="600" fill="white">0.7 — Balanced</text>
  <text x="610" y="287" text-anchor="middle" font-size="11" fill="#92400E" font-weight="600">"Default-ish — natural variety"</text>

  <text x="520" y="315" font-size="11" font-weight="700" fill="#92400E">Best for</text>
  <circle cx="527" cy="332" r="3" fill="#F59E0B"/>
  <text x="537" y="336" font-size="11" fill="#1E293B">General chatbots</text>
  <circle cx="527" cy="352" r="3" fill="#F59E0B"/>
  <text x="537" y="356" font-size="11" fill="#1E293B">Email / writing drafts</text>
  <circle cx="527" cy="372" r="3" fill="#F59E0B"/>
  <text x="537" y="376" font-size="11" fill="#1E293B">Explanations with flair</text>
  <circle cx="527" cy="392" r="3" fill="#F59E0B"/>
  <text x="537" y="396" font-size="11" fill="#1E293B">Tutoring agents</text>
  <circle cx="527" cy="412" r="3" fill="#F59E0B"/>
  <text x="537" y="416" font-size="11" fill="#1E293B">Most general-purpose use</text>

  <rect x="515" y="432" width="190" height="24" rx="4" fill="#0F172A"/>
  <text x="610" y="448" text-anchor="middle" font-size="10" font-family="Menlo, monospace" fill="#34D399">temperature=0.7</text>

  <!-- 1.0 card -->
  <rect x="735" y="230" width="220" height="240" rx="10" fill="#FEF2F2" stroke="#EF4444" stroke-width="2" filter="url(#shadow)"/>
  <rect x="735" y="230" width="220" height="38" rx="10" fill="#EF4444"/>
  <rect x="735" y="260" width="220" height="8" fill="#EF4444"/>
  <text x="845" y="254" text-anchor="middle" font-size="14" font-weight="600" fill="white">1.0 — Max Creative</text>
  <text x="845" y="287" text-anchor="middle" font-size="11" fill="#991B1B" font-weight="600">"Surprise me — maximum variety"</text>

  <text x="755" y="315" font-size="11" font-weight="700" fill="#991B1B">Best for</text>
  <circle cx="762" cy="332" r="3" fill="#EF4444"/>
  <text x="772" y="336" font-size="11" fill="#1E293B">Brainstorming</text>
  <circle cx="762" cy="352" r="3" fill="#EF4444"/>
  <text x="772" y="356" font-size="11" fill="#1E293B">Poetry / fiction</text>
  <circle cx="762" cy="372" r="3" fill="#EF4444"/>
  <text x="772" y="376" font-size="11" fill="#1E293B">Marketing taglines</text>
  <circle cx="762" cy="392" r="3" fill="#EF4444"/>
  <text x="772" y="396" font-size="11" fill="#1E293B">Divergent idea lists</text>
  <circle cx="762" cy="412" r="3" fill="#EF4444"/>
  <text x="772" y="416" font-size="11" fill="#1E293B">Name / slogan generation</text>

  <rect x="750" y="432" width="190" height="24" rx="4" fill="#0F172A"/>
  <text x="845" y="448" text-anchor="middle" font-size="10" font-family="Menlo, monospace" fill="#34D399">temperature=1.0</text>

  <!-- Bottom myth-buster -->
  <rect x="60" y="495" width="880" height="90" rx="10" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1"/>
  <text x="500" y="520" text-anchor="middle" font-size="13" font-weight="700" fill="#1E293B">Temperature is NOT a randomness knob — it reshapes the probability distribution</text>
  <text x="500" y="542" text-anchor="middle" font-size="11" fill="#475569">Low: most-likely tokens dominate (peaks sharpen) → repetitive &amp; stable output.</text>
  <text x="500" y="560" text-anchor="middle" font-size="11" fill="#475569">High: less-likely tokens get more weight (peaks flatten) → surprising but can derail on factual tasks.</text>
  <text x="500" y="578" text-anchor="middle" font-size="10" fill="#6B7280">Rule of thumb: extraction/code → 0.0; chat → 0.3–0.7; brainstorm → 1.0. When in doubt, start at 1.0 and lower if output is too wild.</text>
</svg>
