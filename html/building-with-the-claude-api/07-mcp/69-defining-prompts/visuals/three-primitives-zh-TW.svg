<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" font-family="PingFang TC, -apple-system, sans-serif">
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/></filter>
  </defs>
  <rect width="1000" height="600" fill="white"/>

  <!-- Title -->
  <text x="500" y="36" text-anchor="middle" font-size="20" font-weight="600" fill="#1E293B">MCP 三大基元（Primitives）</text>
  <text x="500" y="58" text-anchor="middle" font-size="13" fill="#6B7280">Tools、Resources、Prompts 各由不同角色控制：模型、應用、或使用者</text>

  <!-- Card 1: Tools -->
  <rect x="30" y="90" width="305" height="470" rx="12" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="30" y="90" width="305" height="48" rx="12" fill="#3B82F6"/>
  <rect x="30" y="126" width="305" height="12" fill="#3B82F6"/>
  <text x="182" y="120" text-anchor="middle" font-size="16" font-weight="600" fill="white">Tools</text>

  <rect x="50" y="156" width="265" height="32" rx="16" fill="#DBEAFE"/>
  <text x="182" y="176" text-anchor="middle" font-size="11" font-weight="700" fill="#1E40AF">由模型控制（Model-controlled）</text>

  <text x="50" y="210" font-size="10" font-weight="700" fill="#6B7280">誰決定使用</text>
  <text x="50" y="226" font-size="11" fill="#1E293B">Claude 根據使用者提問</text>
  <text x="50" y="240" font-size="11" fill="#1E293B">自動選擇何時呼叫。</text>

  <text x="50" y="270" font-size="10" font-weight="700" fill="#6B7280">用途</text>
  <text x="50" y="286" font-size="11" fill="#1E293B">執行動作</text>
  <text x="50" y="300" font-size="11" fill="#1E293B">（允許有副作用）</text>

  <text x="50" y="330" font-size="10" font-weight="700" fill="#6B7280">使用情境</text>
  <text x="50" y="346" font-size="11" fill="#1E293B">編輯文件、寄信、</text>
  <text x="50" y="360" font-size="11" fill="#1E293B">建立 GitHub issue</text>

  <text x="50" y="390" font-size="10" font-weight="700" fill="#6B7280">範例</text>
  <rect x="50" y="398" width="265" height="120" rx="6" fill="#0F172A"/>
  <text x="62" y="416" font-size="10" font-family="Menlo, monospace" fill="#94A3B8">@mcp.tool()</text>
  <text x="62" y="430" font-size="10" font-family="Menlo, monospace" fill="#E2E8F0">def edit_document(</text>
  <text x="62" y="444" font-size="10" font-family="Menlo, monospace" fill="#E2E8F0">  doc_id: str,</text>
  <text x="62" y="458" font-size="10" font-family="Menlo, monospace" fill="#E2E8F0">  old: str,</text>
  <text x="62" y="472" font-size="10" font-family="Menlo, monospace" fill="#E2E8F0">  new: str,</text>
  <text x="62" y="486" font-size="10" font-family="Menlo, monospace" fill="#E2E8F0">) -&gt; str:</text>
  <text x="62" y="500" font-size="10" font-family="Menlo, monospace" fill="#34D399">  docs[doc_id] = ...</text>
  <text x="62" y="514" font-size="10" font-family="Menlo, monospace" fill="#34D399">  return "ok"</text>

  <rect x="50" y="528" width="265" height="20" rx="4" fill="white" stroke="#93C5FD" stroke-width="1"/>
  <text x="182" y="542" text-anchor="middle" font-size="10" font-family="Menlo, monospace" fill="#1E40AF">ListToolsRequest · CallToolRequest</text>

  <!-- Card 2: Resources -->
  <rect x="347" y="90" width="305" height="470" rx="12" fill="#F0FDF4" stroke="#22C55E" stroke-width="2" filter="url(#shadow)"/>
  <rect x="347" y="90" width="305" height="48" rx="12" fill="#22C55E"/>
  <rect x="347" y="126" width="305" height="12" fill="#22C55E"/>
  <text x="500" y="120" text-anchor="middle" font-size="16" font-weight="600" fill="white">Resources</text>

  <rect x="367" y="156" width="265" height="32" rx="16" fill="#DCFCE7"/>
  <text x="500" y="176" text-anchor="middle" font-size="11" font-weight="700" fill="#14532D">由應用控制（App-controlled）</text>

  <text x="367" y="210" font-size="10" font-weight="700" fill="#6B7280">誰決定使用</text>
  <text x="367" y="226" font-size="11" fill="#1E293B">由你的應用決定</text>
  <text x="367" y="240" font-size="11" fill="#1E293B">何時抓取資料。</text>

  <text x="367" y="270" font-size="10" font-weight="700" fill="#6B7280">用途</text>
  <text x="367" y="286" font-size="11" fill="#1E293B">對外暴露唯讀資料</text>
  <text x="367" y="300" font-size="11" fill="#1E293B">（類似 GET endpoint）</text>

  <text x="367" y="330" font-size="10" font-weight="700" fill="#6B7280">使用情境</text>
  <text x="367" y="346" font-size="11" fill="#1E293B">文件 @mention、檔案瀏覽、</text>
  <text x="367" y="360" font-size="11" fill="#1E293B">repo 列表顯示</text>

  <text x="367" y="390" font-size="10" font-weight="700" fill="#6B7280">範例</text>
  <rect x="367" y="398" width="265" height="120" rx="6" fill="#0F172A"/>
  <text x="379" y="416" font-size="10" font-family="Menlo, monospace" fill="#94A3B8">@mcp.resource(</text>
  <text x="379" y="430" font-size="10" font-family="Menlo, monospace" fill="#34D399">  "docs://{doc_id}",</text>
  <text x="379" y="444" font-size="10" font-family="Menlo, monospace" fill="#FBBF24">  mime_type="text/plain"</text>
  <text x="379" y="458" font-size="10" font-family="Menlo, monospace" fill="#94A3B8">)</text>
  <text x="379" y="472" font-size="10" font-family="Menlo, monospace" fill="#E2E8F0">def fetch_doc(</text>
  <text x="379" y="486" font-size="10" font-family="Menlo, monospace" fill="#E2E8F0">  doc_id: str</text>
  <text x="379" y="500" font-size="10" font-family="Menlo, monospace" fill="#E2E8F0">) -&gt; str:</text>
  <text x="379" y="514" font-size="10" font-family="Menlo, monospace" fill="#34D399">  return docs[doc_id]</text>

  <rect x="367" y="528" width="265" height="20" rx="4" fill="white" stroke="#86EFAC" stroke-width="1"/>
  <text x="500" y="542" text-anchor="middle" font-size="10" font-family="Menlo, monospace" fill="#14532D">ReadResourceRequest · URI-based</text>

  <!-- Card 3: Prompts -->
  <rect x="664" y="90" width="305" height="470" rx="12" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="664" y="90" width="305" height="48" rx="12" fill="#8B5CF6"/>
  <rect x="664" y="126" width="305" height="12" fill="#8B5CF6"/>
  <text x="817" y="120" text-anchor="middle" font-size="16" font-weight="600" fill="white">Prompts</text>

  <rect x="684" y="156" width="265" height="32" rx="16" fill="#EDE9FE"/>
  <text x="817" y="176" text-anchor="middle" font-size="11" font-weight="700" fill="#5B21B6">由使用者控制（User-controlled）</text>

  <text x="684" y="210" font-size="10" font-weight="700" fill="#6B7280">誰決定使用</text>
  <text x="684" y="226" font-size="11" fill="#1E293B">使用者從指令選單</text>
  <text x="684" y="240" font-size="11" fill="#1E293B">（如 slash command）挑選。</text>

  <text x="684" y="270" font-size="10" font-weight="700" fill="#6B7280">用途</text>
  <text x="684" y="286" font-size="11" fill="#1E293B">事先打磨好的模板，</text>
  <text x="684" y="300" font-size="11" fill="#1E293B">回傳可直送的訊息列表</text>

  <text x="684" y="330" font-size="10" font-weight="700" fill="#6B7280">使用情境</text>
  <text x="684" y="346" font-size="11" fill="#1E293B">/format report.pdf —</text>
  <text x="684" y="360" font-size="11" fill="#1E293B">高品質的預設 prompt</text>

  <text x="684" y="390" font-size="10" font-weight="700" fill="#6B7280">範例</text>
  <rect x="684" y="398" width="265" height="120" rx="6" fill="#0F172A"/>
  <text x="696" y="416" font-size="10" font-family="Menlo, monospace" fill="#94A3B8">@mcp.prompt(</text>
  <text x="696" y="430" font-size="10" font-family="Menlo, monospace" fill="#34D399">  name="format",</text>
  <text x="696" y="444" font-size="10" font-family="Menlo, monospace" fill="#FBBF24">  description="..."</text>
  <text x="696" y="458" font-size="10" font-family="Menlo, monospace" fill="#94A3B8">)</text>
  <text x="696" y="472" font-size="10" font-family="Menlo, monospace" fill="#E2E8F0">def format_document(</text>
  <text x="696" y="486" font-size="10" font-family="Menlo, monospace" fill="#E2E8F0">  doc_id: str,</text>
  <text x="696" y="500" font-size="10" font-family="Menlo, monospace" fill="#E2E8F0">) -&gt; list[Message]:</text>
  <text x="696" y="514" font-size="10" font-family="Menlo, monospace" fill="#34D399">  return [UserMessage(...)]</text>

  <rect x="684" y="528" width="265" height="20" rx="4" fill="white" stroke="#C4B5FD" stroke-width="1"/>
  <text x="817" y="542" text-anchor="middle" font-size="10" font-family="Menlo, monospace" fill="#5B21B6">GetPromptRequest · Message list</text>

  <!-- Bottom note -->
  <text x="500" y="582" text-anchor="middle" font-size="11" fill="#6B7280">依「<tspan font-weight="700" fill="#1E293B">誰控制</tspan>」來選擇：模型 → Tools、應用 → Resources、使用者 → Prompts</text>
</svg>
