<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" font-family="PingFang TC, -apple-system, sans-serif">
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/></filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#64748B"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#3B82F6"/>
    </marker>
  </defs>
  <rect width="1000" height="600" fill="white"/>

  <!-- Title -->
  <text x="500" y="36" text-anchor="middle" font-size="20" font-weight="600" fill="#1E293B">MCP Client 架構</text>
  <text x="500" y="58" text-anchor="middle" font-size="13" fill="#6B7280">一個 host 應用可透過 transport-agnostic session 連接多個 MCP servers</text>

  <!-- Host Application (left) -->
  <rect x="40" y="100" width="260" height="440" rx="12" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="40" y="100" width="260" height="44" rx="12" fill="#3B82F6"/>
  <rect x="40" y="132" width="260" height="12" fill="#3B82F6"/>
  <text x="170" y="128" text-anchor="middle" font-size="15" font-weight="600" fill="white">Client Host（你的應用）</text>

  <text x="60" y="170" font-size="11" font-weight="600" fill="#1E40AF">範例</text>

  <rect x="60" y="180" width="220" height="38" rx="8" fill="white" stroke="#93C5FD" stroke-width="1.5"/>
  <circle cx="80" cy="199" r="8" fill="#3B82F6"/>
  <text x="80" y="203" text-anchor="middle" font-size="10" font-weight="700" fill="white">CD</text>
  <text x="96" y="196" font-size="11" font-weight="600" fill="#1E293B">Claude Desktop</text>
  <text x="96" y="210" font-size="9" fill="#6B7280">現成的 MCP host</text>

  <rect x="60" y="226" width="220" height="38" rx="8" fill="white" stroke="#93C5FD" stroke-width="1.5"/>
  <circle cx="80" cy="245" r="8" fill="#3B82F6"/>
  <text x="80" y="249" text-anchor="middle" font-size="10" font-weight="700" fill="white">CR</text>
  <text x="96" y="242" font-size="11" font-weight="600" fill="#1E293B">Cursor / IDE</text>
  <text x="96" y="256" font-size="9" fill="#6B7280">支援 MCP 的編輯器</text>

  <rect x="60" y="272" width="220" height="38" rx="8" fill="white" stroke="#93C5FD" stroke-width="1.5"/>
  <circle cx="80" cy="291" r="8" fill="#3B82F6"/>
  <text x="80" y="295" text-anchor="middle" font-size="10" font-weight="700" fill="white">U</text>
  <text x="96" y="288" font-size="11" font-weight="600" fill="#1E293B">自訂應用</text>
  <text x="96" y="302" font-size="9" fill="#6B7280">CLI、chatbot、server</text>

  <!-- MCP Client library box -->
  <rect x="60" y="330" width="220" height="92" rx="8" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="170" y="352" text-anchor="middle" font-size="11" font-weight="700" fill="#1E40AF">MCP Client Library</text>
  <text x="170" y="368" text-anchor="middle" font-size="9" fill="#1E293B">ClientSession（Python SDK）</text>
  <rect x="74" y="378" width="192" height="18" rx="4" fill="#0F172A"/>
  <text x="170" y="391" text-anchor="middle" font-size="9" font-family="Menlo, monospace" fill="#34D399">list_tools() / call_tool()</text>
  <rect x="74" y="400" width="192" height="18" rx="4" fill="#0F172A"/>
  <text x="170" y="413" text-anchor="middle" font-size="9" font-family="Menlo, monospace" fill="#34D399">read_resource() / get_prompt()</text>

  <text x="170" y="442" text-anchor="middle" font-size="10" fill="#6B7280">處理訊息傳遞、協定細節</text>
  <text x="170" y="456" text-anchor="middle" font-size="10" fill="#6B7280">與資源清理</text>

  <rect x="60" y="476" width="220" height="48" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="170" y="494" text-anchor="middle" font-size="10" font-weight="700" fill="#92400E">Claude API（anthropic SDK）</text>
  <text x="170" y="510" text-anchor="middle" font-size="9" fill="#78350F">messages.create(tools=[...])</text>

  <!-- Transport Layer (middle) -->
  <rect x="340" y="160" width="160" height="320" rx="12" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2" filter="url(#shadow)"/>
  <rect x="340" y="160" width="160" height="40" rx="12" fill="#F59E0B"/>
  <rect x="340" y="188" width="160" height="12" fill="#F59E0B"/>
  <text x="420" y="185" text-anchor="middle" font-size="13" font-weight="600" fill="white">Transport 層</text>

  <text x="420" y="220" text-anchor="middle" font-size="10" font-weight="600" fill="#92400E">傳輸無關（agnostic）</text>

  <rect x="356" y="232" width="128" height="48" rx="6" fill="white" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="420" y="250" text-anchor="middle" font-size="11" font-weight="700" fill="#92400E">stdio</text>
  <text x="420" y="266" text-anchor="middle" font-size="9" fill="#78350F">同機器透過</text>
  <text x="420" y="276" text-anchor="middle" font-size="9" fill="#78350F">stdin/stdout 管線</text>

  <rect x="356" y="290" width="128" height="48" rx="6" fill="white" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="420" y="308" text-anchor="middle" font-size="11" font-weight="700" fill="#92400E">HTTP / SSE</text>
  <text x="420" y="324" text-anchor="middle" font-size="9" fill="#78350F">網路連線</text>
  <text x="420" y="334" text-anchor="middle" font-size="9" fill="#78350F">遠端 server</text>

  <rect x="356" y="348" width="128" height="48" rx="6" fill="white" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="420" y="366" text-anchor="middle" font-size="11" font-weight="700" fill="#92400E">WebSockets</text>
  <text x="420" y="382" text-anchor="middle" font-size="9" fill="#78350F">雙向通訊</text>
  <text x="420" y="392" text-anchor="middle" font-size="9" fill="#78350F">適合 streaming</text>

  <rect x="356" y="410" width="128" height="52" rx="6" fill="#FEF9C3" stroke="#84CC16" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="420" y="428" text-anchor="middle" font-size="10" font-weight="700" fill="#3F6212">JSON-RPC 2.0</text>
  <text x="420" y="442" text-anchor="middle" font-size="9" fill="#365314">ListToolsRequest</text>
  <text x="420" y="454" text-anchor="middle" font-size="9" fill="#365314">CallToolRequest</text>

  <!-- MCP Servers (right) — 1:N -->
  <text x="700" y="120" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">一個 client  ↔  多個 server（1:N）</text>

  <rect x="560" y="140" width="400" height="120" rx="12" fill="#F0FDF4" stroke="#22C55E" stroke-width="2" filter="url(#shadow)"/>
  <rect x="560" y="140" width="400" height="38" rx="12" fill="#22C55E"/>
  <rect x="560" y="166" width="400" height="12" fill="#22C55E"/>
  <text x="760" y="164" text-anchor="middle" font-size="13" font-weight="600" fill="white">MCP Server — GitHub</text>
  <text x="580" y="198" font-size="10" fill="#14532D">Tools：list_repos、create_issue、search_code</text>
  <text x="580" y="214" font-size="10" fill="#14532D">Resources：repo://{owner}/{name}、issues://...</text>
  <text x="580" y="230" font-size="10" fill="#14532D">Prompts：code_review、pr_summary</text>
  <rect x="580" y="240" width="160" height="16" rx="4" fill="#0F172A"/>
  <text x="660" y="252" text-anchor="middle" font-size="9" font-family="Menlo, monospace" fill="#34D399">stdio transport</text>

  <rect x="560" y="280" width="400" height="120" rx="12" fill="#F0FDF4" stroke="#22C55E" stroke-width="2" filter="url(#shadow)"/>
  <rect x="560" y="280" width="400" height="38" rx="12" fill="#22C55E"/>
  <rect x="560" y="306" width="400" height="12" fill="#22C55E"/>
  <text x="760" y="304" text-anchor="middle" font-size="13" font-weight="600" fill="white">MCP Server — Filesystem</text>
  <text x="580" y="338" font-size="10" fill="#14532D">Tools：read_file、write_file、list_dir</text>
  <text x="580" y="354" font-size="10" fill="#14532D">Resources：file://documents/{doc_id}</text>
  <text x="580" y="370" font-size="10" fill="#14532D">Prompts：format_doc、summarize_file</text>
  <rect x="580" y="380" width="160" height="16" rx="4" fill="#0F172A"/>
  <text x="660" y="392" text-anchor="middle" font-size="9" font-family="Menlo, monospace" fill="#34D399">stdio transport</text>

  <rect x="560" y="420" width="400" height="120" rx="12" fill="#F0FDF4" stroke="#22C55E" stroke-width="2" filter="url(#shadow)"/>
  <rect x="560" y="420" width="400" height="38" rx="12" fill="#22C55E"/>
  <rect x="560" y="446" width="400" height="12" fill="#22C55E"/>
  <text x="760" y="444" text-anchor="middle" font-size="13" font-weight="600" fill="white">MCP Server — Slack（遠端）</text>
  <text x="580" y="478" font-size="10" fill="#14532D">Tools：post_message、list_channels</text>
  <text x="580" y="494" font-size="10" fill="#14532D">Resources：slack://channels/{id}</text>
  <text x="580" y="510" font-size="10" fill="#14532D">Prompts：daily_standup</text>
  <rect x="580" y="520" width="160" height="16" rx="4" fill="#0F172A"/>
  <text x="660" y="532" text-anchor="middle" font-size="9" font-family="Menlo, monospace" fill="#34D399">HTTP transport</text>

  <!-- Arrows from client to transport -->
  <line x1="300" y1="376" x2="340" y2="310" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <!-- Arrows from transport to each server -->
  <line x1="500" y1="260" x2="560" y2="200" stroke="#22C55E" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="500" y1="320" x2="560" y2="340" stroke="#22C55E" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="500" y1="380" x2="560" y2="480" stroke="#22C55E" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Bottom note -->
  <text x="500" y="578" text-anchor="middle" font-size="11" fill="#6B7280">Client 封裝 transport 與協定細節 — 應用只需呼叫 <tspan font-family="Menlo, monospace" fill="#1E293B">list_tools()</tspan> / <tspan font-family="Menlo, monospace" fill="#1E293B">call_tool()</tspan></text>
</svg>
