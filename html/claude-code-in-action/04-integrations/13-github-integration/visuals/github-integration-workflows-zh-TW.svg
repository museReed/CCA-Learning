<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 580" width="800" height="580">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
    <marker id="arrowRight" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748B"/>
    </marker>
    <marker id="arrowDown" markerWidth="10" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748B"/>
    </marker>
    <marker id="arrowRightBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3B82F6"/>
    </marker>
    <marker id="arrowDownGreen" markerWidth="10" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22C55E"/>
    </marker>
    <marker id="arrowDownPurple" markerWidth="10" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8B5CF6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="580" rx="16" fill="#FAFBFC"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-family="'PingFang TC', 'Noto Sans TC', sans-serif" font-size="21" font-weight="700" fill="#1E293B">GitHub 整合：兩個自動化工作流</text>

  <!-- === Top Flow: Installation === -->
  <rect x="40" y="58" width="720" height="56" rx="12" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="400" y="82" text-anchor="middle" font-family="'PingFang TC', 'Noto Sans TC', sans-serif" font-size="13" font-weight="600" fill="#3B82F6">⚙️ 設定流程</text>

  <!-- Installation steps -->
  <rect x="55" y="72" width="155" height="30" rx="8" fill="white" stroke="#93C5FD" stroke-width="1"/>
  <text x="132" y="92" text-anchor="middle" font-family="'SF Pro Display', 'Helvetica Neue', sans-serif" font-size="11" font-weight="500" fill="#2563EB">/install-github-app</text>

  <line x1="215" y1="87" x2="260" y2="87" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arrowRightBlue)"/>

  <rect x="265" y="72" width="185" height="30" rx="8" fill="white" stroke="#93C5FD" stroke-width="1"/>
  <text x="357" y="92" text-anchor="middle" font-family="'PingFang TC', 'Noto Sans TC', sans-serif" font-size="11" font-weight="500" fill="#2563EB">PR 含 2 個 workflow 檔案</text>

  <line x1="455" y1="87" x2="500" y2="87" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arrowRightBlue)"/>

  <rect x="505" y="72" width="100" height="30" rx="8" fill="white" stroke="#93C5FD" stroke-width="1"/>
  <text x="555" y="92" text-anchor="middle" font-family="'PingFang TC', 'Noto Sans TC', sans-serif" font-size="11" font-weight="500" fill="#2563EB">✅ 合併</text>

  <!-- Split indicator -->
  <line x1="400" y1="114" x2="400" y2="140" stroke="#64748B" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="400" y1="140" x2="200" y2="140" stroke="#64748B" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="400" y1="140" x2="600" y2="140" stroke="#64748B" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="200" y1="140" x2="200" y2="160" stroke="#22C55E" stroke-width="1.5" marker-end="url(#arrowDownGreen)"/>
  <line x1="600" y1="140" x2="600" y2="160" stroke="#8B5CF6" stroke-width="1.5" marker-end="url(#arrowDownPurple)"/>

  <!-- === Left Branch: @claude Mention Action === -->
  <rect x="50" y="160" width="300" height="390" rx="12" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.5" filter="url(#shadow)"/>

  <!-- Left title -->
  <text x="200" y="190" text-anchor="middle" font-family="'PingFang TC', 'Noto Sans TC', sans-serif" font-size="16" font-weight="700" fill="#16A34A">@claude 提及動作</text>

  <!-- Trigger -->
  <rect x="100" y="210" width="200" height="40" rx="10" fill="white" stroke="#86EFAC" stroke-width="1.5"/>
  <text x="200" y="226" text-anchor="middle" font-family="'PingFang TC', 'Noto Sans TC', sans-serif" font-size="11" font-weight="600" fill="#15803D">⚡ 觸發條件</text>
  <text x="200" y="242" text-anchor="middle" font-family="'PingFang TC', 'Noto Sans TC', sans-serif" font-size="11" fill="#166534">留言中提及 @claude</text>

  <line x1="200" y1="250" x2="200" y2="275" stroke="#22C55E" stroke-width="1.5" marker-end="url(#arrowDownGreen)"/>

  <!-- Flow steps -->
  <rect x="120" y="275" width="160" height="34" rx="8" fill="white" stroke="#BBF7D0" stroke-width="1"/>
  <text x="200" y="297" text-anchor="middle" font-family="'PingFang TC', 'Noto Sans TC', sans-serif" font-size="12" font-weight="500" fill="#166534">🔍 分析上下文</text>

  <line x1="200" y1="309" x2="200" y2="325" stroke="#22C55E" stroke-width="1.2" marker-end="url(#arrowDownGreen)"/>

  <rect x="120" y="325" width="160" height="34" rx="8" fill="white" stroke="#BBF7D0" stroke-width="1"/>
  <text x="200" y="347" text-anchor="middle" font-family="'PingFang TC', 'Noto Sans TC', sans-serif" font-size="12" font-weight="500" fill="#166534">📋 制定計畫</text>

  <line x1="200" y1="359" x2="200" y2="375" stroke="#22C55E" stroke-width="1.2" marker-end="url(#arrowDownGreen)"/>

  <rect x="120" y="375" width="160" height="34" rx="8" fill="white" stroke="#BBF7D0" stroke-width="1"/>
  <text x="200" y="397" text-anchor="middle" font-family="'PingFang TC', 'Noto Sans TC', sans-serif" font-size="12" font-weight="500" fill="#166534">⚙️ 執行變更</text>

  <line x1="200" y1="409" x2="200" y2="425" stroke="#22C55E" stroke-width="1.2" marker-end="url(#arrowDownGreen)"/>

  <rect x="120" y="425" width="160" height="34" rx="8" fill="white" stroke="#BBF7D0" stroke-width="1"/>
  <text x="200" y="447" text-anchor="middle" font-family="'PingFang TC', 'Noto Sans TC', sans-serif" font-size="12" font-weight="500" fill="#166534">💬 在討論串回覆</text>

  <!-- Left capabilities -->
  <text x="200" y="486" text-anchor="middle" font-family="'PingFang TC', 'Noto Sans TC', sans-serif" font-size="10" fill="#6B7280">可以：建立 commit、推送分支、</text>
  <text x="200" y="500" text-anchor="middle" font-family="'PingFang TC', 'Noto Sans TC', sans-serif" font-size="10" fill="#6B7280">開啟 PR、回答問題</text>

  <!-- Scope badges -->
  <rect x="100" y="512" width="80" height="22" rx="11" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1"/>
  <text x="140" y="527" text-anchor="middle" font-family="'PingFang TC', 'Noto Sans TC', sans-serif" font-size="10" font-weight="500" fill="#15803D">Issues</text>
  <rect x="190" y="512" width="80" height="22" rx="11" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1"/>
  <text x="230" y="527" text-anchor="middle" font-family="'PingFang TC', 'Noto Sans TC', sans-serif" font-size="10" font-weight="500" fill="#15803D">PRs</text>

  <!-- === Right Branch: PR Review Action === -->
  <rect x="450" y="160" width="300" height="390" rx="12" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="1.5" filter="url(#shadow)"/>

  <!-- Right title -->
  <text x="600" y="190" text-anchor="middle" font-family="'PingFang TC', 'Noto Sans TC', sans-serif" font-size="16" font-weight="700" fill="#7C3AED">PR 審查動作</text>

  <!-- Trigger -->
  <rect x="500" y="210" width="200" height="40" rx="10" fill="white" stroke="#C4B5FD" stroke-width="1.5"/>
  <text x="600" y="226" text-anchor="middle" font-family="'PingFang TC', 'Noto Sans TC', sans-serif" font-size="11" font-weight="600" fill="#7C3AED">⚡ 觸發條件</text>
  <text x="600" y="242" text-anchor="middle" font-family="'PingFang TC', 'Noto Sans TC', sans-serif" font-size="11" fill="#5B21B6">PR 建立 / 更新</text>

  <line x1="600" y1="250" x2="600" y2="275" stroke="#8B5CF6" stroke-width="1.5" marker-end="url(#arrowDownPurple)"/>

  <!-- Flow steps -->
  <rect x="520" y="275" width="160" height="34" rx="8" fill="white" stroke="#DDD6FE" stroke-width="1"/>
  <text x="600" y="297" text-anchor="middle" font-family="'PingFang TC', 'Noto Sans TC', sans-serif" font-size="12" font-weight="500" fill="#5B21B6">🔍 分析變更</text>

  <line x1="600" y1="309" x2="600" y2="325" stroke="#8B5CF6" stroke-width="1.2" marker-end="url(#arrowDownPurple)"/>

  <rect x="520" y="325" width="160" height="34" rx="8" fill="white" stroke="#DDD6FE" stroke-width="1"/>
  <text x="600" y="347" text-anchor="middle" font-family="'PingFang TC', 'Noto Sans TC', sans-serif" font-size="12" font-weight="500" fill="#5B21B6">📝 發佈審查</text>

  <line x1="600" y1="359" x2="600" y2="375" stroke="#8B5CF6" stroke-width="1.2" marker-end="url(#arrowDownPurple)"/>

  <rect x="520" y="375" width="160" height="34" rx="8" fill="white" stroke="#DDD6FE" stroke-width="1"/>
  <text x="600" y="397" text-anchor="middle" font-family="'PingFang TC', 'Noto Sans TC', sans-serif" font-size="12" font-weight="500" fill="#5B21B6">💡 建議修正</text>

  <!-- Right description -->
  <text x="600" y="440" text-anchor="middle" font-family="'PingFang TC', 'Noto Sans TC', sans-serif" font-size="10" fill="#6B7280">每個 PR 自動進行程式碼審查。</text>
  <text x="600" y="454" text-anchor="middle" font-family="'PingFang TC', 'Noto Sans TC', sans-serif" font-size="10" fill="#6B7280">內嵌建議留言。</text>

  <!-- Scope badges -->
  <rect x="530" y="512" width="140" height="22" rx="11" fill="#EDE9FE" stroke="#C4B5FD" stroke-width="1"/>
  <text x="600" y="527" text-anchor="middle" font-family="'PingFang TC', 'Noto Sans TC', sans-serif" font-size="10" font-weight="500" fill="#7C3AED">僅限 Pull Requests</text>

  <!-- Bottom annotation -->
  <rect x="180" y="560" width="440" height="16" rx="8" fill="transparent"/>
  <text x="400" y="572" text-anchor="middle" font-family="'PingFang TC', 'Noto Sans TC', sans-serif" font-size="12" font-weight="500" fill="#64748B">兩者皆使用 <tspan font-family="'SF Mono', monospace" font-size="11" fill="#3B82F6">claude -p</tspan> (非互動模式) + <tspan font-family="'SF Mono', monospace" font-size="11" fill="#3B82F6">allowed_tools</tspan></text>
</svg>