<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 280" font-family="'PingFang TC', 'Noto Sans TC', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.1"/>
    </filter>
  </defs>
  <rect width="520" height="280" fill="white" rx="12"/>
  <text x="260" y="26" text-anchor="middle" font-size="15" font-weight="600" fill="#64748B" letter-spacing="1">權限模型 — 本地 vs CI</text>

  <!-- Divider -->
  <line x1="260" y1="38" x2="260" y2="250" stroke="#E2E8F0" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- LEFT: Local Development -->
  <g transform="translate(15, 40)">
    <rect width="230" height="210" rx="14" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="115" y="28" text-anchor="middle" font-size="22">🏠</text>
    <text x="115" y="50" text-anchor="middle" font-size="14" font-weight="700" fill="#166534">本地開發</text>

    <line x1="20" y1="60" x2="210" y2="60" stroke="#86EFAC" stroke-width="1"/>

    <rect x="20" y="72" width="60" height="20" rx="10" fill="#22C55E" opacity="0.15"/>
    <text x="50" y="86" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">寬鬆</text>

    <text x="20" y="110" font-size="11" fill="#334155">批次授權工具權限：</text>
    <rect x="20" y="118" width="190" height="20" rx="6" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="0.5"/>
    <text x="30" y="132" font-size="9" font-family="'SF Mono', monospace" fill="#64748B">mcp__playwright: allow</text>

    <rect x="20" y="142" width="190" height="20" rx="6" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="0.5"/>
    <text x="30" y="156" font-size="9" font-family="'SF Mono', monospace" fill="#64748B">mcp__filesystem: allow</text>

    <text x="20" y="178" font-size="11" fill="#334155">危險操作會跳出</text>
    <text x="20" y="192" font-size="11" fill="#334155">互動式確認提示</text>
  </g>

  <!-- RIGHT: CI/CD GitHub Actions -->
  <g transform="translate(275, 40)">
    <rect width="230" height="210" rx="14" fill="#FEF2F2" stroke="#EF4444" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="115" y="28" text-anchor="middle" font-size="22">🔒</text>
    <text x="115" y="50" text-anchor="middle" font-size="14" font-weight="700" fill="#DC2626">CI/CD Actions</text>

    <line x1="20" y1="60" x2="210" y2="60" stroke="#FCA5A5" stroke-width="1"/>

    <rect x="20" y="72" width="60" height="20" rx="10" fill="#EF4444" opacity="0.15"/>
    <text x="50" y="86" text-anchor="middle" font-size="10" font-weight="600" fill="#DC2626">嚴格</text>

    <text x="20" y="110" font-size="11" fill="#334155">逐一列出允許的工具：</text>
    <rect x="20" y="118" width="190" height="20" rx="6" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="0.5"/>
    <text x="30" y="132" font-size="9" font-family="'SF Mono', monospace" fill="#64748B">allowed_tools: [Read, Grep]</text>

    <rect x="20" y="142" width="190" height="20" rx="6" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="0.5"/>
    <text x="30" y="156" font-size="9" font-family="'SF Mono', monospace" fill="#64748B">-p flag（非互動模式）</text>

    <text x="20" y="178" font-size="11" fill="#334155">無互動式提示 —</text>
    <text x="20" y="192" font-size="11" font-weight="600" fill="#DC2626">最小權限原則</text>
  </g>

  <text x="260" y="270" text-anchor="middle" font-size="10" fill="#94A3B8">本地 = 信任開發者。CI = 零信任，全部白名單。</text>
</svg>