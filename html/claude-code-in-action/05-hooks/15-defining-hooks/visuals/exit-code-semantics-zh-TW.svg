<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 220" font-family="'PingFang TC', 'Noto Sans TC', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.1"/>
    </filter>
  </defs>
  <rect width="500" height="220" fill="white" rx="12"/>
  <text x="250" y="30" text-anchor="middle" font-size="15" font-weight="600" fill="#64748B" letter-spacing="1">Exit Code 語意</text>

  <g transform="translate(50, 50)">
    <circle cx="65" cy="55" r="50" fill="#F0FDF4" stroke="#22C55E" stroke-width="3" filter="url(#shadow)"/>
    <text x="65" y="45" text-anchor="middle" font-size="36" font-weight="800" fill="#22C55E">0</text>
    <text x="65" y="70" text-anchor="middle" font-size="14" font-weight="600" fill="#16A34A">✓</text>
    <text x="65" y="130" text-anchor="middle" font-size="16" font-weight="700" fill="#166534">放行</text>
    <text x="65" y="150" text-anchor="middle" font-size="11" fill="#64748B">工具正常執行</text>
    <text x="65" y="165" text-anchor="middle" font-size="10" fill="#94A3B8">Pre + Post 皆適用</text>
  </g>

  <g transform="translate(270, 50)">
    <circle cx="65" cy="55" r="50" fill="#FEF2F2" stroke="#EF4444" stroke-width="3" filter="url(#shadow)"/>
    <text x="65" y="45" text-anchor="middle" font-size="36" font-weight="800" fill="#EF4444">2</text>
    <text x="65" y="70" text-anchor="middle" font-size="14" font-weight="600" fill="#DC2626">✗</text>
    <text x="65" y="130" text-anchor="middle" font-size="16" font-weight="700" fill="#991B1B">攔截</text>
    <text x="65" y="150" text-anchor="middle" font-size="11" fill="#64748B">stderr 回饋給 Claude</text>
    <text x="65" y="165" text-anchor="middle" font-size="10" fill="#DC2626" font-weight="600">僅 PreToolUse</text>
  </g>

  <line x1="175" y1="105" x2="260" y2="105" stroke="#E2E8F0" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="250" y="205" text-anchor="middle" font-size="10" fill="#94A3B8">Exit code 1 = 一般錯誤（不是 hook 信號）</text>
</svg>
