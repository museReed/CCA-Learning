<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 420" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.1"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94A3B8"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22C55E"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#EF4444"/>
    </marker>
  </defs>
  <rect width="440" height="420" fill="white" rx="12"/>
  <text x="220" y="30" text-anchor="middle" font-size="15" font-weight="600" fill="#64748B" letter-spacing="0.5">.ENV FILE GUARD — DATA FLOW</text>

  <!-- Step 1: Claude requests -->
  <g transform="translate(130, 45)">
    <rect width="180" height="55" rx="14" fill="white" stroke="#E2E8F0" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="30" y="35" font-size="22">🧠</text>
    <text x="55" y="30" font-size="12" font-weight="600" fill="#334155">Claude requests</text>
    <text x="55" y="45" font-size="11" fill="#64748B">Read(".env")</text>
  </g>

  <line x1="220" y1="100" x2="220" y2="125" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 2: Hook intercepts -->
  <g transform="translate(120, 130)">
    <rect width="200" height="55" rx="14" fill="#EEF2FF" stroke="#818CF8" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="30" y="35" font-size="22">🛡️</text>
    <text x="60" y="30" font-size="12" font-weight="600" fill="#4338CA">PreToolUse fires</text>
    <text x="60" y="45" font-size="11" fill="#6366F1">read_hook.js runs</text>
  </g>

  <line x1="220" y1="185" x2="220" y2="215" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 3: Decision diamond -->
  <g transform="translate(140, 220)">
    <polygon points="80,0 160,40 80,80 0,40" fill="#FFF7ED" stroke="#FB923C" stroke-width="1.5"/>
    <text x="80" y="36" text-anchor="middle" font-size="11" font-weight="600" fill="#9A3412">path includes</text>
    <text x="80" y="50" text-anchor="middle" font-size="11" font-weight="600" fill="#9A3412">".env" ?</text>
  </g>

  <!-- YES → Block -->
  <line x1="305" y1="260" x2="360" y2="260" stroke="#EF4444" stroke-width="2" marker-end="url(#arrowRed)"/>
  <text x="332" y="252" text-anchor="middle" font-size="10" font-weight="600" fill="#EF4444">YES</text>
  <g transform="translate(350, 235)">
    <rect width="80" height="50" rx="12" fill="#FEF2F2" stroke="#EF4444" stroke-width="1.5"/>
    <text x="40" y="22" text-anchor="middle" font-size="16">❌</text>
    <text x="40" y="40" text-anchor="middle" font-size="11" font-weight="600" fill="#DC2626">BLOCK</text>
  </g>

  <!-- NO → Allow -->
  <line x1="220" y1="300" x2="220" y2="340" stroke="#22C55E" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="230" y="325" font-size="10" font-weight="600" fill="#22C55E">NO</text>
  <g transform="translate(170, 345)">
    <rect width="100" height="50" rx="12" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.5"/>
    <text x="50" y="22" text-anchor="middle" font-size="16">✅</text>
    <text x="50" y="40" text-anchor="middle" font-size="11" font-weight="600" fill="#16A34A">ALLOW</text>
  </g>

  <!-- stderr feedback -->
  <text x="390" y="300" text-anchor="middle" font-size="9" fill="#EF4444">stderr: "Access denied"</text>
  <text x="390" y="312" text-anchor="middle" font-size="9" fill="#EF4444">exit(2)</text>
</svg>
