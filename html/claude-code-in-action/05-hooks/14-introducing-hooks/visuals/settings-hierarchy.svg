<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 320" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.1"/>
    </filter>
  </defs>
  <rect width="520" height="320" fill="white" rx="12"/>
  <text x="260" y="32" text-anchor="middle" font-size="15" font-weight="600" fill="#64748B" letter-spacing="0.5">SETTINGS HIERARCHY</text>

  <!-- Layer 3 (top): Local — highest priority -->
  <g transform="translate(130, 50)">
    <rect width="260" height="70" rx="14" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2" filter="url(#shadow)"/>
    <text x="40" y="30" font-size="22">👤</text>
    <text x="70" y="30" font-size="14" font-weight="700" fill="#1E40AF">settings.local.json</text>
    <text x="70" y="50" font-size="11" fill="#3B82F6">Project (personal) · gitignored</text>
    <text x="230" y="40" text-anchor="middle" font-size="20">⬆️</text>
    <text x="230" y="58" text-anchor="middle" font-size="9" font-weight="600" fill="#1E40AF">HIGHEST</text>
  </g>

  <!-- Layer 2 (middle): Project shared -->
  <g transform="translate(100, 135)">
    <rect width="320" height="70" rx="14" fill="#E0E7FF" stroke="#6366F1" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="40" y="30" font-size="22">👥</text>
    <text x="70" y="30" font-size="14" font-weight="700" fill="#4338CA">settings.json</text>
    <text x="70" y="50" font-size="11" fill="#6366F1">Project (team-shared) · in git</text>
  </g>

  <!-- Layer 1 (bottom): Global — lowest priority -->
  <g transform="translate(60, 220)">
    <rect width="400" height="70" rx="14" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="40" y="30" font-size="22">🌍</text>
    <text x="70" y="30" font-size="14" font-weight="700" fill="#475569">~/.claude/settings.json</text>
    <text x="70" y="50" font-size="11" fill="#64748B">Global (all projects) · not in git</text>
    <text x="370" y="40" text-anchor="middle" font-size="20">⬇️</text>
    <text x="370" y="58" text-anchor="middle" font-size="9" font-weight="600" fill="#64748B">LOWEST</text>
  </g>

  <!-- Priority arrow on left -->
  <line x1="40" y1="260" x2="40" y2="70" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrowUp)"/>
  <text x="40" y="165" text-anchor="middle" font-size="11" font-weight="600" fill="#3B82F6" transform="rotate(-90, 40, 165)">Priority</text>
</svg>
