<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" font-family="'PingFang TC', 'Noto Sans TC', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.1"/>
    </filter>
  </defs>
  <rect width="720" height="300" fill="white" rx="12"/>
  <text x="360" y="36" text-anchor="middle" font-size="15" font-weight="600" fill="#64748B" letter-spacing="1">Hook vs Prompt — 決策規則</text>

  <line x1="360" y1="55" x2="360" y2="275" stroke="#E2E8F0" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="360" y="290" text-anchor="middle" font-size="10" fill="#CBD5E1">判斷口訣：「100 次有 1 次出錯，後果能不能承受？」</text>

  <!-- LEFT: Hook -->
  <g transform="translate(40, 60)">
    <rect width="280" height="210" rx="16" fill="#EEF2FF" stroke="#818CF8" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="140" y="45" text-anchor="middle" font-size="36">🔒</text>
    <text x="140" y="80" text-anchor="middle" font-size="22" font-weight="700" fill="#4338CA">Hook</text>
    <text x="140" y="102" text-anchor="middle" font-size="13" fill="#6366F1">確定性 · 100% 保證執行</text>
    <line x1="30" y1="115" x2="250" y2="115" stroke="#C7D2FE" stroke-width="1"/>
    <text x="140" y="140" text-anchor="middle" font-size="12" fill="#4338CA" font-weight="600">需求關鍵字：</text>
    <g transform="translate(20, 150)">
      <rect width="55" height="24" rx="12" fill="#4338CA" opacity="0.1"/>
      <text x="27" y="16" text-anchor="middle" font-size="11" font-weight="600" fill="#4338CA">必須</text>
    </g>
    <g transform="translate(85, 150)">
      <rect width="55" height="24" rx="12" fill="#4338CA" opacity="0.1"/>
      <text x="27" y="16" text-anchor="middle" font-size="11" font-weight="600" fill="#4338CA">絕對</text>
    </g>
    <g transform="translate(150, 150)">
      <rect width="55" height="24" rx="12" fill="#4338CA" opacity="0.1"/>
      <text x="27" y="16" text-anchor="middle" font-size="11" font-weight="600" fill="#4338CA">合規</text>
    </g>
    <g transform="translate(215, 150)">
      <rect width="55" height="24" rx="12" fill="#4338CA" opacity="0.1"/>
      <text x="27" y="16" text-anchor="middle" font-size="11" font-weight="600" fill="#4338CA">保證</text>
    </g>
    <text x="140" y="200" text-anchor="middle" font-size="11" fill="#64748B">退款上限 · 權限控制 · 法規遵循</text>
  </g>

  <!-- RIGHT: Prompt -->
  <g transform="translate(400, 60)">
    <rect width="280" height="210" rx="16" fill="#F5F3FF" stroke="#A78BFA" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="140" y="45" text-anchor="middle" font-size="36">💬</text>
    <text x="140" y="80" text-anchor="middle" font-size="22" font-weight="700" fill="#7C3AED">Prompt</text>
    <text x="140" y="102" text-anchor="middle" font-size="13" fill="#8B5CF6">機率性 · 盡力而為</text>
    <line x1="30" y1="115" x2="250" y2="115" stroke="#DDD6FE" stroke-width="1"/>
    <text x="140" y="140" text-anchor="middle" font-size="12" fill="#7C3AED" font-weight="600">需求關鍵字：</text>
    <g transform="translate(20, 150)">
      <rect width="55" height="24" rx="12" fill="#7C3AED" opacity="0.1"/>
      <text x="27" y="16" text-anchor="middle" font-size="11" font-weight="600" fill="#7C3AED">偏好</text>
    </g>
    <g transform="translate(85, 150)">
      <rect width="55" height="24" rx="12" fill="#7C3AED" opacity="0.1"/>
      <text x="27" y="16" text-anchor="middle" font-size="11" font-weight="600" fill="#7C3AED">通常</text>
    </g>
    <g transform="translate(150, 150)">
      <rect width="55" height="24" rx="12" fill="#7C3AED" opacity="0.1"/>
      <text x="27" y="16" text-anchor="middle" font-size="11" font-weight="600" fill="#7C3AED">建議</text>
    </g>
    <g transform="translate(215, 150)">
      <rect width="65" height="24" rx="12" fill="#7C3AED" opacity="0.1"/>
      <text x="32" y="16" text-anchor="middle" font-size="11" font-weight="600" fill="#7C3AED">盡量</text>
    </g>
    <text x="140" y="200" text-anchor="middle" font-size="11" fill="#64748B">語氣風格 · 回覆長度 · 格式偏好</text>
  </g>
</svg>
