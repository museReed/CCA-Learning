<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 380" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.1"/></filter>
  </defs>
  <rect width="560" height="380" fill="white" rx="12"/>
  <text x="280" y="28" text-anchor="middle" font-size="15" font-weight="600" fill="#64748B" letter-spacing="0.5">HOOK TAXONOMY — ALL 9 TYPES</text>

  <!-- Header row -->
  <g transform="translate(20, 45)">
    <rect width="140" height="28" rx="6" fill="#F1F5F9"/>
    <text x="70" y="19" text-anchor="middle" font-size="10" font-weight="700" fill="#475569">Hook Type</text>
  </g>
  <g transform="translate(165, 45)">
    <rect width="90" height="28" rx="6" fill="#F1F5F9"/>
    <text x="45" y="19" text-anchor="middle" font-size="10" font-weight="700" fill="#475569">When</text>
  </g>
  <g transform="translate(260, 45)">
    <rect width="65" height="28" rx="6" fill="#F1F5F9"/>
    <text x="32" y="19" text-anchor="middle" font-size="10" font-weight="700" fill="#475569">Blocks?</text>
  </g>
  <g transform="translate(330, 45)">
    <rect width="210" height="28" rx="6" fill="#F1F5F9"/>
    <text x="105" y="19" text-anchor="middle" font-size="10" font-weight="700" fill="#475569">Key Use Case</text>
  </g>

  <!-- Tool lifecycle hooks (blue) -->
  <g transform="translate(20, 80)">
    <rect width="140" height="28" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
    <text x="70" y="19" text-anchor="middle" font-size="10" font-weight="600" fill="#1E40AF">PreToolUse</text>
  </g>
  <text x="210" y="99" text-anchor="middle" font-size="9" fill="#64748B">Before tool</text>
  <text x="292" y="99" text-anchor="middle" font-size="10" font-weight="700" fill="#EF4444">Yes</text>
  <text x="435" y="99" text-anchor="middle" font-size="9" fill="#64748B">Guard files, validate commands</text>

  <g transform="translate(20, 114)">
    <rect width="140" height="28" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
    <text x="70" y="19" text-anchor="middle" font-size="10" font-weight="600" fill="#1E40AF">PostToolUse</text>
  </g>
  <text x="210" y="133" text-anchor="middle" font-size="9" fill="#64748B">After tool</text>
  <text x="292" y="133" text-anchor="middle" font-size="10" font-weight="700" fill="#22C55E">No</text>
  <text x="435" y="133" text-anchor="middle" font-size="9" fill="#64748B">Lint, type-check, review</text>

  <!-- Notification hook (orange) -->
  <g transform="translate(20, 148)">
    <rect width="140" height="28" rx="6" fill="#FFF7ED" stroke="#FB923C" stroke-width="1"/>
    <text x="70" y="19" text-anchor="middle" font-size="10" font-weight="600" fill="#9A3412">Notification</text>
  </g>
  <text x="210" y="167" text-anchor="middle" font-size="9" fill="#64748B">On notify</text>
  <text x="292" y="167" text-anchor="middle" font-size="10" font-weight="700" fill="#22C55E">No</text>
  <text x="435" y="167" text-anchor="middle" font-size="9" fill="#64748B">Custom alerts, Slack messages</text>

  <!-- Lifecycle hooks (purple) -->
  <g transform="translate(20, 188)">
    <rect width="140" height="28" rx="6" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="1"/>
    <text x="70" y="19" text-anchor="middle" font-size="10" font-weight="600" fill="#6D28D9">Stop</text>
  </g>
  <text x="210" y="207" text-anchor="middle" font-size="9" fill="#64748B">Agent stops</text>
  <text x="292" y="207" text-anchor="middle" font-size="10" font-weight="700" fill="#22C55E">No</text>
  <text x="435" y="207" text-anchor="middle" font-size="9" fill="#64748B">Auto-commit, cleanup</text>

  <g transform="translate(20, 222)">
    <rect width="140" height="28" rx="6" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="1"/>
    <text x="70" y="19" text-anchor="middle" font-size="10" font-weight="600" fill="#6D28D9">SubagentStop</text>
  </g>
  <text x="210" y="241" text-anchor="middle" font-size="9" fill="#64748B">Sub stops</text>
  <text x="292" y="241" text-anchor="middle" font-size="10" font-weight="700" fill="#22C55E">No</text>
  <text x="435" y="241" text-anchor="middle" font-size="9" fill="#64748B">Sub-task validation</text>

  <g transform="translate(20, 256)">
    <rect width="140" height="28" rx="6" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="1"/>
    <text x="70" y="19" text-anchor="middle" font-size="10" font-weight="600" fill="#6D28D9">PreCompact</text>
  </g>
  <text x="210" y="275" text-anchor="middle" font-size="9" fill="#64748B">Before compact</text>
  <text x="292" y="275" text-anchor="middle" font-size="10" font-weight="700" fill="#22C55E">No</text>
  <text x="435" y="275" text-anchor="middle" font-size="9" fill="#64748B">Save context, checkpoint</text>

  <!-- Session hooks (green) -->
  <g transform="translate(20, 296)">
    <rect width="140" height="28" rx="6" fill="#F0FDF4" stroke="#22C55E" stroke-width="1"/>
    <text x="70" y="19" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">UserPromptSubmit</text>
  </g>
  <text x="210" y="315" text-anchor="middle" font-size="9" fill="#64748B">On prompt</text>
  <text x="292" y="315" text-anchor="middle" font-size="10" font-weight="700" fill="#EF4444">Yes</text>
  <text x="435" y="315" text-anchor="middle" font-size="9" fill="#64748B">Input validation, cost guard</text>

  <g transform="translate(20, 330)">
    <rect width="140" height="28" rx="6" fill="#F0FDF4" stroke="#22C55E" stroke-width="1"/>
    <text x="70" y="19" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">SessionStart / End</text>
  </g>
  <text x="210" y="349" text-anchor="middle" font-size="9" fill="#64748B">Session edge</text>
  <text x="292" y="349" text-anchor="middle" font-size="10" font-weight="700" fill="#22C55E">No</text>
  <text x="435" y="349" text-anchor="middle" font-size="9" fill="#64748B">Env setup, telemetry</text>

  <text x="280" y="372" text-anchor="middle" font-size="9" fill="#94A3B8">Blue = tool lifecycle · Orange = notification · Purple = agent lifecycle · Green = session</text>
</svg>
