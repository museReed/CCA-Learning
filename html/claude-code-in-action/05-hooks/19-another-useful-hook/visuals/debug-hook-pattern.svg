<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 280" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.1"/></filter>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#94A3B8"/></marker>
  </defs>
  <rect width="520" height="280" fill="white" rx="12"/>
  <text x="260" y="28" text-anchor="middle" font-size="15" font-weight="600" fill="#64748B" letter-spacing="0.5">DEBUG HOOK PATTERN — INSPECT BEFORE BUILD</text>

  <!-- Step 1: Add debug hook -->
  <g transform="translate(20, 50)">
    <rect width="140" height="80" rx="14" fill="#FFF7ED" stroke="#FB923C" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="70" y="25" text-anchor="middle" font-size="16">🔧</text>
    <text x="70" y="45" text-anchor="middle" font-size="11" font-weight="600" fill="#9A3412">1. Add debug hook</text>
    <text x="70" y="62" text-anchor="middle" font-size="9" fill="#64748B" font-family="'SF Mono', monospace">jq . > post-log.json</text>
  </g>

  <!-- Arrow -->
  <line x1="165" y1="90" x2="190" y2="90" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 2: Use Claude normally -->
  <g transform="translate(195, 50)">
    <rect width="130" height="80" rx="14" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="65" y="25" text-anchor="middle" font-size="16">🧠</text>
    <text x="65" y="45" text-anchor="middle" font-size="11" font-weight="600" fill="#1E40AF">2. Use Claude</text>
    <text x="65" y="62" text-anchor="middle" font-size="9" fill="#3B82F6">normally</text>
  </g>

  <!-- Arrow -->
  <line x1="330" y1="90" x2="355" y2="90" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 3: Inspect JSON -->
  <g transform="translate(360, 50)">
    <rect width="140" height="80" rx="14" fill="#EEF2FF" stroke="#818CF8" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="70" y="25" text-anchor="middle" font-size="16">🔍</text>
    <text x="70" y="45" text-anchor="middle" font-size="11" font-weight="600" fill="#4338CA">3. Inspect JSON</text>
    <text x="70" y="62" text-anchor="middle" font-size="9" fill="#6366F1">see real stdin shape</text>
  </g>

  <!-- Arrow down from step 3 -->
  <line x1="430" y1="135" x2="430" y2="170" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 4: Write production hook -->
  <g transform="translate(280, 175)">
    <rect width="220" height="70" rx="14" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="30" y="28" font-size="16">✅</text>
    <text x="55" y="28" font-size="11" font-weight="600" fill="#166534">4. Write production hook</text>
    <text x="55" y="45" font-size="9" fill="#22C55E">based on real data, not guesswork</text>
  </g>

  <!-- Analogy box -->
  <g transform="translate(20, 170)">
    <rect width="230" height="60" rx="10" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="115" y="22" text-anchor="middle" font-size="10" font-weight="600" fill="#475569">Analogy</text>
    <text x="115" y="40" text-anchor="middle" font-size="9" fill="#64748B">Like using curl -v before building</text>
    <text x="115" y="53" text-anchor="middle" font-size="9" fill="#64748B">an HTTP client — inspect first!</text>
  </g>

  <text x="260" y="268" text-anchor="middle" font-size="10" fill="#94A3B8">Never guess the stdin shape — capture it with a debug hook, then build your logic from real data.</text>
</svg>
