<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 380" font-family="'PingFang TC', 'Noto Sans TC', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.1"/></filter>
  </defs>
  <rect width="560" height="380" fill="white" rx="12"/>
  <text x="280" y="28" text-anchor="middle" font-size="15" font-weight="600" fill="#64748B" letter-spacing="1">Hook 分類總覽 — 全部 9 種</text>

  <!-- Header row -->
  <g transform="translate(20, 45)">
    <rect width="140" height="28" rx="6" fill="#F1F5F9"/>
    <text x="70" y="19" text-anchor="middle" font-size="10" font-weight="700" fill="#475569">Hook 類型</text>
  </g>
  <g transform="translate(165, 45)">
    <rect width="90" height="28" rx="6" fill="#F1F5F9"/>
    <text x="45" y="19" text-anchor="middle" font-size="10" font-weight="700" fill="#475569">觸發時機</text>
  </g>
  <g transform="translate(260, 45)">
    <rect width="65" height="28" rx="6" fill="#F1F5F9"/>
    <text x="32" y="19" text-anchor="middle" font-size="10" font-weight="700" fill="#475569">可攔截？</text>
  </g>
  <g transform="translate(330, 45)">
    <rect width="210" height="28" rx="6" fill="#F1F5F9"/>
    <text x="105" y="19" text-anchor="middle" font-size="10" font-weight="700" fill="#475569">主要用途</text>
  </g>

  <!-- Tool lifecycle hooks -->
  <g transform="translate(20, 80)">
    <rect width="140" height="28" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
    <text x="70" y="19" text-anchor="middle" font-size="10" font-weight="600" fill="#1E40AF">PreToolUse</text>
  </g>
  <text x="210" y="99" text-anchor="middle" font-size="9" fill="#64748B">工具執行前</text>
  <text x="292" y="99" text-anchor="middle" font-size="10" font-weight="700" fill="#EF4444">是</text>
  <text x="435" y="99" text-anchor="middle" font-size="9" fill="#64748B">守衛檔案、驗證命令</text>

  <g transform="translate(20, 114)">
    <rect width="140" height="28" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
    <text x="70" y="19" text-anchor="middle" font-size="10" font-weight="600" fill="#1E40AF">PostToolUse</text>
  </g>
  <text x="210" y="133" text-anchor="middle" font-size="9" fill="#64748B">工具執行後</text>
  <text x="292" y="133" text-anchor="middle" font-size="10" font-weight="700" fill="#22C55E">否</text>
  <text x="435" y="133" text-anchor="middle" font-size="9" fill="#64748B">Lint、型別檢查、審查</text>

  <g transform="translate(20, 148)">
    <rect width="140" height="28" rx="6" fill="#FFF7ED" stroke="#FB923C" stroke-width="1"/>
    <text x="70" y="19" text-anchor="middle" font-size="10" font-weight="600" fill="#9A3412">Notification</text>
  </g>
  <text x="210" y="167" text-anchor="middle" font-size="9" fill="#64748B">通知時</text>
  <text x="292" y="167" text-anchor="middle" font-size="10" font-weight="700" fill="#22C55E">否</text>
  <text x="435" y="167" text-anchor="middle" font-size="9" fill="#64748B">自訂提醒、Slack 訊息</text>

  <g transform="translate(20, 188)">
    <rect width="140" height="28" rx="6" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="1"/>
    <text x="70" y="19" text-anchor="middle" font-size="10" font-weight="600" fill="#6D28D9">Stop</text>
  </g>
  <text x="210" y="207" text-anchor="middle" font-size="9" fill="#64748B">Agent 停止</text>
  <text x="292" y="207" text-anchor="middle" font-size="10" font-weight="700" fill="#22C55E">否</text>
  <text x="435" y="207" text-anchor="middle" font-size="9" fill="#64748B">自動 commit、清理</text>

  <g transform="translate(20, 222)">
    <rect width="140" height="28" rx="6" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="1"/>
    <text x="70" y="19" text-anchor="middle" font-size="10" font-weight="600" fill="#6D28D9">SubagentStop</text>
  </g>
  <text x="210" y="241" text-anchor="middle" font-size="9" fill="#64748B">Sub 停止</text>
  <text x="292" y="241" text-anchor="middle" font-size="10" font-weight="700" fill="#22C55E">否</text>
  <text x="435" y="241" text-anchor="middle" font-size="9" fill="#64748B">子任務驗證</text>

  <g transform="translate(20, 256)">
    <rect width="140" height="28" rx="6" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="1"/>
    <text x="70" y="19" text-anchor="middle" font-size="10" font-weight="600" fill="#6D28D9">PreCompact</text>
  </g>
  <text x="210" y="275" text-anchor="middle" font-size="9" fill="#64748B">壓縮前</text>
  <text x="292" y="275" text-anchor="middle" font-size="10" font-weight="700" fill="#22C55E">否</text>
  <text x="435" y="275" text-anchor="middle" font-size="9" fill="#64748B">儲存 context、checkpoint</text>

  <g transform="translate(20, 296)">
    <rect width="140" height="28" rx="6" fill="#F0FDF4" stroke="#22C55E" stroke-width="1"/>
    <text x="70" y="19" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">UserPromptSubmit</text>
  </g>
  <text x="210" y="315" text-anchor="middle" font-size="9" fill="#64748B">提交提示時</text>
  <text x="292" y="315" text-anchor="middle" font-size="10" font-weight="700" fill="#EF4444">是</text>
  <text x="435" y="315" text-anchor="middle" font-size="9" fill="#64748B">輸入驗證、成本控管</text>

  <g transform="translate(20, 330)">
    <rect width="140" height="28" rx="6" fill="#F0FDF4" stroke="#22C55E" stroke-width="1"/>
    <text x="70" y="19" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">SessionStart / End</text>
  </g>
  <text x="210" y="349" text-anchor="middle" font-size="9" fill="#64748B">Session 邊界</text>
  <text x="292" y="349" text-anchor="middle" font-size="10" font-weight="700" fill="#22C55E">否</text>
  <text x="435" y="349" text-anchor="middle" font-size="9" fill="#64748B">環境設定、遙測</text>

  <text x="280" y="372" text-anchor="middle" font-size="9" fill="#94A3B8">藍 = 工具生命週期 · 橙 = 通知 · 紫 = Agent 生命週期 · 綠 = Session</text>
</svg>
