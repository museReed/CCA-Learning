<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 260" font-family="'PingFang TC', 'Noto Sans TC', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.1"/></filter>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#94A3B8"/></marker>
  </defs>
  <rect width="520" height="260" fill="white" rx="12"/>
  <text x="260" y="28" text-anchor="middle" font-size="15" font-weight="600" fill="#64748B" letter-spacing="1">Template → Init → Local 模式</text>

  <!-- File 1: settings.example.json -->
  <g transform="translate(20, 50)">
    <rect width="145" height="120" rx="12" fill="#EEF2FF" stroke="#818CF8" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="72" y="25" text-anchor="middle" font-size="10" font-weight="700" fill="#4338CA">📄 settings.example.json</text>
    <line x1="10" y1="35" x2="135" y2="35" stroke="#C7D2FE" stroke-width="1"/>
    <text x="15" y="55" font-size="8" fill="#64748B" font-family="'SF Mono', monospace">"command": "$PWD/hooks/</text>
    <text x="15" y="68" font-size="8" fill="#64748B" font-family="'SF Mono', monospace">  read_hook.js"</text>
    <line x1="10" y1="80" x2="135" y2="80" stroke="#C7D2FE" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="72" y="98" text-anchor="middle" font-size="9" font-weight="600" fill="#4338CA">✓ 提交到 Git</text>
    <text x="72" y="112" text-anchor="middle" font-size="9" fill="#6366F1">$PWD 佔位符</text>
  </g>

  <!-- Arrow 1 -->
  <line x1="170" y1="110" x2="195" y2="110" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- File 2: init-claude.js -->
  <g transform="translate(200, 50)">
    <rect width="120" height="120" rx="12" fill="#FFF7ED" stroke="#FB923C" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="60" y="25" text-anchor="middle" font-size="10" font-weight="700" fill="#9A3412">⚙️ init-claude.js</text>
    <line x1="10" y1="35" x2="110" y2="35" stroke="#FED7AA" stroke-width="1"/>
    <text x="60" y="55" text-anchor="middle" font-size="9" fill="#64748B">讀取 template</text>
    <text x="60" y="70" text-anchor="middle" font-size="9" fill="#64748B">解析 $PWD</text>
    <text x="60" y="85" text-anchor="middle" font-size="9" fill="#64748B">寫入 local 檔案</text>
    <line x1="10" y1="95" x2="110" y2="95" stroke="#FED7AA" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="60" y="112" text-anchor="middle" font-size="9" font-weight="600" fill="#9A3412">✓ 一次性設定</text>
  </g>

  <!-- Arrow 2 -->
  <line x1="325" y1="110" x2="350" y2="110" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- File 3: settings.local.json -->
  <g transform="translate(355, 50)">
    <rect width="145" height="120" rx="12" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="72" y="25" text-anchor="middle" font-size="10" font-weight="700" fill="#166534">📄 settings.local.json</text>
    <line x1="10" y1="35" x2="135" y2="35" stroke="#BBF7D0" stroke-width="1"/>
    <text x="15" y="55" font-size="8" fill="#64748B" font-family="'SF Mono', monospace">"command": "/Users/</text>
    <text x="15" y="68" font-size="8" fill="#64748B" font-family="'SF Mono', monospace">  alice/proj/hooks/…"</text>
    <line x1="10" y1="80" x2="135" y2="80" stroke="#BBF7D0" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="72" y="98" text-anchor="middle" font-size="9" font-weight="600" fill="#166534">✓ 加入 .gitignore</text>
    <text x="72" y="112" text-anchor="middle" font-size="9" fill="#22C55E">絕對路徑</text>
  </g>

  <!-- Bottom summary -->
  <g transform="translate(40, 195)">
    <rect width="440" height="45" rx="10" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
    <text x="220" y="20" text-anchor="middle" font-size="11" font-weight="600" fill="#334155">兩全其美：安全的絕對路徑 + 可攜的團隊設定</text>
    <text x="220" y="36" text-anchor="middle" font-size="9" fill="#94A3B8">每位開發者執行一次 init — 路徑自動解析為本機路徑</text>
  </g>
</svg>
