<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="'PingFang TC', 'Noto Sans TC', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.1"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94A3B8"/>
    </marker>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EFF6FF"/>
      <stop offset="100%" stop-color="#DBEAFE"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0FDF4"/>
      <stop offset="100%" stop-color="#DCFCE7"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAF5FF"/>
      <stop offset="100%" stop-color="#F3E8FF"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF7ED"/>
      <stop offset="100%" stop-color="#FFEDD5"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" fill="white" rx="12"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-size="15" font-weight="600" fill="#64748B" letter-spacing="0.5">課程路線圖 → CCA 考試領域</text>

  <!-- Column Headers -->
  <text x="175" y="68" text-anchor="middle" font-size="12" font-weight="600" fill="#94A3B8" letter-spacing="1">課程章節</text>
  <text x="725" y="68" text-anchor="middle" font-size="12" font-weight="600" fill="#94A3B8" letter-spacing="1">考試領域</text>

  <!-- ===== Course Part 1 ===== -->
  <g transform="translate(40, 85)">
    <rect width="270" height="80" rx="14" fill="url(#blueGrad)" stroke="#3B82F6" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="40" y="36" font-size="24">🧠</text>
    <text x="70" y="36" font-size="13" font-weight="600" fill="#1E40AF">第一部分：什麼是 Claude</text>
    <text x="70" y="54" font-size="13" font-weight="600" fill="#1E40AF">與 Coding Assistants</text>
    <text x="70" y="72" font-size="10" fill="#3B82F6">基礎概念與原理</text>
  </g>

  <!-- ===== Course Part 2 ===== -->
  <g transform="translate(40, 185)">
    <rect width="270" height="80" rx="14" fill="url(#greenGrad)" stroke="#22C55E" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="40" y="36" font-size="24">🔧</text>
    <text x="70" y="36" font-size="13" font-weight="600" fill="#166534">第二部分：Claude Code</text>
    <text x="70" y="54" font-size="13" font-weight="600" fill="#166534">功能深入解析</text>
    <text x="70" y="72" font-size="10" fill="#22C55E">Tool、hook、MCP、設定</text>
  </g>

  <!-- ===== Course Part 3 ===== -->
  <g transform="translate(40, 285)">
    <rect width="270" height="80" rx="14" fill="url(#purpleGrad)" stroke="#8B5CF6" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="40" y="36" font-size="24">💡</text>
    <text x="70" y="36" font-size="13" font-weight="600" fill="#5B21B6">第三部分：實作專案</text>
    <text x="70" y="54" font-size="13" font-weight="600" fill="#5B21B6">動手建構</text>
    <text x="70" y="72" font-size="10" fill="#8B5CF6">端到端應用開發</text>
  </g>

  <!-- ===== Course Part 4 ===== -->
  <g transform="translate(40, 385)">
    <rect width="270" height="80" rx="14" fill="url(#orangeGrad)" stroke="#FB923C" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="40" y="36" font-size="24">🚀</text>
    <text x="70" y="36" font-size="13" font-weight="600" fill="#9A3412">第四部分：效率最大化</text>
    <text x="70" y="54" font-size="13" font-weight="600" fill="#9A3412">策略</text>
    <text x="70" y="72" font-size="10" fill="#FB923C">進階模式與工作流程</text>
  </g>

  <!-- ===== Exam Domain 1 ===== -->
  <g transform="translate(590, 80)">
    <rect width="270" height="58" rx="14" fill="white" stroke="#3B82F6" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="20" y="30" font-size="11" font-weight="700" fill="#3B82F6">D1</text>
    <text x="48" y="30" font-size="12" font-weight="600" fill="#334155">AI 基礎知識</text>
    <text x="48" y="46" font-size="10" fill="#94A3B8">LLM 基礎、token 經濟學</text>
  </g>

  <!-- ===== Exam Domain 2 ===== -->
  <g transform="translate(590, 160)">
    <rect width="270" height="58" rx="14" fill="white" stroke="#8B5CF6" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="20" y="30" font-size="11" font-weight="700" fill="#8B5CF6">D2</text>
    <text x="48" y="30" font-size="12" font-weight="600" fill="#334155">Prompt 工程</text>
    <text x="48" y="46" font-size="10" fill="#94A3B8">System prompt、CLAUDE.md</text>
  </g>

  <!-- ===== Exam Domain 3 ===== -->
  <g transform="translate(590, 240)">
    <rect width="270" height="58" rx="14" fill="white" stroke="#22C55E" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="20" y="30" font-size="11" font-weight="700" fill="#22C55E">D3</text>
    <text x="48" y="30" font-size="12" font-weight="600" fill="#334155">Claude Code 精通</text>
    <text x="48" y="46" font-size="10" fill="#94A3B8">Tool、hook、MCP、工作流程</text>
  </g>

  <!-- ===== Exam Domain 4 ===== -->
  <g transform="translate(590, 320)">
    <rect width="270" height="58" rx="14" fill="white" stroke="#EF4444" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="20" y="30" font-size="11" font-weight="700" fill="#EF4444">D4</text>
    <text x="48" y="30" font-size="12" font-weight="600" fill="#334155">安全與防護</text>
    <text x="48" y="46" font-size="10" fill="#94A3B8">權限模型、安全護欄</text>
  </g>

  <!-- ===== Exam Domain 5 ===== -->
  <g transform="translate(590, 400)">
    <rect width="270" height="58" rx="14" fill="white" stroke="#FB923C" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="20" y="30" font-size="11" font-weight="700" fill="#FB923C">D5</text>
    <text x="48" y="30" font-size="12" font-weight="600" fill="#334155">Agent 設計</text>
    <text x="48" y="46" font-size="10" fill="#94A3B8">Agentic loop、多 agent 架構</text>
  </g>

  <!-- ===== Connecting Lines ===== -->
  <!-- Part 1 → D1 (blue) -->
  <path d="M 310 125 Q 450 109 588 109" fill="none" stroke="#3B82F6" stroke-width="1.5" opacity="0.6"/>
  <!-- Part 1 → D2 (blue-purple) -->
  <path d="M 310 125 Q 450 145 588 189" fill="none" stroke="#3B82F6" stroke-width="1.2" opacity="0.35" stroke-dasharray="4,3"/>

  <!-- Part 2 → D3 (green, strong) -->
  <path d="M 310 225 Q 450 240 588 269" fill="none" stroke="#22C55E" stroke-width="2" opacity="0.7"/>
  <!-- Part 2 → D4 (green-red) -->
  <path d="M 310 225 Q 450 280 588 349" fill="none" stroke="#22C55E" stroke-width="1.2" opacity="0.35" stroke-dasharray="4,3"/>
  <!-- Part 2 → D2 (green-purple) -->
  <path d="M 310 225 Q 450 200 588 189" fill="none" stroke="#22C55E" stroke-width="1.2" opacity="0.35" stroke-dasharray="4,3"/>

  <!-- Part 3 → D3 (purple-green, strong) -->
  <path d="M 310 325 Q 450 290 588 269" fill="none" stroke="#8B5CF6" stroke-width="1.5" opacity="0.6"/>
  <!-- Part 3 → D5 (purple-orange) -->
  <path d="M 310 325 Q 450 370 588 429" fill="none" stroke="#8B5CF6" stroke-width="1.5" opacity="0.6"/>

  <!-- Part 4 → D5 (orange, strong) -->
  <path d="M 310 425 Q 450 425 588 429" fill="none" stroke="#FB923C" stroke-width="2" opacity="0.7"/>
  <!-- Part 4 → D3 (orange-green) -->
  <path d="M 310 425 Q 450 360 588 269" fill="none" stroke="#FB923C" stroke-width="1.2" opacity="0.35" stroke-dasharray="4,3"/>
  <!-- Part 4 → D4 (orange-red) -->
  <path d="M 310 425 Q 450 390 588 349" fill="none" stroke="#FB923C" stroke-width="1.2" opacity="0.35" stroke-dasharray="4,3"/>

  <!-- Legend -->
  <g transform="translate(310, 478)">
    <line x1="0" y1="0" x2="30" y2="0" stroke="#64748B" stroke-width="2" opacity="0.7"/>
    <text x="36" y="4" font-size="10" fill="#94A3B8">主要對應</text>
    <line x1="110" y1="0" x2="140" y2="0" stroke="#64748B" stroke-width="1.2" opacity="0.35" stroke-dasharray="4,3"/>
    <text x="146" y="4" font-size="10" fill="#94A3B8">次要涵蓋</text>
  </g>

  <!-- Bottom note -->
  <text x="450" y="508" text-anchor="middle" font-size="10" fill="#94A3B8">實線 = 主要對應 | 虛線 = 次要涵蓋 | 線條粗細代表涵蓋深度</text>
</svg>