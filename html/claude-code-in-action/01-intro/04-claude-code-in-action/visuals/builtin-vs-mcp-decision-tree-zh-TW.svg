<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 520" font-family="'PingFang TC', 'Noto Sans TC', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EFF6FF"/>
      <stop offset="100%" stop-color="#DBEAFE"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0FDF4"/>
      <stop offset="100%" stop-color="#DCFCE7"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAF5FF"/>
      <stop offset="100%" stop-color="#F3E8FF"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF7ED"/>
      <stop offset="100%" stop-color="#FFEDD5"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94A3B8"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22C55E"/>
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8B5CF6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="780" height="520" fill="white" rx="12"/>

  <!-- Title -->
  <text x="390" y="36" text-anchor="middle" font-size="15" font-weight="600" fill="#64748B" letter-spacing="0.5">內建 vs MCP — 決策樹</text>

  <!-- ===== Start Node ===== -->
  <g transform="translate(290, 55)">
    <rect width="200" height="60" rx="14" fill="url(#blueGrad)" stroke="#3B82F6" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="100" y="28" text-anchor="middle" font-size="20">💡</text>
    <text x="100" y="48" text-anchor="middle" font-size="12" font-weight="600" fill="#1E40AF">需要某個功能？</text>
  </g>

  <!-- Arrow down to decision -->
  <line x1="390" y1="115" x2="390" y2="145" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== Decision Diamond ===== -->
  <g transform="translate(290, 148)">
    <polygon points="100,0 200,50 100,100 0,50" fill="url(#orangeGrad)" stroke="#FB923C" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="100" y="44" text-anchor="middle" font-size="11" font-weight="600" fill="#9A3412">是內建</text>
    <text x="100" y="58" text-anchor="middle" font-size="11" font-weight="600" fill="#9A3412">tool 嗎？</text>
  </g>

  <!-- YES branch (left) -->
  <line x1="290" y1="198" x2="190" y2="198" stroke="#22C55E" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="240" y="190" text-anchor="middle" font-size="11" font-weight="700" fill="#22C55E">是</text>

  <!-- ===== Built-in Tools Box (left) ===== -->
  <g transform="translate(20, 165)">
    <rect width="168" height="68" rx="14" fill="url(#greenGrad)" stroke="#22C55E" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="84" y="24" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">內建 Tool</text>
    <text x="84" y="42" text-anchor="middle" font-size="9" fill="#22C55E" font-family="'SF Mono', monospace">Read · Write · Edit</text>
    <text x="84" y="56" text-anchor="middle" font-size="9" fill="#22C55E" font-family="'SF Mono', monospace">Bash · Glob · Grep</text>
  </g>

  <!-- Arrow down from built-in -->
  <line x1="104" y1="233" x2="104" y2="278" stroke="#22C55E" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- ===== Use Directly ===== -->
  <g transform="translate(24, 280)">
    <rect width="160" height="55" rx="14" fill="#22C55E" filter="url(#shadow)"/>
    <text x="80" y="26" text-anchor="middle" font-size="18">✅</text>
    <text x="80" y="44" text-anchor="middle" font-size="12" font-weight="600" fill="white">直接使用</text>
  </g>

  <!-- NO branch (right) -->
  <line x1="490" y1="198" x2="530" y2="198" stroke="#8B5CF6" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <text x="510" y="190" text-anchor="middle" font-size="11" font-weight="700" fill="#8B5CF6">否</text>

  <!-- ===== Add MCP Server ===== -->
  <g transform="translate(532, 165)">
    <rect width="220" height="68" rx="14" fill="url(#purpleGrad)" stroke="#8B5CF6" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="110" y="24" text-anchor="middle" font-size="11" font-weight="600" fill="#5B21B6">新增 MCP Server</text>
    <text x="110" y="42" text-anchor="middle" font-size="9" fill="#8B5CF6">Browser、Slack、GitHub、</text>
    <text x="110" y="56" text-anchor="middle" font-size="9" fill="#8B5CF6">Database、Figma 等</text>
  </g>

  <!-- Arrow down from MCP -->
  <line x1="642" y1="233" x2="642" y2="278" stroke="#8B5CF6" stroke-width="1.5" marker-end="url(#arrowPurple)"/>

  <!-- ===== Use Extended Tool ===== -->
  <g transform="translate(562, 280)">
    <rect width="160" height="55" rx="14" fill="#8B5CF6" filter="url(#shadow)"/>
    <text x="80" y="26" text-anchor="middle" font-size="18">🔌</text>
    <text x="80" y="44" text-anchor="middle" font-size="12" font-weight="600" fill="white">使用擴充 Tool</text>
  </g>

  <!-- ===== Proportionate Response Philosophy Box ===== -->
  <g transform="translate(140, 375)">
    <rect width="500" height="100" rx="14" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="250" y="28" text-anchor="middle" font-size="20">🎯</text>
    <text x="250" y="48" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">比例原則哲學</text>
    <text x="250" y="68" text-anchor="middle" font-size="10" fill="#64748B">使用能完成任務的最簡單 tool。</text>
    <text x="250" y="84" text-anchor="middle" font-size="10" fill="#64748B">內建 tool 零設定、即時可用。只在內建無法觸及時才加 MCP。</text>
  </g>

  <!-- Bottom note -->
  <text x="390" y="505" text-anchor="middle" font-size="10" fill="#94A3B8">Claude Code 內建 7 個 tool — MCP 透過 server plugin 可擴展至 100+ 功能</text>
</svg>