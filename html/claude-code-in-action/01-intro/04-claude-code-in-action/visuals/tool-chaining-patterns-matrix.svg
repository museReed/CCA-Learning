<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EFF6FF"/>
      <stop offset="100%" stop-color="#DBEAFE"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0FDF4"/>
      <stop offset="100%" stop-color="#DCFCE7"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAF5FF"/>
      <stop offset="100%" stop-color="#F3E8FF"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF7ED"/>
      <stop offset="100%" stop-color="#FFEDD5"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="6" markerHeight="5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94A3B8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="560" fill="white" rx="12"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-size="15" font-weight="600" fill="#64748B" letter-spacing="0.5">TOOL CHAINING PATTERNS — 4 DEMO USE CASES</text>

  <!-- ===== Cell 1: Performance Optimization (top-left) ===== -->
  <g transform="translate(30, 55)">
    <rect width="410" height="210" rx="14" fill="url(#blueGrad)" stroke="#3B82F6" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="20" y="30" font-size="20">🚀</text>
    <text x="46" y="30" font-size="13" font-weight="600" fill="#1E40AF">Performance Optimization</text>
    <!-- Chain -->
    <g transform="translate(20, 50)">
      <rect width="76" height="36" rx="8" fill="white" stroke="#3B82F6" stroke-width="1" opacity="0.8"/>
      <text x="38" y="22" text-anchor="middle" font-size="10" font-weight="600" fill="#3B82F6">Read</text>
      <line x1="78" y1="18" x2="96" y2="18" stroke="#94A3B8" stroke-width="1" marker-end="url(#arrow)"/>

      <rect x="98" width="76" height="36" rx="8" fill="white" stroke="#3B82F6" stroke-width="1" opacity="0.8"/>
      <text x="136" y="22" text-anchor="middle" font-size="10" font-weight="600" fill="#3B82F6">Analyze</text>
      <line x1="176" y1="18" x2="194" y2="18" stroke="#94A3B8" stroke-width="1" marker-end="url(#arrow)"/>

      <rect x="196" width="76" height="36" rx="8" fill="white" stroke="#3B82F6" stroke-width="1" opacity="0.8"/>
      <text x="234" y="22" text-anchor="middle" font-size="10" font-weight="600" fill="#3B82F6">Fix</text>
      <line x1="274" y1="18" x2="292" y2="18" stroke="#94A3B8" stroke-width="1" marker-end="url(#arrow)"/>

      <rect x="294" width="76" height="36" rx="8" fill="white" stroke="#3B82F6" stroke-width="1" opacity="0.8"/>
      <text x="332" y="22" text-anchor="middle" font-size="10" font-weight="600" fill="#3B82F6">Test</text>
    </g>
    <!-- Details -->
    <text x="20" y="115" font-size="10" fill="#334155">Tools: Grep + Read + Edit + Bash</text>
    <text x="20" y="132" font-size="10" fill="#334155">Pattern: Identify bottleneck → refactor → verify</text>
    <!-- CCA reference -->
    <rect x="20" y="148" width="370" height="40" rx="8" fill="white" opacity="0.6"/>
    <text x="30" y="166" font-size="9" fill="#64748B">CCA Task: "Given a function, optimize its time complexity</text>
    <text x="30" y="180" font-size="9" fill="#64748B">while maintaining correctness" (D3: Claude Code)</text>
  </g>

  <!-- ===== Cell 2: Data Analysis (top-right) ===== -->
  <g transform="translate(460, 55)">
    <rect width="410" height="210" rx="14" fill="url(#greenGrad)" stroke="#22C55E" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="20" y="30" font-size="20">📊</text>
    <text x="46" y="30" font-size="13" font-weight="600" fill="#166534">Data Analysis</text>
    <!-- Chain -->
    <g transform="translate(20, 50)">
      <rect width="76" height="36" rx="8" fill="white" stroke="#22C55E" stroke-width="1" opacity="0.8"/>
      <text x="38" y="22" text-anchor="middle" font-size="10" font-weight="600" fill="#22C55E">Read CSV</text>
      <line x1="78" y1="18" x2="96" y2="18" stroke="#94A3B8" stroke-width="1" marker-end="url(#arrow)"/>

      <rect x="98" width="76" height="36" rx="8" fill="white" stroke="#22C55E" stroke-width="1" opacity="0.8"/>
      <text x="136" y="22" text-anchor="middle" font-size="10" font-weight="600" fill="#22C55E">Transform</text>
      <line x1="176" y1="18" x2="194" y2="18" stroke="#94A3B8" stroke-width="1" marker-end="url(#arrow)"/>

      <rect x="196" width="76" height="36" rx="8" fill="white" stroke="#22C55E" stroke-width="1" opacity="0.8"/>
      <text x="234" y="22" text-anchor="middle" font-size="10" font-weight="600" fill="#22C55E">Visualize</text>
      <line x1="274" y1="18" x2="292" y2="18" stroke="#94A3B8" stroke-width="1" marker-end="url(#arrow)"/>

      <rect x="294" width="76" height="36" rx="8" fill="white" stroke="#22C55E" stroke-width="1" opacity="0.8"/>
      <text x="332" y="22" text-anchor="middle" font-size="10" font-weight="600" fill="#22C55E">Report</text>
    </g>
    <text x="20" y="115" font-size="10" fill="#334155">Tools: Read + Bash (python) + Write</text>
    <text x="20" y="132" font-size="10" fill="#334155">Pattern: Ingest → process → output chart</text>
    <rect x="20" y="148" width="370" height="40" rx="8" fill="white" opacity="0.6"/>
    <text x="30" y="166" font-size="9" fill="#64748B">CCA Task: "Analyze dataset and produce summary</text>
    <text x="30" y="180" font-size="9" fill="#64748B">statistics with visualization" (D3: Claude Code)</text>
  </g>

  <!-- ===== Cell 3: MCP / Browser (bottom-left) ===== -->
  <g transform="translate(30, 290)">
    <rect width="410" height="210" rx="14" fill="url(#purpleGrad)" stroke="#8B5CF6" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="20" y="30" font-size="20">🌐</text>
    <text x="46" y="30" font-size="13" font-weight="600" fill="#5B21B6">MCP / Browser Automation</text>
    <!-- Chain -->
    <g transform="translate(20, 50)">
      <rect width="76" height="36" rx="8" fill="white" stroke="#8B5CF6" stroke-width="1" opacity="0.8"/>
      <text x="38" y="22" text-anchor="middle" font-size="10" font-weight="600" fill="#8B5CF6">Generate</text>
      <line x1="78" y1="18" x2="96" y2="18" stroke="#94A3B8" stroke-width="1" marker-end="url(#arrow)"/>

      <rect x="98" width="76" height="36" rx="8" fill="white" stroke="#8B5CF6" stroke-width="1" opacity="0.8"/>
      <text x="136" y="16" text-anchor="middle" font-size="10" font-weight="600" fill="#8B5CF6">Screen-</text>
      <text x="136" y="30" text-anchor="middle" font-size="10" font-weight="600" fill="#8B5CF6">shot</text>
      <line x1="176" y1="18" x2="194" y2="18" stroke="#94A3B8" stroke-width="1" marker-end="url(#arrow)"/>

      <rect x="196" width="76" height="36" rx="8" fill="white" stroke="#8B5CF6" stroke-width="1" opacity="0.8"/>
      <text x="234" y="22" text-anchor="middle" font-size="10" font-weight="600" fill="#8B5CF6">Evaluate</text>
      <line x1="274" y1="18" x2="292" y2="18" stroke="#94A3B8" stroke-width="1" marker-end="url(#arrow)"/>

      <rect x="294" width="76" height="36" rx="8" fill="white" stroke="#8B5CF6" stroke-width="1" opacity="0.8"/>
      <text x="332" y="22" text-anchor="middle" font-size="10" font-weight="600" fill="#8B5CF6">Refine</text>
    </g>
    <text x="20" y="115" font-size="10" fill="#334155">Tools: Write + MCP (browser) + Read (image)</text>
    <text x="20" y="132" font-size="10" fill="#334155">Pattern: Create → preview → iterate</text>
    <rect x="20" y="148" width="370" height="40" rx="8" fill="white" opacity="0.6"/>
    <text x="30" y="166" font-size="9" fill="#64748B">CCA Task: "Extend capabilities via MCP servers</text>
    <text x="30" y="180" font-size="9" fill="#64748B">for browser-based workflows" (D5: Agent Design)</text>
  </g>

  <!-- ===== Cell 4: CI/CD Security (bottom-right) ===== -->
  <g transform="translate(460, 290)">
    <rect width="410" height="210" rx="14" fill="url(#orangeGrad)" stroke="#FB923C" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="20" y="30" font-size="20">🔒</text>
    <text x="46" y="30" font-size="13" font-weight="600" fill="#9A3412">CI/CD Security Scan</text>
    <!-- Chain -->
    <g transform="translate(20, 50)">
      <rect width="76" height="36" rx="8" fill="white" stroke="#FB923C" stroke-width="1" opacity="0.8"/>
      <text x="38" y="22" text-anchor="middle" font-size="10" font-weight="600" fill="#FB923C">Scan</text>
      <line x1="78" y1="18" x2="96" y2="18" stroke="#94A3B8" stroke-width="1" marker-end="url(#arrow)"/>

      <rect x="98" width="76" height="36" rx="8" fill="white" stroke="#FB923C" stroke-width="1" opacity="0.8"/>
      <text x="136" y="22" text-anchor="middle" font-size="10" font-weight="600" fill="#FB923C">Identify</text>
      <line x1="176" y1="18" x2="194" y2="18" stroke="#94A3B8" stroke-width="1" marker-end="url(#arrow)"/>

      <rect x="196" width="76" height="36" rx="8" fill="white" stroke="#FB923C" stroke-width="1" opacity="0.8"/>
      <text x="234" y="22" text-anchor="middle" font-size="10" font-weight="600" fill="#FB923C">Fix</text>
      <line x1="274" y1="18" x2="292" y2="18" stroke="#94A3B8" stroke-width="1" marker-end="url(#arrow)"/>

      <rect x="294" width="76" height="36" rx="8" fill="white" stroke="#FB923C" stroke-width="1" opacity="0.8"/>
      <text x="332" y="22" text-anchor="middle" font-size="10" font-weight="600" fill="#FB923C">Verify</text>
    </g>
    <text x="20" y="115" font-size="10" fill="#334155">Tools: Grep + Bash + Edit + Bash</text>
    <text x="20" y="132" font-size="10" fill="#334155">Pattern: Detect vuln → patch → re-scan</text>
    <rect x="20" y="148" width="370" height="40" rx="8" fill="white" opacity="0.6"/>
    <text x="30" y="166" font-size="9" fill="#64748B">CCA Task: "Implement security scanning as part</text>
    <text x="30" y="180" font-size="9" fill="#64748B">of automated pipeline" (D4: Security)</text>
  </g>

  <!-- Bottom note -->
  <text x="450" y="535" text-anchor="middle" font-size="10" fill="#94A3B8">Each pattern demonstrates multi-step tool chaining — the agentic loop iterates until the task is complete</text>
  <text x="450" y="550" text-anchor="middle" font-size="10" fill="#94A3B8">CCA references map to official exam domain task statements</text>
</svg>