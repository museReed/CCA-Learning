<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 280" font-family="'PingFang TC', 'Noto Sans TC', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.1"/>
    </filter>
  </defs>
  <rect width="500" height="280" fill="white" rx="12"/>
  <text x="250" y="28" text-anchor="middle" font-size="15" font-weight="600" fill="#64748B" letter-spacing="1">Context Window ↔ 開發者類比</text>

  <!-- Table header -->
  <rect x="20" y="44" width="220" height="32" rx="8" fill="#DBEAFE"/>
  <text x="130" y="65" text-anchor="middle" font-size="12" font-weight="700" fill="#1E40AF">Context Window 操作</text>
  <rect x="260" y="44" width="220" height="32" rx="8" fill="#F0FDF4"/>
  <text x="370" y="65" text-anchor="middle" font-size="12" font-weight="700" fill="#166534">開發者類比</text>

  <!-- Row 1: Escape ↔ Ctrl+C -->
  <rect x="20" y="84" width="220" height="40" rx="14" fill="#FEF2F2" stroke="#EF4444" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="40" y="108" font-size="16">⎋</text>
  <text x="62" y="108" font-size="12" font-weight="600" fill="#DC2626">Escape</text>
  <text x="140" y="108" font-size="10" fill="#64748B">中斷當前回應</text>

  <text x="248" y="108" font-size="14" fill="#94A3B8">↔</text>

  <rect x="260" y="84" width="220" height="40" rx="14" fill="#FEF2F2" stroke="#EF4444" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="280" y="108" font-size="16">🛑</text>
  <text x="302" y="108" font-size="12" font-weight="600" fill="#DC2626">Ctrl+C</text>
  <text x="380" y="108" font-size="10" fill="#64748B">終止執行中程序</text>

  <!-- Row 2: Double-Escape ↔ git reset --soft -->
  <rect x="20" y="132" width="220" height="40" rx="14" fill="#FFF7ED" stroke="#FB923C" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="40" y="156" font-size="16">⎋⎋</text>
  <text x="72" y="156" font-size="12" font-weight="600" fill="#EA580C">Double-Escape</text>
  <text x="175" y="156" font-size="10" fill="#64748B">撤回上一輪</text>

  <text x="248" y="156" font-size="14" fill="#94A3B8">↔</text>

  <rect x="260" y="132" width="220" height="40" rx="14" fill="#FFF7ED" stroke="#FB923C" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="280" y="156" font-size="16">↩️</text>
  <text x="302" y="152" font-size="12" font-weight="600" fill="#EA580C">git reset --soft</text>
  <text x="302" y="165" font-size="10" fill="#64748B">撤回 commit，保留修改</text>

  <!-- Row 3: /compact ↔ git squash -->
  <rect x="20" y="180" width="220" height="40" rx="14" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="40" y="204" font-size="16">📦</text>
  <text x="62" y="204" font-size="12" font-weight="600" fill="#7C3AED">/compact</text>
  <text x="140" y="204" font-size="10" fill="#64748B">壓縮歷史記錄</text>

  <text x="248" y="204" font-size="14" fill="#94A3B8">↔</text>

  <rect x="260" y="180" width="220" height="40" rx="14" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="280" y="204" font-size="16">🗜️</text>
  <text x="302" y="204" font-size="12" font-weight="600" fill="#7C3AED">git squash</text>
  <text x="395" y="204" font-size="10" fill="#64748B">壓縮 commit</text>

  <!-- Row 4: /clear ↔ git init -->
  <rect x="20" y="228" width="220" height="40" rx="14" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="40" y="252" font-size="16">🆕</text>
  <text x="62" y="252" font-size="12" font-weight="600" fill="#2563EB">/clear</text>
  <text x="128" y="252" font-size="10" fill="#64748B">全新開始</text>

  <text x="248" y="252" font-size="14" fill="#94A3B8">↔</text>

  <rect x="260" y="228" width="220" height="40" rx="14" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="280" y="252" font-size="16">🏗️</text>
  <text x="302" y="252" font-size="12" font-weight="600" fill="#2563EB">git init</text>
  <text x="367" y="252" font-size="10" fill="#64748B">全新 repo</text>
</svg>