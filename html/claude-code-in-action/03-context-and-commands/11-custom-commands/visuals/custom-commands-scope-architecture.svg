<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 260" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.1"/>
    </filter>
  </defs>
  <rect width="500" height="260" fill="white" rx="12"/>
  <text x="250" y="28" text-anchor="middle" font-size="15" font-weight="600" fill="#64748B" letter-spacing="0.5">CUSTOM COMMANDS — DUAL SCOPE</text>

  <!-- Left: Project scope -->
  <rect x="20" y="44" width="220" height="175" rx="14" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="130" y="70" text-anchor="middle" font-size="22">📂</text>
  <text x="130" y="92" text-anchor="middle" font-size="14" font-weight="700" fill="#1E40AF">Project Scope</text>
  <text x="130" y="110" text-anchor="middle" font-size="10" fill="#3B82F6">.claude/commands/</text>

  <line x1="40" y1="120" x2="220" y2="120" stroke="#93C5FD" stroke-width="1"/>

  <!-- Git icon + committed -->
  <text x="44" y="140" font-size="12">🔀</text>
  <text x="62" y="140" font-size="11" fill="#1E40AF">Committed to git</text>
  <text x="44" y="158" font-size="12">👥</text>
  <text x="62" y="158" font-size="11" fill="#1E40AF">Shared team-wide</text>

  <line x1="40" y1="168" x2="220" y2="168" stroke="#93C5FD" stroke-width="0.5"/>

  <text x="44" y="186" font-size="10" fill="#64748B">Examples:</text>
  <rect x="44" y="192" width="60" height="20" rx="10" fill="#1E40AF" opacity="0.1"/>
  <text x="74" y="206" text-anchor="middle" font-size="10" font-weight="600" fill="#1E40AF">/review</text>
  <rect x="112" y="192" width="60" height="20" rx="10" fill="#1E40AF" opacity="0.1"/>
  <text x="142" y="206" text-anchor="middle" font-size="10" font-weight="600" fill="#1E40AF">/deploy</text>
  <rect x="180" y="192" width="50" height="20" rx="10" fill="#1E40AF" opacity="0.1"/>
  <text x="205" y="206" text-anchor="middle" font-size="10" font-weight="600" fill="#1E40AF">/test</text>

  <!-- Right: User scope -->
  <rect x="260" y="44" width="220" height="175" rx="14" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="370" y="70" text-anchor="middle" font-size="22">🔒</text>
  <text x="370" y="92" text-anchor="middle" font-size="14" font-weight="700" fill="#6D28D9">User Scope</text>
  <text x="370" y="110" text-anchor="middle" font-size="10" fill="#8B5CF6">~/.claude/commands/</text>

  <line x1="280" y1="120" x2="460" y2="120" stroke="#C4B5FD" stroke-width="1"/>

  <text x="284" y="140" font-size="12">🙈</text>
  <text x="302" y="140" font-size="11" fill="#6D28D9">Not in git</text>
  <text x="284" y="158" font-size="12">🧑</text>
  <text x="302" y="158" font-size="11" fill="#6D28D9">Personal only</text>

  <line x1="280" y1="168" x2="460" y2="168" stroke="#C4B5FD" stroke-width="0.5"/>

  <text x="284" y="186" font-size="10" fill="#64748B">Examples:</text>
  <rect x="284" y="192" width="70" height="20" rx="10" fill="#6D28D9" opacity="0.1"/>
  <text x="319" y="206" text-anchor="middle" font-size="10" font-weight="600" fill="#6D28D9">/my-style</text>
  <rect x="362" y="192" width="80" height="20" rx="10" fill="#6D28D9" opacity="0.1"/>
  <text x="402" y="206" text-anchor="middle" font-size="10" font-weight="600" fill="#6D28D9">/shortcuts</text>

  <!-- Bottom note -->
  <text x="250" y="248" text-anchor="middle" font-size="10" fill="#94A3B8">Project commands for team workflows, User commands for personal preferences.</text>
</svg>