<svg xmlns="http://www.w3.org/2000/svg" width="800" height="520" viewBox="0 0 800 520">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3B82F6"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22C55E"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8B5CF6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="520" rx="16" fill="#FAFBFC"/>

  <!-- Title -->
  <text x="400" y="42" text-anchor="middle" font-family="'PingFang TC', 'Noto Sans TC', sans-serif" font-size="22" font-weight="700" fill="#1E293B">三種模式對應不同複雜度</text>

  <!-- Top row: 3 trigger boxes -->
  <!-- Simple Change -->
  <rect x="40" y="72" width="210" height="56" rx="12" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="145" y="96" text-anchor="middle" font-family="'PingFang TC', 'Noto Sans TC', sans-serif" font-size="13" fill="#64748B">情境</text>
  <text x="145" y="116" text-anchor="middle" font-family="'PingFang TC', 'Noto Sans TC', sans-serif" font-size="16" font-weight="600" fill="#1E40AF">&#x1F4DD; 簡單修改</text>

  <!-- Complex Multi-file -->
  <rect x="295" y="72" width="210" height="56" rx="12" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="400" y="96" text-anchor="middle" font-family="'PingFang TC', 'Noto Sans TC', sans-serif" font-size="13" fill="#64748B">情境</text>
  <text x="400" y="116" text-anchor="middle" font-family="'PingFang TC', 'Noto Sans TC', sans-serif" font-size="16" font-weight="600" fill="#166534">&#x1F4C1; 複雜多檔案</text>

  <!-- Ambiguous Problem -->
  <rect x="550" y="72" width="210" height="56" rx="12" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="655" y="96" text-anchor="middle" font-family="'PingFang TC', 'Noto Sans TC', sans-serif" font-size="13" fill="#64748B">情境</text>
  <text x="655" y="116" text-anchor="middle" font-family="'PingFang TC', 'Noto Sans TC', sans-serif" font-size="16" font-weight="600" fill="#5B21B6">&#x1F914; 模糊問題</text>

  <!-- Arrows down from triggers -->
  <line x1="145" y1="128" x2="145" y2="168" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="400" y1="128" x2="400" y2="168" stroke="#22C55E" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="655" y1="128" x2="655" y2="168" stroke="#8B5CF6" stroke-width="2" marker-end="url(#arrowPurple)"/>

  <!-- Mode labels -->
  <!-- Direct Execution -->
  <rect x="40" y="172" width="210" height="48" rx="12" fill="#3B82F6" filter="url(#shadow)"/>
  <text x="145" y="202" text-anchor="middle" font-family="'PingFang TC', 'Noto Sans TC', sans-serif" font-size="17" font-weight="700" fill="white">&#x26A1; 直接執行</text>

  <!-- Plan Mode -->
  <rect x="295" y="172" width="210" height="48" rx="12" fill="#22C55E" filter="url(#shadow)"/>
  <text x="400" y="195" text-anchor="middle" font-family="'PingFang TC', 'Noto Sans TC', sans-serif" font-size="17" font-weight="700" fill="white">&#x1F4CB; Plan Mode</text>
  <text x="400" y="213" text-anchor="middle" font-family="'PingFang TC', 'Noto Sans TC', sans-serif" font-size="12" fill="rgba(255,255,255,0.85)">（規劃模式）</text>

  <!-- Extended Thinking -->
  <rect x="550" y="172" width="210" height="48" rx="12" fill="#8B5CF6" filter="url(#shadow)"/>
  <text x="655" y="195" text-anchor="middle" font-family="'PingFang TC', 'Noto Sans TC', sans-serif" font-size="16" font-weight="700" fill="white">&#x1F9E0; Extended Thinking</text>
  <text x="655" y="213" text-anchor="middle" font-family="'PingFang TC', 'Noto Sans TC', sans-serif" font-size="12" fill="rgba(255,255,255,0.85)">（深度推理）</text>

  <!-- LEFT column: single arrow to result -->
  <line x1="145" y1="220" x2="145" y2="280" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <rect x="40" y="284" width="210" height="44" rx="12" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="145" y="312" text-anchor="middle" font-family="'PingFang TC', 'Noto Sans TC', sans-serif" font-size="15" font-weight="600" fill="#1E40AF">直接修改程式碼</text>

  <!-- CENTER column: Plan Mode branching steps -->
  <line x1="400" y1="220" x2="400" y2="258" stroke="#22C55E" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- Step 1: Ask -->
  <rect x="330" y="262" width="140" height="34" rx="10" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.2"/>
  <text x="400" y="284" text-anchor="middle" font-family="'PingFang TC', 'Noto Sans TC', sans-serif" font-size="14" font-weight="600" fill="#166534">1. 提問釐清</text>
  <line x1="400" y1="296" x2="400" y2="308" stroke="#22C55E" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- Step 2: Explore -->
  <rect x="330" y="312" width="140" height="34" rx="10" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.2"/>
  <text x="400" y="334" text-anchor="middle" font-family="'PingFang TC', 'Noto Sans TC', sans-serif" font-size="14" font-weight="600" fill="#166534">2. 探索程式碼</text>
  <line x1="400" y1="346" x2="400" y2="358" stroke="#22C55E" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- Step 3: Plan -->
  <rect x="330" y="362" width="140" height="34" rx="10" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.2"/>
  <text x="400" y="384" text-anchor="middle" font-family="'PingFang TC', 'Noto Sans TC', sans-serif" font-size="14" font-weight="600" fill="#166534">3. 產出計畫</text>
  <line x1="400" y1="396" x2="400" y2="408" stroke="#22C55E" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- Step 4: Review -->
  <rect x="330" y="412" width="140" height="34" rx="10" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.2"/>
  <text x="400" y="434" text-anchor="middle" font-family="'PingFang TC', 'Noto Sans TC', sans-serif" font-size="14" font-weight="600" fill="#166534">4. 審查計畫</text>
  <line x1="400" y1="446" x2="400" y2="458" stroke="#22C55E" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- Step 5: Execute -->
  <rect x="330" y="462" width="140" height="34" rx="10" fill="#22C55E"/>
  <text x="400" y="484" text-anchor="middle" font-family="'PingFang TC', 'Noto Sans TC', sans-serif" font-size="14" font-weight="700" fill="white">5. 執行修改</text>

  <!-- RIGHT column: deep reasoning -->
  <line x1="655" y1="220" x2="655" y2="280" stroke="#8B5CF6" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <rect x="550" y="284" width="210" height="70" rx="12" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="655" y="310" text-anchor="middle" font-family="'PingFang TC', 'Noto Sans TC', sans-serif" font-size="28">&#x1F50D;</text>
  <text x="655" y="338" text-anchor="middle" font-family="'PingFang TC', 'Noto Sans TC', sans-serif" font-size="14" font-weight="600" fill="#5B21B6">行動前先深度推理</text>

  <!-- Bottom annotation bar -->
  <text x="400" y="514" text-anchor="middle" font-family="'PingFang TC', 'Noto Sans TC', sans-serif" font-size="14" font-weight="600" fill="#64748B">&#x2328;&#xFE0F; Shift+Tab 切換模式</text>
</svg>