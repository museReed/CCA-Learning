<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 280" font-family="'PingFang TC', 'Noto Sans TC', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.1"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94A3B8"/>
    </marker>
  </defs>
  <rect width="780" height="280" fill="white" rx="12"/>
  <text x="390" y="32" text-anchor="middle" font-size="15" font-weight="600" fill="#64748B" letter-spacing="1">規劃模式 → 執行流程</text>

  <!-- Phase labels -->
  <text x="225" y="58" text-anchor="middle" font-size="10" font-weight="600" fill="#3B82F6">規劃階段</text>
  <text x="630" y="58" text-anchor="middle" font-size="10" font-weight="600" fill="#22C55E">執行階段</text>
  <line x1="420" y1="50" x2="420" y2="240" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- Step 1: User Asks -->
  <g transform="translate(20, 80)">
    <rect width="120" height="80" rx="14" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="60" y="30" text-anchor="middle" font-size="22">💬</text>
    <text x="60" y="52" text-anchor="middle" font-size="12" font-weight="700" fill="#1E40AF">用戶提問</text>
    <text x="60" y="68" text-anchor="middle" font-size="9" fill="#3B82F6">描述任務需求</text>
  </g>

  <line x1="140" y1="120" x2="158" y2="120" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 2: Claude Explores -->
  <g transform="translate(165, 80)">
    <rect width="120" height="80" rx="14" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="60" y="30" text-anchor="middle" font-size="22">🔍</text>
    <text x="60" y="52" text-anchor="middle" font-size="12" font-weight="700" fill="#5B21B6">探索</text>
    <text x="60" y="68" text-anchor="middle" font-size="9" fill="#8B5CF6">讀取檔案、</text>
    <text x="60" y="78" text-anchor="middle" font-size="9" fill="#8B5CF6">執行指令</text>
  </g>

  <line x1="285" y1="120" x2="303" y2="120" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 3: Claude Plans -->
  <g transform="translate(310, 80)">
    <rect width="120" height="80" rx="14" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="60" y="30" text-anchor="middle" font-size="22">📋</text>
    <text x="60" y="52" text-anchor="middle" font-size="12" font-weight="700" fill="#5B21B6">規劃</text>
    <text x="60" y="68" text-anchor="middle" font-size="9" fill="#8B5CF6">提出方案</text>
    <text x="60" y="78" text-anchor="middle" font-size="9" fill="#8B5CF6">等待審核</text>
  </g>

  <line x1="430" y1="120" x2="450" y2="120" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 4: Review Gate (diamond) -->
  <g transform="translate(455, 80)">
    <polygon points="60,0 120,40 60,80 0,40" fill="#FEF3C7" stroke="#FB923C" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="60" y="33" text-anchor="middle" font-size="18">⚠️</text>
    <text x="60" y="50" text-anchor="middle" font-size="10" font-weight="700" fill="#92400E">審核</text>
    <text x="60" y="62" text-anchor="middle" font-size="10" font-weight="700" fill="#92400E">關卡</text>
  </g>

  <!-- Approve arrow -->
  <line x1="575" y1="120" x2="633" y2="120" stroke="#22C55E" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="604" y="112" text-anchor="middle" font-size="9" font-weight="600" fill="#22C55E">核准</text>

  <!-- Redirect arrow -->
  <path d="M 515 80 Q 515 55 370 55 Q 225 55 225 80" fill="none" stroke="#EF4444" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text x="380" y="47" text-anchor="middle" font-size="9" font-weight="600" fill="#EF4444">調整方向</text>

  <!-- Step 5: Claude Executes -->
  <g transform="translate(640, 80)">
    <rect width="120" height="80" rx="14" fill="#DCFCE7" stroke="#22C55E" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="60" y="30" text-anchor="middle" font-size="22">⚡</text>
    <text x="60" y="52" text-anchor="middle" font-size="12" font-weight="700" fill="#166534">執行</text>
    <text x="60" y="68" text-anchor="middle" font-size="9" fill="#22C55E">實作核准後</text>
    <text x="60" y="78" text-anchor="middle" font-size="9" fill="#22C55E">的變更</text>
  </g>

  <!-- Subtext -->
  <text x="280" y="210" text-anchor="middle" font-size="10" fill="#64748B">Claude 先讀取程式碼、理解上下文，</text>
  <text x="280" y="224" text-anchor="middle" font-size="10" fill="#64748B">再提出修改方案</text>

  <text x="630" y="210" text-anchor="middle" font-size="10" fill="#64748B">只有在你核准後</text>
  <text x="630" y="224" text-anchor="middle" font-size="10" fill="#64748B">Claude 才會修改檔案</text>

  <text x="390" y="268" text-anchor="middle" font-size="10" fill="#94A3B8">審核關卡確保你掌握主導權 — 執行前隨時可調整方向</text>
</svg>