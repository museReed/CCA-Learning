<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 480" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EFF6FF"/>
      <stop offset="100%" stop-color="#DBEAFE"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0FDF4"/>
      <stop offset="100%" stop-color="#DCFCE7"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF7ED"/>
      <stop offset="100%" stop-color="#FFEDD5"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAF5FF"/>
      <stop offset="100%" stop-color="#F3E8FF"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FEF2F2"/>
      <stop offset="100%" stop-color="#FEE2E2"/>
    </linearGradient>
    <marker id="arrowBlue" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3B82F6"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22C55E"/>
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8B5CF6"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#FB923C"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="560" height="480" fill="white" rx="12"/>

  <!-- Title -->
  <text x="280" y="36" text-anchor="middle" font-size="15" font-weight="600" fill="#64748B" letter-spacing="0.5">RESEARCH MODE WORKFLOW</text>

  <!-- Step 1: User Question -->
  <g transform="translate(30, 60)">
    <rect width="140" height="90" rx="14" fill="url(#blueGrad)" stroke="#3B82F6" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="70" y="30" text-anchor="middle" font-size="22">&#x1F464;</text>
    <text x="70" y="52" text-anchor="middle" font-size="12" font-weight="600" fill="#1E40AF">User Question</text>
    <text x="70" y="68" text-anchor="middle" font-size="9" fill="#3B82F6">Ask a complex or</text>
    <text x="70" y="80" text-anchor="middle" font-size="9" fill="#3B82F6">multi-faceted question</text>
  </g>
  <!-- Step number -->
  <circle cx="55" cy="56" r="11" fill="#3B82F6" opacity="0.15"/>
  <text x="55" y="60" text-anchor="middle" font-size="9" font-weight="700" fill="#3B82F6">1</text>

  <!-- Arrow 1→2 -->
  <path d="M 170 105 L 205 105" fill="none" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- Step 2: Plan Search Strategy -->
  <g transform="translate(213, 60)">
    <rect width="140" height="90" rx="14" fill="url(#purpleGrad)" stroke="#8B5CF6" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="70" y="30" text-anchor="middle" font-size="22">&#x1F9E0;</text>
    <text x="70" y="52" text-anchor="middle" font-size="12" font-weight="600" fill="#5B21B6">Plan Strategy</text>
    <text x="70" y="68" text-anchor="middle" font-size="9" fill="#8B5CF6">Decompose into</text>
    <text x="70" y="80" text-anchor="middle" font-size="9" fill="#8B5CF6">sub-queries</text>
  </g>
  <circle cx="238" cy="56" r="11" fill="#8B5CF6" opacity="0.15"/>
  <text x="238" y="60" text-anchor="middle" font-size="9" font-weight="700" fill="#8B5CF6">2</text>

  <!-- Arrow 2→3 -->
  <path d="M 353 105 L 388 105" fill="none" stroke="#8B5CF6" stroke-width="2" marker-end="url(#arrowPurple)"/>

  <!-- Step 3: Search Multiple Sources -->
  <g transform="translate(396, 55)">
    <rect width="140" height="100" rx="14" fill="url(#orangeGrad)" stroke="#FB923C" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="70" y="28" text-anchor="middle" font-size="22">&#x1F50D;</text>
    <text x="70" y="48" text-anchor="middle" font-size="12" font-weight="600" fill="#9A3412">Search Sources</text>
    <text x="70" y="64" text-anchor="middle" font-size="9" fill="#FB923C">Web, docs, articles,</text>
    <text x="70" y="76" text-anchor="middle" font-size="9" fill="#FB923C">papers, databases</text>
    <!-- Mini source indicators -->
    <circle cx="30" cy="92" r="5" fill="#FB923C" opacity="0.3"/>
    <circle cx="50" cy="92" r="5" fill="#FB923C" opacity="0.3"/>
    <circle cx="70" cy="92" r="5" fill="#FB923C" opacity="0.3"/>
    <circle cx="90" cy="92" r="5" fill="#FB923C" opacity="0.3"/>
    <circle cx="110" cy="92" r="5" fill="#FB923C" opacity="0.3"/>
  </g>
  <circle cx="421" cy="51" r="11" fill="#FB923C" opacity="0.15"/>
  <text x="421" y="55" text-anchor="middle" font-size="9" font-weight="700" fill="#FB923C">3</text>

  <!-- Arrow 3→4 (down-left) -->
  <path d="M 466 155 L 466 200 Q 466 215 450 215 L 350 215" fill="none" stroke="#FB923C" stroke-width="2" marker-end="url(#arrowOrange)"/>

  <!-- Step 4: Synthesize Findings -->
  <g transform="translate(170, 190)">
    <rect width="172" height="100" rx="14" fill="url(#greenGrad)" stroke="#22C55E" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="86" y="30" text-anchor="middle" font-size="22">&#x1F9E9;</text>
    <text x="86" y="52" text-anchor="middle" font-size="12" font-weight="600" fill="#166534">Synthesize Findings</text>
    <text x="86" y="68" text-anchor="middle" font-size="9" fill="#22C55E">Cross-reference &amp; validate</text>
    <text x="86" y="80" text-anchor="middle" font-size="9" fill="#22C55E">Identify key themes</text>
  </g>
  <circle cx="195" cy="186" r="11" fill="#22C55E" opacity="0.15"/>
  <text x="195" y="190" text-anchor="middle" font-size="9" font-weight="700" fill="#22C55E">4</text>

  <!-- Arrow 4→5 (down) -->
  <path d="M 256 290 L 256 320" fill="none" stroke="#22C55E" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- Step 5: Deliver Cited Report -->
  <g transform="translate(100, 328)">
    <rect width="360" height="110" rx="14" fill="url(#blueGrad)" stroke="#3B82F6" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="180" y="28" text-anchor="middle" font-size="22">&#x1F4CA;</text>
    <text x="180" y="50" text-anchor="middle" font-size="13" font-weight="600" fill="#1E40AF">Deliver Cited Report</text>
    <text x="180" y="68" text-anchor="middle" font-size="10" fill="#3B82F6">Comprehensive answer with inline citations</text>

    <!-- Citation examples -->
    <rect x="25" y="78" width="90" height="20" rx="6" fill="white" stroke="#93C5FD" stroke-width="1"/>
    <text x="70" y="92" text-anchor="middle" font-size="8" fill="#1E40AF">[1] source.com</text>
    <rect x="125" y="78" width="90" height="20" rx="6" fill="white" stroke="#93C5FD" stroke-width="1"/>
    <text x="170" y="92" text-anchor="middle" font-size="8" fill="#1E40AF">[2] paper.org</text>
    <rect x="225" y="78" width="110" height="20" rx="6" fill="white" stroke="#93C5FD" stroke-width="1"/>
    <text x="280" y="92" text-anchor="middle" font-size="8" fill="#1E40AF">[3] research.edu</text>
  </g>
  <circle cx="125" cy="324" r="11" fill="#3B82F6" opacity="0.15"/>
  <text x="125" y="328" text-anchor="middle" font-size="9" font-weight="700" fill="#3B82F6">5</text>

  <!-- Bottom note -->
  <text x="280" y="465" text-anchor="middle" font-size="10" fill="#94A3B8">Research mode searches the web and synthesizes findings into a comprehensive cited report</text>
</svg>