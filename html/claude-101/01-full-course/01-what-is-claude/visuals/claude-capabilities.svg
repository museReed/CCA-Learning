<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 560" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EFF6FF"/>
      <stop offset="100%" stop-color="#DBEAFE"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0FDF4"/>
      <stop offset="100%" stop-color="#DCFCE7"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF7ED"/>
      <stop offset="100%" stop-color="#FFEDD5"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAF5FF"/>
      <stop offset="100%" stop-color="#F3E8FF"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FEF2F2"/>
      <stop offset="100%" stop-color="#FEE2E2"/>
    </linearGradient>
    <linearGradient id="centerGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="560" height="560" fill="white" rx="12"/>

  <!-- Title -->
  <text x="280" y="36" text-anchor="middle" font-size="15" font-weight="600" fill="#64748B" letter-spacing="0.5">CLAUDE'S CORE CAPABILITIES</text>

  <!-- Center: Claude -->
  <circle cx="280" cy="280" r="62" fill="url(#centerGrad)" filter="url(#shadow)"/>
  <text x="280" y="268" text-anchor="middle" font-size="28" fill="white">&#x2728;</text>
  <text x="280" y="292" text-anchor="middle" font-size="16" font-weight="700" fill="white">Claude</text>

  <!-- Connecting lines -->
  <line x1="280" y1="218" x2="280" y2="118" stroke="#3B82F6" stroke-width="2" stroke-dasharray="4,3" opacity="0.4"/>
  <line x1="339" y1="243" x2="430" y2="168" stroke="#22C55E" stroke-width="2" stroke-dasharray="4,3" opacity="0.4"/>
  <line x1="342" y1="295" x2="430" y2="378" stroke="#8B5CF6" stroke-width="2" stroke-dasharray="4,3" opacity="0.4"/>
  <line x1="280" y1="342" x2="280" y2="430" stroke="#EF4444" stroke-width="2" stroke-dasharray="4,3" opacity="0.4"/>
  <line x1="218" y1="243" x2="130" y2="168" stroke="#FB923C" stroke-width="2" stroke-dasharray="4,3" opacity="0.4"/>

  <!-- 1. Writing (Top) -->
  <g transform="translate(200, 60)">
    <rect width="160" height="72" rx="14" fill="url(#blueGrad)" stroke="#3B82F6" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="80" y="30" text-anchor="middle" font-size="22">&#x270D;&#xFE0F;</text>
    <text x="80" y="48" text-anchor="middle" font-size="12" font-weight="600" fill="#1E40AF">Writing</text>
    <text x="80" y="63" text-anchor="middle" font-size="9.5" fill="#3B82F6">Draft, edit &amp; summarize text</text>
  </g>

  <!-- 2. Research & Analysis (Top-Right) -->
  <g transform="translate(390, 120)">
    <rect width="155" height="82" rx="14" fill="url(#greenGrad)" stroke="#22C55E" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="78" y="30" text-anchor="middle" font-size="22">&#x1F50D;</text>
    <text x="78" y="50" text-anchor="middle" font-size="12" font-weight="600" fill="#166534">Research &amp; Analysis</text>
    <text x="78" y="68" text-anchor="middle" font-size="9.5" fill="#22C55E">Deep-dive into any topic</text>
  </g>

  <!-- 3. Problem-Solving (Bottom-Right) -->
  <g transform="translate(390, 345)">
    <rect width="155" height="72" rx="14" fill="url(#purpleGrad)" stroke="#8B5CF6" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="78" y="28" text-anchor="middle" font-size="22">&#x1F4A1;</text>
    <text x="78" y="47" text-anchor="middle" font-size="12" font-weight="600" fill="#5B21B6">Problem-Solving</text>
    <text x="78" y="63" text-anchor="middle" font-size="9.5" fill="#8B5CF6">Break down complex tasks</text>
  </g>

  <!-- 4. Learning (Bottom) -->
  <g transform="translate(200, 438)">
    <rect width="160" height="72" rx="14" fill="url(#redGrad)" stroke="#EF4444" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="80" y="28" text-anchor="middle" font-size="22">&#x1F393;</text>
    <text x="80" y="47" text-anchor="middle" font-size="12" font-weight="600" fill="#991B1B">Learning</text>
    <text x="80" y="63" text-anchor="middle" font-size="9.5" fill="#EF4444">Explain &amp; teach concepts</text>
  </g>

  <!-- 5. Coding (Top-Left) -->
  <g transform="translate(15, 120)">
    <rect width="155" height="82" rx="14" fill="url(#orangeGrad)" stroke="#FB923C" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="78" y="30" text-anchor="middle" font-size="22">&#x1F4BB;</text>
    <text x="78" y="50" text-anchor="middle" font-size="12" font-weight="600" fill="#9A3412">Coding</text>
    <text x="78" y="68" text-anchor="middle" font-size="9.5" fill="#FB923C">Write, debug &amp; review code</text>
  </g>

  <!-- Bottom note -->
  <text x="280" y="540" text-anchor="middle" font-size="10" fill="#94A3B8">Claude is a versatile AI assistant built by Anthropic</text>
</svg>