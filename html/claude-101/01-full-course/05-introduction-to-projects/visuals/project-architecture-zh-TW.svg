<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 480" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EFF6FF"/>
      <stop offset="100%" stop-color="#DBEAFE"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0FDF4"/>
      <stop offset="100%" stop-color="#DCFCE7"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAF5FF"/>
      <stop offset="100%" stop-color="#F3E8FF"/>
    </linearGradient>
    <marker id="arrowBlue" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3B82F6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="560" height="480" fill="white" rx="12"/>

  <!-- Title -->
  <text x="280" y="36" text-anchor="middle" font-size="15" font-weight="600" fill="#64748B" letter-spacing="0.5">專案架構</text>

  <!-- Outer container: Project -->
  <rect x="30" y="55" width="500" height="400" rx="18" fill="#F8FAFC" stroke="#3B82F6" stroke-width="2" stroke-dasharray="8,4" filter="url(#shadow)"/>
  <text x="280" y="82" text-anchor="middle" font-size="14" font-weight="700" fill="#1E40AF">&#x1F4C1;  專案容器</text>

  <!-- Project Knowledge -->
  <g transform="translate(50, 100)">
    <rect width="210" height="140" rx="14" fill="url(#greenGrad)" stroke="#22C55E" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="105" y="32" text-anchor="middle" font-size="22">&#x1F4DA;</text>
    <text x="105" y="54" text-anchor="middle" font-size="13" font-weight="600" fill="#166534">專案知識</text>
    <text x="105" y="72" text-anchor="middle" font-size="10" fill="#22C55E">上傳的檔案與文件</text>
    <!-- File icons -->
    <rect x="25" y="85" width="70" height="24" rx="6" fill="white" stroke="#22C55E" stroke-width="1" opacity="0.8"/>
    <text x="60" y="101" text-anchor="middle" font-size="9" fill="#166534">report.pdf</text>
    <rect x="105" y="85" width="70" height="24" rx="6" fill="white" stroke="#22C55E" stroke-width="1" opacity="0.8"/>
    <text x="140" y="101" text-anchor="middle" font-size="9" fill="#166534">data.csv</text>
    <rect x="25" y="114" width="70" height="24" rx="6" fill="white" stroke="#22C55E" stroke-width="1" opacity="0.8"/>
    <text x="60" y="130" text-anchor="middle" font-size="9" fill="#166534">notes.md</text>
  </g>

  <!-- Project Instructions -->
  <g transform="translate(300, 100)">
    <rect width="210" height="140" rx="14" fill="url(#purpleGrad)" stroke="#8B5CF6" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="105" y="32" text-anchor="middle" font-size="22">&#x1F4DD;</text>
    <text x="105" y="54" text-anchor="middle" font-size="13" font-weight="600" fill="#5B21B6">專案指示</text>
    <text x="105" y="72" text-anchor="middle" font-size="10" fill="#8B5CF6">自訂系統提示詞</text>
    <!-- Instruction lines -->
    <rect x="20" y="85" width="170" height="16" rx="4" fill="white" stroke="#8B5CF6" stroke-width="0.8" opacity="0.6"/>
    <text x="30" y="96" font-size="8" fill="#5B21B6">你是一位行銷專家...</text>
    <rect x="20" y="106" width="140" height="16" rx="4" fill="white" stroke="#8B5CF6" stroke-width="0.8" opacity="0.6"/>
    <text x="30" y="117" font-size="8" fill="#5B21B6">請始終使用正式語氣回應</text>
    <rect x="20" y="123" width="155" height="14" rx="4" fill="white" stroke="#8B5CF6" stroke-width="0.8" opacity="0.4"/>
  </g>

  <!-- Arrow down -->
  <path d="M 155 240 L 155 270 Q 155 280 165 280 L 250 280" fill="none" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arrowBlue)" opacity="0.5"/>
  <path d="M 405 240 L 405 270 Q 405 280 395 280 L 310 280" fill="none" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arrowBlue)" opacity="0.5"/>
  <text x="280" y="272" text-anchor="middle" font-size="9" fill="#3B82F6" font-style="italic">共享上下文</text>

  <!-- Conversations section -->
  <g transform="translate(50, 290)">
    <rect width="460" height="145" rx="14" fill="url(#blueGrad)" stroke="#3B82F6" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="230" y="28" text-anchor="middle" font-size="13" font-weight="600" fill="#1E40AF">&#x1F4AC;  對話（共享專案上下文）</text>

    <!-- Conversation cards -->
    <g transform="translate(20, 40)">
      <rect width="125" height="85" rx="10" fill="white" stroke="#93C5FD" stroke-width="1" filter="url(#shadow)"/>
      <text x="63" y="24" text-anchor="middle" font-size="16">&#x1F5E8;&#xFE0F;</text>
      <text x="63" y="42" text-anchor="middle" font-size="10" font-weight="600" fill="#1E40AF">對話 1</text>
      <text x="63" y="56" text-anchor="middle" font-size="8.5" fill="#64748B">撰寫關於第四季</text>
      <text x="63" y="70" text-anchor="middle" font-size="8.5" fill="#64748B">成果的部落格文章</text>
    </g>

    <g transform="translate(165, 40)">
      <rect width="125" height="85" rx="10" fill="white" stroke="#93C5FD" stroke-width="1" filter="url(#shadow)"/>
      <text x="63" y="24" text-anchor="middle" font-size="16">&#x1F5E8;&#xFE0F;</text>
      <text x="63" y="42" text-anchor="middle" font-size="10" font-weight="600" fill="#1E40AF">對話 2</text>
      <text x="63" y="56" text-anchor="middle" font-size="8.5" fill="#64748B">分析競爭對手</text>
      <text x="63" y="70" text-anchor="middle" font-size="8.5" fill="#64748B">定價資料</text>
    </g>

    <g transform="translate(310, 40)">
      <rect width="125" height="85" rx="10" fill="white" stroke="#93C5FD" stroke-width="1" filter="url(#shadow)"/>
      <text x="63" y="24" text-anchor="middle" font-size="16">&#x1F5E8;&#xFE0F;</text>
      <text x="63" y="42" text-anchor="middle" font-size="10" font-weight="600" fill="#1E40AF">對話 3</text>
      <text x="63" y="56" text-anchor="middle" font-size="8.5" fill="#64748B">腦力激盪產品</text>
      <text x="63" y="70" text-anchor="middle" font-size="8.5" fill="#64748B">發布活動點子</text>
    </g>
  </g>

  <!-- Bottom note -->
  <text x="280" y="465" text-anchor="middle" font-size="10" fill="#94A3B8">專案中的所有對話都共享相同的知識和指示</text>
</svg>