<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 520" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EFF6FF"/>
      <stop offset="100%" stop-color="#DBEAFE"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0FDF4"/>
      <stop offset="100%" stop-color="#DCFCE7"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF7ED"/>
      <stop offset="100%" stop-color="#FFEDD5"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAF5FF"/>
      <stop offset="100%" stop-color="#F3E8FF"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FEF2F2"/>
      <stop offset="100%" stop-color="#FEE2E2"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="560" height="520" fill="white" rx="12"/>

  <!-- Title -->
  <text x="280" y="36" text-anchor="middle" font-size="15" font-weight="600" fill="#64748B" letter-spacing="0.5">CLAUDE 產品全景</text>

  <!-- Header bar -->
  <rect x="60" y="50" width="440" height="32" rx="8" fill="url(#headerGrad)" opacity="0.1"/>
  <text x="280" y="71" text-anchor="middle" font-size="11" font-weight="600" fill="#3B82F6">多種方式使用 Claude 的能力</text>

  <!-- Row 1: Web/Desktop/Mobile -->
  <g transform="translate(30, 95)">
    <rect width="240" height="120" rx="14" fill="url(#blueGrad)" stroke="#3B82F6" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="120" y="30" text-anchor="middle" font-size="22">&#x1F310;</text>
    <text x="120" y="50" text-anchor="middle" font-size="14" font-weight="700" fill="#1E40AF">Claude.ai</text>
    <text x="120" y="66" text-anchor="middle" font-size="10" fill="#3B82F6">網頁、桌面與行動版</text>
    <rect x="20" y="78" width="60" height="28" rx="6" fill="white" stroke="#93C5FD" stroke-width="1"/>
    <text x="50" y="96" text-anchor="middle" font-size="8.5" fill="#1E40AF">&#x1F4BB; 網頁</text>
    <rect x="90" y="78" width="60" height="28" rx="6" fill="white" stroke="#93C5FD" stroke-width="1"/>
    <text x="120" y="96" text-anchor="middle" font-size="8.5" fill="#1E40AF">&#x1F5A5; 桌面</text>
    <rect x="160" y="78" width="60" height="28" rx="6" fill="white" stroke="#93C5FD" stroke-width="1"/>
    <text x="190" y="96" text-anchor="middle" font-size="8.5" fill="#1E40AF">&#x1F4F1; 行動</text>
  </g>

  <!-- Row 1: Claude Code -->
  <g transform="translate(290, 95)">
    <rect width="240" height="120" rx="14" fill="url(#greenGrad)" stroke="#22C55E" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="120" y="30" text-anchor="middle" font-size="22">&#x1F4BB;</text>
    <text x="120" y="50" text-anchor="middle" font-size="14" font-weight="700" fill="#166534">Claude Code</text>
    <text x="120" y="66" text-anchor="middle" font-size="10" fill="#22C55E">開發者命令列工具</text>
    <rect x="25" y="76" width="190" height="34" rx="6" fill="#1E293B"/>
    <text x="35" y="92" font-size="9" fill="#22C55E" font-family="monospace">$ claude "修復登入錯誤"</text>
    <text x="35" y="104" font-size="8" fill="#94A3B8" font-family="monospace">正在分析程式碼庫...</text>
  </g>

  <!-- Row 2: API -->
  <g transform="translate(30, 232)">
    <rect width="240" height="120" rx="14" fill="url(#purpleGrad)" stroke="#8B5CF6" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="120" y="30" text-anchor="middle" font-size="22">&#x1F527;</text>
    <text x="120" y="50" text-anchor="middle" font-size="14" font-weight="700" fill="#5B21B6">API</text>
    <text x="120" y="66" text-anchor="middle" font-size="10" fill="#8B5CF6">建立自訂應用程式</text>
    <rect x="25" y="76" width="190" height="34" rx="6" fill="#1E293B"/>
    <text x="35" y="92" font-size="8" fill="#C4B5FD" font-family="monospace">client.messages.create(</text>
    <text x="45" y="104" font-size="8" fill="#94A3B8" font-family="monospace">  model="claude-sonnet..."</text>
  </g>

  <!-- Row 2: Claude for Slack -->
  <g transform="translate(290, 232)">
    <rect width="240" height="120" rx="14" fill="url(#orangeGrad)" stroke="#FB923C" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="120" y="30" text-anchor="middle" font-size="22">&#x1F4E8;</text>
    <text x="120" y="50" text-anchor="middle" font-size="14" font-weight="700" fill="#9A3412">Claude for Slack</text>
    <text x="120" y="66" text-anchor="middle" font-size="10" fill="#FB923C">團隊協作</text>
    <rect x="25" y="76" width="190" height="34" rx="6" fill="white" stroke="#FDBA74" stroke-width="1"/>
    <text x="35" y="92" font-size="9" fill="#9A3412">@Claude 摘要這個討論串</text>
    <text x="35" y="104" font-size="8" fill="#94A3B8">私訊與頻道</text>
  </g>

  <!-- Row 3: Claude for Work -->
  <g transform="translate(130, 370)">
    <rect width="300" height="110" rx="14" fill="url(#redGrad)" stroke="#EF4444" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="150" y="30" text-anchor="middle" font-size="22">&#x1F3E2;</text>
    <text x="150" y="50" text-anchor="middle" font-size="14" font-weight="700" fill="#991B1B">Claude for Work</text>
    <text x="150" y="66" text-anchor="middle" font-size="10" fill="#EF4444">企業部署與管理控制</text>
    <rect x="20" y="78" width="75" height="22" rx="6" fill="white" stroke="#FECACA" stroke-width="1"/>
    <text x="58" y="93" text-anchor="middle" font-size="8" fill="#991B1B">SSO &amp; SCIM</text>
    <rect x="105" y="78" width="85" height="22" rx="6" fill="white" stroke="#FECACA" stroke-width="1"/>
    <text x="148" y="93" text-anchor="middle" font-size="8" fill="#991B1B">使用量分析</text>
    <rect x="200" y="78" width="80" height="22" rx="6" fill="white" stroke="#FECACA" stroke-width="1"/>
    <text x="240" y="93" text-anchor="middle" font-size="8" fill="#991B1B">資料保留</text>
  </g>

  <!-- Bottom note -->
  <text x="280" y="505" text-anchor="middle" font-size="10" fill="#94A3B8">選擇最適合你工作流程和使用場景的入口</text>
</svg>