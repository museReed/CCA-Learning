<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="SF Pro Display, -apple-system, sans-serif">
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/></filter>
  </defs>
  <rect width="800" height="500" fill="white"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-size="20" font-weight="600" fill="#1E293B">MCP Architecture Overview</text>

  <!-- Your Application (Blue) -->
  <rect x="30" y="120" width="160" height="260" rx="8" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="30" y="120" width="160" height="40" rx="8" fill="#3B82F6"/>
  <rect x="30" y="152" width="160" height="8" fill="#3B82F6"/>
  <text x="110" y="146" text-anchor="middle" font-size="14" font-weight="600" fill="white">Your Application</text>
  <text x="110" y="190" text-anchor="middle" font-size="12" fill="#1E293B">Host Process</text>
  <rect x="50" y="210" width="120" height="36" rx="6" fill="white" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="110" y="233" text-anchor="middle" font-size="11" fill="#3B82F6">Business Logic</text>
  <rect x="50" y="260" width="120" height="36" rx="6" fill="white" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="110" y="283" text-anchor="middle" font-size="11" fill="#3B82F6">LLM Integration</text>
  <rect x="50" y="310" width="120" height="36" rx="6" fill="white" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="110" y="333" text-anchor="middle" font-size="11" fill="#3B82F6">User Interface</text>

  <!-- MCP Client (Purple) -->
  <rect x="240" y="170" width="140" height="160" rx="8" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="240" y="170" width="140" height="40" rx="8" fill="#8B5CF6"/>
  <rect x="240" y="202" width="140" height="8" fill="#8B5CF6"/>
  <text x="310" y="196" text-anchor="middle" font-size="14" font-weight="600" fill="white">MCP Client</text>
  <text x="310" y="240" text-anchor="middle" font-size="11" fill="#1E293B">Protocol Handler</text>
  <text x="310" y="260" text-anchor="middle" font-size="11" fill="#1E293B">Message Router</text>
  <text x="310" y="280" text-anchor="middle" font-size="11" fill="#1E293B">Connection Mgr</text>
  <text x="310" y="310" text-anchor="middle" font-size="10" fill="#8B5CF6" font-weight="500">JSON-RPC 2.0</text>

  <!-- MCP Server (Green) -->
  <rect x="430" y="120" width="160" height="260" rx="8" fill="#F0FDF4" stroke="#22C55E" stroke-width="2" filter="url(#shadow)"/>
  <rect x="430" y="120" width="160" height="40" rx="8" fill="#22C55E"/>
  <rect x="430" y="152" width="160" height="8" fill="#22C55E"/>
  <text x="510" y="146" text-anchor="middle" font-size="14" font-weight="600" fill="white">MCP Server</text>
  <rect x="450" y="180" width="120" height="36" rx="6" fill="white" stroke="#86EFAC" stroke-width="1.5"/>
  <text x="510" y="203" text-anchor="middle" font-size="12" fill="#22C55E" font-weight="500">Tools</text>
  <rect x="450" y="228" width="120" height="36" rx="6" fill="white" stroke="#86EFAC" stroke-width="1.5"/>
  <text x="510" y="251" text-anchor="middle" font-size="12" fill="#22C55E" font-weight="500">Resources</text>
  <rect x="450" y="276" width="120" height="36" rx="6" fill="white" stroke="#86EFAC" stroke-width="1.5"/>
  <text x="510" y="299" text-anchor="middle" font-size="12" fill="#22C55E" font-weight="500">Prompts</text>
  <text x="510" y="345" text-anchor="middle" font-size="10" fill="#6B7280">Exposes capabilities</text>
  <text x="510" y="362" text-anchor="middle" font-size="10" fill="#6B7280">via standard protocol</text>

  <!-- External Service (Orange) -->
  <rect x="640" y="170" width="130" height="160" rx="8" fill="#FFF7ED" stroke="#FB923C" stroke-width="2" filter="url(#shadow)"/>
  <rect x="640" y="170" width="130" height="40" rx="8" fill="#FB923C"/>
  <rect x="640" y="202" width="130" height="8" fill="#FB923C"/>
  <text x="705" y="196" text-anchor="middle" font-size="13" font-weight="600" fill="white">External Services</text>
  <rect x="656" y="225" width="98" height="28" rx="6" fill="white" stroke="#FDBA74" stroke-width="1.5"/>
  <text x="705" y="244" text-anchor="middle" font-size="11" fill="#FB923C">GitHub API</text>
  <rect x="656" y="261" width="98" height="28" rx="6" fill="white" stroke="#FDBA74" stroke-width="1.5"/>
  <text x="705" y="280" text-anchor="middle" font-size="11" fill="#FB923C">Database</text>
  <rect x="656" y="297" width="98" height="28" rx="6" fill="white" stroke="#FDBA74" stroke-width="1.5"/>
  <text x="705" y="316" text-anchor="middle" font-size="11" fill="#FB923C">File System</text>

  <!-- Arrows -->
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3B82F6"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#8B5CF6"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#22C55E"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#FB923C"/>
    </marker>
  </defs>

  <!-- App → Client -->
  <line x1="190" y1="240" x2="236" y2="240" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="236" y1="260" x2="190" y2="260" stroke="#8B5CF6" stroke-width="2" marker-end="url(#arrowPurple)" stroke-dasharray="5,3"/>

  <!-- Client → Server -->
  <line x1="380" y1="240" x2="426" y2="240" stroke="#8B5CF6" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <line x1="426" y1="260" x2="380" y2="260" stroke="#22C55E" stroke-width="2" marker-end="url(#arrowGreen)" stroke-dasharray="5,3"/>

  <!-- Server → External -->
  <line x1="590" y1="240" x2="636" y2="240" stroke="#22C55E" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="636" y1="260" x2="590" y2="260" stroke="#FB923C" stroke-width="2" marker-end="url(#arrowOrange)" stroke-dasharray="5,3"/>

  <!-- Labels on arrows -->
  <text x="213" y="232" text-anchor="middle" font-size="9" fill="#3B82F6">Request</text>
  <text x="213" y="276" text-anchor="middle" font-size="9" fill="#8B5CF6">Response</text>
  <text x="403" y="232" text-anchor="middle" font-size="9" fill="#8B5CF6">JSON-RPC</text>
  <text x="403" y="276" text-anchor="middle" font-size="9" fill="#22C55E">Result</text>
  <text x="613" y="232" text-anchor="middle" font-size="9" fill="#22C55E">API Call</text>
  <text x="613" y="276" text-anchor="middle" font-size="9" fill="#FB923C">Data</text>

  <!-- Bottom legend -->
  <rect x="180" y="430" width="440" height="50" rx="8" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1"/>
  <text x="400" y="452" text-anchor="middle" font-size="12" fill="#1E293B" font-weight="500">MCP standardizes how applications connect to external tools and data sources</text>
  <text x="400" y="470" text-anchor="middle" font-size="11" fill="#6B7280">One protocol, many servers — no custom integrations needed</text>
</svg>