<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="SF Pro Display, -apple-system, sans-serif">
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/></filter>
  </defs>
  <rect width="800" height="500" fill="white"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-size="20" font-weight="600" fill="#1E293B">Resource Types in MCP</text>

  <!-- VS divider -->
  <line x1="400" y1="70" x2="400" y2="420" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="6,4"/>
  <rect x="383" y="220" width="34" height="26" rx="13" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1"/>
  <text x="400" y="238" text-anchor="middle" font-size="11" fill="#6B7280" font-weight="600">VS</text>

  <!-- LEFT: Direct Resource -->
  <rect x="40" y="70" width="320" height="350" rx="8" fill="#F0FDF4" stroke="#22C55E" stroke-width="2" filter="url(#shadow)"/>

  <!-- Header -->
  <rect x="40" y="70" width="320" height="44" rx="8" fill="#22C55E"/>
  <rect x="40" y="106" width="320" height="8" fill="#22C55E"/>
  <text x="200" y="98" text-anchor="middle" font-size="16" font-weight="600" fill="white">Direct Resource</text>

  <!-- Static badge -->
  <rect x="140" y="130" width="120" height="26" rx="13" fill="#DCFCE7"/>
  <text x="200" y="148" text-anchor="middle" font-size="12" font-weight="600" fill="#22C55E">Static URI</text>

  <!-- URI box -->
  <rect x="65" y="175" width="270" height="40" rx="6" fill="#1E293B"/>
  <text x="200" y="200" text-anchor="middle" font-size="13" font-family="SF Mono, Menlo, monospace" fill="#86EFAC">docs://documents</text>

  <!-- Arrow down -->
  <line x1="200" y1="215" x2="200" y2="245" stroke="#22C55E" stroke-width="2"/>
  <polygon points="194 245, 200 255, 206 245" fill="#22C55E"/>

  <!-- Description -->
  <text x="200" y="278" text-anchor="middle" font-size="13" fill="#1E293B" font-weight="500">Returns a fixed list</text>

  <!-- Result box -->
  <rect x="65" y="295" width="270" height="100" rx="6" fill="white" stroke="#86EFAC" stroke-width="1.5"/>
  <text x="80" y="318" font-size="11" font-family="SF Mono, Menlo, monospace" fill="#6B7280">[</text>
  <text x="80" y="338" font-size="11" font-family="SF Mono, Menlo, monospace" fill="#22C55E">  "getting-started.md"</text>
  <text x="80" y="358" font-size="11" font-family="SF Mono, Menlo, monospace" fill="#22C55E">  "api-reference.md"</text>
  <text x="80" y="378" font-size="11" font-family="SF Mono, Menlo, monospace" fill="#22C55E">  "changelog.md"</text>
  <text x="80" y="396" font-size="11" font-family="SF Mono, Menlo, monospace" fill="#6B7280">]</text>

  <!-- RIGHT: Templated Resource -->
  <rect x="440" y="70" width="320" height="350" rx="8" fill="#F0FDF4" stroke="#22C55E" stroke-width="2" filter="url(#shadow)"/>

  <!-- Header -->
  <rect x="440" y="70" width="320" height="44" rx="8" fill="#16A34A"/>
  <rect x="440" y="106" width="320" height="8" fill="#16A34A"/>
  <text x="600" y="98" text-anchor="middle" font-size="16" font-weight="600" fill="white">Resource Template</text>

  <!-- Dynamic badge -->
  <rect x="530" y="130" width="140" height="26" rx="13" fill="#DCFCE7"/>
  <text x="600" y="148" text-anchor="middle" font-size="12" font-weight="600" fill="#16A34A">Parameterized URI</text>

  <!-- URI box -->
  <rect x="465" y="175" width="270" height="40" rx="6" fill="#1E293B"/>
  <text x="600" y="194" text-anchor="middle" font-size="13" font-family="SF Mono, Menlo, monospace">
    <tspan fill="#86EFAC">docs://documents/</tspan><tspan fill="#FB923C">{doc_id}</tspan>
  </text>

  <!-- Arrow down -->
  <line x1="600" y1="215" x2="600" y2="245" stroke="#16A34A" stroke-width="2"/>
  <polygon points="594 245, 600 255, 606 245" fill="#16A34A"/>

  <!-- Description -->
  <text x="600" y="278" text-anchor="middle" font-size="13" fill="#1E293B" font-weight="500">Returns a specific document</text>

  <!-- Result box -->
  <rect x="465" y="295" width="270" height="100" rx="6" fill="white" stroke="#86EFAC" stroke-width="1.5"/>
  <text x="480" y="318" font-size="11" font-family="SF Mono, Menlo, monospace" fill="#6B7280">{</text>
  <text x="480" y="338" font-size="11" font-family="SF Mono, Menlo, monospace">
    <tspan fill="#93C5FD">  "uri"</tspan><tspan fill="#6B7280">: </tspan><tspan fill="#22C55E">"docs://documents/42"</tspan>
  </text>
  <text x="480" y="358" font-size="11" font-family="SF Mono, Menlo, monospace">
    <tspan fill="#93C5FD">  "content"</tspan><tspan fill="#6B7280">: </tspan><tspan fill="#22C55E">"# Getting Started</tspan>
  </text>
  <text x="480" y="378" font-size="11" font-family="SF Mono, Menlo, monospace">
    <tspan fill="#22C55E">    Welcome to..."</tspan>
  </text>
  <text x="480" y="396" font-size="11" font-family="SF Mono, Menlo, monospace" fill="#6B7280">}</text>

  <!-- Bottom comparison -->
  <rect x="80" y="440" width="640" height="44" rx="8" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1"/>
  <text x="400" y="458" text-anchor="middle" font-size="12" fill="#1E293B" font-weight="500">
    <tspan fill="#22C55E" font-weight="600">Direct</tspan> = known, enumerable data  |  <tspan fill="#16A34A" font-weight="600">Template</tspan> = dynamic, parameterized lookups
  </text>
  <text x="400" y="476" text-anchor="middle" font-size="11" fill="#6B7280">Both are read-only and app-controlled — your code decides when to fetch</text>
</svg>