<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="PingFang TC, SF Pro Display, sans-serif">
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/></filter>
  </defs>
  <rect width="800" height="500" fill="white"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-size="20" font-weight="600" fill="#1E293B">MCP 三大核心元素</text>

  <!-- Tools Column (Blue) -->
  <rect x="40" y="70" width="226" height="310" rx="8" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="40" y="70" width="226" height="44" rx="8" fill="#3B82F6"/>
  <rect x="40" y="106" width="226" height="8" fill="#3B82F6"/>
  <text x="153" y="98" text-anchor="middle" font-size="16" font-weight="600" fill="white">Tools（工具）</text>

  <rect x="80" y="130" width="146" height="28" rx="14" fill="#DBEAFE"/>
  <text x="153" y="149" text-anchor="middle" font-size="12" font-weight="600" fill="#3B82F6">模型控制</text>

  <circle cx="153" cy="190" r="22" fill="white" stroke="#3B82F6" stroke-width="2"/>
  <text x="153" y="195" text-anchor="middle" font-size="18" fill="#3B82F6">AI</text>

  <text x="153" y="232" text-anchor="middle" font-size="12" fill="#1E293B" font-weight="500">Claude 決定</text>
  <text x="153" y="248" text-anchor="middle" font-size="12" fill="#1E293B" font-weight="500">何時呼叫</text>

  <line x1="65" y1="268" x2="241" y2="268" stroke="#BFDBFE" stroke-width="1"/>

  <text x="153" y="290" text-anchor="middle" font-size="11" fill="#6B7280" font-weight="500">使用情境：</text>
  <text x="153" y="310" text-anchor="middle" font-size="11" fill="#6B7280">搜尋檔案</text>
  <text x="153" y="328" text-anchor="middle" font-size="11" fill="#6B7280">建立 Issue</text>
  <text x="153" y="346" text-anchor="middle" font-size="11" fill="#6B7280">執行查詢</text>
  <text x="153" y="364" text-anchor="middle" font-size="11" fill="#6B7280">發送訊息</text>

  <!-- Resources Column (Green) -->
  <rect x="287" y="70" width="226" height="310" rx="8" fill="#F0FDF4" stroke="#22C55E" stroke-width="2" filter="url(#shadow)"/>
  <rect x="287" y="70" width="226" height="44" rx="8" fill="#22C55E"/>
  <rect x="287" y="106" width="226" height="8" fill="#22C55E"/>
  <text x="400" y="98" text-anchor="middle" font-size="16" font-weight="600" fill="white">Resources（資源）</text>

  <rect x="330" y="130" width="140" height="28" rx="14" fill="#DCFCE7"/>
  <text x="400" y="149" text-anchor="middle" font-size="12" font-weight="600" fill="#22C55E">應用程式控制</text>

  <circle cx="400" cy="190" r="22" fill="white" stroke="#22C55E" stroke-width="2"/>
  <text x="400" y="196" text-anchor="middle" font-size="16" fill="#22C55E" font-weight="600">&lt;/&gt;</text>

  <text x="400" y="232" text-anchor="middle" font-size="12" fill="#1E293B" font-weight="500">你的程式碼</text>
  <text x="400" y="248" text-anchor="middle" font-size="12" fill="#1E293B" font-weight="500">擷取資料</text>

  <line x1="312" y1="268" x2="488" y2="268" stroke="#BBF7D0" stroke-width="1"/>

  <text x="400" y="290" text-anchor="middle" font-size="11" fill="#6B7280" font-weight="500">使用情境：</text>
  <text x="400" y="310" text-anchor="middle" font-size="11" fill="#6B7280">載入文件</text>
  <text x="400" y="328" text-anchor="middle" font-size="11" fill="#6B7280">讀取設定檔</text>
  <text x="400" y="346" text-anchor="middle" font-size="11" fill="#6B7280">取得資料庫記錄</text>
  <text x="400" y="364" text-anchor="middle" font-size="11" fill="#6B7280">提供上下文</text>

  <!-- Prompts Column (Purple) -->
  <rect x="534" y="70" width="226" height="310" rx="8" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="534" y="70" width="226" height="44" rx="8" fill="#8B5CF6"/>
  <rect x="534" y="106" width="226" height="8" fill="#8B5CF6"/>
  <text x="647" y="98" text-anchor="middle" font-size="16" font-weight="600" fill="white">Prompts（提示）</text>

  <rect x="577" y="130" width="140" height="28" rx="14" fill="#EDE9FE"/>
  <text x="647" y="149" text-anchor="middle" font-size="12" font-weight="600" fill="#8B5CF6">使用者控制</text>

  <circle cx="647" cy="190" r="22" fill="white" stroke="#8B5CF6" stroke-width="2"/>
  <circle cx="647" cy="183" r="7" fill="#8B5CF6"/>
  <path d="M 633 200 Q 647 208 661 200" stroke="#8B5CF6" stroke-width="2.5" fill="none"/>

  <text x="647" y="232" text-anchor="middle" font-size="12" fill="#1E293B" font-weight="500">使用者觸發</text>
  <text x="647" y="248" text-anchor="middle" font-size="12" fill="#1E293B" font-weight="500">工作流程</text>

  <line x1="559" y1="268" x2="735" y2="268" stroke="#DDD6FE" stroke-width="1"/>

  <text x="647" y="290" text-anchor="middle" font-size="11" fill="#6B7280" font-weight="500">使用情境：</text>
  <text x="647" y="310" text-anchor="middle" font-size="11" fill="#6B7280">程式碼審查</text>
  <text x="647" y="328" text-anchor="middle" font-size="11" fill="#6B7280">文件摘要</text>
  <text x="647" y="346" text-anchor="middle" font-size="11" fill="#6B7280">除錯流程</text>
  <text x="647" y="364" text-anchor="middle" font-size="11" fill="#6B7280">產生報告</text>

  <!-- Bottom summary -->
  <rect x="100" y="420" width="600" height="60" rx="8" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1"/>
  <text x="400" y="445" text-anchor="middle" font-size="13" fill="#1E293B" font-weight="500">每個元素在 MCP 生態系中扮演不同的控制角色</text>
  <text x="400" y="465" text-anchor="middle" font-size="11" fill="#6B7280">Tools = 動作 | Resources = 資料 | Prompts = 範本</text>
</svg>