<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 480" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <filter id="shadow1">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#4ADE80"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#FBBF24"/>
    </linearGradient>
    <marker id="arrow1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94A3B8"/>
    </marker>
  </defs>
  <rect width="560" height="480" fill="url(#bg1)" rx="12"/>
  <!-- Title -->
  <text x="280" y="38" text-anchor="middle" fill="#F8FAFC" font-size="18" font-weight="700">Skill Discovery Flow</text>
  <text x="280" y="58" text-anchor="middle" fill="#94A3B8" font-size="12">How Claude matches and activates skills at runtime</text>

  <!-- Step 1: User Request -->
  <rect x="190" y="78" width="180" height="52" rx="10" fill="url(#blueGrad)" filter="url(#shadow1)"/>
  <text x="280" y="100" text-anchor="middle" fill="#FFF" font-size="13" font-weight="600">User Request</text>
  <text x="280" y="116" text-anchor="middle" fill="#DBEAFE" font-size="10">"Create a PR description"</text>

  <!-- Arrow 1 -->
  <line x1="280" y1="130" x2="280" y2="158" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow1)"/>

  <!-- Step 2: Description Matching -->
  <rect x="155" y="162" width="250" height="60" rx="10" fill="#1E3A5F" stroke="#3B82F6" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="280" y="186" text-anchor="middle" fill="#F8FAFC" font-size="13" font-weight="600">Claude Matches Descriptions</text>
  <text x="280" y="204" text-anchor="middle" fill="#94A3B8" font-size="10">Scans skill names &amp; descriptions for relevance</text>

  <!-- Arrow 2 -->
  <line x1="280" y1="222" x2="280" y2="250" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow1)"/>

  <!-- Step 3: Skill Activated -->
  <rect x="175" y="254" width="210" height="52" rx="10" fill="url(#purpleGrad)" filter="url(#shadow1)"/>
  <text x="280" y="276" text-anchor="middle" fill="#FFF" font-size="13" font-weight="600">Skill Activated</text>
  <text x="280" y="292" text-anchor="middle" fill="#EDE9FE" font-size="10">Best-matching skill selected</text>

  <!-- Arrow 3 -->
  <line x1="280" y1="306" x2="280" y2="334" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow1)"/>

  <!-- Step 4: Instructions Loaded -->
  <rect x="155" y="338" width="250" height="52" rx="10" fill="url(#orangeGrad)" filter="url(#shadow1)"/>
  <text x="280" y="360" text-anchor="middle" fill="#FFF" font-size="13" font-weight="600">Instructions Loaded</text>
  <text x="280" y="376" text-anchor="middle" fill="#FEF3C7" font-size="10">SKILL.md content injected into context</text>

  <!-- Arrow 4 -->
  <line x1="280" y1="390" x2="280" y2="418" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow1)"/>

  <!-- Step 5: Task Executed -->
  <rect x="190" y="422" width="180" height="44" rx="10" fill="url(#greenGrad)" filter="url(#shadow1)"/>
  <text x="280" y="450" text-anchor="middle" fill="#FFF" font-size="13" font-weight="700">Task Executed</text>

  <!-- Side annotations -->
  <rect x="24" y="168" width="110" height="48" rx="8" fill="#1E293B" stroke="#475569" stroke-width="1"/>
  <text x="79" y="188" text-anchor="middle" fill="#CBD5E1" font-size="9" font-weight="600">Skills Registry</text>
  <text x="79" y="202" text-anchor="middle" fill="#64748B" font-size="8">~/.claude/skills/</text>
  <line x1="134" y1="192" x2="155" y2="192" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,3"/>

  <rect x="426" y="254" width="110" height="48" rx="8" fill="#1E293B" stroke="#475569" stroke-width="1"/>
  <text x="481" y="274" text-anchor="middle" fill="#CBD5E1" font-size="9" font-weight="600">Priority Order</text>
  <text x="481" y="288" text-anchor="middle" fill="#64748B" font-size="8">Project → User → Plugin</text>
  <line x1="426" y1="278" x2="385" y2="278" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,3"/>
</svg>