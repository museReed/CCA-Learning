<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 560" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <filter id="shadow2">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <linearGradient id="purpleG2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="greenG2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#4ADE80"/>
    </linearGradient>
  </defs>
  <rect width="560" height="560" fill="url(#bg2)" rx="12"/>
  <text x="280" y="36" text-anchor="middle" fill="#F8FAFC" font-size="18" font-weight="700">SKILL.md 檔案解剖</text>
  <text x="280" y="56" text-anchor="middle" fill="#94A3B8" font-size="12">結構、前置資料與目錄配置</text>

  <!-- Directory tree -->
  <rect x="24" y="78" width="200" height="180" rx="10" fill="#1E293B" stroke="#475569" stroke-width="1" filter="url(#shadow2)"/>
  <text x="124" y="100" text-anchor="middle" fill="#F8FAFC" font-size="12" font-weight="700">目錄結構</text>
  <text x="40" y="122" fill="#94A3B8" font-size="11" font-family="'SF Mono', 'Menlo', monospace">~/.claude/</text>
  <text x="52" y="140" fill="#94A3B8" font-size="11" font-family="'SF Mono', 'Menlo', monospace">skills/</text>
  <text x="64" y="158" fill="#60A5FA" font-size="11" font-family="'SF Mono', 'Menlo', monospace">pr-description/</text>
  <rect x="72" y="164" width="136" height="20" rx="4" fill="#3B82F620"/>
  <text x="80" y="179" fill="#3B82F6" font-size="11" font-weight="600" font-family="'SF Mono', 'Menlo', monospace">SKILL.md</text>
  <text x="64" y="202" fill="#64748B" font-size="11" font-family="'SF Mono', 'Menlo', monospace">code-review/</text>
  <text x="80" y="220" fill="#64748B" font-size="11" font-family="'SF Mono', 'Menlo', monospace">SKILL.md</text>
  <text x="64" y="244" fill="#64748B" font-size="11" font-family="'SF Mono', 'Menlo', monospace">test-writer/</text>

  <!-- SKILL.md file view -->
  <rect x="244" y="78" width="296" height="400" rx="10" fill="#0F172A" stroke="#3B82F6" stroke-width="1.5" filter="url(#shadow2)"/>
  <rect x="244" y="78" width="296" height="28" rx="10" fill="#1E3A5F"/>
  <rect x="244" y="96" width="296" height="10" fill="#1E3A5F"/>
  <circle cx="262" cy="92" r="5" fill="#EF4444"/>
  <circle cx="278" cy="92" r="5" fill="#F59E0B"/>
  <circle cx="294" cy="92" r="5" fill="#22C55E"/>
  <text x="392" y="96" text-anchor="middle" fill="#94A3B8" font-size="10">SKILL.md</text>

  <!-- Frontmatter -->
  <rect x="256" y="116" width="272" height="130" rx="6" fill="#1E293B" stroke="#8B5CF6" stroke-width="1"/>
  <text x="268" y="134" fill="#8B5CF6" font-size="10" font-weight="700">前置資料 (FRONTMATTER)</text>
  <text x="268" y="154" fill="#94A3B8" font-size="11" font-family="'SF Mono', 'Menlo', monospace">---</text>
  <text x="268" y="172" fill="#F59E0B" font-size="11" font-family="'SF Mono', 'Menlo', monospace">name<tspan fill="#94A3B8">: </tspan><tspan fill="#22C55E">PR Description</tspan></text>
  <text x="268" y="190" fill="#F59E0B" font-size="11" font-family="'SF Mono', 'Menlo', monospace">description<tspan fill="#94A3B8">: </tspan><tspan fill="#22C55E">Generate</tspan></text>
  <text x="286" y="206" fill="#22C55E" font-size="11" font-family="'SF Mono', 'Menlo', monospace">pull request descriptions</text>
  <text x="268" y="232" fill="#94A3B8" font-size="11" font-family="'SF Mono', 'Menlo', monospace">---</text>

  <!-- Instruction body -->
  <rect x="256" y="258" width="272" height="130" rx="6" fill="#1E293B" stroke="#22C55E" stroke-width="1"/>
  <text x="268" y="276" fill="#22C55E" font-size="10" font-weight="700">指令主體 (INSTRUCTION BODY)</text>
  <text x="268" y="296" fill="#60A5FA" font-size="11" font-family="'SF Mono', 'Menlo', monospace"># PR Description Skill</text>
  <text x="268" y="316" fill="#CBD5E1" font-size="11" font-family="'SF Mono', 'Menlo', monospace">建立 PR 時：</text>
  <text x="268" y="336" fill="#CBD5E1" font-size="11" font-family="'SF Mono', 'Menlo', monospace">1. 摘要變更內容</text>
  <text x="268" y="356" fill="#CBD5E1" font-size="11" font-family="'SF Mono', 'Menlo', monospace">2. 列出修改的檔案</text>
  <text x="268" y="376" fill="#CBD5E1" font-size="11" font-family="'SF Mono', 'Menlo', monospace">3. 標註破壞性變更</text>

  <!-- Labels -->
  <rect x="24" y="296" width="196" height="44" rx="8" fill="url(#purpleG2)" filter="url(#shadow2)"/>
  <text x="122" y="314" text-anchor="middle" fill="#FFF" font-size="11" font-weight="600">前置資料 = 元資料</text>
  <text x="122" y="328" text-anchor="middle" fill="#EDE9FE" font-size="9">用於發現與匹配</text>

  <rect x="24" y="356" width="196" height="44" rx="8" fill="url(#greenG2)" filter="url(#shadow2)"/>
  <text x="122" y="374" text-anchor="middle" fill="#FFF" font-size="11" font-weight="600">主體 = 指令</text>
  <text x="122" y="388" text-anchor="middle" fill="#DCFCE7" font-size="9">注入至 Claude 的上下文</text>

  <!-- Key insight -->
  <rect x="24" y="430" width="516" height="48" rx="10" fill="#1E293B" stroke="#3B82F6" stroke-width="1" filter="url(#shadow2)"/>
  <text x="40" y="450" fill="#3B82F6" font-size="11" font-weight="700">關鍵要點</text>
  <text x="40" y="466" fill="#94A3B8" font-size="11">name 與 description 欄位是 Claude 發現技能的方式 — 務必清晰且具體。</text>

  <text x="280" y="510" text-anchor="middle" fill="#64748B" font-size="10">每個技能 = 一個資料夾，以 SKILL.md 檔案作為入口點</text>
  <text x="280" y="528" text-anchor="middle" fill="#64748B" font-size="10">位置：~/.claude/skills/&lt;skill-name&gt;/SKILL.md</text>
</svg>