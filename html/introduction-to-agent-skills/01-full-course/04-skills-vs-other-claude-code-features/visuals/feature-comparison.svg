<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 560" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <filter id="shadow4">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="560" height="560" fill="url(#bg4)" rx="12"/>
  <text x="280" y="36" text-anchor="middle" fill="#F8FAFC" font-size="18" font-weight="700">Skills vs Other Claude Code Features</text>
  <text x="280" y="56" text-anchor="middle" fill="#94A3B8" font-size="12">When to use each customization mechanism</text>

  <!-- Table header -->
  <rect x="24" y="74" width="512" height="36" rx="8" fill="#1E3A5F"/>
  <text x="104" y="96" text-anchor="middle" fill="#93C5FD" font-size="11" font-weight="700">Feature</text>
  <text x="230" y="96" text-anchor="middle" fill="#93C5FD" font-size="11" font-weight="700">Trigger</text>
  <text x="360" y="96" text-anchor="middle" fill="#93C5FD" font-size="11" font-weight="700">Loading</text>
  <text x="480" y="96" text-anchor="middle" fill="#93C5FD" font-size="11" font-weight="700">Best For</text>

  <!-- Row 1: Skills -->
  <rect x="24" y="116" width="512" height="72" rx="8" fill="#1E293B" stroke="#3B82F6" stroke-width="1.5" filter="url(#shadow4)"/>
  <rect x="32" y="124" width="8" height="56" rx="4" fill="#3B82F6"/>
  <text x="104" y="140" text-anchor="middle" fill="#3B82F6" font-size="12" font-weight="700">Skills</text>
  <text x="104" y="156" text-anchor="middle" fill="#64748B" font-size="9">SKILL.md</text>
  <text x="104" y="170" text-anchor="middle" fill="#64748B" font-size="9">~/.claude/skills/</text>
  <text x="230" y="144" text-anchor="middle" fill="#CBD5E1" font-size="10">Auto-match</text>
  <text x="230" y="160" text-anchor="middle" fill="#94A3B8" font-size="9">by description</text>
  <text x="360" y="144" text-anchor="middle" fill="#CBD5E1" font-size="10">On-demand</text>
  <text x="360" y="160" text-anchor="middle" fill="#94A3B8" font-size="9">only when matched</text>
  <text x="480" y="144" text-anchor="middle" fill="#CBD5E1" font-size="10">Task-specific</text>
  <text x="480" y="160" text-anchor="middle" fill="#94A3B8" font-size="9">reusable workflows</text>

  <!-- Row 2: CLAUDE.md -->
  <rect x="24" y="196" width="512" height="72" rx="8" fill="#1E293B" stroke="#8B5CF6" stroke-width="1.5" filter="url(#shadow4)"/>
  <rect x="32" y="204" width="8" height="56" rx="4" fill="#8B5CF6"/>
  <text x="104" y="220" text-anchor="middle" fill="#8B5CF6" font-size="12" font-weight="700">CLAUDE.md</text>
  <text x="104" y="236" text-anchor="middle" fill="#64748B" font-size="9">Project config</text>
  <text x="104" y="250" text-anchor="middle" fill="#64748B" font-size="9">in repo root</text>
  <text x="230" y="224" text-anchor="middle" fill="#CBD5E1" font-size="10">Always</text>
  <text x="230" y="240" text-anchor="middle" fill="#94A3B8" font-size="9">auto-loaded</text>
  <text x="360" y="224" text-anchor="middle" fill="#CBD5E1" font-size="10">Always loaded</text>
  <text x="360" y="240" text-anchor="middle" fill="#94A3B8" font-size="9">every session</text>
  <text x="480" y="224" text-anchor="middle" fill="#CBD5E1" font-size="10">Project rules</text>
  <text x="480" y="240" text-anchor="middle" fill="#94A3B8" font-size="9">global conventions</text>

  <!-- Row 3: Slash Commands -->
  <rect x="24" y="276" width="512" height="72" rx="8" fill="#1E293B" stroke="#22C55E" stroke-width="1.5" filter="url(#shadow4)"/>
  <rect x="32" y="284" width="8" height="56" rx="4" fill="#22C55E"/>
  <text x="104" y="300" text-anchor="middle" fill="#22C55E" font-size="12" font-weight="700">Slash Commands</text>
  <text x="104" y="316" text-anchor="middle" fill="#64748B" font-size="9">/command-name</text>
  <text x="104" y="330" text-anchor="middle" fill="#64748B" font-size="9">.claude/commands/</text>
  <text x="230" y="304" text-anchor="middle" fill="#CBD5E1" font-size="10">Explicit</text>
  <text x="230" y="320" text-anchor="middle" fill="#94A3B8" font-size="9">user types /cmd</text>
  <text x="360" y="304" text-anchor="middle" fill="#CBD5E1" font-size="10">On invocation</text>
  <text x="360" y="320" text-anchor="middle" fill="#94A3B8" font-size="9">user-initiated</text>
  <text x="480" y="304" text-anchor="middle" fill="#CBD5E1" font-size="10">Quick actions</text>
  <text x="480" y="320" text-anchor="middle" fill="#94A3B8" font-size="9">one-off tasks</text>

  <!-- Row 4: Hooks -->
  <rect x="24" y="356" width="512" height="72" rx="8" fill="#1E293B" stroke="#F59E0B" stroke-width="1.5" filter="url(#shadow4)"/>
  <rect x="32" y="364" width="8" height="56" rx="4" fill="#F59E0B"/>
  <text x="104" y="380" text-anchor="middle" fill="#F59E0B" font-size="12" font-weight="700">Hooks</text>
  <text x="104" y="396" text-anchor="middle" fill="#64748B" font-size="9">Event listeners</text>
  <text x="104" y="410" text-anchor="middle" fill="#64748B" font-size="9">.claude/hooks/</text>
  <text x="230" y="384" text-anchor="middle" fill="#CBD5E1" font-size="10">Event-driven</text>
  <text x="230" y="400" text-anchor="middle" fill="#94A3B8" font-size="9">on lifecycle events</text>
  <text x="360" y="384" text-anchor="middle" fill="#CBD5E1" font-size="10">Automatic</text>
  <text x="360" y="400" text-anchor="middle" fill="#94A3B8" font-size="9">on trigger event</text>
  <text x="480" y="384" text-anchor="middle" fill="#CBD5E1" font-size="10">Automation</text>
  <text x="480" y="400" text-anchor="middle" fill="#94A3B8" font-size="9">linting, formatting</text>

  <!-- Row 5: MCP -->
  <rect x="24" y="436" width="512" height="72" rx="8" fill="#1E293B" stroke="#EF4444" stroke-width="1.5" filter="url(#shadow4)"/>
  <rect x="32" y="444" width="8" height="56" rx="4" fill="#EF4444"/>
  <text x="104" y="460" text-anchor="middle" fill="#EF4444" font-size="12" font-weight="700">MCP Servers</text>
  <text x="104" y="476" text-anchor="middle" fill="#64748B" font-size="9">External tools</text>
  <text x="104" y="490" text-anchor="middle" fill="#64748B" font-size="9">via protocol</text>
  <text x="230" y="464" text-anchor="middle" fill="#CBD5E1" font-size="10">Tool call</text>
  <text x="230" y="480" text-anchor="middle" fill="#94A3B8" font-size="9">Claude decides</text>
  <text x="360" y="464" text-anchor="middle" fill="#CBD5E1" font-size="10">Connected</text>
  <text x="360" y="480" text-anchor="middle" fill="#94A3B8" font-size="9">server running</text>
  <text x="480" y="464" text-anchor="middle" fill="#CBD5E1" font-size="10">External APIs</text>
  <text x="480" y="480" text-anchor="middle" fill="#94A3B8" font-size="9">DB, services</text>

  <!-- Bottom insight -->
  <rect x="24" y="520" width="512" height="28" rx="8" fill="#0F172A" stroke="#475569" stroke-width="1"/>
  <text x="280" y="539" text-anchor="middle" fill="#94A3B8" font-size="10">Skills = smart, auto-matched instructions | CLAUDE.md = always-on rules | Commands = explicit triggers</text>
</svg>