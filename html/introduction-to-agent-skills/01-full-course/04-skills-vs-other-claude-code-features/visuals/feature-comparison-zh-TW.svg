  <text x="104" y="490" text-anchor="middle" fill="#64748B" font-size="9">透過協議</text>
  <text x="230" y="464" text-anchor="middle" fill="#CBD5E1" font-size="10">工具呼叫</text>
  <text x="230" y="480" text-anchor="middle" fill="#94A3B8" font-size="9">Claude 決定</text>
