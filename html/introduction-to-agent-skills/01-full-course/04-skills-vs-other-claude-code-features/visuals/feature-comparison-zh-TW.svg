  <rect x="24" y="520" width="512" height="28" rx="8" fill="#0F172A" stroke="#475569" stroke-width="1"/>
  <text x="280" y="539" text-anchor="middle" fill="#94A3B8" font-size="10">技能 = 智慧自動匹配指令 | CLAUDE.md = 常駐規則 | 斜線指令 = 明確觸發</text>
