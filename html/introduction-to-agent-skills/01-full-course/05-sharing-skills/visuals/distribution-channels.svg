<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 520" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <filter id="shadow5">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <linearGradient id="blueG5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="greenG5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#16A34A"/>
    </linearGradient>
    <linearGradient id="purpleG5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <marker id="arrow5" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94A3B8"/>
    </marker>
  </defs>
  <rect width="560" height="520" fill="url(#bg5)" rx="12"/>
  <text x="280" y="36" text-anchor="middle" fill="#F8FAFC" font-size="18" font-weight="700">Skill Distribution Channels</text>
  <text x="280" y="56" text-anchor="middle" fill="#94A3B8" font-size="12">Three paths to share skills with others</text>

  <!-- Central source -->
  <rect x="200" y="74" width="160" height="52" rx="10" fill="#1E293B" stroke="#F8FAFC" stroke-width="1.5" filter="url(#shadow5)"/>
  <text x="280" y="96" text-anchor="middle" fill="#F8FAFC" font-size="13" font-weight="700">Your Skill</text>
  <text x="280" y="112" text-anchor="middle" fill="#94A3B8" font-size="10">SKILL.md + sub-files</text>

  <!-- Three arrows down -->
  <line x1="140" y1="100" x2="100" y2="160" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrow5)"/>
  <line x1="280" y1="126" x2="280" y2="160" stroke="#22C55E" stroke-width="2" marker-end="url(#arrow5)"/>
  <line x1="420" y1="100" x2="460" y2="160" stroke="#8B5CF6" stroke-width="2" marker-end="url(#arrow5)"/>

  <!-- Channel 1: Repository -->
  <rect x="16" y="164" width="168" height="200" rx="10" fill="#0F172A" stroke="#3B82F6" stroke-width="1.5" filter="url(#shadow5)"/>
  <rect x="16" y="164" width="168" height="40" rx="10" fill="url(#blueG5)"/>
  <rect x="16" y="194" width="168" height="10" fill="url(#blueG5)"/>
  <text x="100" y="190" text-anchor="middle" fill="#FFF" font-size="13" font-weight="700">Repository</text>
  <text x="100" y="224" text-anchor="middle" fill="#CBD5E1" font-size="10" font-weight="600">Via Git Clone</text>
  <text x="36" y="248" fill="#94A3B8" font-size="9">.claude/skills/</text>
  <text x="36" y="264" fill="#94A3B8" font-size="9">  my-skill/</text>
  <text x="36" y="280" fill="#60A5FA" font-size="9">    SKILL.md</text>
  <line x1="36" y1="294" x2="164" y2="294" stroke="#334155" stroke-width="1"/>
  <text x="100" y="314" text-anchor="middle" fill="#64748B" font-size="9">Team members clone</text>
  <text x="100" y="328" text-anchor="middle" fill="#64748B" font-size="9">repo to get skills</text>
  <text x="100" y="348" text-anchor="middle" fill="#3B82F6" font-size="9" font-weight="600">Scope: Team / Repo</text>

  <!-- Channel 2: Plugins -->
  <rect x="196" y="164" width="168" height="200" rx="10" fill="#0F172A" stroke="#22C55E" stroke-width="1.5" filter="url(#shadow5)"/>
  <rect x="196" y="164" width="168" height="40" rx="10" fill="url(#greenG5)"/>
  <rect x="196" y="194" width="168" height="10" fill="url(#greenG5)"/>
  <text x="280" y="190" text-anchor="middle" fill="#FFF" font-size="13" font-weight="700">Plugins</text>
  <text x="280" y="224" text-anchor="middle" fill="#CBD5E1" font-size="10" font-weight="600">Marketplace</text>
  <text x="216" y="248" fill="#94A3B8" font-size="9">Publish to registry</text>
  <text x="216" y="264" fill="#94A3B8" font-size="9">Users install with:</text>
  <rect x="212" y="272" width="136" height="20" rx="4" fill="#1E293B"/>
  <text x="280" y="286" text-anchor="middle" fill="#4ADE80" font-size="9" font-family="'SF Mono', 'Menlo', monospace">claude plugin add</text>
  <line x1="216" y1="302" x2="344" y2="302" stroke="#334155" stroke-width="1"/>
  <text x="280" y="322" text-anchor="middle" fill="#64748B" font-size="9">Discoverable by</text>
  <text x="280" y="336" text-anchor="middle" fill="#64748B" font-size="9">anyone in ecosystem</text>
  <text x="280" y="348" text-anchor="middle" fill="#22C55E" font-size="9" font-weight="600">Scope: Public / Community</text>

  <!-- Channel 3: Enterprise -->
  <rect x="376" y="164" width="168" height="200" rx="10" fill="#0F172A" stroke="#8B5CF6" stroke-width="1.5" filter="url(#shadow5)"/>
  <rect x="376" y="164" width="168" height="40" rx="10" fill="url(#purpleG5)"/>
  <rect x="376" y="194" width="168" height="10" fill="url(#purpleG5)"/>
  <text x="460" y="190" text-anchor="middle" fill="#FFF" font-size="13" font-weight="700">Enterprise</text>
  <text x="460" y="224" text-anchor="middle" fill="#CBD5E1" font-size="10" font-weight="600">Managed Settings</text>
  <text x="396" y="248" fill="#94A3B8" font-size="9">Admin configures</text>
  <text x="396" y="264" fill="#94A3B8" font-size="9">org-wide skills via</text>
  <text x="396" y="280" fill="#94A3B8" font-size="9">managed policies</text>
  <line x1="396" y1="294" x2="524" y2="294" stroke="#334155" stroke-width="1"/>
  <text x="460" y="314" text-anchor="middle" fill="#64748B" font-size="9">Auto-deployed to</text>
  <text x="460" y="328" text-anchor="middle" fill="#64748B" font-size="9">all org members</text>
  <text x="460" y="348" text-anchor="middle" fill="#8B5CF6" font-size="9" font-weight="600">Scope: Organization</text>

  <!-- Bottom arrows to targets -->
  <line x1="100" y1="364" x2="100" y2="400" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arrow5)"/>
  <line x1="280" y1="364" x2="280" y2="400" stroke="#22C55E" stroke-width="1.5" marker-end="url(#arrow5)"/>
  <line x1="460" y1="364" x2="460" y2="400" stroke="#8B5CF6" stroke-width="1.5" marker-end="url(#arrow5)"/>

  <!-- Target audiences -->
  <rect x="36" y="404" width="128" height="36" rx="8" fill="#1E293B" stroke="#3B82F6" stroke-width="1"/>
  <text x="100" y="426" text-anchor="middle" fill="#93C5FD" font-size="10" font-weight="600">Team Members</text>

  <rect x="216" y="404" width="128" height="36" rx="8" fill="#1E293B" stroke="#22C55E" stroke-width="1"/>
  <text x="280" y="426" text-anchor="middle" fill="#86EFAC" font-size="10" font-weight="600">Community</text>

  <rect x="396" y="404" width="128" height="36" rx="8" fill="#1E293B" stroke="#8B5CF6" stroke-width="1"/>
  <text x="460" y="426" text-anchor="middle" fill="#C4B5FD" font-size="10" font-weight="600">Entire Org</text>

  <!-- Bottom note -->
  <rect x="40" y="460" width="480" height="44" rx="8" fill="#1E293B" stroke="#475569" stroke-width="1"/>
  <text x="280" y="480" text-anchor="middle" fill="#F8FAFC" font-size="10" font-weight="600">Choose based on audience size and control requirements</text>
  <text x="280" y="496" text-anchor="middle" fill="#64748B" font-size="9">Repository for teams | Plugins for community | Enterprise for org-wide governance</text>
</svg>