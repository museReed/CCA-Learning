<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" fill="none">
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/></filter>
  </defs>
  <rect width="800" height="520" fill="white"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-family="SF Pro Display, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#1E293B">MCP Roots: File System Access Control</text>

  <!-- File System Tree (left) -->
  <rect x="30" y="70" width="220" height="310" rx="8" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="140" y="95" text-anchor="middle" font-family="SF Pro Display, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#1E293B">File System</text>

  <text x="55" y="130" font-family="SF Pro Display, -apple-system, sans-serif" font-size="12" fill="#64748B">~/</text>
  <text x="70" y="155" font-family="SF Pro Display, -apple-system, sans-serif" font-size="12" fill="#1E293B">Desktop/</text>
  <rect x="65" y="165" width="170" height="22" rx="4" fill="#DCFCE7" stroke="#22C55E" stroke-width="1"/>
  <text x="85" y="181" font-family="SF Pro Display, -apple-system, sans-serif" font-size="12" fill="#1E293B">Documents/</text>
  <text x="100" y="205" font-family="SF Pro Display, -apple-system, sans-serif" font-size="11" fill="#64748B">project/</text>
  <text x="115" y="225" font-family="SF Pro Display, -apple-system, sans-serif" font-size="11" fill="#64748B">src/</text>
  <text x="115" y="245" font-family="SF Pro Display, -apple-system, sans-serif" font-size="11" fill="#64748B">README.md</text>
  <text x="70" y="275" font-family="SF Pro Display, -apple-system, sans-serif" font-size="12" fill="#1E293B">Downloads/</text>
  <rect x="65" y="285" width="170" height="22" rx="4" fill="#FEF2F2" stroke="#EF4444" stroke-width="1"/>
  <text x="85" y="301" font-family="SF Pro Display, -apple-system, sans-serif" font-size="12" fill="#1E293B">Movies/</text>
  <text x="100" y="325" font-family="SF Pro Display, -apple-system, sans-serif" font-size="11" fill="#FB923C" font-weight="600">biking.mp4</text>
  <text x="70" y="355" font-family="SF Pro Display, -apple-system, sans-serif" font-size="12" fill="#1E293B">.ssh/</text>

  <!-- Roots Configuration (middle) -->
  <rect x="290" y="70" width="220" height="310" rx="8" fill="white" stroke="#22C55E" stroke-width="2" filter="url(#shadow)"/>
  <rect x="290" y="70" width="220" height="36" rx="8" fill="#22C55E"/>
  <rect x="290" y="90" width="220" height="16" fill="#22C55E"/>
  <text x="400" y="94" text-anchor="middle" font-family="SF Pro Display, -apple-system, sans-serif" font-size="13" font-weight="600" fill="white">Roots Configuration</text>

  <text x="310" y="130" font-family="SF Pro Display, -apple-system, sans-serif" font-size="11" fill="#64748B">Approved paths:</text>

  <rect x="305" y="140" width="190" height="30" rx="6" fill="#F0FDF4" stroke="#22C55E" stroke-width="1"/>
  <text x="315" y="160" font-family="SF Pro Display, -apple-system, sans-serif" font-size="11" fill="#22C55E" font-weight="600">~/Documents/</text>

  <rect x="305" y="180" width="190" height="30" rx="6" fill="#F0FDF4" stroke="#22C55E" stroke-width="1"/>
  <text x="315" y="200" font-family="SF Pro Display, -apple-system, sans-serif" font-size="11" fill="#22C55E" font-weight="600">~/Desktop/</text>

  <text x="310" y="240" font-family="SF Pro Display, -apple-system, sans-serif" font-size="11" fill="#64748B">Blocked paths:</text>

  <rect x="305" y="250" width="190" height="30" rx="6" fill="#FEF2F2" stroke="#EF4444" stroke-width="1"/>
  <text x="315" y="270" font-family="SF Pro Display, -apple-system, sans-serif" font-size="11" fill="#EF4444" font-weight="600">Everything else</text>

  <text x="400" y="320" text-anchor="middle" font-family="SF Pro Display, -apple-system, sans-serif" font-size="10" fill="#94A3B8">Client exposes roots</text>
  <text x="400" y="335" text-anchor="middle" font-family="SF Pro Display, -apple-system, sans-serif" font-size="10" fill="#94A3B8">via list_roots()</text>

  <!-- Access Control (right) -->
  <rect x="550" y="70" width="220" height="310" rx="8" fill="white" stroke="#3B82F6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="550" y="70" width="220" height="36" rx="8" fill="#3B82F6"/>
  <rect x="550" y="90" width="220" height="16" fill="#3B82F6"/>
  <text x="660" y="94" text-anchor="middle" font-family="SF Pro Display, -apple-system, sans-serif" font-size="13" font-weight="600" fill="white">Access Results</text>

  <!-- Allowed -->
  <text x="575" y="130" font-family="SF Pro Display, -apple-system, sans-serif" font-size="20" fill="#22C55E">&#x2705;</text>
  <text x="600" y="130" font-family="SF Pro Display, -apple-system, sans-serif" font-size="12" fill="#1E293B">~/Documents/src/</text>

  <text x="575" y="160" font-family="SF Pro Display, -apple-system, sans-serif" font-size="20" fill="#22C55E">&#x2705;</text>
  <text x="600" y="160" font-family="SF Pro Display, -apple-system, sans-serif" font-size="12" fill="#1E293B">~/Desktop/notes.txt</text>

  <text x="575" y="190" font-family="SF Pro Display, -apple-system, sans-serif" font-size="20" fill="#22C55E">&#x2705;</text>
  <text x="600" y="190" font-family="SF Pro Display, -apple-system, sans-serif" font-size="12" fill="#1E293B">~/Documents/README</text>

  <!-- Divider -->
  <line x1="570" y1="210" x2="750" y2="210" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Denied -->
  <text x="575" y="240" font-family="SF Pro Display, -apple-system, sans-serif" font-size="20" fill="#EF4444">&#x274C;</text>
  <text x="600" y="240" font-family="SF Pro Display, -apple-system, sans-serif" font-size="12" fill="#1E293B">~/Movies/biking.mp4</text>

  <text x="575" y="270" font-family="SF Pro Display, -apple-system, sans-serif" font-size="20" fill="#EF4444">&#x274C;</text>
  <text x="600" y="270" font-family="SF Pro Display, -apple-system, sans-serif" font-size="12" fill="#1E293B">~/.ssh/id_rsa</text>

  <text x="575" y="300" font-family="SF Pro Display, -apple-system, sans-serif" font-size="20" fill="#EF4444">&#x274C;</text>
  <text x="600" y="300" font-family="SF Pro Display, -apple-system, sans-serif" font-size="12" fill="#1E293B">~/Downloads/</text>

  <text x="660" y="360" text-anchor="middle" font-family="SF Pro Display, -apple-system, sans-serif" font-size="10" fill="#94A3B8">Server respects root</text>
  <text x="660" y="375" text-anchor="middle" font-family="SF Pro Display, -apple-system, sans-serif" font-size="10" fill="#94A3B8">boundaries</text>

  <!-- Flow arrows at bottom -->
  <rect x="80" y="420" width="640" height="70" rx="8" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="400" y="445" text-anchor="middle" font-family="SF Pro Display, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#3B82F6">Flow: Claude  &#x2192;  list_roots()  &#x2192;  read directory  &#x2192;  find file  &#x2192;  use tool</text>
  <text x="400" y="470" text-anchor="middle" font-family="SF Pro Display, -apple-system, sans-serif" font-size="11" fill="#64748B">Roots are informational hints -- well-behaved servers should respect them</text>
</svg>