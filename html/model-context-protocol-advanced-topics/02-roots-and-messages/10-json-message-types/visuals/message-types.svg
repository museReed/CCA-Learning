<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" fill="none">
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/></filter>
  </defs>
  <rect width="800" height="560" fill="white"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-family="SF Pro Display, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#1E293B">MCP JSON Message Types</text>

  <!-- Left Column: Request-Result Pairs -->
  <rect x="40" y="70" width="340" height="340" rx="8" fill="white" stroke="#3B82F6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="40" y="70" width="340" height="40" rx="8" fill="#3B82F6"/>
  <rect x="40" y="90" width="340" height="20" fill="#3B82F6"/>
  <text x="210" y="96" text-anchor="middle" font-family="SF Pro Display, -apple-system, sans-serif" font-size="14" font-weight="600" fill="white">Request-Result Pairs</text>
  <text x="210" y="130" text-anchor="middle" font-family="SF Pro Display, -apple-system, sans-serif" font-size="11" fill="#64748B">Bidirectional: expects a response</text>

  <!-- Request items -->
  <rect x="60" y="150" width="300" height="36" rx="6" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1"/>
  <text x="80" y="173" font-family="SF Pro Display, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#3B82F6">CallTool</text>
  <text x="340" y="173" text-anchor="end" font-family="SF Pro Display, -apple-system, sans-serif" font-size="11" fill="#64748B">&#x2194; CallToolResult</text>

  <rect x="60" y="196" width="300" height="36" rx="6" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1"/>
  <text x="80" y="219" font-family="SF Pro Display, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#3B82F6">ListPrompts</text>
  <text x="340" y="219" text-anchor="end" font-family="SF Pro Display, -apple-system, sans-serif" font-size="11" fill="#64748B">&#x2194; ListPromptsResult</text>

  <rect x="60" y="242" width="300" height="36" rx="6" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1"/>
  <text x="80" y="265" font-family="SF Pro Display, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#3B82F6">ReadResource</text>
  <text x="340" y="265" text-anchor="end" font-family="SF Pro Display, -apple-system, sans-serif" font-size="11" fill="#64748B">&#x2194; ReadResourceResult</text>

  <rect x="60" y="288" width="300" height="36" rx="6" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1"/>
  <text x="80" y="311" font-family="SF Pro Display, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#3B82F6">Initialize</text>
  <text x="340" y="311" text-anchor="end" font-family="SF Pro Display, -apple-system, sans-serif" font-size="11" fill="#64748B">&#x2194; InitializeResult</text>

  <rect x="60" y="334" width="300" height="36" rx="6" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1"/>
  <text x="80" y="357" font-family="SF Pro Display, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#3B82F6">CreateMessage</text>
  <text x="340" y="357" text-anchor="end" font-family="SF Pro Display, -apple-system, sans-serif" font-size="11" fill="#64748B">&#x2194; CreateMessageResult</text>

  <!-- Bidirectional arrow icon -->
  <text x="210" y="397" text-anchor="middle" font-family="SF Pro Display, -apple-system, sans-serif" font-size="12" fill="#3B82F6" font-weight="600">&#x2194;  Always paired</text>

  <!-- Right Column: Notifications -->
  <rect x="420" y="70" width="340" height="340" rx="8" fill="white" stroke="#FB923C" stroke-width="2" filter="url(#shadow)"/>
  <rect x="420" y="70" width="340" height="40" rx="8" fill="#FB923C"/>
  <rect x="420" y="90" width="340" height="20" fill="#FB923C"/>
  <text x="590" y="96" text-anchor="middle" font-family="SF Pro Display, -apple-system, sans-serif" font-size="14" font-weight="600" fill="white">Notifications</text>
  <text x="590" y="130" text-anchor="middle" font-family="SF Pro Display, -apple-system, sans-serif" font-size="11" fill="#64748B">One-way: fire and forget</text>

  <!-- Notification items -->
  <rect x="440" y="150" width="300" height="36" rx="6" fill="#FFF7ED" stroke="#FB923C" stroke-width="1"/>
  <text x="460" y="173" font-family="SF Pro Display, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#FB923C">Progress</text>
  <text x="720" y="173" text-anchor="end" font-family="SF Pro Display, -apple-system, sans-serif" font-size="11" fill="#64748B">&#x2192; no response</text>

  <rect x="440" y="196" width="300" height="36" rx="6" fill="#FFF7ED" stroke="#FB923C" stroke-width="1"/>
  <text x="460" y="219" font-family="SF Pro Display, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#FB923C">Logging</text>
  <text x="720" y="219" text-anchor="end" font-family="SF Pro Display, -apple-system, sans-serif" font-size="11" fill="#64748B">&#x2192; no response</text>

  <rect x="440" y="242" width="300" height="36" rx="6" fill="#FFF7ED" stroke="#FB923C" stroke-width="1"/>
  <text x="460" y="265" font-family="SF Pro Display, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#FB923C">ToolListChanged</text>
  <text x="720" y="265" text-anchor="end" font-family="SF Pro Display, -apple-system, sans-serif" font-size="11" fill="#64748B">&#x2192; no response</text>

  <rect x="440" y="288" width="300" height="36" rx="6" fill="#FFF7ED" stroke="#FB923C" stroke-width="1"/>
  <text x="460" y="311" font-family="SF Pro Display, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#FB923C">ResourceUpdated</text>
  <text x="720" y="311" text-anchor="end" font-family="SF Pro Display, -apple-system, sans-serif" font-size="11" fill="#64748B">&#x2192; no response</text>

  <rect x="440" y="334" width="300" height="36" rx="6" fill="#FFF7ED" stroke="#FB923C" stroke-width="1"/>
  <text x="460" y="357" font-family="SF Pro Display, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#FB923C">RootsListChanged</text>
  <text x="720" y="357" text-anchor="end" font-family="SF Pro Display, -apple-system, sans-serif" font-size="11" fill="#64748B">&#x2192; no response</text>

  <!-- One-way arrow icon -->
  <text x="590" y="397" text-anchor="middle" font-family="SF Pro Display, -apple-system, sans-serif" font-size="12" fill="#FB923C" font-weight="600">&#x2192;  No reply expected</text>

  <!-- Bottom: Client vs Server classification -->
  <rect x="40" y="430" width="720" height="110" rx="8" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="400" y="455" text-anchor="middle" font-family="SF Pro Display, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#1E293B">Who Sends What?</text>

  <!-- Client sends -->
  <rect x="60" y="470" width="310" height="50" rx="6" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="1"/>
  <text x="215" y="490" text-anchor="middle" font-family="SF Pro Display, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#8B5CF6">Client &#x2192; Server</text>
  <text x="215" y="508" text-anchor="middle" font-family="SF Pro Display, -apple-system, sans-serif" font-size="11" fill="#64748B">CallTool, ListPrompts, ReadResource, Initialize</text>

  <!-- Server sends -->
  <rect x="430" y="470" width="310" height="50" rx="6" fill="#F0FDF4" stroke="#22C55E" stroke-width="1"/>
  <text x="585" y="490" text-anchor="middle" font-family="SF Pro Display, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#22C55E">Server &#x2192; Client</text>
  <text x="585" y="508" text-anchor="middle" font-family="SF Pro Display, -apple-system, sans-serif" font-size="11" fill="#64748B">CreateMessage, Progress, Logging, *Changed</text>
</svg>