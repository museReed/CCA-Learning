<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 580" fill="none">
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/></filter>
  </defs>
  <rect width="800" height="580" fill="white"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="PingFang TC, SF Pro Display, sans-serif" font-size="22" font-weight="700" fill="#1E293B">擴展問題與無狀態解決方案</text>

  <!-- TOP SECTION: The Problem -->
  <rect x="30" y="55" width="740" height="200" rx="8" fill="white" stroke="#EF4444" stroke-width="2" filter="url(#shadow)"/>
  <rect x="30" y="55" width="740" height="36" rx="8" fill="#EF4444"/>
  <rect x="30" y="75" width="740" height="16" fill="#EF4444"/>
  <text x="400" y="79" text-anchor="middle" font-family="PingFang TC, SF Pro Display, sans-serif" font-size="13" font-weight="600" fill="white">問題：有狀態 Session + 負載均衡器</text>

  <!-- Clients -->
  <rect x="55" y="110" width="70" height="35" rx="6" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="90" y="132" text-anchor="middle" font-family="PingFang TC, SF Pro Display, sans-serif" font-size="10" font-weight="600" fill="#8B5CF6">Client A</text>
  <rect x="55" y="155" width="70" height="35" rx="6" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="90" y="177" text-anchor="middle" font-family="PingFang TC, SF Pro Display, sans-serif" font-size="10" font-weight="600" fill="#8B5CF6">Client B</text>
  <rect x="55" y="200" width="70" height="35" rx="6" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="90" y="222" text-anchor="middle" font-family="PingFang TC, SF Pro Display, sans-serif" font-size="10" font-weight="600" fill="#8B5CF6">Client C</text>

  <!-- Arrows to LB -->
  <line x1="125" y1="127" x2="260" y2="160" stroke="#64748B" stroke-width="1.2"/>
  <line x1="125" y1="172" x2="260" y2="170" stroke="#64748B" stroke-width="1.2"/>
  <line x1="125" y1="217" x2="260" y2="180" stroke="#64748B" stroke-width="1.2"/>

  <!-- Load Balancer -->
  <rect x="260" y="135" width="120" height="65" rx="6" fill="#FFF7ED" stroke="#FB923C" stroke-width="2"/>
  <text x="320" y="163" text-anchor="middle" font-family="PingFang TC, SF Pro Display, sans-serif" font-size="11" font-weight="600" fill="#FB923C">負載</text>
  <text x="320" y="178" text-anchor="middle" font-family="PingFang TC, SF Pro Display, sans-serif" font-size="11" font-weight="600" fill="#FB923C">均衡器</text>

  <!-- Arrows from LB to servers -->
  <line x1="380" y1="155" x2="460" y2="127" stroke="#64748B" stroke-width="1.2"/>
  <line x1="380" y1="167" x2="460" y2="172" stroke="#64748B" stroke-width="1.2"/>
  <line x1="380" y1="180" x2="460" y2="217" stroke="#64748B" stroke-width="1.2"/>

  <!-- Server instances -->
  <rect x="460" y="110" width="90" height="35" rx="6" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.5"/>
  <text x="505" y="132" text-anchor="middle" font-family="PingFang TC, SF Pro Display, sans-serif" font-size="10" font-weight="600" fill="#22C55E">Server 1</text>
  <rect x="460" y="155" width="90" height="35" rx="6" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.5"/>
  <text x="505" y="177" text-anchor="middle" font-family="PingFang TC, SF Pro Display, sans-serif" font-size="10" font-weight="600" fill="#22C55E">Server 2</text>
  <rect x="460" y="200" width="90" height="35" rx="6" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.5"/>
  <text x="505" y="222" text-anchor="middle" font-family="PingFang TC, SF Pro Display, sans-serif" font-size="10" font-weight="600" fill="#22C55E">Server 3</text>

  <!-- Problem callout -->
  <rect x="580" y="120" width="170" height="110" rx="6" fill="#FEF2F2" stroke="#EF4444" stroke-width="1.5"/>
  <text x="665" y="145" text-anchor="middle" font-family="PingFang TC, SF Pro Display, sans-serif" font-size="11" font-weight="700" fill="#EF4444">問題</text>
  <text x="665" y="165" text-anchor="middle" font-family="PingFang TC, SF Pro Display, sans-serif" font-size="10" fill="#1E293B">GET SSE 連到</text>
  <text x="665" y="180" text-anchor="middle" font-family="PingFang TC, SF Pro Display, sans-serif" font-size="10" fill="#1E293B">Server 1，但 POST</text>
  <text x="665" y="195" text-anchor="middle" font-family="PingFang TC, SF Pro Display, sans-serif" font-size="10" fill="#1E293B">可能打到 Server 2</text>
  <text x="665" y="215" text-anchor="middle" font-family="PingFang TC, SF Pro Display, sans-serif" font-size="10" font-weight="600" fill="#EF4444">Session 狀態遺失！</text>

  <!-- BOTTOM SECTION: The Solution -->
  <rect x="30" y="275" width="740" height="130" rx="8" fill="white" stroke="#22C55E" stroke-width="2" filter="url(#shadow)"/>
  <rect x="30" y="275" width="740" height="36" rx="8" fill="#22C55E"/>
  <rect x="30" y="295" width="740" height="16" fill="#22C55E"/>
  <text x="400" y="299" text-anchor="middle" font-family="PingFang TC, SF Pro Display, sans-serif" font-size="13" font-weight="600" fill="white">解決方案：stateless_http = True</text>

  <text x="400" y="335" text-anchor="middle" font-family="PingFang TC, SF Pro Display, sans-serif" font-size="12" fill="#1E293B">Server 端不保存 Session 狀態。不需要 GET SSE 連線。</text>
  <text x="400" y="355" text-anchor="middle" font-family="PingFang TC, SF Pro Display, sans-serif" font-size="12" fill="#1E293B">每個 POST 都是獨立的 -- 任何 Server 實例都能處理任何請求。</text>
  <text x="400" y="380" text-anchor="middle" font-family="PingFang TC, SF Pro Display, sans-serif" font-size="11" fill="#22C55E" font-weight="600">不需要初始化握手。Server 立即開始接受請求。</text>

  <!-- Trade-off Table -->
  <rect x="80" y="420" width="640" height="140" rx="8" fill="white" stroke="#CBD5E1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="400" y="445" text-anchor="middle" font-family="PingFang TC, SF Pro Display, sans-serif" font-size="14" font-weight="700" fill="#1E293B">取捨</text>

  <!-- Gains -->
  <text x="120" y="472" font-family="PingFang TC, SF Pro Display, sans-serif" font-size="12" fill="#22C55E">&#x2705;</text>
  <text x="140" y="472" font-family="PingFang TC, SF Pro Display, sans-serif" font-size="11" fill="#1E293B">水平擴展</text>

  <text x="120" y="494" font-family="PingFang TC, SF Pro Display, sans-serif" font-size="12" fill="#22C55E">&#x2705;</text>
  <text x="140" y="494" font-family="PingFang TC, SF Pro Display, sans-serif" font-size="11" fill="#1E293B">不需要初始化</text>

  <text x="120" y="516" font-family="PingFang TC, SF Pro Display, sans-serif" font-size="12" fill="#22C55E">&#x2705;</text>
  <text x="140" y="516" font-family="PingFang TC, SF Pro Display, sans-serif" font-size="11" fill="#1E293B">部署簡單</text>

  <text x="120" y="538" font-family="PingFang TC, SF Pro Display, sans-serif" font-size="12" fill="#22C55E">&#x2705;</text>
  <text x="140" y="538" font-family="PingFang TC, SF Pro Display, sans-serif" font-size="11" fill="#1E293B">支援任何負載均衡器</text>

  <!-- Divider -->
  <line x1="400" y1="460" x2="400" y2="548" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Losses -->
  <text x="430" y="472" font-family="PingFang TC, SF Pro Display, sans-serif" font-size="12" fill="#EF4444">&#x274C;</text>
  <text x="450" y="472" font-family="PingFang TC, SF Pro Display, sans-serif" font-size="11" fill="#1E293B">無法使用 Sampling (create_message)</text>

  <text x="430" y="494" font-family="PingFang TC, SF Pro Display, sans-serif" font-size="12" fill="#EF4444">&#x274C;</text>
  <text x="450" y="494" font-family="PingFang TC, SF Pro Display, sans-serif" font-size="11" fill="#1E293B">無進度通知</text>

  <text x="430" y="516" font-family="PingFang TC, SF Pro Display, sans-serif" font-size="12" fill="#EF4444">&#x274C;</text>
  <text x="450" y="516" font-family="PingFang TC, SF Pro Display, sans-serif" font-size="11" fill="#1E293B">無法 Server &#x2192; Client 請求</text>

  <text x="430" y="538" font-family="PingFang TC, SF Pro Display, sans-serif" font-size="12" fill="#EF4444">&#x274C;</text>
  <text x="450" y="538" font-family="PingFang TC, SF Pro Display, sans-serif" font-size="11" fill="#1E293B">無日誌通知</text>
</svg>