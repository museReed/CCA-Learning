<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" fill="none">
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/></filter>
  </defs>
  <rect width="800" height="520" fill="white"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-family="PingFang TC, SF Pro Display, sans-serif" font-size="22" font-weight="700" fill="#1E293B">StreamableHTTP：雙 SSE 連線模型</text>

  <!-- Session ID badge -->
  <rect x="290" y="55" width="220" height="26" rx="13" fill="#1E293B"/>
  <text x="400" y="72" text-anchor="middle" font-family="PingFang TC, SF Pro Display, sans-serif" font-size="11" font-weight="600" fill="white">Session ID: abc-123-xyz</text>

  <!-- Client box -->
  <rect x="40" y="110" width="180" height="280" rx="8" fill="white" stroke="#8B5CF6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="40" y="110" width="180" height="40" rx="8" fill="#8B5CF6"/>
  <rect x="40" y="130" width="180" height="20" fill="#8B5CF6"/>
  <text x="130" y="136" text-anchor="middle" font-family="PingFang TC, SF Pro Display, sans-serif" font-size="14" font-weight="600" fill="white">Client</text>

  <text x="130" y="175" text-anchor="middle" font-family="PingFang TC, SF Pro Display, sans-serif" font-size="11" fill="#1E293B">開啟 2 條連線：</text>

  <rect x="55" y="190" width="150" height="32" rx="6" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="130" y="211" text-anchor="middle" font-family="PingFang TC, SF Pro Display, sans-serif" font-size="10" font-weight="600" fill="#3B82F6">1. GET /mcp（主連線）</text>

  <rect x="55" y="232" width="150" height="32" rx="6" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.5"/>
  <text x="130" y="253" text-anchor="middle" font-family="PingFang TC, SF Pro Display, sans-serif" font-size="10" font-weight="600" fill="#22C55E">2. POST /mcp（工具）</text>

  <text x="130" y="290" text-anchor="middle" font-family="PingFang TC, SF Pro Display, sans-serif" font-size="10" fill="#64748B">所有請求都包含</text>
  <rect x="65" y="298" width="130" height="22" rx="4" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <text x="130" y="314" text-anchor="middle" font-family="PingFang TC, SF Pro Display, sans-serif" font-size="9" font-weight="600" fill="#1E293B">Mcp-Session-Id: abc-123</text>

  <text x="130" y="365" text-anchor="middle" font-family="PingFang TC, SF Pro Display, sans-serif" font-size="10" fill="#64748B">發送工具呼叫，</text>
  <text x="130" y="378" text-anchor="middle" font-family="PingFang TC, SF Pro Display, sans-serif" font-size="10" fill="#64748B">接收執行結果</text>

  <!-- Server box -->
  <rect x="580" y="110" width="180" height="280" rx="8" fill="white" stroke="#22C55E" stroke-width="2" filter="url(#shadow)"/>
  <rect x="580" y="110" width="180" height="40" rx="8" fill="#22C55E"/>
  <rect x="580" y="130" width="180" height="20" fill="#22C55E"/>
  <text x="670" y="136" text-anchor="middle" font-family="PingFang TC, SF Pro Display, sans-serif" font-size="14" font-weight="600" fill="white">Server</text>

  <text x="670" y="175" text-anchor="middle" font-family="PingFang TC, SF Pro Display, sans-serif" font-size="11" fill="#1E293B">將訊息路由到</text>
  <text x="670" y="190" text-anchor="middle" font-family="PingFang TC, SF Pro Display, sans-serif" font-size="11" fill="#1E293B">正確的 SSE 串流：</text>

  <rect x="595" y="205" width="150" height="45" rx="6" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1"/>
  <text x="670" y="223" text-anchor="middle" font-family="PingFang TC, SF Pro Display, sans-serif" font-size="10" fill="#3B82F6" font-weight="600">主 SSE</text>
  <text x="670" y="240" text-anchor="middle" font-family="PingFang TC, SF Pro Display, sans-serif" font-size="9" fill="#64748B">Sampling, Roots, Ping</text>

  <rect x="595" y="260" width="150" height="45" rx="6" fill="#F0FDF4" stroke="#22C55E" stroke-width="1"/>
  <text x="670" y="278" text-anchor="middle" font-family="PingFang TC, SF Pro Display, sans-serif" font-size="10" fill="#22C55E" font-weight="600">工具 SSE</text>
  <text x="670" y="295" text-anchor="middle" font-family="PingFang TC, SF Pro Display, sans-serif" font-size="9" fill="#64748B">結果、日誌、進度</text>

  <text x="670" y="335" text-anchor="middle" font-family="PingFang TC, SF Pro Display, sans-serif" font-size="10" fill="#64748B">工具 SSE 在結果</text>
  <text x="670" y="350" text-anchor="middle" font-family="PingFang TC, SF Pro Display, sans-serif" font-size="10" fill="#64748B">送出後自動關閉</text>

  <!-- Connection 1: Primary SSE (Blue, solid) -->
  <line x1="220" y1="206" x2="578" y2="206" stroke="#3B82F6" stroke-width="2.5"/>
  <text x="400" y="198" text-anchor="middle" font-family="PingFang TC, SF Pro Display, sans-serif" font-size="11" font-weight="700" fill="#3B82F6">主 SSE（持續開啟）</text>
  <polygon points="225,206 233,201 233,211" fill="#3B82F6"/>
  <polygon points="573,206 565,201 565,211" fill="#3B82F6"/>

  <!-- Connection 2: Tool SSE (Green, dashed) -->
  <line x1="220" y1="248" x2="578" y2="248" stroke="#22C55E" stroke-width="2.5" stroke-dasharray="8,4"/>
  <text x="400" y="240" text-anchor="middle" font-family="PingFang TC, SF Pro Display, sans-serif" font-size="11" font-weight="700" fill="#22C55E">工具專屬 SSE（每次呼叫建立，自動關閉）</text>
  <polygon points="573,248 565,243 565,253" fill="#22C55E"/>

  <!-- Message routing detail -->
  <rect x="120" y="420" width="560" height="80" rx="8" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="400" y="443" text-anchor="middle" font-family="PingFang TC, SF Pro Display, sans-serif" font-size="13" font-weight="700" fill="#1E293B">訊息路由</text>

  <rect x="140" y="455" width="240" height="30" rx="6" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1"/>
  <text x="260" y="474" text-anchor="middle" font-family="PingFang TC, SF Pro Display, sans-serif" font-size="11" fill="#3B82F6">Server 主動請求 &#x2192; 主連線</text>

  <rect x="420" y="455" width="240" height="30" rx="6" fill="#F0FDF4" stroke="#22C55E" stroke-width="1"/>
  <text x="540" y="474" text-anchor="middle" font-family="PingFang TC, SF Pro Display, sans-serif" font-size="11" fill="#22C55E">結果 + 日誌 &#x2192; 工具 SSE</text>
</svg>