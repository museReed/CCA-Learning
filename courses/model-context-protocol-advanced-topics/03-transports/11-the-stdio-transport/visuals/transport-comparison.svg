<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 540" fill="none">
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/></filter>
  </defs>
  <rect width="800" height="540" fill="white"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-family="SF Pro Display, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#1E293B">Transport Comparison: STDIO vs StreamableHTTP</text>

  <!-- Left: STDIO Transport -->
  <rect x="30" y="65" width="360" height="280" rx="8" fill="white" stroke="#22C55E" stroke-width="2" filter="url(#shadow)"/>
  <rect x="30" y="65" width="360" height="40" rx="8" fill="#22C55E"/>
  <rect x="30" y="85" width="360" height="20" fill="#22C55E"/>
  <text x="210" y="91" text-anchor="middle" font-family="SF Pro Display, -apple-system, sans-serif" font-size="14" font-weight="600" fill="white">STDIO Transport</text>

  <!-- Same machine box -->
  <rect x="50" y="120" width="320" height="90" rx="6" fill="#F0FDF4" stroke="#22C55E" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="210" y="138" text-anchor="middle" font-family="SF Pro Display, -apple-system, sans-serif" font-size="10" fill="#64748B">Same Machine</text>

  <!-- Client box -->
  <rect x="65" y="148" width="110" height="45" rx="6" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="120" y="175" text-anchor="middle" font-family="SF Pro Display, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#8B5CF6">Client</text>

  <!-- Server box -->
  <rect x="245" y="148" width="110" height="45" rx="6" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.5"/>
  <text x="300" y="175" text-anchor="middle" font-family="SF Pro Display, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#22C55E">Server</text>

  <!-- Arrows -->
  <line x1="175" y1="163" x2="243" y2="163" stroke="#1E293B" stroke-width="1.5" marker-end="url(#arrowDark)"/>
  <text x="210" y="158" text-anchor="middle" font-family="SF Pro Display, -apple-system, sans-serif" font-size="9" fill="#64748B">stdin</text>
  <line x1="243" y1="180" x2="175" y2="180" stroke="#1E293B" stroke-width="1.5" marker-end="url(#arrowDarkLeft)"/>
  <text x="210" y="195" text-anchor="middle" font-family="SF Pro Display, -apple-system, sans-serif" font-size="9" fill="#64748B">stdout</text>

  <!-- Features checklist -->
  <text x="60" y="235" font-family="SF Pro Display, -apple-system, sans-serif" font-size="12" fill="#22C55E">&#x2705;</text>
  <text x="80" y="235" font-family="SF Pro Display, -apple-system, sans-serif" font-size="11" fill="#1E293B">Server &#x2192; Client requests</text>
  <text x="60" y="257" font-family="SF Pro Display, -apple-system, sans-serif" font-size="12" fill="#22C55E">&#x2705;</text>
  <text x="80" y="257" font-family="SF Pro Display, -apple-system, sans-serif" font-size="11" fill="#1E293B">Notifications</text>
  <text x="60" y="279" font-family="SF Pro Display, -apple-system, sans-serif" font-size="12" fill="#22C55E">&#x2705;</text>
  <text x="80" y="279" font-family="SF Pro Display, -apple-system, sans-serif" font-size="11" fill="#1E293B">Progress updates</text>
  <text x="60" y="301" font-family="SF Pro Display, -apple-system, sans-serif" font-size="12" fill="#22C55E">&#x2705;</text>
  <text x="80" y="301" font-family="SF Pro Display, -apple-system, sans-serif" font-size="11" fill="#1E293B">Sampling (create_message)</text>
  <text x="60" y="323" font-family="SF Pro Display, -apple-system, sans-serif" font-size="12" fill="#22C55E">&#x2705;</text>
  <text x="80" y="323" font-family="SF Pro Display, -apple-system, sans-serif" font-size="11" fill="#1E293B">Full bidirectional comms</text>

  <!-- Right: StreamableHTTP Transport -->
  <rect x="410" y="65" width="360" height="280" rx="8" fill="white" stroke="#FB923C" stroke-width="2" filter="url(#shadow)"/>
  <rect x="410" y="65" width="360" height="40" rx="8" fill="#FB923C"/>
  <rect x="410" y="85" width="360" height="20" fill="#FB923C"/>
  <text x="590" y="91" text-anchor="middle" font-family="SF Pro Display, -apple-system, sans-serif" font-size="14" font-weight="600" fill="white">StreamableHTTP Transport</text>

  <!-- Different machines -->
  <rect x="430" y="120" width="130" height="90" rx="6" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="495" y="138" text-anchor="middle" font-family="SF Pro Display, -apple-system, sans-serif" font-size="10" fill="#64748B">Machine A</text>
  <rect x="450" y="148" width="90" height="45" rx="6" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="495" y="175" text-anchor="middle" font-family="SF Pro Display, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#8B5CF6">Client</text>

  <rect x="620" y="120" width="130" height="90" rx="6" fill="#FFF7ED" stroke="#FB923C" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="685" y="138" text-anchor="middle" font-family="SF Pro Display, -apple-system, sans-serif" font-size="10" fill="#64748B">Machine B</text>
  <rect x="640" y="148" width="90" height="45" rx="6" fill="#FFF7ED" stroke="#FB923C" stroke-width="1.5"/>
  <text x="685" y="175" text-anchor="middle" font-family="SF Pro Display, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#FB923C">Server</text>

  <!-- Arrows -->
  <line x1="540" y1="163" x2="638" y2="163" stroke="#1E293B" stroke-width="1.5" marker-end="url(#arrowDark)"/>
  <text x="590" y="158" text-anchor="middle" font-family="SF Pro Display, -apple-system, sans-serif" font-size="9" fill="#64748B">HTTP POST</text>
  <line x1="638" y1="180" x2="540" y2="180" stroke="#1E293B" stroke-width="1.5" marker-end="url(#arrowDarkLeft)"/>
  <text x="590" y="195" text-anchor="middle" font-family="SF Pro Display, -apple-system, sans-serif" font-size="9" fill="#64748B">SSE stream</text>

  <!-- Features checklist -->
  <text x="440" y="235" font-family="SF Pro Display, -apple-system, sans-serif" font-size="12" fill="#22C55E">&#x2705;</text>
  <text x="460" y="235" font-family="SF Pro Display, -apple-system, sans-serif" font-size="11" fill="#1E293B">Server &#x2192; Client requests</text>
  <text x="440" y="257" font-family="SF Pro Display, -apple-system, sans-serif" font-size="12" fill="#22C55E">&#x2705;</text>
  <text x="460" y="257" font-family="SF Pro Display, -apple-system, sans-serif" font-size="11" fill="#1E293B">Notifications</text>
  <text x="440" y="279" font-family="SF Pro Display, -apple-system, sans-serif" font-size="12" fill="#22C55E">&#x2705;</text>
  <text x="460" y="279" font-family="SF Pro Display, -apple-system, sans-serif" font-size="11" fill="#1E293B">Progress updates</text>
  <text x="440" y="301" font-family="SF Pro Display, -apple-system, sans-serif" font-size="12" fill="#22C55E">&#x2705;</text>
  <text x="460" y="301" font-family="SF Pro Display, -apple-system, sans-serif" font-size="11" fill="#1E293B">Sampling (create_message)</text>
  <text x="440" y="323" font-family="SF Pro Display, -apple-system, sans-serif" font-size="12" fill="#22C55E">&#x2705;</text>
  <text x="460" y="323" font-family="SF Pro Display, -apple-system, sans-serif" font-size="11" fill="#1E293B">Remote hosting</text>

  <!-- Bottom comparison -->
  <rect x="30" y="370" width="360" height="80" rx="8" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.5"/>
  <text x="210" y="395" text-anchor="middle" font-family="SF Pro Display, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#22C55E">Best For</text>
  <text x="210" y="415" text-anchor="middle" font-family="SF Pro Display, -apple-system, sans-serif" font-size="11" fill="#1E293B">Local tools, IDE integrations,</text>
  <text x="210" y="432" text-anchor="middle" font-family="SF Pro Display, -apple-system, sans-serif" font-size="11" fill="#1E293B">desktop apps, CLI tools</text>

  <rect x="410" y="370" width="360" height="80" rx="8" fill="#FFF7ED" stroke="#FB923C" stroke-width="1.5"/>
  <text x="590" y="395" text-anchor="middle" font-family="SF Pro Display, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#FB923C">Best For</text>
  <text x="590" y="415" text-anchor="middle" font-family="SF Pro Display, -apple-system, sans-serif" font-size="11" fill="#1E293B">Cloud-hosted services, web apps,</text>
  <text x="590" y="432" text-anchor="middle" font-family="SF Pro Display, -apple-system, sans-serif" font-size="11" fill="#1E293B">multi-user, horizontal scaling</text>

  <!-- Key takeaway -->
  <rect x="100" y="470" width="600" height="50" rx="8" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="400" y="500" text-anchor="middle" font-family="SF Pro Display, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#3B82F6">Both transports support the full MCP feature set. Choose based on deployment model.</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowDark" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1E293B"/>
    </marker>
    <marker id="arrowDarkLeft" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <polygon points="8 0, 0 3, 8 6" fill="#1E293B"/>
    </marker>
  </defs>
</svg>