<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/></filter>
  </defs>
  <rect width="800" height="500" fill="white"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-family="SF Pro Display, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#1E293B">MCP Sampling Flow</text>

  <!-- MCP Server -->
  <rect x="40" y="100" width="200" height="180" rx="8" fill="#F0FDF4" stroke="#22C55E" stroke-width="2" filter="url(#shadow)"/>
  <rect x="40" y="100" width="200" height="40" rx="8" fill="#22C55E"/>
  <rect x="40" y="120" width="200" height="20" fill="#22C55E"/>
  <text x="140" y="126" text-anchor="middle" font-family="SF Pro Display, -apple-system, sans-serif" font-size="14" font-weight="600" fill="white">MCP Server</text>
  <text x="140" y="170" text-anchor="middle" font-family="SF Pro Display, -apple-system, sans-serif" font-size="12" fill="#1E293B">Needs text generation</text>
  <text x="140" y="190" text-anchor="middle" font-family="SF Pro Display, -apple-system, sans-serif" font-size="12" fill="#1E293B">e.g. summarize data,</text>
  <text x="140" y="210" text-anchor="middle" font-family="SF Pro Display, -apple-system, sans-serif" font-size="12" fill="#1E293B">translate content</text>
  <text x="140" y="245" text-anchor="middle" font-family="SF Pro Display, -apple-system, sans-serif" font-size="11" fill="#22C55E" font-weight="600">No API key needed!</text>

  <!-- MCP Client -->
  <rect x="300" y="100" width="200" height="180" rx="8" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="300" y="100" width="200" height="40" rx="8" fill="#8B5CF6"/>
  <rect x="300" y="120" width="200" height="20" fill="#8B5CF6"/>
  <text x="400" y="126" text-anchor="middle" font-family="SF Pro Display, -apple-system, sans-serif" font-size="14" font-weight="600" fill="white">MCP Client</text>
  <text x="400" y="170" text-anchor="middle" font-family="SF Pro Display, -apple-system, sans-serif" font-size="12" fill="#1E293B">Receives request</text>
  <text x="400" y="190" text-anchor="middle" font-family="SF Pro Display, -apple-system, sans-serif" font-size="12" fill="#1E293B">Applies safety policies</text>
  <text x="400" y="210" text-anchor="middle" font-family="SF Pro Display, -apple-system, sans-serif" font-size="12" fill="#1E293B">Calls LLM provider</text>
  <text x="400" y="245" text-anchor="middle" font-family="SF Pro Display, -apple-system, sans-serif" font-size="11" fill="#8B5CF6" font-weight="600">Pays for tokens</text>

  <!-- Claude -->
  <rect x="560" y="100" width="200" height="180" rx="8" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="560" y="100" width="200" height="40" rx="8" fill="#3B82F6"/>
  <rect x="560" y="120" width="200" height="20" fill="#3B82F6"/>
  <text x="660" y="126" text-anchor="middle" font-family="SF Pro Display, -apple-system, sans-serif" font-size="14" font-weight="600" fill="white">Claude (LLM)</text>
  <text x="660" y="170" text-anchor="middle" font-family="SF Pro Display, -apple-system, sans-serif" font-size="12" fill="#1E293B">Generates text</text>
  <text x="660" y="190" text-anchor="middle" font-family="SF Pro Display, -apple-system, sans-serif" font-size="12" fill="#1E293B">Returns completion</text>
  <text x="660" y="210" text-anchor="middle" font-family="SF Pro Display, -apple-system, sans-serif" font-size="12" fill="#1E293B">with model info</text>

  <!-- Arrow 1: Server → Client -->
  <line x1="240" y1="160" x2="298" y2="160" stroke="#22C55E" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="270" y="150" text-anchor="middle" font-family="SF Pro Display, -apple-system, sans-serif" font-size="10" fill="#22C55E" font-weight="600">create_</text>
  <text x="270" y="162" text-anchor="middle" font-family="SF Pro Display, -apple-system, sans-serif" font-size="10" fill="#22C55E" font-weight="600">message()</text>

  <!-- Arrow 2: Client → Claude -->
  <line x1="500" y1="160" x2="558" y2="160" stroke="#8B5CF6" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <text x="530" y="150" text-anchor="middle" font-family="SF Pro Display, -apple-system, sans-serif" font-size="10" fill="#8B5CF6" font-weight="600">sampling_</text>
  <text x="530" y="162" text-anchor="middle" font-family="SF Pro Display, -apple-system, sans-serif" font-size="10" fill="#8B5CF6" font-weight="600">callback</text>

  <!-- Arrow 3: Claude → Client (return) -->
  <line x1="558" y1="230" x2="500" y2="230" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="530" y="222" text-anchor="middle" font-family="SF Pro Display, -apple-system, sans-serif" font-size="10" fill="#3B82F6" font-weight="600">completion</text>

  <!-- Arrow 4: Client → Server (return) -->
  <line x1="298" y1="230" x2="240" y2="230" stroke="#8B5CF6" stroke-width="2" marker-end="url(#arrowPurpleLeft)"/>
  <text x="270" y="222" text-anchor="middle" font-family="SF Pro Display, -apple-system, sans-serif" font-size="10" fill="#8B5CF6" font-weight="600">response</text>

  <!-- Step numbers -->
  <circle cx="270" cy="140" r="10" fill="#22C55E"/>
  <text x="270" y="144" text-anchor="middle" font-family="SF Pro Display, -apple-system, sans-serif" font-size="10" font-weight="700" fill="white">1</text>
  <circle cx="530" cy="140" r="10" fill="#8B5CF6"/>
  <text x="530" y="144" text-anchor="middle" font-family="SF Pro Display, -apple-system, sans-serif" font-size="10" font-weight="700" fill="white">2</text>
  <circle cx="530" cy="248" r="10" fill="#3B82F6"/>
  <text x="530" y="252" text-anchor="middle" font-family="SF Pro Display, -apple-system, sans-serif" font-size="10" font-weight="700" fill="white">3</text>
  <circle cx="270" cy="248" r="10" fill="#8B5CF6"/>
  <text x="270" y="252" text-anchor="middle" font-family="SF Pro Display, -apple-system, sans-serif" font-size="10" font-weight="700" fill="white">4</text>

  <!-- Key Insight callout -->
  <rect x="140" y="330" width="520" height="80" rx="8" fill="#FFF7ED" stroke="#FB923C" stroke-width="2" filter="url(#shadow)"/>
  <text x="170" y="358" font-family="SF Pro Display, -apple-system, sans-serif" font-size="18" fill="#FB923C">&#x1F4A1;</text>
  <text x="195" y="360" font-family="SF Pro Display, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#1E293B">Key Insight</text>
  <text x="400" y="390" text-anchor="middle" font-family="SF Pro Display, -apple-system, sans-serif" font-size="13" fill="#1E293B">Server doesn't need an API key -- the Client pays for tokens.</text>
  <text x="400" y="408" text-anchor="middle" font-family="SF Pro Display, -apple-system, sans-serif" font-size="12" fill="#64748B">The server delegates LLM calls through the client's sampling capability.</text>

  <!-- Flow label -->
  <text x="400" y="470" text-anchor="middle" font-family="SF Pro Display, -apple-system, sans-serif" font-size="11" fill="#94A3B8">Request flow (top) | Response flow (bottom)</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#22C55E"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#8B5CF6"/>
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <polygon points="8 0, 0 3, 8 6" fill="#3B82F6"/>
    </marker>
    <marker id="arrowPurpleLeft" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <polygon points="8 0, 0 3, 8 6" fill="#8B5CF6"/>
    </marker>
  </defs>
</svg>