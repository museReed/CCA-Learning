<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="SF Pro Display, -apple-system, sans-serif">
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/></filter>
  </defs>
  <rect width="800" height="500" fill="white"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-size="20" font-weight="600" fill="#1E293B">The Three MCP Primitives</text>

  <!-- Tools Column (Blue) -->
  <rect x="40" y="70" width="226" height="310" rx="8" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="40" y="70" width="226" height="44" rx="8" fill="#3B82F6"/>
  <rect x="40" y="106" width="226" height="8" fill="#3B82F6"/>
  <text x="153" y="98" text-anchor="middle" font-size="16" font-weight="600" fill="white">Tools</text>

  <!-- Control badge -->
  <rect x="80" y="130" width="146" height="28" rx="14" fill="#DBEAFE"/>
  <text x="153" y="149" text-anchor="middle" font-size="12" font-weight="600" fill="#3B82F6">Model-Controlled</text>

  <!-- Claude icon (simplified brain) -->
  <circle cx="153" cy="190" r="22" fill="white" stroke="#3B82F6" stroke-width="2"/>
  <text x="153" y="195" text-anchor="middle" font-size="18" fill="#3B82F6">AI</text>

  <text x="153" y="232" text-anchor="middle" font-size="12" fill="#1E293B" font-weight="500">Claude decides</text>
  <text x="153" y="248" text-anchor="middle" font-size="12" fill="#1E293B" font-weight="500">when to call</text>

  <!-- Divider -->
  <line x1="65" y1="268" x2="241" y2="268" stroke="#BFDBFE" stroke-width="1"/>

  <!-- Use cases -->
  <text x="153" y="290" text-anchor="middle" font-size="11" fill="#6B7280" font-weight="500">Use Cases:</text>
  <text x="153" y="310" text-anchor="middle" font-size="11" fill="#6B7280">Search files</text>
  <text x="153" y="328" text-anchor="middle" font-size="11" fill="#6B7280">Create issues</text>
  <text x="153" y="346" text-anchor="middle" font-size="11" fill="#6B7280">Run queries</text>
  <text x="153" y="364" text-anchor="middle" font-size="11" fill="#6B7280">Send messages</text>

  <!-- Resources Column (Green) -->
  <rect x="287" y="70" width="226" height="310" rx="8" fill="#F0FDF4" stroke="#22C55E" stroke-width="2" filter="url(#shadow)"/>
  <rect x="287" y="70" width="226" height="44" rx="8" fill="#22C55E"/>
  <rect x="287" y="106" width="226" height="8" fill="#22C55E"/>
  <text x="400" y="98" text-anchor="middle" font-size="16" font-weight="600" fill="white">Resources</text>

  <!-- Control badge -->
  <rect x="330" y="130" width="140" height="28" rx="14" fill="#DCFCE7"/>
  <text x="400" y="149" text-anchor="middle" font-size="12" font-weight="600" fill="#22C55E">App-Controlled</text>

  <!-- Code icon -->
  <circle cx="400" cy="190" r="22" fill="white" stroke="#22C55E" stroke-width="2"/>
  <text x="400" y="196" text-anchor="middle" font-size="16" fill="#22C55E" font-weight="600">&lt;/&gt;</text>

  <text x="400" y="232" text-anchor="middle" font-size="12" fill="#1E293B" font-weight="500">Your code</text>
  <text x="400" y="248" text-anchor="middle" font-size="12" fill="#1E293B" font-weight="500">fetches data</text>

  <!-- Divider -->
  <line x1="312" y1="268" x2="488" y2="268" stroke="#BBF7D0" stroke-width="1"/>

  <!-- Use cases -->
  <text x="400" y="290" text-anchor="middle" font-size="11" fill="#6B7280" font-weight="500">Use Cases:</text>
  <text x="400" y="310" text-anchor="middle" font-size="11" fill="#6B7280">Load documents</text>
  <text x="400" y="328" text-anchor="middle" font-size="11" fill="#6B7280">Read config files</text>
  <text x="400" y="346" text-anchor="middle" font-size="11" fill="#6B7280">Fetch DB records</text>
  <text x="400" y="364" text-anchor="middle" font-size="11" fill="#6B7280">Provide context</text>

  <!-- Prompts Column (Purple) -->
  <rect x="534" y="70" width="226" height="310" rx="8" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="534" y="70" width="226" height="44" rx="8" fill="#8B5CF6"/>
  <rect x="534" y="106" width="226" height="8" fill="#8B5CF6"/>
  <text x="647" y="98" text-anchor="middle" font-size="16" font-weight="600" fill="white">Prompts</text>

  <!-- Control badge -->
  <rect x="577" y="130" width="140" height="28" rx="14" fill="#EDE9FE"/>
  <text x="647" y="149" text-anchor="middle" font-size="12" font-weight="600" fill="#8B5CF6">User-Controlled</text>

  <!-- User icon -->
  <circle cx="647" cy="190" r="22" fill="white" stroke="#8B5CF6" stroke-width="2"/>
  <circle cx="647" cy="183" r="7" fill="#8B5CF6"/>
  <path d="M 633 200 Q 647 208 661 200" stroke="#8B5CF6" stroke-width="2.5" fill="none"/>

  <text x="647" y="232" text-anchor="middle" font-size="12" fill="#1E293B" font-weight="500">User triggers</text>
  <text x="647" y="248" text-anchor="middle" font-size="12" fill="#1E293B" font-weight="500">workflows</text>

  <!-- Divider -->
  <line x1="559" y1="268" x2="735" y2="268" stroke="#DDD6FE" stroke-width="1"/>

  <!-- Use cases -->
  <text x="647" y="290" text-anchor="middle" font-size="11" fill="#6B7280" font-weight="500">Use Cases:</text>
  <text x="647" y="310" text-anchor="middle" font-size="11" fill="#6B7280">Code review</text>
  <text x="647" y="328" text-anchor="middle" font-size="11" fill="#6B7280">Summarize docs</text>
  <text x="647" y="346" text-anchor="middle" font-size="11" fill="#6B7280">Debug workflows</text>
  <text x="647" y="364" text-anchor="middle" font-size="11" fill="#6B7280">Generate reports</text>

  <!-- Bottom summary -->
  <rect x="100" y="420" width="600" height="60" rx="8" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1"/>
  <text x="400" y="445" text-anchor="middle" font-size="13" fill="#1E293B" font-weight="500">Each primitive serves a different control pattern in the MCP ecosystem.</text>
  <text x="400" y="465" text-anchor="middle" font-size="11" fill="#6B7280">Tools = actions | Resources = data | Prompts = templates</text>
</svg>