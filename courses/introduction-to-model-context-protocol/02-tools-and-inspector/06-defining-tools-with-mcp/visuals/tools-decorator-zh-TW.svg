<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="PingFang TC, SF Pro Display, sans-serif">
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/></filter>
  </defs>
  <rect width="800" height="500" fill="white"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-size="20" font-weight="600" fill="#1E293B">從裝飾器到 JSON Schema</text>

  <!-- Left: Python Code -->
  <rect x="30" y="70" width="330" height="340" rx="8" fill="#1E293B" filter="url(#shadow)"/>
  <rect x="30" y="70" width="330" height="36" rx="8" fill="#334155"/>
  <rect x="30" y="98" width="330" height="8" fill="#334155"/>
  <circle cx="50" cy="88" r="5" fill="#EF4444"/>
  <circle cx="66" cy="88" r="5" fill="#FB923C"/>
  <circle cx="82" cy="88" r="5" fill="#22C55E"/>
  <text x="195" y="92" text-anchor="middle" font-size="11" fill="#94A3B8">Python</text>

  <text x="48" y="130" font-size="12" fill="#94A3B8" font-family="SF Mono, Menlo, monospace">
    <tspan fill="#C084FC">@mcp.tool</tspan><tspan fill="#94A3B8">()</tspan>
  </text>
  <text x="48" y="152" font-size="12" font-family="SF Mono, Menlo, monospace">
    <tspan fill="#C084FC">async def</tspan><tspan fill="#93C5FD"> search_issues</tspan><tspan fill="#94A3B8">(</tspan>
  </text>
  <text x="48" y="174" font-size="12" font-family="SF Mono, Menlo, monospace">
    <tspan fill="#94A3B8">    query</tspan><tspan fill="#94A3B8">: </tspan><tspan fill="#22C55E">str</tspan><tspan fill="#94A3B8">,</tspan>
  </text>
  <text x="48" y="196" font-size="12" font-family="SF Mono, Menlo, monospace">
    <tspan fill="#94A3B8">    repo</tspan><tspan fill="#94A3B8">: </tspan><tspan fill="#22C55E">str</tspan><tspan fill="#94A3B8">,</tspan>
  </text>
  <text x="48" y="218" font-size="12" font-family="SF Mono, Menlo, monospace">
    <tspan fill="#94A3B8">    max_results</tspan><tspan fill="#94A3B8">: </tspan><tspan fill="#22C55E">int</tspan><tspan fill="#94A3B8"> = </tspan><tspan fill="#FB923C">10</tspan>
  </text>
  <text x="48" y="240" font-size="12" font-family="SF Mono, Menlo, monospace">
    <tspan fill="#94A3B8">) -> </tspan><tspan fill="#22C55E">list</tspan><tspan fill="#94A3B8">[</tspan><tspan fill="#22C55E">str</tspan><tspan fill="#94A3B8">]:</tspan>
  </text>
  <text x="48" y="268" font-size="12" font-family="SF Mono, Menlo, monospace">
    <tspan fill="#6B7280">    """搜尋 GitHub Issues</tspan>
  </text>
  <text x="48" y="290" font-size="12" font-family="SF Mono, Menlo, monospace">
    <tspan fill="#6B7280">    在指定的 Repository 中"""</tspan>
  </text>
  <text x="48" y="318" font-size="12" font-family="SF Mono, Menlo, monospace">
    <tspan fill="#94A3B8">    ...</tspan>
  </text>

  <rect x="68" y="350" width="90" height="24" rx="12" fill="#3B82F6" opacity="0.2"/>
  <text x="113" y="367" text-anchor="middle" font-size="10" fill="#3B82F6" font-weight="600">你的程式碼</text>

  <!-- Arrow -->
  <line x1="370" y1="240" x2="430" y2="240" stroke="#3B82F6" stroke-width="2.5"/>
  <polygon points="430 234, 442 240, 430 246" fill="#3B82F6"/>
  <rect x="366" y="256" width="80" height="32" rx="6" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="406" y="270" text-anchor="middle" font-size="9" fill="#3B82F6" font-weight="600">SDK 自動</text>
  <text x="406" y="282" text-anchor="middle" font-size="9" fill="#3B82F6" font-weight="600">產生</text>

  <!-- Right: JSON Schema -->
  <rect x="450" y="70" width="320" height="340" rx="8" fill="#1E293B" filter="url(#shadow)"/>
  <rect x="450" y="70" width="320" height="36" rx="8" fill="#334155"/>
  <rect x="450" y="98" width="320" height="8" fill="#334155"/>
  <circle cx="470" cy="88" r="5" fill="#EF4444"/>
  <circle cx="486" cy="88" r="5" fill="#FB923C"/>
  <circle cx="502" cy="88" r="5" fill="#22C55E"/>
  <text x="610" y="92" text-anchor="middle" font-size="11" fill="#94A3B8">JSON Schema</text>

  <text x="468" y="130" font-size="11" font-family="SF Mono, Menlo, monospace">
    <tspan fill="#94A3B8">{</tspan>
  </text>
  <text x="468" y="150" font-size="11" font-family="SF Mono, Menlo, monospace">
    <tspan fill="#93C5FD">  "name"</tspan><tspan fill="#94A3B8">: </tspan><tspan fill="#22C55E">"search_issues"</tspan><tspan fill="#94A3B8">,</tspan>
  </text>
  <text x="468" y="170" font-size="11" font-family="SF Mono, Menlo, monospace">
    <tspan fill="#93C5FD">  "description"</tspan><tspan fill="#94A3B8">:</tspan>
  </text>
  <text x="468" y="190" font-size="11" font-family="SF Mono, Menlo, monospace">
    <tspan fill="#22C55E">    "搜尋 GitHub Issues..."</tspan><tspan fill="#94A3B8">,</tspan>
  </text>
  <text x="468" y="210" font-size="11" font-family="SF Mono, Menlo, monospace">
    <tspan fill="#93C5FD">  "inputSchema"</tspan><tspan fill="#94A3B8">: {</tspan>
  </text>
  <text x="468" y="230" font-size="11" font-family="SF Mono, Menlo, monospace">
    <tspan fill="#93C5FD">    "properties"</tspan><tspan fill="#94A3B8">: {</tspan>
  </text>
  <text x="468" y="250" font-size="11" font-family="SF Mono, Menlo, monospace">
    <tspan fill="#93C5FD">      "query"</tspan><tspan fill="#94A3B8">: {</tspan><tspan fill="#93C5FD">"type"</tspan><tspan fill="#94A3B8">:</tspan><tspan fill="#22C55E">"string"</tspan><tspan fill="#94A3B8">},</tspan>
  </text>
  <text x="468" y="270" font-size="11" font-family="SF Mono, Menlo, monospace">
    <tspan fill="#93C5FD">      "repo"</tspan><tspan fill="#94A3B8">: {</tspan><tspan fill="#93C5FD">"type"</tspan><tspan fill="#94A3B8">:</tspan><tspan fill="#22C55E">"string"</tspan><tspan fill="#94A3B8">},</tspan>
  </text>
  <text x="468" y="290" font-size="11" font-family="SF Mono, Menlo, monospace">
    <tspan fill="#93C5FD">      "max_results"</tspan><tspan fill="#94A3B8">: {</tspan>
  </text>
  <text x="468" y="310" font-size="11" font-family="SF Mono, Menlo, monospace">
    <tspan fill="#93C5FD">        "type"</tspan><tspan fill="#94A3B8">:</tspan><tspan fill="#22C55E">"integer"</tspan><tspan fill="#94A3B8">,</tspan>
    <tspan fill="#93C5FD">"default"</tspan><tspan fill="#94A3B8">:</tspan><tspan fill="#FB923C">10</tspan>
  </text>
  <text x="468" y="330" font-size="11" font-family="SF Mono, Menlo, monospace">
    <tspan fill="#94A3B8">    }},</tspan>
  </text>
  <text x="468" y="350" font-size="11" font-family="SF Mono, Menlo, monospace">
    <tspan fill="#93C5FD">    "required"</tspan><tspan fill="#94A3B8">: [</tspan><tspan fill="#22C55E">"query"</tspan><tspan fill="#94A3B8">,</tspan><tspan fill="#22C55E">"repo"</tspan><tspan fill="#94A3B8">]</tspan>
  </text>
  <text x="468" y="370" font-size="11" font-family="SF Mono, Menlo, monospace">
    <tspan fill="#94A3B8">  }}</tspan>
  </text>
  <text x="468" y="390" font-size="11" font-family="SF Mono, Menlo, monospace">
    <tspan fill="#94A3B8">}</tspan>
  </text>

  <rect x="628" y="350" width="120" height="24" rx="12" fill="#22C55E" opacity="0.2"/>
  <text x="688" y="367" text-anchor="middle" font-size="10" fill="#22C55E" font-weight="600">傳送給 Claude</text>

  <!-- Bottom note -->
  <rect x="100" y="440" width="600" height="44" rx="8" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1"/>
  <text x="400" y="460" text-anchor="middle" font-size="12" fill="#1E293B" font-weight="500">MCP SDK 會檢查你的 Python 函式，自動產生 JSON Schema</text>
  <text x="400" y="476" text-anchor="middle" font-size="11" fill="#6B7280">型別提示、預設值和文件字串都會成為 Tool 定義的一部分</text>
</svg>