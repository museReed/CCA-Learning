<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 680" font-family="PingFang TC, SF Pro Display, sans-serif">
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/></filter>
  </defs>
  <rect width="800" height="680" fill="white"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-size="20" font-weight="600" fill="#1E293B">MCP 訊息流程</text>

  <!-- Column headers -->
  <rect x="60" y="52" width="100" height="36" rx="8" fill="#F1F5F9" stroke="#1E293B" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="110" y="75" text-anchor="middle" font-size="13" font-weight="600" fill="#1E293B">使用者</text>

  <rect x="230" y="52" width="120" height="36" rx="8" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="290" y="75" text-anchor="middle" font-size="13" font-weight="600" fill="#3B82F6">你的 Server</text>

  <rect x="430" y="52" width="120" height="36" rx="8" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="490" y="69" text-anchor="middle" font-size="12" font-weight="600" fill="#8B5CF6">MCP Client</text>
  <text x="490" y="83" text-anchor="middle" font-size="10" fill="#8B5CF6">/ Server</text>

  <rect x="630" y="52" width="110" height="36" rx="8" fill="#FFF7ED" stroke="#FB923C" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="685" y="75" text-anchor="middle" font-size="13" font-weight="600" fill="#FB923C">Claude</text>

  <!-- Lifelines -->
  <line x1="110" y1="88" x2="110" y2="650" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="290" y1="88" x2="290" y2="650" stroke="#93C5FD" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="490" y1="88" x2="490" y2="650" stroke="#C4B5FD" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="685" y1="88" x2="685" y2="650" stroke="#FDBA74" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Arrow markers -->
  <defs>
    <marker id="aRight" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1E293B"/>
    </marker>
    <marker id="aLeft" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <polygon points="8 0, 0 3, 8 6" fill="#1E293B"/>
    </marker>
    <marker id="aBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3B82F6"/>
    </marker>
    <marker id="aPurpleL" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <polygon points="8 0, 0 3, 8 6" fill="#8B5CF6"/>
    </marker>
    <marker id="aOrangeL" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <polygon points="8 0, 0 3, 8 6" fill="#FB923C"/>
    </marker>
    <marker id="aGreenL" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <polygon points="8 0, 0 3, 8 6" fill="#22C55E"/>
    </marker>
  </defs>

  <!-- Step 1 -->
  <line x1="114" y1="118" x2="286" y2="118" stroke="#1E293B" stroke-width="1.5" marker-end="url(#aRight)"/>
  <rect x="148" y="104" width="108" height="18" rx="4" fill="#F1F5F9"/>
  <text x="202" y="116" text-anchor="middle" font-size="10" fill="#1E293B" font-weight="500">1. 使用者提問</text>

  <!-- Step 2 -->
  <line x1="294" y1="148" x2="486" y2="148" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#aBlue)"/>
  <rect x="340" y="134" width="100" height="18" rx="4" fill="#EFF6FF"/>
  <text x="390" y="146" text-anchor="middle" font-size="10" fill="#3B82F6" font-weight="500">2. 列出 Tools</text>

  <!-- Step 3 -->
  <line x1="494" y1="178" x2="494" y2="198" stroke="#8B5CF6" stroke-width="1.5"/>
  <rect x="500" y="170" width="130" height="18" rx="4" fill="#F5F3FF"/>
  <text x="565" y="182" text-anchor="middle" font-size="10" fill="#8B5CF6" font-weight="500">3. ListToolsRequest</text>
  <text x="565" y="196" text-anchor="middle" font-size="9" fill="#8B5CF6">（內部處理）</text>

  <!-- Step 4 -->
  <line x1="486" y1="218" x2="294" y2="218" stroke="#8B5CF6" stroke-width="1.5" marker-end="url(#aPurpleL)"/>
  <rect x="340" y="204" width="100" height="18" rx="4" fill="#F5F3FF"/>
  <text x="390" y="216" text-anchor="middle" font-size="10" fill="#8B5CF6" font-weight="500">4. ListToolsResult</text>

  <!-- Step 5 -->
  <line x1="294" y1="248" x2="681" y2="248" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#aBlue)"/>
  <rect x="390" y="234" width="180" height="18" rx="4" fill="#EFF6FF"/>
  <text x="480" y="246" text-anchor="middle" font-size="10" fill="#3B82F6" font-weight="500">5. 傳送提問 + Tool 定義</text>

  <!-- Step 6 -->
  <line x1="681" y1="278" x2="294" y2="278" stroke="#FB923C" stroke-width="1.5" marker-end="url(#aOrangeL)"/>
  <rect x="390" y="264" width="180" height="18" rx="4" fill="#FFF7ED"/>
  <text x="480" y="276" text-anchor="middle" font-size="10" fill="#FB923C" font-weight="500">6. Claude 決定：使用 Tool</text>

  <!-- Step 7 -->
  <line x1="294" y1="308" x2="486" y2="308" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#aBlue)"/>
  <rect x="336" y="294" width="108" height="18" rx="4" fill="#EFF6FF"/>
  <text x="390" y="306" text-anchor="middle" font-size="10" fill="#3B82F6" font-weight="500">7. 執行 Tool</text>

  <!-- Step 8 -->
  <line x1="494" y1="338" x2="494" y2="358" stroke="#8B5CF6" stroke-width="1.5"/>
  <rect x="500" y="330" width="130" height="18" rx="4" fill="#F5F3FF"/>
  <text x="565" y="342" text-anchor="middle" font-size="10" fill="#8B5CF6" font-weight="500">8. CallToolRequest</text>
  <text x="565" y="356" text-anchor="middle" font-size="9" fill="#8B5CF6">（呼叫外部服務）</text>

  <!-- Step 9 -->
  <line x1="486" y1="378" x2="294" y2="378" stroke="#22C55E" stroke-width="1.5" marker-end="url(#aGreenL)"/>
  <rect x="340" y="364" width="100" height="18" rx="4" fill="#F0FDF4"/>
  <text x="390" y="376" text-anchor="middle" font-size="10" fill="#22C55E" font-weight="500">9. CallToolResult</text>

  <!-- Step 10 -->
  <line x1="294" y1="408" x2="681" y2="408" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#aBlue)"/>
  <rect x="390" y="394" width="170" height="18" rx="4" fill="#EFF6FF"/>
  <text x="475" y="406" text-anchor="middle" font-size="10" fill="#3B82F6" font-weight="500">10. Tool 結果傳給 Claude</text>

  <!-- Step 11 -->
  <line x1="681" y1="438" x2="294" y2="438" stroke="#FB923C" stroke-width="1.5" marker-end="url(#aOrangeL)"/>
  <rect x="400" y="424" width="150" height="18" rx="4" fill="#FFF7ED"/>
  <text x="475" y="436" text-anchor="middle" font-size="10" fill="#FB923C" font-weight="500">11. 最終回應</text>

  <!-- Step 12 -->
  <line x1="286" y1="468" x2="114" y2="468" stroke="#1E293B" stroke-width="1.5" marker-end="url(#aLeft)"/>
  <rect x="148" y="454" width="108" height="18" rx="4" fill="#F1F5F9"/>
  <text x="202" y="466" text-anchor="middle" font-size="10" fill="#1E293B" font-weight="500">12. 回覆使用者</text>

  <!-- Phase labels -->
  <rect x="20" y="100" width="70" height="80" rx="6" fill="#F1F5F9" opacity="0.6"/>
  <text x="55" y="140" text-anchor="middle" font-size="9" fill="#6B7280" font-weight="500">探索</text>
  <text x="55" y="154" text-anchor="middle" font-size="9" fill="#6B7280">階段</text>

  <rect x="20" y="230" width="70" height="60" rx="6" fill="#EFF6FF" opacity="0.6"/>
  <text x="55" y="260" text-anchor="middle" font-size="9" fill="#3B82F6" font-weight="500">LLM</text>
  <text x="55" y="274" text-anchor="middle" font-size="9" fill="#3B82F6">決策</text>

  <rect x="20" y="295" width="70" height="100" rx="6" fill="#F0FDF4" opacity="0.6"/>
  <text x="55" y="345" text-anchor="middle" font-size="9" fill="#22C55E" font-weight="500">Tool</text>
  <text x="55" y="359" text-anchor="middle" font-size="9" fill="#22C55E">執行</text>

  <rect x="20" y="400" width="70" height="90" rx="6" fill="#FFF7ED" opacity="0.6"/>
  <text x="55" y="445" text-anchor="middle" font-size="9" fill="#FB923C" font-weight="500">回應</text>
  <text x="55" y="459" text-anchor="middle" font-size="9" fill="#FB923C">階段</text>

  <!-- Bottom note -->
  <rect x="140" y="510" width="520" height="44" rx="8" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1"/>
  <text x="400" y="530" text-anchor="middle" font-size="11" fill="#1E293B" font-weight="500">MCP Client 負責管理你的 Server 與 MCP Server 之間的所有協議通訊</text>
  <text x="400" y="546" text-anchor="middle" font-size="10" fill="#6B7280">步驟 3-4 及 8-9 透過 JSON-RPC 在 MCP 傳輸層上進行</text>
</svg>