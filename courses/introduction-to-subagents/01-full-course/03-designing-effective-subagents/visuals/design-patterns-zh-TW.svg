<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 560" width="560" height="560">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="100%" style="stop-color:#1E293B"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#2563EB"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22C55E"/>
      <stop offset="100%" style="stop-color:#16A34A"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="560" height="560" rx="16" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="280" y="38" text-anchor="middle" fill="#F8FAFC" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="700">子代理設計模式</text>
  <text x="280" y="58" text-anchor="middle" fill="#94A3B8" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="12">三種經驗證的有效任務委派模式</text>

  <!-- Pattern 1: Specialist -->
  <rect x="25" y="78" width="160" height="260" rx="12" fill="#1E293B" stroke="#3B82F6" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="25" y="78" width="160" height="40" rx="12" fill="url(#blueGrad)"/>
  <rect x="25" y="105" width="160" height="13" fill="url(#blueGrad)"/>
  <circle cx="57" cy="98" r="12" fill="rgba(255,255,255,0.15)"/>
  <text x="57" y="103" text-anchor="middle" fill="#FFF" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="14">S</text>
  <text x="120" y="103" text-anchor="middle" fill="#FFF" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="13" font-weight="700">專家型</text>

  <text x="105" y="140" text-anchor="middle" fill="#60A5FA" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="10" font-weight="600">深度專業知識</text>

  <rect x="37" y="154" width="136" height="1" fill="#334155"/>

  <text x="105" y="175" text-anchor="middle" fill="#CBD5E1" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="10">專注於單一領域</text>
  <text x="105" y="195" text-anchor="middle" fill="#CBD5E1" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="10">例如：TypeScript 型別</text>
  <text x="105" y="210" text-anchor="middle" fill="#CBD5E1" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="10">SQL 最佳化</text>
  <text x="105" y="225" text-anchor="middle" fill="#CBD5E1" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="10">安全性審計</text>

  <rect x="37" y="240" width="136" height="1" fill="#334155"/>

  <text x="105" y="260" text-anchor="middle" fill="#94A3B8" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="9">工具：領域專用</text>
  <text x="105" y="276" text-anchor="middle" fill="#94A3B8" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="9">提示：專家系統</text>
  <text x="105" y="292" text-anchor="middle" fill="#94A3B8" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="9">上下文：高度聚焦</text>

  <rect x="45" y="308" width="120" height="20" rx="10" fill="#0F2A1A" stroke="#22C55E" stroke-width="1"/>
  <text x="105" y="322" text-anchor="middle" fill="#22C55E" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="9" font-weight="600">最適合：精確任務</text>

  <!-- Pattern 2: Explorer -->
  <rect x="200" y="78" width="160" height="260" rx="12" fill="#1E293B" stroke="#22C55E" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="200" y="78" width="160" height="40" rx="12" fill="url(#greenGrad)"/>
  <rect x="200" y="105" width="160" height="13" fill="url(#greenGrad)"/>
  <circle cx="232" cy="98" r="12" fill="rgba(255,255,255,0.15)"/>
  <text x="232" y="103" text-anchor="middle" fill="#FFF" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="14">E</text>
  <text x="295" y="103" text-anchor="middle" fill="#FFF" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="13" font-weight="700">探索型</text>

  <text x="280" y="140" text-anchor="middle" fill="#4ADE80" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="10" font-weight="600">程式碼庫搜尋</text>

  <rect x="212" y="154" width="136" height="1" fill="#334155"/>

  <text x="280" y="175" text-anchor="middle" fill="#CBD5E1" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="10">瀏覽大型程式碼庫</text>
  <text x="280" y="195" text-anchor="middle" fill="#CBD5E1" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="10">例如：查找所有用法</text>
  <text x="280" y="210" text-anchor="middle" fill="#CBD5E1" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="10">映射依賴關係</text>
  <text x="280" y="225" text-anchor="middle" fill="#CBD5E1" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="10">發現程式模式</text>

  <rect x="212" y="240" width="136" height="1" fill="#334155"/>

  <text x="280" y="260" text-anchor="middle" fill="#94A3B8" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="9">工具：Glob、Grep、Read</text>
  <text x="280" y="276" text-anchor="middle" fill="#94A3B8" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="9">提示：搜尋策略</text>
  <text x="280" y="292" text-anchor="middle" fill="#94A3B8" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="9">上下文：唯讀</text>

  <rect x="220" y="308" width="120" height="20" rx="10" fill="#0F2A1A" stroke="#22C55E" stroke-width="1"/>
  <text x="280" y="322" text-anchor="middle" fill="#22C55E" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="9" font-weight="600">最適合：發現探索</text>

  <!-- Pattern 3: Reviewer -->
  <rect x="375" y="78" width="160" height="260" rx="12" fill="#1E293B" stroke="#8B5CF6" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="375" y="78" width="160" height="40" rx="12" fill="url(#purpleGrad)"/>
  <rect x="375" y="105" width="160" height="13" fill="url(#purpleGrad)"/>
  <circle cx="407" cy="98" r="12" fill="rgba(255,255,255,0.15)"/>
  <text x="407" y="103" text-anchor="middle" fill="#FFF" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="14">R</text>
  <text x="470" y="103" text-anchor="middle" fill="#FFF" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="13" font-weight="700">審查型</text>

  <text x="455" y="140" text-anchor="middle" fill="#A78BFA" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="10" font-weight="600">程式碼審查</text>

  <rect x="387" y="154" width="136" height="1" fill="#334155"/>

  <text x="455" y="175" text-anchor="middle" fill="#CBD5E1" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="10">分析程式碼品質</text>
  <text x="455" y="195" text-anchor="middle" fill="#CBD5E1" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="10">例如：查找 Bug</text>
  <text x="455" y="210" text-anchor="middle" fill="#CBD5E1" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="10">檢查風格合規性</text>
  <text x="455" y="225" text-anchor="middle" fill="#CBD5E1" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="10">建議改進方案</text>

  <rect x="387" y="240" width="136" height="1" fill="#334155"/>

  <text x="455" y="260" text-anchor="middle" fill="#94A3B8" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="9">工具：Read、Bash (lint)</text>
  <text x="455" y="276" text-anchor="middle" fill="#94A3B8" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="9">提示：審查標準</text>
  <text x="455" y="292" text-anchor="middle" fill="#94A3B8" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="9">上下文：無寫入權限</text>

  <rect x="395" y="308" width="120" height="20" rx="10" fill="#1A0F2E" stroke="#8B5CF6" stroke-width="1"/>
  <text x="455" y="322" text-anchor="middle" fill="#8B5CF6" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="9" font-weight="600">最適合：品質把關</text>

  <!-- Isolation Benefit Section -->
  <rect x="25" y="358" width="510" height="180" rx="12" fill="#0F172A" stroke="#334155" stroke-width="1" filter="url(#shadow)"/>
  <text x="280" y="384" text-anchor="middle" fill="#F8FAFC" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="14" font-weight="700">隔離優勢：獨立上下文視窗</text>

  <!-- Without isolation -->
  <rect x="45" y="400" width="220" height="120" rx="8" fill="#1E293B" stroke="#EF4444" stroke-width="1"/>
  <text x="155" y="420" text-anchor="middle" fill="#EF4444" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="11" font-weight="600">未隔離</text>
  <rect x="60" y="430" width="190" height="16" rx="4" fill="#2A1A1A"/>
  <rect x="60" y="430" width="190" height="16" rx="4" fill="#EF4444" opacity="0.15"/>
  <text x="155" y="442" text-anchor="middle" fill="#FCA5A5" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="9">任務 A 程式碼填滿上下文...</text>
  <rect x="60" y="450" width="190" height="16" rx="4" fill="#EF4444" opacity="0.1"/>
  <text x="155" y="462" text-anchor="middle" fill="#FCA5A5" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="9">任務 B 得到被污染的上下文</text>
  <rect x="60" y="470" width="190" height="16" rx="4" fill="#EF4444" opacity="0.05"/>
  <text x="155" y="482" text-anchor="middle" fill="#FCA5A5" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="9">任務 C：上下文空間不足！</text>
  <rect x="60" y="495" width="190" height="16" rx="8" fill="#7F1D1D"/>
  <text x="155" y="507" text-anchor="middle" fill="#FCA5A5" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="9" font-weight="600">上下文溢位 / 品質下降</text>

  <!-- With isolation -->
  <rect x="295" y="400" width="220" height="120" rx="8" fill="#1E293B" stroke="#22C55E" stroke-width="1"/>
  <text x="405" y="420" text-anchor="middle" fill="#22C55E" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="11" font-weight="600">已隔離</text>
  <rect x="310" y="432" width="55" height="40" rx="4" fill="#0F2A1A" stroke="#22C55E" stroke-width="0.5"/>
  <text x="337" y="450" text-anchor="middle" fill="#4ADE80" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="8">任務 A</text>
  <text x="337" y="463" text-anchor="middle" fill="#4ADE80" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="7">全新上下文</text>
  <rect x="373" y="432" width="55" height="40" rx="4" fill="#0F2A1A" stroke="#22C55E" stroke-width="0.5"/>
  <text x="400" y="450" text-anchor="middle" fill="#4ADE80" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="8">任務 B</text>
  <text x="400" y="463" text-anchor="middle" fill="#4ADE80" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="7">全新上下文</text>
  <rect x="436" y="432" width="55" height="40" rx="4" fill="#0F2A1A" stroke="#22C55E" stroke-width="0.5"/>
  <text x="463" y="450" text-anchor="middle" fill="#4ADE80" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="8">任務 C</text>
  <text x="463" y="463" text-anchor="middle" fill="#4ADE80" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="7">全新上下文</text>
  <rect x="310" y="495" width="190" height="16" rx="8" fill="#052E16"/>
  <text x="405" y="507" text-anchor="middle" fill="#4ADE80" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="9" font-weight="600">每個任務：完整上下文容量</text>
</svg>