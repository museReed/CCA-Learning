<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 560" width="560" height="560">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="100%" style="stop-color:#1E293B"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#2563EB"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22C55E"/>
      <stop offset="100%" style="stop-color:#16A34A"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#EF4444"/>
      <stop offset="100%" style="stop-color:#DC2626"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#22C55E"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#EF4444"/>
    </marker>
  </defs>

  <rect width="560" height="560" rx="16" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="280" y="38" text-anchor="middle" fill="#F8FAFC" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="700">何時使用子代理</text>
  <text x="280" y="58" text-anchor="middle" fill="#94A3B8" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="12">有效協調的決策流程</text>

  <!-- Decision diamond -->
  <polygon points="280,80 370,120 280,160 190,120" fill="#1E293B" stroke="#3B82F6" stroke-width="2" filter="url(#shadow)"/>
  <text x="280" y="117" text-anchor="middle" fill="#60A5FA" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="10" font-weight="700">任務是否</text>
  <text x="280" y="130" text-anchor="middle" fill="#60A5FA" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="10" font-weight="700">複雜？</text>

  <!-- Yes branch left -->
  <line x1="190" y1="120" x2="110" y2="120" stroke="#22C55E" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="155" y="112" fill="#22C55E" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="10" font-weight="600">是</text>

  <!-- No branch right -->
  <line x1="370" y1="120" x2="450" y2="120" stroke="#EF4444" stroke-width="2" marker-end="url(#arrowRed)"/>
  <text x="405" y="112" fill="#EF4444" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="10" font-weight="600">否</text>

  <!-- Use Subagents box -->
  <rect x="20" y="90" width="90" height="60" rx="8" fill="url(#greenGrad)" filter="url(#shadow)"/>
  <text x="65" y="118" text-anchor="middle" fill="#FFF" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="10" font-weight="700">使用</text>
  <text x="65" y="132" text-anchor="middle" fill="#FFF" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="10" font-weight="700">子代理</text>

  <!-- Handle directly box -->
  <rect x="450" y="90" width="90" height="60" rx="8" fill="url(#redGrad)" filter="url(#shadow)"/>
  <text x="495" y="118" text-anchor="middle" fill="#FFF" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="10" font-weight="700">直接</text>
  <text x="495" y="132" text-anchor="middle" fill="#FFF" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="10" font-weight="700">處理</text>

  <!-- Good Use Cases Section -->
  <rect x="20" y="175" width="250" height="355" rx="12" fill="#1E293B" stroke="#22C55E" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="20" y="175" width="250" height="32" rx="12" fill="url(#greenGrad)"/>
  <rect x="20" y="195" width="250" height="12" fill="url(#greenGrad)"/>
  <text x="145" y="196" text-anchor="middle" fill="#FFF" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="13" font-weight="700">適合使用子代理</text>

  <!-- Good case 1 -->
  <rect x="35" y="220" width="220" height="60" rx="8" fill="#0F2A1A" stroke="#22C55E" stroke-width="0.5"/>
  <text x="52" y="240" fill="#22C55E" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="700">1</text>
  <text x="72" y="240" fill="#F8FAFC" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="11" font-weight="600">複雜的多步驟任務</text>
  <text x="72" y="258" fill="#94A3B8" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="9">跨多個檔案重構，</text>
  <text x="72" y="270" fill="#94A3B8" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="9">端到端實作完整功能</text>

  <!-- Good case 2 -->
  <rect x="35" y="290" width="220" height="60" rx="8" fill="#0F2A1A" stroke="#22C55E" stroke-width="0.5"/>
  <text x="52" y="310" fill="#22C55E" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="700">2</text>
  <text x="72" y="310" fill="#F8FAFC" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="11" font-weight="600">平行獨立工作</text>
  <text x="72" y="328" fill="#94A3B8" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="9">搜尋 + 審查 + 編輯平行進行，</text>
  <text x="72" y="340" fill="#94A3B8" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="9">無需共享狀態</text>

  <!-- Good case 3 -->
  <rect x="35" y="360" width="220" height="60" rx="8" fill="#0F2A1A" stroke="#22C55E" stroke-width="0.5"/>
  <text x="52" y="380" fill="#22C55E" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="700">3</text>
  <text x="72" y="380" fill="#F8FAFC" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="11" font-weight="600">上下文密集的探索</text>
  <text x="72" y="398" fill="#94A3B8" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="9">大型程式碼庫搜尋，</text>
  <text x="72" y="410" fill="#94A3B8" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="9">會填滿主代理上下文</text>

  <!-- Good case 4 -->
  <rect x="35" y="430" width="220" height="60" rx="8" fill="#0F2A1A" stroke="#22C55E" stroke-width="0.5"/>
  <text x="52" y="450" fill="#22C55E" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="700">4</text>
  <text x="72" y="450" fill="#F8FAFC" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="11" font-weight="600">專門化的專業知識</text>
  <text x="72" y="468" fill="#94A3B8" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="9">安全性審計、效能審查、</text>
  <text x="72" y="480" fill="#94A3B8" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="9">領域專屬分析</text>

  <!-- Bad Use Cases Section -->
  <rect x="290" y="175" width="250" height="355" rx="12" fill="#1E293B" stroke="#EF4444" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="290" y="175" width="250" height="32" rx="12" fill="url(#redGrad)"/>
  <rect x="290" y="195" width="250" height="12" fill="url(#redGrad)"/>
  <text x="415" y="196" text-anchor="middle" fill="#FFF" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="13" font-weight="700">避免使用子代理</text>

  <!-- Bad case 1 -->
  <rect x="305" y="220" width="220" height="60" rx="8" fill="#2A1A1A" stroke="#EF4444" stroke-width="0.5"/>
  <text x="322" y="240" fill="#EF4444" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="700">1</text>
  <text x="342" y="240" fill="#F8FAFC" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="11" font-weight="600">簡單的單一查詢</text>
  <text x="342" y="258" fill="#94A3B8" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="9">快速查找、簡單編輯、</text>
  <text x="342" y="270" fill="#94A3B8" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="9">單步驟操作</text>

  <!-- Bad case 2 -->
  <rect x="305" y="290" width="220" height="60" rx="8" fill="#2A1A1A" stroke="#EF4444" stroke-width="0.5"/>
  <text x="322" y="310" fill="#EF4444" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="700">2</text>
  <text x="342" y="310" fill="#F8FAFC" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="11" font-weight="600">序列相依步驟</text>
  <text x="342" y="328" fill="#94A3B8" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="9">每個步驟依賴前一個結果，</text>
  <text x="342" y="340" fill="#94A3B8" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="9">無法平行化</text>

  <!-- Bad case 3 -->
  <rect x="305" y="360" width="220" height="60" rx="8" fill="#2A1A1A" stroke="#EF4444" stroke-width="0.5"/>
  <text x="322" y="380" fill="#EF4444" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="700">3</text>
  <text x="342" y="380" fill="#F8FAFC" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="11" font-weight="600">需要共享狀態</text>
  <text x="342" y="398" fill="#94A3B8" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="9">任務需要讀取彼此的上下文</text>
  <text x="342" y="410" fill="#94A3B8" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="9">或進行中的工作</text>

  <!-- Bad case 4 -->
  <rect x="305" y="430" width="220" height="60" rx="8" fill="#2A1A1A" stroke="#EF4444" stroke-width="0.5"/>
  <text x="322" y="450" fill="#EF4444" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="700">4</text>
  <text x="342" y="450" fill="#F8FAFC" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="11" font-weight="600">開銷不合理</text>
  <text x="342" y="468" fill="#94A3B8" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="9">子代理建立成本超過</text>
  <text x="342" y="480" fill="#94A3B8" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="9">瑣碎任務的效益</text>

  <!-- Summary counts -->
  <text x="240" y="505" fill="#22C55E" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="18" font-weight="700" text-anchor="middle">4/4</text>
  <text x="240" y="521" fill="#94A3B8" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="9" text-anchor="middle">適用場景</text>
  <text x="510" y="505" fill="#EF4444" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="18" font-weight="700" text-anchor="middle">4/4</text>
  <text x="510" y="521" fill="#94A3B8" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="9" text-anchor="middle">應避免場景</text>
</svg>