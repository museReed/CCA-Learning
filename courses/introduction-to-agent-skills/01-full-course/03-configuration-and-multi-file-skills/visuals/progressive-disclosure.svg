<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 540" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <filter id="shadow3">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="arrow3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94A3B8"/>
    </marker>
    <linearGradient id="blueG3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
    <linearGradient id="purpleG3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="orangeG3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#FBBF24"/>
    </linearGradient>
  </defs>
  <rect width="560" height="540" fill="url(#bg3)" rx="12"/>
  <text x="280" y="36" text-anchor="middle" fill="#F8FAFC" font-size="18" font-weight="700">Multi-File Skill Structure</text>
  <text x="280" y="56" text-anchor="middle" fill="#94A3B8" font-size="12">Progressive disclosure: sub-files loaded on demand</text>

  <!-- Main SKILL.md card -->
  <rect x="170" y="76" width="220" height="100" rx="10" fill="url(#blueG3)" filter="url(#shadow3)"/>
  <text x="280" y="100" text-anchor="middle" fill="#FFF" font-size="14" font-weight="700">SKILL.md</text>
  <text x="280" y="118" text-anchor="middle" fill="#DBEAFE" font-size="10">Entry point — always loaded first</text>
  <text x="280" y="136" text-anchor="middle" fill="#DBEAFE" font-size="10">Contains frontmatter + core instructions</text>
  <text x="280" y="154" text-anchor="middle" fill="#93C5FD" font-size="9">References sub-files for extended content</text>

  <!-- Arrows from SKILL.md -->
  <line x1="210" y1="176" x2="110" y2="220" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrow3)"/>
  <line x1="280" y1="176" x2="280" y2="220" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrow3)"/>
  <line x1="350" y1="176" x2="450" y2="220" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrow3)"/>

  <!-- Sub-file 1 -->
  <rect x="24" y="224" width="170" height="68" rx="8" fill="#1E293B" stroke="#8B5CF6" stroke-width="1.5" filter="url(#shadow3)"/>
  <text x="109" y="248" text-anchor="middle" fill="#A78BFA" font-size="11" font-weight="600">examples.md</text>
  <text x="109" y="264" text-anchor="middle" fill="#94A3B8" font-size="9">Code examples &amp; patterns</text>
  <text x="109" y="278" text-anchor="middle" fill="#64748B" font-size="8">Loaded when examples needed</text>

  <!-- Sub-file 2 -->
  <rect x="204" y="224" width="152" height="68" rx="8" fill="#1E293B" stroke="#22C55E" stroke-width="1.5" filter="url(#shadow3)"/>
  <text x="280" y="248" text-anchor="middle" fill="#4ADE80" font-size="11" font-weight="600">templates.md</text>
  <text x="280" y="264" text-anchor="middle" fill="#94A3B8" font-size="9">Output templates</text>
  <text x="280" y="278" text-anchor="middle" fill="#64748B" font-size="8">Loaded for formatting</text>

  <!-- Sub-file 3 -->
  <rect x="366" y="224" width="170" height="68" rx="8" fill="#1E293B" stroke="#F59E0B" stroke-width="1.5" filter="url(#shadow3)"/>
  <text x="451" y="248" text-anchor="middle" fill="#FBBF24" font-size="11" font-weight="600">guidelines.md</text>
  <text x="451" y="264" text-anchor="middle" fill="#94A3B8" font-size="9">Style &amp; convention rules</text>
  <text x="451" y="278" text-anchor="middle" fill="#64748B" font-size="8">Loaded for validation</text>

  <!-- Metadata fields section -->
  <rect x="40" y="324" width="480" height="180" rx="10" fill="#1E293B" stroke="#475569" stroke-width="1" filter="url(#shadow3)"/>
  <text x="280" y="348" text-anchor="middle" fill="#F8FAFC" font-size="13" font-weight="700">Frontmatter Configuration Fields</text>

  <!-- Field cards -->
  <rect x="60" y="362" width="110" height="56" rx="6" fill="#0F172A" stroke="#3B82F6" stroke-width="1"/>
  <text x="115" y="382" text-anchor="middle" fill="#3B82F6" font-size="10" font-weight="700">name</text>
  <text x="115" y="396" text-anchor="middle" fill="#94A3B8" font-size="8">Human-readable</text>
  <text x="115" y="408" text-anchor="middle" fill="#64748B" font-size="8">skill identifier</text>

  <rect x="185" y="362" width="110" height="56" rx="6" fill="#0F172A" stroke="#8B5CF6" stroke-width="1"/>
  <text x="240" y="382" text-anchor="middle" fill="#8B5CF6" font-size="10" font-weight="700">description</text>
  <text x="240" y="396" text-anchor="middle" fill="#94A3B8" font-size="8">Matching criteria</text>
  <text x="240" y="408" text-anchor="middle" fill="#64748B" font-size="8">for discovery</text>

  <rect x="310" y="362" width="110" height="56" rx="6" fill="#0F172A" stroke="#22C55E" stroke-width="1"/>
  <text x="365" y="382" text-anchor="middle" fill="#22C55E" font-size="10" font-weight="700">allowed-tools</text>
  <text x="365" y="396" text-anchor="middle" fill="#94A3B8" font-size="8">Restrict which</text>
  <text x="365" y="408" text-anchor="middle" fill="#64748B" font-size="8">tools skill can use</text>

  <rect x="60" y="430" width="110" height="56" rx="6" fill="#0F172A" stroke="#F59E0B" stroke-width="1"/>
  <text x="115" y="450" text-anchor="middle" fill="#F59E0B" font-size="10" font-weight="700">model</text>
  <text x="115" y="464" text-anchor="middle" fill="#94A3B8" font-size="8">Preferred model</text>
  <text x="115" y="476" text-anchor="middle" fill="#64748B" font-size="8">for this skill</text>

  <rect x="185" y="430" width="110" height="56" rx="6" fill="#0F172A" stroke="#EF4444" stroke-width="1"/>
  <text x="240" y="450" text-anchor="middle" fill="#EF4444" font-size="10" font-weight="700">validator</text>
  <text x="240" y="464" text-anchor="middle" fill="#94A3B8" font-size="8">Command to verify</text>
  <text x="240" y="476" text-anchor="middle" fill="#64748B" font-size="8">skill output</text>

  <rect x="310" y="430" width="110" height="56" rx="6" fill="#0F172A" stroke="#06B6D4" stroke-width="1"/>
  <text x="365" y="450" text-anchor="middle" fill="#06B6D4" font-size="10" font-weight="700">files</text>
  <text x="365" y="464" text-anchor="middle" fill="#94A3B8" font-size="8">Sub-files to</text>
  <text x="365" y="476" text-anchor="middle" fill="#64748B" font-size="8">reference</text>

  <!-- Bottom note -->
  <text x="280" y="524" text-anchor="middle" fill="#64748B" font-size="10">Multi-file skills keep context lean — only load what's needed for the current task</text>
</svg>