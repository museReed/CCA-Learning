<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 560" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <filter id="shadow6">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="arrow6" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94A3B8"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#EF4444"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22C55E"/>
    </marker>
  </defs>
  <rect width="560" height="560" fill="url(#bg6)" rx="12"/>
  <text x="280" y="36" text-anchor="middle" fill="#F8FAFC" font-size="18" font-weight="700">Troubleshooting Decision Tree</text>
  <text x="280" y="56" text-anchor="middle" fill="#94A3B8" font-size="12">Debug flow when a skill is not working as expected</text>

  <!-- Start: Problem -->
  <rect x="180" y="72" width="200" height="44" rx="10" fill="#EF4444" filter="url(#shadow6)"/>
  <text x="280" y="100" text-anchor="middle" fill="#FFF" font-size="13" font-weight="700">Skill Not Triggering?</text>

  <line x1="280" y1="116" x2="280" y2="144" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow6)"/>

  <!-- Check 1: Description Match -->
  <rect x="150" y="148" width="260" height="50" rx="8" fill="#1E293B" stroke="#3B82F6" stroke-width="1.5" filter="url(#shadow6)"/>
  <text x="168" y="170" fill="#3B82F6" font-size="10" font-weight="700">1</text>
  <text x="184" y="170" fill="#F8FAFC" font-size="11" font-weight="600">Check description match</text>
  <text x="184" y="186" fill="#94A3B8" font-size="9">Does your request match the skill description?</text>

  <!-- Yes/No branches from Check 1 -->
  <line x1="410" y1="173" x2="444" y2="173" stroke="#EF4444" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <rect x="448" y="158" width="96" height="30" rx="6" fill="#0F172A" stroke="#EF4444" stroke-width="1"/>
  <text x="496" y="178" text-anchor="middle" fill="#EF4444" font-size="9" font-weight="600">Rewrite description</text>

  <line x1="280" y1="198" x2="280" y2="222" stroke="#22C55E" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="294" y="214" fill="#22C55E" font-size="8">OK</text>

  <!-- Check 2: Validator -->
  <rect x="150" y="226" width="260" height="50" rx="8" fill="#1E293B" stroke="#8B5CF6" stroke-width="1.5" filter="url(#shadow6)"/>
  <text x="168" y="248" fill="#8B5CF6" font-size="10" font-weight="700">2</text>
  <text x="184" y="248" fill="#F8FAFC" font-size="11" font-weight="600">Check validator command</text>
  <text x="184" y="264" fill="#94A3B8" font-size="9">Is the validator passing or returning errors?</text>

  <line x1="410" y1="251" x2="444" y2="251" stroke="#EF4444" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <rect x="448" y="236" width="96" height="30" rx="6" fill="#0F172A" stroke="#EF4444" stroke-width="1"/>
  <text x="496" y="256" text-anchor="middle" fill="#EF4444" font-size="9" font-weight="600">Fix validator cmd</text>

  <line x1="280" y1="276" x2="280" y2="300" stroke="#22C55E" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="294" y="292" fill="#22C55E" font-size="8">OK</text>

  <!-- Check 3: Priority Order -->
  <rect x="150" y="304" width="260" height="50" rx="8" fill="#1E293B" stroke="#F59E0B" stroke-width="1.5" filter="url(#shadow6)"/>
  <text x="168" y="326" fill="#F59E0B" font-size="10" font-weight="700">3</text>
  <text x="184" y="326" fill="#F8FAFC" font-size="11" font-weight="600">Check priority order</text>
  <text x="184" y="342" fill="#94A3B8" font-size="9">Is another skill overriding yours?</text>

  <line x1="410" y1="329" x2="444" y2="329" stroke="#EF4444" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <rect x="448" y="314" width="96" height="30" rx="6" fill="#0F172A" stroke="#EF4444" stroke-width="1"/>
  <text x="496" y="334" text-anchor="middle" fill="#EF4444" font-size="9" font-weight="600">Adjust priority</text>

  <line x1="280" y1="354" x2="280" y2="378" stroke="#22C55E" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="294" y="370" fill="#22C55E" font-size="8">OK</text>

  <!-- Check 4: Debug Output -->
  <rect x="150" y="382" width="260" height="50" rx="8" fill="#1E293B" stroke="#06B6D4" stroke-width="1.5" filter="url(#shadow6)"/>
  <text x="168" y="404" fill="#06B6D4" font-size="10" font-weight="700">4</text>
  <text x="184" y="404" fill="#F8FAFC" font-size="11" font-weight="600">Run with --debug flag</text>
  <text x="184" y="420" fill="#94A3B8" font-size="9">claude --debug to see skill resolution logs</text>

  <line x1="410" y1="407" x2="444" y2="407" stroke="#EF4444" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <rect x="448" y="392" width="96" height="30" rx="6" fill="#0F172A" stroke="#EF4444" stroke-width="1"/>
  <text x="496" y="412" text-anchor="middle" fill="#EF4444" font-size="9" font-weight="600">Check logs</text>

  <line x1="280" y1="432" x2="280" y2="456" stroke="#22C55E" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="294" y="448" fill="#22C55E" font-size="8">OK</text>

  <!-- Success -->
  <rect x="190" y="460" width="180" height="40" rx="10" fill="#22C55E" filter="url(#shadow6)"/>
  <text x="280" y="486" text-anchor="middle" fill="#FFF" font-size="13" font-weight="700">Skill Working!</text>

  <!-- Side tips -->
  <rect x="16" y="148" width="120" height="80" rx="8" fill="#0F172A" stroke="#475569" stroke-width="1"/>
  <text x="76" y="168" text-anchor="middle" fill="#CBD5E1" font-size="9" font-weight="700">Quick Tips</text>
  <text x="26" y="184" fill="#64748B" font-size="8">- Be specific in desc</text>
  <text x="26" y="198" fill="#64748B" font-size="8">- Test with exact phrase</text>
  <text x="26" y="212" fill="#64748B" font-size="8">- Check YAML syntax</text>

  <!-- Bottom note -->
  <text x="280" y="524" text-anchor="middle" fill="#64748B" font-size="10">Debug systematically: description → validator → priority → logs</text>
  <text x="280" y="542" text-anchor="middle" fill="#475569" font-size="9">Most issues are caused by vague descriptions or YAML frontmatter errors</text>
</svg>