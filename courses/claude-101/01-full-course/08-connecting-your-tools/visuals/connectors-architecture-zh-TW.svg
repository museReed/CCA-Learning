<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 560" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EFF6FF"/>
      <stop offset="100%" stop-color="#DBEAFE"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0FDF4"/>
      <stop offset="100%" stop-color="#DCFCE7"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF7ED"/>
      <stop offset="100%" stop-color="#FFEDD5"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAF5FF"/>
      <stop offset="100%" stop-color="#F3E8FF"/>
    </linearGradient>
    <linearGradient id="centerGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="560" height="560" fill="white" rx="12"/>

  <!-- Title -->
  <text x="280" y="36" text-anchor="middle" font-size="15" font-weight="600" fill="#64748B" letter-spacing="0.5">連接你的工具</text>

  <!-- Center: Claude Hub -->
  <circle cx="280" cy="280" r="58" fill="url(#centerGrad)" filter="url(#shadow)"/>
  <text x="280" y="268" text-anchor="middle" font-size="26" fill="white">&#x2728;</text>
  <text x="280" y="292" text-anchor="middle" font-size="14" font-weight="700" fill="white">Claude</text>

  <!-- Bidirectional connection lines -->
  <line x1="280" y1="222" x2="280" y2="150" stroke="#3B82F6" stroke-width="2" opacity="0.35"/>
  <polygon points="280,155 276,165 284,165" fill="#3B82F6" opacity="0.6"/>
  <polygon points="280,217 276,207 284,207" fill="#3B82F6" opacity="0.6"/>

  <line x1="328" y1="242" x2="405" y2="138" stroke="#22C55E" stroke-width="2" opacity="0.35"/>
  <polygon points="402,143 393,142 398,151" fill="#22C55E" opacity="0.6"/>
  <polygon points="331,237 337,247 341,238" fill="#22C55E" opacity="0.6"/>

  <line x1="338" y1="280" x2="420" y2="280" stroke="#8B5CF6" stroke-width="2" opacity="0.35"/>
  <polygon points="415,280 405,276 405,284" fill="#8B5CF6" opacity="0.6"/>
  <polygon points="343,280 353,276 353,284" fill="#8B5CF6" opacity="0.6"/>

  <line x1="328" y1="318" x2="405" y2="418" stroke="#FB923C" stroke-width="2" opacity="0.35"/>
  <polygon points="402,413 393,414 398,405" fill="#FB923C" opacity="0.6"/>
  <polygon points="331,323 337,313 341,322" fill="#FB923C" opacity="0.6"/>

  <line x1="280" y1="338" x2="280" y2="410" stroke="#EF4444" stroke-width="2" opacity="0.35"/>
  <polygon points="280,405 276,395 284,395" fill="#EF4444" opacity="0.6"/>
  <polygon points="280,343 276,353 284,353" fill="#EF4444" opacity="0.6"/>

  <line x1="232" y1="318" x2="155" y2="418" stroke="#3B82F6" stroke-width="2" opacity="0.35"/>
  <polygon points="158,413 167,414 162,405" fill="#3B82F6" opacity="0.6"/>
  <polygon points="229,323 223,313 219,322" fill="#3B82F6" opacity="0.6"/>

  <line x1="222" y1="280" x2="140" y2="280" stroke="#22C55E" stroke-width="2" opacity="0.35"/>
  <polygon points="145,280 155,276 155,284" fill="#22C55E" opacity="0.6"/>
  <polygon points="217,280 207,276 207,284" fill="#22C55E" opacity="0.6"/>

  <line x1="232" y1="242" x2="155" y2="138" stroke="#8B5CF6" stroke-width="2" opacity="0.35"/>
  <polygon points="158,143 167,142 162,151" fill="#8B5CF6" opacity="0.6"/>
  <polygon points="229,237 223,247 219,238" fill="#8B5CF6" opacity="0.6"/>

  <!-- Tool cards -->
  <!-- 1. Google Drive (Top) -->
  <g transform="translate(215, 80)">
    <rect width="130" height="62" rx="12" fill="url(#blueGrad)" stroke="#3B82F6" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="65" y="26" text-anchor="middle" font-size="18">&#x1F4C1;</text>
    <text x="65" y="44" text-anchor="middle" font-size="11" font-weight="600" fill="#1E40AF">Google Drive</text>
    <text x="65" y="56" text-anchor="middle" font-size="8.5" fill="#3B82F6">文件、試算表、簡報</text>
  </g>

  <!-- 2. Notion (Top-Right) -->
  <g transform="translate(395, 82)">
    <rect width="120" height="62" rx="12" fill="url(#greenGrad)" stroke="#22C55E" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="60" y="26" text-anchor="middle" font-size="18">&#x1F4D3;</text>
    <text x="60" y="44" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">Notion</text>
    <text x="60" y="56" text-anchor="middle" font-size="8.5" fill="#22C55E">頁面與資料庫</text>
  </g>

  <!-- 3. GitHub (Right) -->
  <g transform="translate(425, 254)">
    <rect width="120" height="62" rx="12" fill="url(#purpleGrad)" stroke="#8B5CF6" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="60" y="26" text-anchor="middle" font-size="18">&#x1F4BB;</text>
    <text x="60" y="44" text-anchor="middle" font-size="11" font-weight="600" fill="#5B21B6">GitHub</text>
    <text x="60" y="56" text-anchor="middle" font-size="8.5" fill="#8B5CF6">程式碼與拉取請求</text>
  </g>

  <!-- 4. Asana (Bottom-Right) -->
  <g transform="translate(385, 415)">
    <rect width="120" height="62" rx="12" fill="url(#orangeGrad)" stroke="#FB923C" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="60" y="26" text-anchor="middle" font-size="18">&#x2705;</text>
    <text x="60" y="44" text-anchor="middle" font-size="11" font-weight="600" fill="#9A3412">Asana</text>
    <text x="60" y="56" text-anchor="middle" font-size="8.5" fill="#FB923C">任務與專案</text>
  </g>

  <!-- 5. Slack (Bottom) -->
  <g transform="translate(215, 418)">
    <rect width="130" height="62" rx="12" fill="url(#blueGrad)" stroke="#EF4444" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="65" y="26" text-anchor="middle" font-size="18">&#x1F4E8;</text>
    <text x="65" y="44" text-anchor="middle" font-size="11" font-weight="600" fill="#991B1B">Slack</text>
    <text x="65" y="56" text-anchor="middle" font-size="8.5" fill="#EF4444">訊息與頻道</text>
  </g>

  <!-- 6. Linear (Bottom-Left) -->
  <g transform="translate(55, 415)">
    <rect width="120" height="62" rx="12" fill="url(#blueGrad)" stroke="#3B82F6" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="60" y="26" text-anchor="middle" font-size="18">&#x1F3AF;</text>
    <text x="60" y="44" text-anchor="middle" font-size="11" font-weight="600" fill="#1E40AF">Linear</text>
    <text x="60" y="56" text-anchor="middle" font-size="8.5" fill="#3B82F6">議題與追蹤</text>
  </g>

  <!-- 7. Confluence (Left) -->
  <g transform="translate(15, 254)">
    <rect width="120" height="62" rx="12" fill="url(#greenGrad)" stroke="#22C55E" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="60" y="26" text-anchor="middle" font-size="18">&#x1F4D6;</text>
    <text x="60" y="44" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">Confluence</text>
    <text x="60" y="56" text-anchor="middle" font-size="8.5" fill="#22C55E">知識庫與文件</text>
  </g>

  <!-- 8. Jira (Top-Left) -->
  <g transform="translate(45, 82)">
    <rect width="120" height="62" rx="12" fill="url(#purpleGrad)" stroke="#8B5CF6" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="60" y="26" text-anchor="middle" font-size="18">&#x1F4CB;</text>
    <text x="60" y="44" text-anchor="middle" font-size="11" font-weight="600" fill="#5B21B6">Jira</text>
    <text x="60" y="56" text-anchor="middle" font-size="8.5" fill="#8B5CF6">工單與衝刺</text>
  </g>

  <!-- Bottom note -->
  <text x="280" y="515" text-anchor="middle" font-size="10" fill="#94A3B8">連接器讓 Claude 能讀取並寫入你現有的工具</text>
  <text x="280" y="530" text-anchor="middle" font-size="10" fill="#94A3B8">資料在 Claude 與各整合服務之間雙向流動</text>
</svg>