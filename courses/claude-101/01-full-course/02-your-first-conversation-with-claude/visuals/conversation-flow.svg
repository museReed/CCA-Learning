<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 520" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EFF6FF"/>
      <stop offset="100%" stop-color="#DBEAFE"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0FDF4"/>
      <stop offset="100%" stop-color="#DCFCE7"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF7ED"/>
      <stop offset="100%" stop-color="#FFEDD5"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAF5FF"/>
      <stop offset="100%" stop-color="#F3E8FF"/>
    </linearGradient>
    <marker id="arrowBlue" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3B82F6"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22C55E"/>
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8B5CF6"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#FB923C"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="560" height="520" fill="white" rx="12"/>

  <!-- Title -->
  <text x="280" y="36" text-anchor="middle" font-size="15" font-weight="600" fill="#64748B" letter-spacing="0.5">CONVERSATION FLOW WITH CLAUDE</text>

  <!-- Step 1: Start Conversation -->
  <g transform="translate(30, 60)">
    <rect width="145" height="70" rx="14" fill="url(#blueGrad)" stroke="#3B82F6" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="73" y="30" text-anchor="middle" font-size="20">&#x1F4AC;</text>
    <text x="73" y="50" text-anchor="middle" font-size="11" font-weight="600" fill="#1E40AF">Start Conversation</text>
    <text x="73" y="63" text-anchor="middle" font-size="9" fill="#3B82F6">Open a new chat</text>
  </g>

  <!-- Arrow 1→2 -->
  <path d="M 175 95 L 210 95" fill="none" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- Step 2: Provide Context -->
  <g transform="translate(218, 60)">
    <rect width="145" height="70" rx="14" fill="url(#greenGrad)" stroke="#22C55E" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="73" y="30" text-anchor="middle" font-size="20">&#x1F4CB;</text>
    <text x="73" y="50" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">Provide Context</text>
    <text x="73" y="63" text-anchor="middle" font-size="9" fill="#22C55E">Share background info</text>
  </g>

  <!-- Arrow 2→3 -->
  <path d="M 363 95 L 398 95" fill="none" stroke="#22C55E" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- Step 3: Ask Question -->
  <g transform="translate(406, 60)">
    <rect width="130" height="70" rx="14" fill="url(#purpleGrad)" stroke="#8B5CF6" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="65" y="30" text-anchor="middle" font-size="20">&#x2753;</text>
    <text x="65" y="50" text-anchor="middle" font-size="11" font-weight="600" fill="#5B21B6">Ask Question</text>
    <text x="65" y="63" text-anchor="middle" font-size="9" fill="#8B5CF6">Be specific &amp; clear</text>
  </g>

  <!-- Arrow 3→4 (down) -->
  <path d="M 471 130 L 471 160" fill="none" stroke="#8B5CF6" stroke-width="2" marker-end="url(#arrowPurple)"/>

  <!-- Step 4: Claude Responds -->
  <g transform="translate(370, 168)">
    <rect width="170" height="70" rx="14" fill="url(#blueGrad)" stroke="#3B82F6" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="85" y="30" text-anchor="middle" font-size="20">&#x2728;</text>
    <text x="85" y="50" text-anchor="middle" font-size="11" font-weight="600" fill="#1E40AF">Claude Responds</text>
    <text x="85" y="63" text-anchor="middle" font-size="9" fill="#3B82F6">Detailed, helpful answer</text>
  </g>

  <!-- Arrow 4→5 (left) -->
  <path d="M 370 203 L 335 203" fill="none" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- Step 5: Follow Up -->
  <g transform="translate(180, 168)">
    <rect width="145" height="70" rx="14" fill="url(#orangeGrad)" stroke="#FB923C" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="73" y="30" text-anchor="middle" font-size="20">&#x1F504;</text>
    <text x="73" y="50" text-anchor="middle" font-size="11" font-weight="600" fill="#9A3412">Follow Up</text>
    <text x="73" y="63" text-anchor="middle" font-size="9" fill="#FB923C">Ask more, go deeper</text>
  </g>

  <!-- Arrow 5→6 (left) -->
  <path d="M 180 203 L 145 203" fill="none" stroke="#FB923C" stroke-width="2" marker-end="url(#arrowOrange)"/>

  <!-- Step 6: Refine -->
  <g transform="translate(10, 168)">
    <rect width="127" height="70" rx="14" fill="url(#greenGrad)" stroke="#22C55E" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="64" y="30" text-anchor="middle" font-size="20">&#x1F3AF;</text>
    <text x="64" y="50" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">Refine</text>
    <text x="64" y="63" text-anchor="middle" font-size="9" fill="#22C55E">Adjust &amp; improve</text>
  </g>

  <!-- Iterative cycle arrow (from Refine back to Ask Question) -->
  <path d="M 74 168 Q 74 148 120 148 L 455 148 Q 471 148 471 158" fill="none" stroke="#22C55E" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowGreen)" opacity="0.6"/>
  <text x="280" y="143" text-anchor="middle" font-size="9" fill="#22C55E" font-style="italic">Iterate as needed</text>

  <!-- Example conversation panel -->
  <g transform="translate(40, 280)">
    <rect width="480" height="200" rx="14" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="240" y="24" text-anchor="middle" font-size="11" font-weight="600" fill="#64748B">EXAMPLE CONVERSATION</text>

    <!-- User message -->
    <rect x="180" y="40" width="280" height="34" rx="10" fill="#DBEAFE"/>
    <text x="195" y="61" font-size="10" fill="#1E40AF">I'm writing a blog post about AI safety.</text>

    <!-- Claude response -->
    <rect x="20" y="84" width="310" height="34" rx="10" fill="#F0FDF4"/>
    <text x="35" y="105" font-size="10" fill="#166534">Great topic! Here are key themes to cover...</text>

    <!-- User follow-up -->
    <rect x="180" y="128" width="280" height="34" rx="10" fill="#DBEAFE"/>
    <text x="195" y="149" font-size="10" fill="#1E40AF">Can you expand on alignment research?</text>

    <!-- Claude refinement -->
    <rect x="20" y="160" width="310" height="28" rx="10" fill="#F0FDF4"/>
    <text x="35" y="179" font-size="10" fill="#166534">Absolutely! Alignment research focuses on...</text>
  </g>

  <!-- Bottom note -->
  <text x="280" y="505" text-anchor="middle" font-size="10" fill="#94A3B8">Each follow-up builds on prior context within the same conversation</text>
</svg>