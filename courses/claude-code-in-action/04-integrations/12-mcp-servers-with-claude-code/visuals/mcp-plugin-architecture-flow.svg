<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 200" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.1"/>
    </filter>
    <marker id="arrowR" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#94A3B8"/>
    </marker>
    <marker id="arrowL" viewBox="0 0 10 7" refX="0" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 10 0 L 0 3.5 L 10 7 z" fill="#94A3B8"/>
    </marker>
  </defs>
  <rect width="520" height="200" fill="white" rx="12"/>
  <text x="260" y="26" text-anchor="middle" font-size="15" font-weight="600" fill="#64748B" letter-spacing="0.5">MCP PLUGIN ARCHITECTURE</text>

  <!-- Claude Code box -->
  <rect x="20" y="55" width="120" height="80" rx="14" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="80" y="85" text-anchor="middle" font-size="24">🧠</text>
  <text x="80" y="108" text-anchor="middle" font-size="12" font-weight="700" fill="#1E40AF">Claude Code</text>
  <text x="80" y="122" text-anchor="middle" font-size="9" fill="#3B82F6">AI Agent</text>

  <!-- Bidirectional arrows: Claude ↔ Protocol -->
  <line x1="145" y1="85" x2="190" y2="85" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <line x1="190" y1="100" x2="145" y2="100" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <text x="168" y="78" text-anchor="middle" font-size="8" fill="#94A3B8">JSON-RPC</text>
  <text x="168" y="115" text-anchor="middle" font-size="8" fill="#94A3B8">tool result</text>

  <!-- MCP Protocol layer -->
  <rect x="195" y="60" width="110" height="70" rx="14" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="250" y="88" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">MCP Protocol</text>
  <text x="250" y="105" text-anchor="middle" font-size="9" fill="#22C55E">Abstraction Layer</text>

  <!-- Bidirectional arrows: Protocol ↔ Server -->
  <line x1="310" y1="85" x2="355" y2="85" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <line x1="355" y1="100" x2="310" y2="100" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <text x="333" y="78" text-anchor="middle" font-size="8" fill="#94A3B8">request</text>
  <text x="333" y="115" text-anchor="middle" font-size="8" fill="#94A3B8">response</text>

  <!-- MCP Server box -->
  <rect x="360" y="45" width="140" height="100" rx="14" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="430" y="72" text-anchor="middle" font-size="24">🔌</text>
  <text x="430" y="95" text-anchor="middle" font-size="12" font-weight="700" fill="#6D28D9">MCP Server</text>
  <text x="430" y="110" text-anchor="middle" font-size="9" fill="#8B5CF6">Separate Process</text>

  <!-- External systems below server -->
  <line x1="430" y1="145" x2="430" y2="158" stroke="#94A3B8" stroke-width="1.2" marker-end="url(#arrowR)"/>

  <rect x="370" y="160" width="120" height="30" rx="14" fill="#FFF7ED" stroke="#FB923C" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="388" y="180" font-size="12">🌐</text>
  <text x="406" y="180" font-size="10" font-weight="600" fill="#EA580C">DB / Browser / API</text>

  <!-- Key insight note -->
  <text x="260" y="190" text-anchor="middle" font-size="10" fill="#94A3B8">MCP = universal adapter between AI and any external system.</text>
</svg>