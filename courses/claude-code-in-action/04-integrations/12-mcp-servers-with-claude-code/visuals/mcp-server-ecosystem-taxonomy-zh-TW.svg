<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 300" font-family="'PingFang TC', 'Noto Sans TC', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.1"/>
    </filter>
  </defs>
  <rect width="520" height="300" fill="white" rx="12"/>
  <text x="260" y="28" text-anchor="middle" font-size="15" font-weight="600" fill="#64748B" letter-spacing="1">MCP Server 生態系</text>

  <!-- Row 1 -->
  <!-- Browser Automation -->
  <rect x="20" y="44" width="155" height="76" rx="14" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="40" y="68" font-size="18">🌐</text>
  <text x="63" y="68" font-size="12" font-weight="700" fill="#1E40AF">瀏覽器自動化</text>
  <text x="40" y="86" font-size="10" fill="#64748B">Playwright</text>
  <text x="40" y="100" font-size="10" fill="#64748B">Puppeteer</text>

  <!-- Database -->
  <rect x="183" y="44" width="155" height="76" rx="14" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="203" y="68" font-size="18">🗄️</text>
  <text x="226" y="68" font-size="12" font-weight="700" fill="#166534">資料庫</text>
  <text x="203" y="86" font-size="10" fill="#64748B">Postgres, SQLite</text>
  <text x="203" y="100" font-size="10" fill="#64748B">Redis, MongoDB</text>

  <!-- API Testing -->
  <rect x="346" y="44" width="155" height="76" rx="14" fill="#FFF7ED" stroke="#FB923C" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="366" y="68" font-size="18">🧪</text>
  <text x="389" y="68" font-size="12" font-weight="700" fill="#EA580C">API 測試</text>
  <text x="366" y="86" font-size="10" fill="#64748B">Postman</text>
  <text x="366" y="100" font-size="10" fill="#64748B">REST Client</text>

  <!-- Row 2 -->
  <!-- File System -->
  <rect x="20" y="130" width="155" height="76" rx="14" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="40" y="154" font-size="18">📁</text>
  <text x="63" y="154" font-size="12" font-weight="700" fill="#6D28D9">檔案系統</text>
  <text x="40" y="172" font-size="10" fill="#64748B">filesystem</text>
  <text x="40" y="186" font-size="10" fill="#64748B">Google Drive</text>

  <!-- Cloud -->
  <rect x="183" y="130" width="155" height="76" rx="14" fill="#FEF2F2" stroke="#EF4444" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="203" y="154" font-size="18">☁️</text>
  <text x="226" y="154" font-size="12" font-weight="700" fill="#DC2626">雲端服務</text>
  <text x="203" y="172" font-size="10" fill="#64748B">AWS, GCP</text>
  <text x="203" y="186" font-size="10" fill="#64748B">Azure, Vercel</text>

  <!-- Dev Tools -->
  <rect x="346" y="130" width="155" height="76" rx="14" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="366" y="154" font-size="18">🛠️</text>
  <text x="389" y="154" font-size="12" font-weight="700" fill="#1E40AF">開發工具</text>
  <text x="366" y="172" font-size="10" fill="#64748B">GitHub, Linear</text>
  <text x="366" y="186" font-size="10" fill="#64748B">Sentry, Figma</text>

  <!-- Summary bar -->
  <rect x="20" y="222" width="481" height="36" rx="14" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="260" y="240" text-anchor="middle" font-size="11" fill="#64748B">所有 server 都講同一套 MCP 協定 — Claude Code 統一對待</text>
  <text x="260" y="254" text-anchor="middle" font-size="10" fill="#94A3B8">在 settings.json 設定一次，即可使用所有工具</text>

  <text x="260" y="288" text-anchor="middle" font-size="10" fill="#94A3B8">社群資源：npmjs.com、GitHub、Anthropic 官方 server</text>
</svg>