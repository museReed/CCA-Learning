<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 300" font-family="'PingFang TC', 'Noto Sans TC', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.1"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#94A3B8"/>
    </marker>
  </defs>
  <rect width="540" height="300" fill="white" rx="12"/>
  <text x="270" y="26" text-anchor="middle" font-size="15" font-weight="600" fill="#64748B" letter-spacing="1">GitHub Actions — 兩種工作流</text>

  <!-- Divider -->
  <line x1="270" y1="38" x2="270" y2="275" stroke="#E2E8F0" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- LEFT: @claude Mention Action -->
  <g transform="translate(15, 40)">
    <rect width="240" height="235" rx="14" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="120" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#1E40AF">@claude 提及</text>

    <rect x="20" y="42" width="200" height="30" rx="10" fill="white" stroke="#93C5FD" stroke-width="1"/>
    <text x="34" y="62" font-size="12">💬</text>
    <text x="52" y="62" font-size="10" fill="#1E40AF">PR/Issue 留言含 @claude</text>

    <line x1="120" y1="72" x2="120" y2="84" stroke="#94A3B8" stroke-width="1.2" marker-end="url(#arrow)"/>

    <rect x="20" y="86" width="200" height="30" rx="10" fill="white" stroke="#93C5FD" stroke-width="1"/>
    <text x="34" y="106" font-size="12">⚙️</text>
    <text x="52" y="106" font-size="10" fill="#1E40AF">GitHub Action 啟動</text>

    <line x1="120" y1="116" x2="120" y2="128" stroke="#94A3B8" stroke-width="1.2" marker-end="url(#arrow)"/>

    <rect x="20" y="130" width="200" height="30" rx="10" fill="white" stroke="#93C5FD" stroke-width="1"/>
    <text x="34" y="150" font-size="12">🧠</text>
    <text x="52" y="150" font-size="10" fill="#1E40AF">Claude 分析上下文</text>

    <line x1="120" y1="160" x2="120" y2="172" stroke="#94A3B8" stroke-width="1.2" marker-end="url(#arrow)"/>

    <rect x="20" y="174" width="200" height="30" rx="10" fill="white" stroke="#93C5FD" stroke-width="1"/>
    <text x="34" y="194" font-size="12">🔧</text>
    <text x="52" y="194" font-size="10" fill="#1E40AF">執行任務（寫碼、回答、修復）</text>

    <line x1="120" y1="204" x2="120" y2="216" stroke="#94A3B8" stroke-width="1.2" marker-end="url(#arrow)"/>

    <rect x="50" y="218" width="140" height="10" rx="5" fill="#3B82F6" opacity="0.3"/>
    <text x="120" y="226" text-anchor="middle" font-size="9" font-weight="600" fill="#1E40AF">以留言回覆結果</text>
  </g>

  <!-- RIGHT: PR Review Action -->
  <g transform="translate(285, 40)">
    <rect width="240" height="235" rx="14" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="120" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">PR Review</text>

    <rect x="20" y="42" width="200" height="30" rx="10" fill="white" stroke="#86EFAC" stroke-width="1"/>
    <text x="34" y="62" font-size="12">🔀</text>
    <text x="52" y="62" font-size="10" fill="#166534">PR 建立或更新</text>

    <line x1="120" y1="72" x2="120" y2="84" stroke="#94A3B8" stroke-width="1.2" marker-end="url(#arrow)"/>

    <rect x="20" y="86" width="200" height="30" rx="10" fill="white" stroke="#86EFAC" stroke-width="1"/>
    <text x="34" y="106" font-size="12">⚙️</text>
    <text x="52" y="106" font-size="10" fill="#166534">Action 自動執行</text>

    <line x1="120" y1="116" x2="120" y2="128" stroke="#94A3B8" stroke-width="1.2" marker-end="url(#arrow)"/>

    <rect x="20" y="130" width="200" height="30" rx="10" fill="white" stroke="#86EFAC" stroke-width="1"/>
    <text x="34" y="150" font-size="12">🧠</text>
    <text x="52" y="150" font-size="10" fill="#166534">Claude 審查程式碼變更</text>

    <line x1="120" y1="160" x2="120" y2="172" stroke="#94A3B8" stroke-width="1.2" marker-end="url(#arrow)"/>

    <rect x="20" y="174" width="200" height="30" rx="10" fill="white" stroke="#86EFAC" stroke-width="1"/>
    <text x="34" y="194" font-size="12">📝</text>
    <text x="52" y="194" font-size="10" fill="#166534">發布 review 與建議</text>

    <line x1="120" y1="204" x2="120" y2="216" stroke="#94A3B8" stroke-width="1.2" marker-end="url(#arrow)"/>

    <rect x="50" y="218" width="140" height="10" rx="5" fill="#22C55E" opacity="0.3"/>
    <text x="120" y="226" text-anchor="middle" font-size="9" font-weight="600" fill="#166534">在 diff 上行內留言</text>
  </g>

  <text x="270" y="293" text-anchor="middle" font-size="10" fill="#94A3B8">兩者都在 CI 執行 — 不需本地 Claude Code。設定在 .github/workflows/</text>
</svg>