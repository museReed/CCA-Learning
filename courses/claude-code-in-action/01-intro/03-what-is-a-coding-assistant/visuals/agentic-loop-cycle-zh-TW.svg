<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 560" font-family="'PingFang TC', 'Noto Sans TC', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EFF6FF"/>
      <stop offset="100%" stop-color="#DBEAFE"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0FDF4"/>
      <stop offset="100%" stop-color="#DCFCE7"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF7ED"/>
      <stop offset="100%" stop-color="#FFEDD5"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAF5FF"/>
      <stop offset="100%" stop-color="#F3E8FF"/>
    </linearGradient>
    <marker id="arrowBlue" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3B82F6"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22C55E"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#FB923C"/>
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8B5CF6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="560" height="560" fill="white" rx="12"/>

  <!-- Title -->
  <text x="280" y="36" text-anchor="middle" font-size="15" font-weight="600" fill="#64748B" letter-spacing="0.5">AGENT LOOP 代理迴圈</text>

  <!-- Center Label -->
  <circle cx="280" cy="270" r="52" fill="white" stroke="#E2E8F0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="280" y="262" text-anchor="middle" font-size="22">🔄</text>
  <text x="280" y="282" text-anchor="middle" font-size="11" font-weight="600" fill="#334155">持續</text>
  <text x="280" y="296" text-anchor="middle" font-size="11" font-weight="600" fill="#334155">迴圈</text>

  <!-- ===== Step 1: Gather Context (Top) ===== -->
  <g transform="translate(190, 60)">
    <rect width="180" height="90" rx="14" fill="url(#blueGrad)" stroke="#3B82F6" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="90" y="36" text-anchor="middle" font-size="26">🔍</text>
    <text x="90" y="60" text-anchor="middle" font-size="13" font-weight="600" fill="#1E40AF">蒐集上下文</text>
    <text x="90" y="78" text-anchor="middle" font-size="10" fill="#3B82F6">讀取檔案、搜尋程式碼</text>
  </g>

  <!-- ===== Step 2: Plan (Right) ===== -->
  <g transform="translate(380, 220)">
    <rect width="150" height="90" rx="14" fill="url(#purpleGrad)" stroke="#8B5CF6" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="75" y="36" text-anchor="middle" font-size="26">🧠</text>
    <text x="75" y="60" text-anchor="middle" font-size="13" font-weight="600" fill="#5B21B6">規劃</text>
    <text x="75" y="78" text-anchor="middle" font-size="10" fill="#8B5CF6">決定下一步動作</text>
  </g>

  <!-- ===== Step 3: Take Action (Bottom) ===== -->
  <g transform="translate(190, 390)">
    <rect width="180" height="90" rx="14" fill="url(#orangeGrad)" stroke="#FB923C" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="90" y="36" text-anchor="middle" font-size="26">🔧</text>
    <text x="90" y="60" text-anchor="middle" font-size="13" font-weight="600" fill="#9A3412">執行動作</text>
    <text x="90" y="78" text-anchor="middle" font-size="10" fill="#FB923C">執行 tool_use</text>
  </g>

  <!-- ===== Step 4: Evaluate (Left) ===== -->
  <g transform="translate(30, 220)">
    <rect width="150" height="90" rx="14" fill="url(#greenGrad)" stroke="#22C55E" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="75" y="36" text-anchor="middle" font-size="26">📋</text>
    <text x="75" y="60" text-anchor="middle" font-size="13" font-weight="600" fill="#166534">評估</text>
    <text x="75" y="78" text-anchor="middle" font-size="10" fill="#22C55E">檢查結果</text>
  </g>

  <!-- ===== Curved Arrows ===== -->
  <!-- Step 1 → Step 2 (top-right curve) -->
  <path d="M 370 120 Q 420 140 420 218" fill="none" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- Step 2 → Step 3 (bottom-right curve) -->
  <path d="M 440 312 Q 420 370 370 400" fill="none" stroke="#8B5CF6" stroke-width="2" marker-end="url(#arrowPurple)"/>

  <!-- Step 3 → Step 4 (bottom-left curve) -->
  <path d="M 190 440 Q 140 410 140 312" fill="none" stroke="#FB923C" stroke-width="2" marker-end="url(#arrowOrange)"/>

  <!-- Step 4 → Step 1 (top-left curve) -->
  <path d="M 120 218 Q 140 160 190 130" fill="none" stroke="#22C55E" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- Step numbers -->
  <circle cx="400" cy="165" r="12" fill="#3B82F6" opacity="0.15"/>
  <text x="400" y="169" text-anchor="middle" font-size="10" font-weight="700" fill="#3B82F6">1</text>

  <circle cx="440" cy="365" r="12" fill="#8B5CF6" opacity="0.15"/>
  <text x="440" y="369" text-anchor="middle" font-size="10" font-weight="700" fill="#8B5CF6">2</text>

  <circle cx="160" cy="385" r="12" fill="#FB923C" opacity="0.15"/>
  <text x="160" y="389" text-anchor="middle" font-size="10" font-weight="700" fill="#FB923C">3</text>

  <circle cx="120" cy="170" r="12" fill="#22C55E" opacity="0.15"/>
  <text x="120" y="174" text-anchor="middle" font-size="10" font-weight="700" fill="#22C55E">4</text>

  <!-- Bottom note -->
  <text x="280" y="520" text-anchor="middle" font-size="10" fill="#94A3B8">迴圈持續直到 stop_reason = end_turn（任務完成或需要人類輸入）</text>
  <text x="280" y="545" text-anchor="middle" font-size="10" fill="#94A3B8">每次循環可能呼叫多個 Tool，再回到評估階段</text>
</svg>