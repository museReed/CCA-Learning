<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EFF6FF"/>
      <stop offset="100%" stop-color="#DBEAFE"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0FDF4"/>
      <stop offset="100%" stop-color="#DCFCE7"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAF5FF"/>
      <stop offset="100%" stop-color="#F3E8FF"/>
    </linearGradient>
    <marker id="arrowBlue" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3B82F6"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22C55E"/>
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8B5CF6"/>
    </marker>
    <marker id="arrowGray" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748B"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="520" fill="white" rx="12"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#1E293B">Tool Chaining Patterns in Claude Code</text>
  <text x="400" y="58" text-anchor="middle" font-size="12" fill="#94A3B8">3 demos showing how the agentic loop chains tools to solve real problems</text>

  <!-- ===== Column 1: Performance Optimization (Blue) ===== -->
  <g transform="translate(30, 80)">
    <!-- Column header -->
    <rect width="230" height="36" rx="10" fill="#3B82F6" filter="url(#shadow)"/>
    <text x="115" y="14" text-anchor="middle" font-size="14">🚀</text>
    <text x="115" y="30" text-anchor="middle" font-size="11" font-weight="600" fill="white">Performance Optimization</text>

    <!-- Steps -->
    <rect x="15" y="52" width="200" height="42" rx="8" fill="url(#blueGrad)" stroke="#3B82F6" stroke-width="1" filter="url(#shadow)"/>
    <text x="115" y="70" text-anchor="middle" font-size="11" font-weight="600" fill="#1E40AF">Search</text>
    <text x="115" y="84" text-anchor="middle" font-size="9" fill="#3B82F6">Grep for slow endpoints</text>

    <line x1="115" y1="94" x2="115" y2="108" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

    <rect x="15" y="112" width="200" height="42" rx="8" fill="url(#blueGrad)" stroke="#3B82F6" stroke-width="1" filter="url(#shadow)"/>
    <text x="115" y="130" text-anchor="middle" font-size="11" font-weight="600" fill="#1E40AF">Benchmark</text>
    <text x="115" y="144" text-anchor="middle" font-size="9" fill="#3B82F6">Run timing tests</text>

    <line x1="115" y1="154" x2="115" y2="168" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

    <rect x="15" y="172" width="200" height="42" rx="8" fill="url(#blueGrad)" stroke="#3B82F6" stroke-width="1" filter="url(#shadow)"/>
    <text x="115" y="190" text-anchor="middle" font-size="11" font-weight="600" fill="#1E40AF">Profile</text>
    <text x="115" y="204" text-anchor="middle" font-size="9" fill="#3B82F6">Identify bottleneck</text>

    <line x1="115" y1="214" x2="115" y2="228" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

    <rect x="15" y="232" width="200" height="42" rx="8" fill="url(#blueGrad)" stroke="#3B82F6" stroke-width="1" filter="url(#shadow)"/>
    <text x="115" y="250" text-anchor="middle" font-size="11" font-weight="600" fill="#1E40AF">Fix</text>
    <text x="115" y="264" text-anchor="middle" font-size="9" fill="#3B82F6">Apply optimization</text>

    <line x1="115" y1="274" x2="115" y2="288" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

    <rect x="15" y="292" width="200" height="42" rx="8" fill="url(#blueGrad)" stroke="#3B82F6" stroke-width="1" filter="url(#shadow)"/>
    <text x="115" y="310" text-anchor="middle" font-size="11" font-weight="600" fill="#1E40AF">Verify</text>
    <text x="115" y="324" text-anchor="middle" font-size="9" fill="#3B82F6">Re-run benchmark</text>
  </g>

  <!-- ===== Column 2: Bug Fix (Green) ===== -->
  <g transform="translate(285, 80)">
    <!-- Column header -->
    <rect width="230" height="36" rx="10" fill="#22C55E" filter="url(#shadow)"/>
    <text x="115" y="14" text-anchor="middle" font-size="14">🐛</text>
    <text x="115" y="30" text-anchor="middle" font-size="11" font-weight="600" fill="white">Bug Fix</text>

    <!-- Steps -->
    <rect x="15" y="52" width="200" height="42" rx="8" fill="url(#greenGrad)" stroke="#22C55E" stroke-width="1" filter="url(#shadow)"/>
    <text x="115" y="70" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">Analyze</text>
    <text x="115" y="84" text-anchor="middle" font-size="9" fill="#22C55E">Read logs &amp; stacktrace</text>

    <line x1="115" y1="94" x2="115" y2="108" stroke="#22C55E" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

    <rect x="15" y="112" width="200" height="42" rx="8" fill="url(#greenGrad)" stroke="#22C55E" stroke-width="1" filter="url(#shadow)"/>
    <text x="115" y="130" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">Reproduce</text>
    <text x="115" y="144" text-anchor="middle" font-size="9" fill="#22C55E">Write failing test</text>

    <line x1="115" y1="154" x2="115" y2="168" stroke="#22C55E" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

    <rect x="15" y="172" width="200" height="42" rx="8" fill="url(#greenGrad)" stroke="#22C55E" stroke-width="1" filter="url(#shadow)"/>
    <text x="115" y="190" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">Fix</text>
    <text x="115" y="204" text-anchor="middle" font-size="9" fill="#22C55E">Edit source code</text>

    <line x1="115" y1="214" x2="115" y2="228" stroke="#22C55E" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

    <rect x="15" y="232" width="200" height="42" rx="8" fill="url(#greenGrad)" stroke="#22C55E" stroke-width="1" filter="url(#shadow)"/>
    <text x="115" y="250" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">Test</text>
    <text x="115" y="264" text-anchor="middle" font-size="9" fill="#22C55E">Run tests, all pass</text>
  </g>

  <!-- ===== Column 3: MCP + CI/CD (Purple) ===== -->
  <g transform="translate(540, 80)">
    <!-- Column header -->
    <rect width="230" height="36" rx="10" fill="#8B5CF6" filter="url(#shadow)"/>
    <text x="115" y="14" text-anchor="middle" font-size="14">🔌</text>
    <text x="115" y="30" text-anchor="middle" font-size="11" font-weight="600" fill="white">MCP + CI/CD</text>

    <!-- Steps -->
    <rect x="15" y="52" width="200" height="42" rx="8" fill="url(#purpleGrad)" stroke="#8B5CF6" stroke-width="1" filter="url(#shadow)"/>
    <text x="115" y="70" text-anchor="middle" font-size="11" font-weight="600" fill="#5B21B6">Read</text>
    <text x="115" y="84" text-anchor="middle" font-size="9" fill="#8B5CF6">Fetch context via MCP</text>

    <line x1="115" y1="94" x2="115" y2="108" stroke="#8B5CF6" stroke-width="1.5" marker-end="url(#arrowPurple)"/>

    <rect x="15" y="112" width="200" height="42" rx="8" fill="url(#purpleGrad)" stroke="#8B5CF6" stroke-width="1" filter="url(#shadow)"/>
    <text x="115" y="130" text-anchor="middle" font-size="11" font-weight="600" fill="#5B21B6">Plan</text>
    <text x="115" y="144" text-anchor="middle" font-size="9" fill="#8B5CF6">Design deployment steps</text>

    <line x1="115" y1="154" x2="115" y2="168" stroke="#8B5CF6" stroke-width="1.5" marker-end="url(#arrowPurple)"/>

    <rect x="15" y="172" width="200" height="42" rx="8" fill="url(#purpleGrad)" stroke="#8B5CF6" stroke-width="1" filter="url(#shadow)"/>
    <text x="115" y="190" text-anchor="middle" font-size="11" font-weight="600" fill="#5B21B6">Execute</text>
    <text x="115" y="204" text-anchor="middle" font-size="9" fill="#8B5CF6">Run CI pipeline</text>

    <line x1="115" y1="214" x2="115" y2="228" stroke="#8B5CF6" stroke-width="1.5" marker-end="url(#arrowPurple)"/>

    <rect x="15" y="232" width="200" height="42" rx="8" fill="url(#purpleGrad)" stroke="#8B5CF6" stroke-width="1" filter="url(#shadow)"/>
    <text x="115" y="250" text-anchor="middle" font-size="11" font-weight="600" fill="#5B21B6">Deploy</text>
    <text x="115" y="264" text-anchor="middle" font-size="9" fill="#8B5CF6">Push to production</text>
  </g>

  <!-- ===== Bottom summary ===== -->
  <g transform="translate(100, 440)">
    <rect width="600" height="44" rx="12" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="300" y="20" text-anchor="middle" font-size="14">🔗</text>
    <text x="300" y="37" text-anchor="middle" font-size="12" font-weight="600" fill="#334155">Each demo = agentic loop x tool chaining</text>
  </g>

  <!-- Converging arrows from each column to bottom -->
  <path d="M 145 420 L 250 448" fill="none" stroke="#3B82F6" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrowBlue)"/>
  <path d="M 400 420 L 400 438" fill="none" stroke="#22C55E" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrowGreen)"/>
  <path d="M 655 420 L 550 448" fill="none" stroke="#8B5CF6" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrowPurple)"/>

  <!-- Footer -->
  <text x="400" y="508" text-anchor="middle" font-size="10" fill="#94A3B8">Claude Code autonomously selects and sequences tools based on task requirements</text>
</svg>