  <!-- Ch01 Intro (blue) -->
  <rect x="40" y="100" width="240" height="55" rx="12" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2" filter="url(#shadow)"/>
  <text x="160" y="133" text-anchor="middle" font-family="'SF Pro Display', 'Helvetica Neue', sans-serif" font-size="14" font-weight="600" fill="#3B82F6">Ch01  Intro</text>

