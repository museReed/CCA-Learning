  <rect x="525" y="560" width="160" height="45" rx="22" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="605" y="588" text-anchor="middle" font-family="'SF Pro Display', 'Helvetica Neue', sans-serif" font-size="14" font-weight="600" fill="#8B5CF6">Automate</text>
