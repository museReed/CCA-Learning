  <line x1="280" y1="127" x2="520" y2="352" stroke="#3B82F6" stroke-width="1.5" stroke-opacity="0.3"/>

  <!-- Ch02 → D1 (Agentic Coding) -->
  <line x1="280" y1="202" x2="520" y2="127" stroke="#22C55E" stroke-width="1.5" stroke-opacity="0.4"/>
  <!-- Ch02 → D3 (Config) -->
  <line x1="280" y1="202" x2="520" y2="277" stroke="#22C55E" stroke-width="1.5" stroke-opacity="0.5"/>

