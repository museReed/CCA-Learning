  <rect x="115" y="560" width="160" height="45" rx="22" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="195" y="588" text-anchor="middle" font-family="'SF Pro Display', 'Helvetica Neue', sans-serif" font-size="14" font-weight="600" fill="#3B82F6">Stay Updated</text>

