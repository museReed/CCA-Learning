  <rect x="320" y="560" width="160" height="45" rx="22" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="400" y="588" text-anchor="middle" font-family="'SF Pro Display', 'Helvetica Neue', sans-serif" font-size="14" font-weight="600" fill="#22C55E">Experiment</text>

