  <!-- Ch04 → D5 (Enterprise) -->
  <line x1="280" y1="352" x2="520" y2="427" stroke="#FB923C" stroke-width="1.5" stroke-opacity="0.4"/>

  <!-- Ch05 → D3 (Config) -->
  <line x1="280" y1="427" x2="520" y2="277" stroke="#EF4444" stroke-width="1.5" stroke-opacity="0.4"/>
  <!-- Ch05 → D4 (AI Safety) -->
  <line x1="280" y1="427" x2="520" y2="352" stroke="#EF4444" stroke-width="1.5" stroke-opacity="0.4"/>
  <!-- Ch05 → D5 (Enterprise) -->
  <line x1="280" y1="427" x2="520" y2="427" stroke="#EF4444" stroke-width="1.5" stroke-opacity="0.5"/>

