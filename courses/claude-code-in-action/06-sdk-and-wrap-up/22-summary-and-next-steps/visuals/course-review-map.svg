  <line x1="280" y1="277" x2="520" y2="127" stroke="#8B5CF6" stroke-width="1.5" stroke-opacity="0.3"/>
  <!-- Ch03 → D3 (Config) -->
  <line x1="280" y1="277" x2="520" y2="277" stroke="#8B5CF6" stroke-width="1.5" stroke-opacity="0.5"/>
