<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620" width="800" height="620">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748B"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="620" fill="#FAFBFC" rx="0"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-family="'PingFang TC', 'Noto Sans TC', sans-serif" font-size="22" font-weight="700" fill="#1E293B">Claude Code SDK：程式化存取</text>

  <!-- Entry Points Row -->
  <!-- TypeScript -->
  <rect x="30" y="65" width="230" height="90" rx="12" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2" filter="url(#shadow)"/>
  <text x="145" y="92" text-anchor="middle" font-family="'SF Pro Display', 'Helvetica Neue', sans-serif" font-size="15" font-weight="700" fill="#3B82F6">TypeScript</text>
  <text x="145" y="118" text-anchor="middle" font-family="'SF Mono', 'Menlo', monospace" font-size="11" fill="#475569">import { query } from</text>
  <text x="145" y="136" text-anchor="middle" font-family="'SF Mono', 'Menlo', monospace" font-size="11" fill="#475569">"@anthropic-ai/claude-code"</text>

  <!-- Python -->
  <rect x="285" y="65" width="230" height="90" rx="12" fill="#F0FDF4" stroke="#22C55E" stroke-width="2" filter="url(#shadow)"/>
  <text x="400" y="92" text-anchor="middle" font-family="'SF Pro Display', 'Helvetica Neue', sans-serif" font-size="15" font-weight="700" fill="#22C55E">Python</text>
  <text x="400" y="118" text-anchor="middle" font-family="'SF Mono', 'Menlo', monospace" font-size="11" fill="#475569">from claude_code</text>
  <text x="400" y="136" text-anchor="middle" font-family="'SF Mono', 'Menlo', monospace" font-size="11" fill="#475569">import query</text>

  <!-- CLI -->
  <rect x="540" y="65" width="230" height="90" rx="12" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="2" filter="url(#shadow)"/>
  <text x="655" y="92" text-anchor="middle" font-family="'SF Pro Display', 'Helvetica Neue', sans-serif" font-size="15" font-weight="700" fill="#8B5CF6">CLI</text>
  <text x="655" y="118" text-anchor="middle" font-family="'SF Mono', 'Menlo', monospace" font-size="11" fill="#475569">claude -p "prompt"</text>
  <text x="655" y="136" text-anchor="middle" font-family="'SF Mono', 'Menlo', monospace" font-size="11" fill="#475569">--allowedTools Edit</text>

  <!-- Arrows from entry points to engine -->
  <line x1="145" y1="155" x2="145" y2="195" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="400" y1="155" x2="400" y2="195" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="655" y1="155" x2="655" y2="195" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Claude Code Engine -->
  <rect x="80" y="200" width="640" height="100" rx="12" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="400" y="237" text-anchor="middle" font-family="'SF Pro Display', 'Helvetica Neue', sans-serif" font-size="20" font-weight="700" fill="#1E293B">Claude Code Engine</text>
  <text x="400" y="270" text-anchor="middle" font-family="'PingFang TC', 'Noto Sans TC', sans-serif" font-size="14" fill="#64748B">相同工具、相同設定、相同 Agent 迴圈</text>

  <!-- Arrow to permission model -->
  <line x1="400" y1="300" x2="400" y2="345" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Permission Model Label -->
  <text x="400" y="340" text-anchor="middle" font-family="'PingFang TC', 'Noto Sans TC', sans-serif" font-size="16" font-weight="600" fill="#1E293B">Permission Model</text>

  <!-- Default: Read-only (left) -->
  <rect x="60" y="355" width="320" height="170" rx="12" fill="#F0FDF4" stroke="#22C55E" stroke-width="2" filter="url(#shadow)"/>
  <rect x="60" y="355" width="320" height="40" rx="12" fill="#22C55E"/>
  <rect x="60" y="380" width="320" height="15" fill="#22C55E"/>
  <text x="220" y="381" text-anchor="middle" font-family="'PingFang TC', 'Noto Sans TC', sans-serif" font-size="15" font-weight="700" fill="white">預設：唯讀</text>

  <text x="220" y="425" text-anchor="middle" font-family="'SF Mono', 'Menlo', monospace" font-size="13" fill="#475569">Read</text>
  <text x="220" y="450" text-anchor="middle" font-family="'SF Mono', 'Menlo', monospace" font-size="13" fill="#475569">Grep</text>
  <text x="220" y="475" text-anchor="middle" font-family="'SF Mono', 'Menlo', monospace" font-size="13" fill="#475569">Glob</text>
  <text x="220" y="500" text-anchor="middle" font-family="'SF Mono', 'Menlo', monospace" font-size="13" fill="#475569">WebFetch</text>

  <!-- Opt-in: Write (right) -->
  <rect x="420" y="355" width="320" height="170" rx="12" fill="#FFF7ED" stroke="#FB923C" stroke-width="2" filter="url(#shadow)"/>
  <rect x="420" y="355" width="320" height="40" rx="12" fill="#FB923C"/>
  <rect x="420" y="380" width="320" height="15" fill="#FB923C"/>
  <text x="580" y="381" text-anchor="middle" font-family="'PingFang TC', 'Noto Sans TC', sans-serif" font-size="15" font-weight="700" fill="white">選擇開啟：寫入</text>

  <text x="580" y="430" text-anchor="middle" font-family="'SF Mono', 'Menlo', monospace" font-size="12" fill="#475569">allowedTools: [</text>
  <text x="580" y="455" text-anchor="middle" font-family="'SF Mono', 'Menlo', monospace" font-size="12" fill="#475569">"Edit",</text>
  <text x="580" y="480" text-anchor="middle" font-family="'SF Mono', 'Menlo', monospace" font-size="12" fill="#475569">"Write",</text>
  <text x="580" y="505" text-anchor="middle" font-family="'SF Mono', 'Menlo', monospace" font-size="12" fill="#475569">"Bash"</text>

  <!-- Bottom annotation -->
  <rect x="140" y="555" width="520" height="40" rx="20" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <text x="400" y="580" text-anchor="middle" font-family="'PingFang TC', 'Noto Sans TC', sans-serif" font-size="12" fill="#64748B">繼承工作目錄的 .claude/settings.json</text>
</svg>