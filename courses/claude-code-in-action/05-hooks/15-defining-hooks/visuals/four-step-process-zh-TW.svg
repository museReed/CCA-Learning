<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 200" font-family="'PingFang TC', 'Noto Sans TC', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.1"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94A3B8"/>
    </marker>
  </defs>
  <rect width="820" height="200" fill="white" rx="12"/>
  <text x="410" y="30" text-anchor="middle" font-size="15" font-weight="600" fill="#64748B" letter-spacing="1">Hook 定義四步驟</text>

  <g transform="translate(30, 50)">
    <circle cx="75" cy="40" r="38" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2" filter="url(#shadow)"/>
    <text x="75" y="35" text-anchor="middle" font-size="22" font-weight="700" fill="#1E40AF">1</text>
    <text x="75" y="52" text-anchor="middle" font-size="10" fill="#3B82F6">🛡️</text>
    <text x="75" y="100" text-anchor="middle" font-size="13" font-weight="600" fill="#1E40AF">Pre 或 Post</text>
    <text x="75" y="116" text-anchor="middle" font-size="10" fill="#64748B">攔截還是觀察？</text>
  </g>
  <line x1="185" y1="90" x2="220" y2="90" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g transform="translate(220, 50)">
    <circle cx="75" cy="40" r="38" fill="#E0E7FF" stroke="#6366F1" stroke-width="2" filter="url(#shadow)"/>
    <text x="75" y="35" text-anchor="middle" font-size="22" font-weight="700" fill="#4338CA">2</text>
    <text x="75" y="52" text-anchor="middle" font-size="10" fill="#6366F1">🎯</text>
    <text x="75" y="100" text-anchor="middle" font-size="13" font-weight="600" fill="#4338CA">Matcher</text>
    <text x="75" y="116" text-anchor="middle" font-size="10" fill="#64748B">監聽哪些工具？</text>
  </g>
  <line x1="375" y1="90" x2="410" y2="90" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g transform="translate(410, 50)">
    <circle cx="75" cy="40" r="38" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="2" filter="url(#shadow)"/>
    <text x="75" y="35" text-anchor="middle" font-size="22" font-weight="700" fill="#6D28D9">3</text>
    <text x="75" y="52" text-anchor="middle" font-size="10" fill="#8B5CF6">⚙️</text>
    <text x="75" y="100" text-anchor="middle" font-size="13" font-weight="600" fill="#6D28D9">Command</text>
    <text x="75" y="116" text-anchor="middle" font-size="10" fill="#64748B">讀取 stdin JSON</text>
  </g>
  <line x1="565" y1="90" x2="600" y2="90" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g transform="translate(600, 50)">
    <circle cx="75" cy="40" r="38" fill="#F0FDF4" stroke="#22C55E" stroke-width="2" filter="url(#shadow)"/>
    <text x="75" y="35" text-anchor="middle" font-size="22" font-weight="700" fill="#166534">4</text>
    <text x="75" y="52" text-anchor="middle" font-size="10" fill="#22C55E">🚪</text>
    <text x="75" y="100" text-anchor="middle" font-size="13" font-weight="600" fill="#166534">Exit Code</text>
    <text x="75" y="116" text-anchor="middle" font-size="10" fill="#64748B">0 = 放行，2 = 攔截</text>
  </g>

  <text x="410" y="170" text-anchor="middle" font-size="11" fill="#94A3B8">所有 hook 都遵循這四步——從簡單的檔案守衛到複雜的合規閘門。</text>
</svg>
