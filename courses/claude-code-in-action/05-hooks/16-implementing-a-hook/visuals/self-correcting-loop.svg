<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 340" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.1"/></filter>
  </defs>
  <rect width="460" height="340" fill="white" rx="12"/>
  <text x="230" y="30" text-anchor="middle" font-size="15" font-weight="600" fill="#64748B" letter-spacing="0.5">SELF-CORRECTING FEEDBACK LOOP</text>

  <!-- Center label -->
  <text x="230" y="180" text-anchor="middle" font-size="28" fill="#E2E8F0">♾️</text>
  <text x="230" y="200" text-anchor="middle" font-size="11" font-weight="600" fill="#94A3B8">Zero human</text>
  <text x="230" y="214" text-anchor="middle" font-size="11" font-weight="600" fill="#94A3B8">intervention</text>

  <!-- Node 1: Claude tries action (top) -->
  <g transform="translate(145, 50)">
    <rect width="170" height="60" rx="14" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="30" y="35" font-size="20">🧠</text>
    <text x="55" y="30" font-size="12" font-weight="600" fill="#1E40AF">Claude tries</text>
    <text x="55" y="45" font-size="11" fill="#3B82F6">an action</text>
  </g>

  <!-- Node 2: Hook blocks + explains (right) -->
  <g transform="translate(300, 160)">
    <rect width="150" height="60" rx="14" fill="#FEF2F2" stroke="#EF4444" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="25" y="35" font-size="20">🛡️</text>
    <text x="50" y="28" font-size="12" font-weight="600" fill="#991B1B">Hook blocks</text>
    <text x="50" y="43" font-size="11" fill="#EF4444">+ explains why</text>
  </g>

  <!-- Node 3: Claude adjusts (left) -->
  <g transform="translate(10, 160)">
    <rect width="155" height="60" rx="14" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="25" y="35" font-size="20">💡</text>
    <text x="50" y="28" font-size="12" font-weight="600" fill="#166534">Claude adjusts</text>
    <text x="50" y="43" font-size="11" fill="#22C55E">approach</text>
  </g>

  <!-- Curved arrows forming the cycle -->
  <!-- Top → Right -->
  <path d="M 315 110 Q 400 120 390 155" fill="none" stroke="#94A3B8" stroke-width="1.5"/>
  <polygon points="390,155 385,145 395,147" fill="#94A3B8"/>
  <!-- Right → Left (bottom) -->
  <path d="M 300 210 Q 230 280 165 215" fill="none" stroke="#94A3B8" stroke-width="1.5"/>
  <polygon points="165,215 170,225 160,222" fill="#94A3B8"/>
  <!-- Left → Top -->
  <path d="M 80 155 Q 70 120 145 100" fill="none" stroke="#94A3B8" stroke-width="1.5"/>
  <polygon points="145,100 135,105 137,95" fill="#94A3B8"/>

  <!-- Labels on arrows -->
  <text x="375" y="130" text-anchor="middle" font-size="9" fill="#64748B">exit 2 + stderr</text>
  <text x="225" y="270" text-anchor="middle" font-size="9" fill="#64748B">feedback in context</text>
  <text x="70" y="130" text-anchor="middle" font-size="9" fill="#64748B">new attempt</text>

  <text x="230" y="320" text-anchor="middle" font-size="10" fill="#94A3B8">Claude reads the rejection reason and tries a different approach automatically.</text>
</svg>
