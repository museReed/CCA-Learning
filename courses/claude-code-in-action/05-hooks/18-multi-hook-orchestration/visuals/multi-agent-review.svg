<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 300" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.1"/></filter>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#94A3B8"/></marker>
    <marker id="arrowPurple" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#8B5CF6"/></marker>
  </defs>
  <rect width="520" height="300" fill="white" rx="12"/>
  <text x="260" y="28" text-anchor="middle" font-size="15" font-weight="600" fill="#64748B" letter-spacing="0.5">MULTI-AGENT REVIEW PATTERN</text>

  <!-- Primary Claude -->
  <g transform="translate(30, 55)">
    <rect width="160" height="70" rx="14" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="28" y="30" font-size="20">🧠</text>
    <text x="55" y="28" font-size="12" font-weight="600" fill="#1E40AF">Primary Claude</text>
    <text x="55" y="45" font-size="10" fill="#3B82F6">writes to queries/</text>
    <text x="55" y="60" font-size="9" fill="#94A3B8">main workspace</text>
  </g>

  <!-- Arrow to hook -->
  <line x1="190" y1="90" x2="220" y2="90" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="205" y="82" font-size="8" fill="#64748B">write</text>

  <!-- PostToolUse hook -->
  <g transform="translate(225, 55)">
    <rect width="130" height="70" rx="14" fill="#EEF2FF" stroke="#818CF8" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="20" y="30" font-size="18">🛡️</text>
    <text x="45" y="28" font-size="11" font-weight="600" fill="#4338CA">PostToolUse</text>
    <text x="45" y="43" font-size="10" fill="#6366F1">hook triggers</text>
    <text x="45" y="58" font-size="9" fill="#94A3B8">on file write</text>
  </g>

  <!-- Arrow down to reviewer -->
  <line x1="290" y1="125" x2="290" y2="155" stroke="#8B5CF6" stroke-width="1.5" marker-end="url(#arrowPurple)"/>
  <text x="310" y="145" font-size="8" fill="#8B5CF6">spawn</text>

  <!-- Reviewer Claude -->
  <g transform="translate(195, 160)">
    <rect width="190" height="70" rx="14" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="2" filter="url(#shadow)"/>
    <text x="28" y="30" font-size="20">🔍</text>
    <text x="55" y="28" font-size="12" font-weight="600" fill="#6D28D9">Reviewer Claude</text>
    <text x="55" y="45" font-size="10" fill="#8B5CF6">TypeScript SDK instance</text>
    <text x="55" y="60" font-size="9" fill="#94A3B8">scoped to queries/ only</text>
  </g>

  <!-- Duplicate found path -->
  <path d="M 195 195 Q 120 195 120 150" fill="none" stroke="#EF4444" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="120,150 115,160 125,158" fill="#EF4444"/>
  <text x="110" y="175" font-size="9" fill="#EF4444">duplicate found</text>

  <!-- No issue path -->
  <g transform="translate(400, 160)">
    <rect width="100" height="70" rx="14" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="50" y="28" text-anchor="middle" font-size="16">✅</text>
    <text x="50" y="48" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">No issues</text>
    <text x="50" y="62" text-anchor="middle" font-size="9" fill="#22C55E">exit 0</text>
  </g>
  <line x1="385" y1="195" x2="398" y2="195" stroke="#22C55E" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Bottom note -->
  <text x="260" y="268" text-anchor="middle" font-size="10" fill="#94A3B8">A second Claude instance reviews changes with isolated, scoped context.</text>
  <text x="260" y="282" text-anchor="middle" font-size="10" fill="#94A3B8">Primary Claude receives feedback and self-corrects without human intervention.</text>
</svg>
