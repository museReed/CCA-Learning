<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="preGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EEF2FF"/>
      <stop offset="100%" stop-color="#E0E7FF"/>
    </linearGradient>
    <linearGradient id="postGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0FDF4"/>
      <stop offset="100%" stop-color="#DCFCE7"/>
    </linearGradient>
    <linearGradient id="toolGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF7ED"/>
      <stop offset="100%" stop-color="#FFEDD5"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94A3B8"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22C55E"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#EF4444"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="320" fill="white" rx="12"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-size="15" font-weight="600" fill="#64748B" letter-spacing="0.5">TOOL EXECUTION PIPELINE</text>

  <!-- ===== Node 1: Prompt ===== -->
  <g transform="translate(30, 80)">
    <rect width="120" height="100" rx="16" fill="white" stroke="#E2E8F0" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="60" y="50" text-anchor="middle" font-size="28">💬</text>
    <text x="60" y="78" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">Prompt</text>
    <text x="60" y="93" text-anchor="middle" font-size="10" fill="#94A3B8">User input</text>
  </g>

  <!-- Arrow 1→2 -->
  <line x1="155" y1="130" x2="190" y2="130" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== Node 2: Model ===== -->
  <g transform="translate(195, 80)">
    <rect width="120" height="100" rx="16" fill="white" stroke="#E2E8F0" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="60" y="50" text-anchor="middle" font-size="28">🧠</text>
    <text x="60" y="78" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">Model</text>
    <text x="60" y="93" text-anchor="middle" font-size="10" fill="#94A3B8">Picks tool</text>
  </g>

  <!-- Arrow 2→3 -->
  <line x1="320" y1="130" x2="355" y2="130" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== Node 3: PreToolUse ===== -->
  <g transform="translate(360, 65)">
    <rect width="140" height="130" rx="16" fill="url(#preGrad)" stroke="#818CF8" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="70" y="42" text-anchor="middle" font-size="28">🛡️</text>
    <text x="70" y="70" text-anchor="middle" font-size="13" font-weight="700" fill="#4338CA">PreToolUse</text>
    <text x="70" y="87" text-anchor="middle" font-size="10" fill="#6366F1">Gatekeeper</text>
    <!-- Allow / Block badges -->
    <g transform="translate(14, 96)">
      <rect width="48" height="22" rx="11" fill="#22C55E" opacity="0.15"/>
      <text x="24" y="15" text-anchor="middle" font-size="10" font-weight="600" fill="#16A34A">✓ Allow</text>
    </g>
    <g transform="translate(78, 96)">
      <rect width="48" height="22" rx="11" fill="#EF4444" opacity="0.15"/>
      <text x="24" y="15" text-anchor="middle" font-size="10" font-weight="600" fill="#DC2626">✗ Block</text>
    </g>
  </g>

  <!-- Arrow 3→4 (Allow path) -->
  <line x1="505" y1="130" x2="545" y2="130" stroke="#22C55E" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="525" y="120" text-anchor="middle" font-size="9" fill="#22C55E" font-weight="600">exit 0</text>

  <!-- Block path: curved arrow back to Model -->
  <path d="M 430 195 Q 430 240 320 240 Q 255 240 255 195" fill="none" stroke="#EF4444" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowRed)"/>
  <text x="345" y="258" text-anchor="middle" font-size="9" fill="#EF4444" font-weight="600">exit 2 + stderr</text>

  <!-- ===== Node 4: Tool ===== -->
  <g transform="translate(550, 80)">
    <rect width="120" height="100" rx="16" fill="url(#toolGrad)" stroke="#FB923C" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="60" y="50" text-anchor="middle" font-size="28">🔧</text>
    <text x="60" y="78" text-anchor="middle" font-size="13" font-weight="600" fill="#9A3412">Tool</text>
    <text x="60" y="93" text-anchor="middle" font-size="10" fill="#C2410C">Executes</text>
  </g>

  <!-- Arrow 4→5 -->
  <line x1="675" y1="130" x2="710" y2="130" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== Node 5: PostToolUse ===== -->
  <g transform="translate(715, 65)">
    <rect width="150" height="130" rx="16" fill="url(#postGrad)" stroke="#4ADE80" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="75" y="42" text-anchor="middle" font-size="28">🔍</text>
    <text x="75" y="70" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">PostToolUse</text>
    <text x="75" y="87" text-anchor="middle" font-size="10" fill="#16A34A">Observer</text>
    <!-- Feedback items -->
    <g transform="translate(12, 96)">
      <rect width="126" height="22" rx="11" fill="#166534" opacity="0.1"/>
      <text x="63" y="15" text-anchor="middle" font-size="9" fill="#166534">lint · format · feedback</text>
    </g>
  </g>

  <!-- Feedback arrow from PostToolUse back to Model (subtle) -->
  <path d="M 790 195 Q 790 290 450 290 Q 255 290 255 185" fill="none" stroke="#94A3B8" stroke-width="1" stroke-dasharray="4,4" marker-end="url(#arrow)"/>
  <text x="525" y="302" text-anchor="middle" font-size="9" fill="#94A3B8">feedback → next turn</text>
</svg>
