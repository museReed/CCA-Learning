<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 300" font-family="'PingFang TC', 'Noto Sans TC', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.1"/></filter>
  </defs>
  <rect width="520" height="300" fill="white" rx="12"/>
  <text x="260" y="28" text-anchor="middle" font-size="15" font-weight="600" fill="#64748B" letter-spacing="1">安全性 vs 可攜性 取捨</text>

  <!-- Absolute path side -->
  <g transform="translate(20, 50)">
    <rect width="220" height="180" rx="14" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="110" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">絕對路徑</text>
    <text x="110" y="50" text-anchor="middle" font-size="10" fill="#22C55E">🔒 安全</text>
    <line x1="20" y1="60" x2="200" y2="60" stroke="#E2E8F0" stroke-width="1"/>
    <text x="15" y="80" font-size="9" fill="#334155">✓ 無 path interception 風險</text>
    <text x="15" y="95" font-size="9" fill="#334155">✓ 無 binary planting 攻擊</text>
    <text x="15" y="110" font-size="9" fill="#334155">✓ 執行結果可預測</text>
    <line x1="20" y1="120" x2="200" y2="120" stroke="#E2E8F0" stroke-width="1"/>
    <text x="15" y="140" font-size="9" fill="#DC2626">✗ 綁定特定機器</text>
    <text x="15" y="155" font-size="9" fill="#DC2626">✗ 其他開發者無法使用</text>
    <text x="15" y="170" font-size="9" fill="#DC2626">✗ CI 環境會失敗</text>
  </g>

  <!-- Relative path side -->
  <g transform="translate(280, 50)">
    <rect width="220" height="180" rx="14" fill="#FEF2F2" stroke="#EF4444" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="110" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#991B1B">相對路徑</text>
    <text x="110" y="50" text-anchor="middle" font-size="10" fill="#EF4444">🌍 可攜</text>
    <line x1="20" y1="60" x2="200" y2="60" stroke="#E2E8F0" stroke-width="1"/>
    <text x="15" y="80" font-size="9" fill="#334155">✓ 任何機器都能用</text>
    <text x="15" y="95" font-size="9" fill="#334155">✓ 可提交到 Git</text>
    <text x="15" y="110" font-size="9" fill="#334155">✓ CI 相容</text>
    <line x1="20" y1="120" x2="200" y2="120" stroke="#E2E8F0" stroke-width="1"/>
    <text x="15" y="140" font-size="9" fill="#DC2626">✗ PATH 攔截風險</text>
    <text x="15" y="155" font-size="9" fill="#DC2626">✗ Binary planting 攻擊</text>
    <text x="15" y="170" font-size="9" fill="#DC2626">✗ $PWD 不可預測</text>
  </g>

  <!-- VS divider -->
  <circle cx="260" cy="140" r="18" fill="#FFF7ED" stroke="#FB923C" stroke-width="1.5"/>
  <text x="260" y="145" text-anchor="middle" font-size="12" font-weight="700" fill="#9A3412">vs</text>

  <!-- Solution arrow -->
  <text x="260" y="260" text-anchor="middle" font-size="11" font-weight="600" fill="#4338CA">💡 解法：Template + init script</text>
  <text x="260" y="278" text-anchor="middle" font-size="10" fill="#94A3B8">settings.example.json → init-claude.js → settings.local.json</text>
</svg>
