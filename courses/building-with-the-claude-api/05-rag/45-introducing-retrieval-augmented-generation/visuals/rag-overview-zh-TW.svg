<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" font-family="PingFang TC, -apple-system, sans-serif">
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/></filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#64748B"/>
    </marker>
  </defs>
  <rect width="1000" height="600" fill="white"/>

  <text x="500" y="36" text-anchor="middle" font-size="20" font-weight="600" fill="#1E293B">檢索增強生成 (RAG) — 為什麼需要它</text>
  <text x="500" y="58" text-anchor="middle" font-size="13" fill="#6B7280">把 800 頁文件塞進 prompt 會失敗;RAG 只抓取你需要的段落</text>

  <rect x="40" y="90" width="440" height="470" rx="12" fill="#FEF2F2" stroke="#EF4444" stroke-width="2" filter="url(#shadow)"/>
  <rect x="40" y="90" width="440" height="48" rx="12" fill="#EF4444"/>
  <rect x="40" y="126" width="440" height="12" fill="#EF4444"/>
  <text x="260" y="120" text-anchor="middle" font-size="16" font-weight="600" fill="white">Prompt Stuffing(原始做法)</text>

  <rect x="95" y="152" width="330" height="26" rx="13" fill="#FEE2E2"/>
  <text x="260" y="170" text-anchor="middle" font-size="11" font-weight="600" fill="#991B1B">把整份 800 頁文件全部塞進 prompt</text>

  <rect x="60" y="196" width="100" height="40" rx="8" fill="white" stroke="#FCA5A5"/>
  <text x="110" y="212" text-anchor="middle" font-size="11" font-weight="600" fill="#1E293B">使用者</text>
  <text x="110" y="227" text-anchor="middle" font-size="9" fill="#6B7280">「有哪些風險?」</text>

  <line x1="165" y1="216" x2="190" y2="216" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="195" y="184" width="240" height="64" rx="6" fill="#FEE2E2" stroke="#EF4444" stroke-width="1.5"/>
  <text x="315" y="202" text-anchor="middle" font-size="11" font-weight="700" fill="#991B1B">巨大的 prompt</text>
  <text x="315" y="218" text-anchor="middle" font-size="9" fill="#7F1D1D">問題 + 800 頁原始文字</text>
  <text x="315" y="232" text-anchor="middle" font-size="9" fill="#7F1D1D">全部灌進去</text>
  <text x="315" y="244" text-anchor="middle" font-size="9" font-family="Menlo, monospace" fill="#DC2626">~200K tokens</text>

  <rect x="180" y="272" width="160" height="40" rx="8" fill="white" stroke="#FCA5A5"/>
  <text x="260" y="288" text-anchor="middle" font-size="11" font-weight="600" fill="#1E293B">Claude</text>
  <text x="260" y="302" text-anchor="middle" font-size="9" fill="#6B7280">context 過載</text>

  <line x1="260" y1="252" x2="260" y2="268" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="260" y1="316" x2="260" y2="332" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="100" y="336" width="320" height="52" rx="6" fill="white" stroke="#FCA5A5"/>
  <text x="260" y="356" text-anchor="middle" font-size="11" font-weight="600" fill="#991B1B">答案被稀釋 / 產生幻覺</text>
  <text x="260" y="374" text-anchor="middle" font-size="10" fill="#7F1D1D">關鍵事實埋在雜訊裡</text>

  <rect x="60" y="410" width="400" height="134" rx="8" fill="white" stroke="#FECACA"/>
  <text x="76" y="432" font-size="11" font-weight="700" fill="#991B1B">限制</text>
  <text x="76" y="452" font-size="10" fill="#1E293B">• Prompt 有硬性長度上限,文件可能根本塞不下</text>
  <text x="76" y="470" font-size="10" fill="#1E293B">• Prompt 過長時 Claude 效果會下降</text>
  <text x="76" y="488" font-size="10" fill="#1E293B">• 每次呼叫都要付完整 token 費用</text>
  <text x="76" y="506" font-size="10" fill="#1E293B">• 延遲隨文件大小線性增加</text>
  <text x="76" y="524" font-size="10" fill="#1E293B">• 沒有來源標註,無法驗證</text>

  <rect x="520" y="90" width="440" height="470" rx="12" fill="#F0FDF4" stroke="#22C55E" stroke-width="2" filter="url(#shadow)"/>
  <rect x="520" y="90" width="440" height="48" rx="12" fill="#22C55E"/>
  <rect x="520" y="126" width="440" height="12" fill="#22C55E"/>
  <text x="740" y="120" text-anchor="middle" font-size="16" font-weight="600" fill="white">Claude + RAG(有根據)</text>

  <rect x="575" y="152" width="330" height="26" rx="13" fill="#DCFCE7"/>
  <text x="740" y="170" text-anchor="middle" font-size="11" font-weight="600" fill="#14532D">只檢索與問題相關的段落</text>

  <rect x="540" y="196" width="100" height="40" rx="8" fill="white" stroke="#86EFAC"/>
  <text x="590" y="212" text-anchor="middle" font-size="11" font-weight="600" fill="#1E293B">使用者</text>
  <text x="590" y="227" text-anchor="middle" font-size="9" fill="#6B7280">「有哪些風險?」</text>

  <line x1="645" y1="216" x2="670" y2="216" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="675" y="196" width="130" height="40" rx="8" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="740" y="212" text-anchor="middle" font-size="11" font-weight="600" fill="#1E40AF">Retriever</text>
  <text x="740" y="226" text-anchor="middle" font-size="9" fill="#1E3A8A">搜尋相關段落</text>

  <line x1="810" y1="216" x2="830" y2="216" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="835" y="196" width="105" height="40" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="887" y="212" text-anchor="middle" font-size="11" font-weight="600" fill="#92400E">Top-K 段落</text>
  <text x="887" y="226" text-anchor="middle" font-size="9" fill="#78350F">風險因素 §</text>

  <rect x="600" y="260" width="280" height="58" rx="6" fill="#DCFCE7" stroke="#22C55E" stroke-width="1.5"/>
  <text x="740" y="278" text-anchor="middle" font-size="11" font-weight="700" fill="#14532D">強化後的 prompt</text>
  <text x="740" y="294" text-anchor="middle" font-size="9" fill="#166534">問題 + 2-3 個相關段落</text>
  <text x="740" y="308" text-anchor="middle" font-size="9" font-family="Menlo, monospace" fill="#16A34A">~2K tokens</text>

  <line x1="740" y1="242" x2="740" y2="256" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="660" y="336" width="160" height="40" rx="8" fill="white" stroke="#86EFAC"/>
  <text x="740" y="352" text-anchor="middle" font-size="11" font-weight="600" fill="#1E293B">Claude</text>
  <text x="740" y="366" text-anchor="middle" font-size="9" fill="#6B7280">精準的 context</text>

  <line x1="740" y1="322" x2="740" y2="332" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="540" y="400" width="400" height="144" rx="8" fill="white" stroke="#BBF7D0"/>
  <text x="556" y="422" font-size="11" font-weight="700" fill="#166534">優點</text>
  <text x="556" y="442" font-size="10" fill="#1E293B">• 讓 Claude 只專注在最相關的內容</text>
  <text x="556" y="460" font-size="10" fill="#1E293B">• 可擴展到超大文件與多文件集合</text>
  <text x="556" y="478" font-size="10" fill="#1E293B">• Prompt 變小 = 成本低、延遲低</text>
  <text x="556" y="496" font-size="10" fill="#1E293B">• 可做到可驗證的答案(配合 Citations)</text>
  <text x="556" y="516" font-size="10" fill="#1E293B">• 代價:需要切塊策略 + 檢索調校</text>
  <text x="556" y="534" font-size="10" fill="#1E293B">• 最適合文件超過 context window 的情境</text>

  <text x="500" y="582" text-anchor="middle" font-size="11" fill="#6B7280">RAG 用「實作複雜度」換來「可擴展性、準確度、成本效率」。</text>
</svg>
