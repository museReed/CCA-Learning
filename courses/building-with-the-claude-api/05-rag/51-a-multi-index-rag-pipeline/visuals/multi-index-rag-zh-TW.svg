<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" font-family="PingFang TC, -apple-system, sans-serif">
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/></filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#64748B"/>
    </marker>
  </defs>
  <rect width="1000" height="600" fill="white"/>

  <text x="500" y="36" text-anchor="middle" font-size="20" font-weight="600" fill="#1E293B">Multi-Index RAG — Hybrid 檢索 + Reciprocal Rank Fusion</text>
  <text x="500" y="58" text-anchor="middle" font-size="13" fill="#6B7280">Retriever 把查詢同時丟給所有 index,再用 RRF 合併排名</text>

  <rect x="40" y="96" width="180" height="48" rx="8" fill="white" stroke="#64748B" stroke-width="1.5"/>
  <text x="130" y="116" text-anchor="middle" font-size="11" font-weight="700" fill="#1E293B">查詢</text>
  <text x="130" y="132" text-anchor="middle" font-size="10" font-family="Menlo, monospace" fill="#1E293B">"INC-2023-Q4-011?"</text>

  <line x1="225" y1="120" x2="260" y2="120" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="265" y="92" width="180" height="56" rx="8" fill="#1E293B"/>
  <text x="355" y="115" text-anchor="middle" font-size="12" font-weight="700" fill="white">Retriever</text>
  <text x="355" y="132" text-anchor="middle" font-size="10" fill="#CBD5E1">fan-out + RRF merge</text>

  <line x1="355" y1="152" x2="180" y2="190" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="355" y1="152" x2="530" y2="190" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="60" y="198" width="240" height="150" rx="10" fill="#F3E8FF" stroke="#8B5CF6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="60" y="198" width="240" height="32" rx="10" fill="#8B5CF6"/>
  <rect x="60" y="218" width="240" height="12" fill="#8B5CF6"/>
  <text x="180" y="219" text-anchor="middle" font-size="12" font-weight="600" fill="white">VectorIndex(semantic)</text>

  <text x="74" y="250" font-size="10" font-weight="600" fill="#5B21B6">Top 3 結果:</text>
  <rect x="74" y="256" width="212" height="22" rx="3" fill="white" stroke="#C4B5FD"/>
  <text x="82" y="271" font-size="10" fill="#1E293B">1. Section 2 · 軟體工程</text>
  <rect x="74" y="282" width="212" height="22" rx="3" fill="white" stroke="#C4B5FD"/>
  <text x="82" y="297" font-size="10" fill="#1E293B">2. Section 7 · 法務</text>
  <rect x="74" y="308" width="212" height="22" rx="3" fill="white" stroke="#C4B5FD"/>
  <text x="82" y="323" font-size="10" fill="#1E293B">3. Section 6 · 財務</text>

  <rect x="410" y="198" width="240" height="150" rx="10" fill="#F0FDF4" stroke="#22C55E" stroke-width="2" filter="url(#shadow)"/>
  <rect x="410" y="198" width="240" height="32" rx="10" fill="#22C55E"/>
  <rect x="410" y="218" width="240" height="12" fill="#22C55E"/>
  <text x="530" y="219" text-anchor="middle" font-size="12" font-weight="600" fill="white">BM25Index(lexical)</text>

  <text x="424" y="250" font-size="10" font-weight="600" fill="#14532D">Top 3 結果:</text>
  <rect x="424" y="256" width="212" height="22" rx="3" fill="white" stroke="#86EFAC"/>
  <text x="432" y="271" font-size="10" fill="#1E293B">1. Section 6 · 財務</text>
  <rect x="424" y="282" width="212" height="22" rx="3" fill="white" stroke="#86EFAC"/>
  <text x="432" y="297" font-size="10" fill="#1E293B">2. Section 2 · 軟體工程</text>
  <rect x="424" y="308" width="212" height="22" rx="3" fill="white" stroke="#86EFAC"/>
  <text x="432" y="323" font-size="10" fill="#1E293B">3. Section 7 · 法務</text>

  <rect x="760" y="198" width="200" height="150" rx="10" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2" stroke-dasharray="5,3"/>
  <rect x="760" y="198" width="200" height="32" rx="10" fill="#F59E0B"/>
  <rect x="760" y="218" width="200" height="12" fill="#F59E0B"/>
  <text x="860" y="219" text-anchor="middle" font-size="12" font-weight="600" fill="white">+ 未來 index</text>
  <text x="775" y="252" font-size="10" fill="#78350F">相同 SearchIndex protocol:</text>
  <text x="775" y="268" font-size="10" font-family="Menlo, monospace" fill="#92400E">add_document()</text>
  <text x="775" y="282" font-size="10" font-family="Menlo, monospace" fill="#92400E">search()</text>
  <text x="775" y="302" font-size="9" fill="#78350F">接 graph 檢索、關鍵字、</text>
  <text x="775" y="314" font-size="9" fill="#78350F">領域專用 index — Retriever</text>
  <text x="775" y="326" font-size="9" fill="#78350F">會自動納入 fusion。</text>

  <line x1="180" y1="354" x2="300" y2="394" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="530" y1="354" x2="420" y2="394" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="60" y="400" width="660" height="144" rx="10" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="60" y="400" width="660" height="32" rx="10" fill="#3B82F6"/>
  <rect x="60" y="420" width="660" height="12" fill="#3B82F6"/>
  <text x="390" y="421" text-anchor="middle" font-size="12" font-weight="600" fill="white">Reciprocal Rank Fusion (RRF)</text>

  <text x="76" y="452" font-size="11" font-weight="700" fill="#1E40AF">公式</text>
  <rect x="76" y="458" width="280" height="26" rx="4" fill="white" stroke="#93C5FD"/>
  <text x="86" y="476" font-size="11" font-family="Menlo, monospace" fill="#1E293B">RRF(d) = Σ 1 / (k + rank_i(d))</text>
  <text x="76" y="498" font-size="10" fill="#1E293B">k = 60(預設)· 下方範例為了看清楚用 k=1</text>

  <text x="370" y="452" font-size="11" font-weight="700" fill="#1E40AF">實際計算</text>
  <text x="370" y="470" font-size="10" font-family="Menlo, monospace" fill="#1E293B">§2 = 1/(1+1) + 1/(1+2) = 0.833</text>
  <text x="370" y="486" font-size="10" font-family="Menlo, monospace" fill="#1E293B">§6 = 1/(1+3) + 1/(1+1) = 0.750</text>
  <text x="370" y="502" font-size="10" font-family="Menlo, monospace" fill="#1E293B">§7 = 1/(1+2) + 1/(1+3) = 0.583</text>

  <text x="76" y="524" font-size="10" fill="#6B7280">把每份文件在各 index 中排名的倒數相加。在多個 index 都名列前茅的文件就會浮到最上面。</text>

  <rect x="740" y="400" width="220" height="144" rx="10" fill="white" stroke="#3B82F6" stroke-width="2"/>
  <text x="850" y="422" text-anchor="middle" font-size="12" font-weight="700" fill="#1E40AF">合併後 Top-K</text>
  <rect x="752" y="432" width="196" height="22" rx="3" fill="#3B82F6"/>
  <text x="760" y="447" font-size="10" fill="white">1. §2 軟體工程 (0.833)</text>
  <rect x="752" y="458" width="196" height="22" rx="3" fill="#60A5FA"/>
  <text x="760" y="473" font-size="10" fill="white">2. §6 財務 (0.750)</text>
  <rect x="752" y="484" width="196" height="22" rx="3" fill="#93C5FD"/>
  <text x="760" y="499" font-size="10" fill="#1E3A8A">3. §7 法務 (0.583)</text>
  <text x="850" y="528" text-anchor="middle" font-size="9" fill="#6B7280">→ 傳給 Claude</text>

  <text x="500" y="582" text-anchor="middle" font-size="11" fill="#6B7280">共用 SearchIndex API 讓各 index 解耦 · RRF 不管原始分數,公平合併排名。</text>
</svg>
