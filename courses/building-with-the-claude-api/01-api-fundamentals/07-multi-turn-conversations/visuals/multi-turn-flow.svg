<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" font-family="SF Pro Display, -apple-system, sans-serif">
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/></filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#64748B"/>
    </marker>
  </defs>
  <rect width="1000" height="600" fill="white"/>

  <!-- Title -->
  <text x="500" y="36" text-anchor="middle" font-size="20" font-weight="600" fill="#1E293B">Multi-Turn Conversation Flow</text>
  <text x="500" y="58" text-anchor="middle" font-size="13" fill="#6B7280">Claude is stateless — your messages[] array IS the memory. You must send the full history every turn.</text>

  <!-- Lane labels -->
  <text x="50" y="108" font-size="12" font-weight="700" fill="#3B82F6">USER</text>
  <text x="50" y="228" font-size="12" font-weight="700" fill="#8B5CF6">CLIENT (messages[])</text>
  <text x="50" y="408" font-size="12" font-weight="700" fill="#22C55E">CLAUDE</text>

  <!-- TURN 1 -->
  <text x="200" y="86" text-anchor="middle" font-size="11" font-weight="700" fill="#6B7280">Turn 1</text>

  <!-- User message 1 -->
  <rect x="115" y="95" width="170" height="44" rx="8" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2" filter="url(#shadow)"/>
  <text x="200" y="113" text-anchor="middle" font-size="11" font-weight="600" fill="#1E40AF">User says:</text>
  <text x="200" y="130" text-anchor="middle" font-size="11" fill="#1E293B">"Hi, I'm Alice"</text>

  <!-- arrow down -->
  <line x1="200" y1="145" x2="200" y2="170" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- messages[] state 1 -->
  <rect x="115" y="175" width="170" height="80" rx="8" fill="#FAF5FF" stroke="#8B5CF6" stroke-width="2"/>
  <text x="200" y="192" text-anchor="middle" font-size="10" font-weight="600" fill="#5B21B6">messages[]</text>
  <rect x="125" y="200" width="150" height="20" rx="3" fill="#EDE9FE"/>
  <text x="200" y="214" text-anchor="middle" font-size="9" font-family="Menlo, monospace" fill="#5B21B6">{user: "Hi, I'm Alice"}</text>
  <text x="200" y="238" text-anchor="middle" font-size="9" fill="#6B7280">length: 1</text>

  <!-- arrow down to send -->
  <line x1="200" y1="260" x2="200" y2="300" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="230" y="285" font-size="9" fill="#6B7280">send →</text>

  <!-- Claude response 1 -->
  <rect x="115" y="305" width="170" height="64" rx="8" fill="#F0FDF4" stroke="#22C55E" stroke-width="2" filter="url(#shadow)"/>
  <text x="200" y="324" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">Claude replies:</text>
  <text x="200" y="342" text-anchor="middle" font-size="11" fill="#1E293B">"Hello Alice!</text>
  <text x="200" y="356" text-anchor="middle" font-size="11" fill="#1E293B">How can I help?"</text>

  <!-- arrow right to next turn -->
  <path d="M 285 185 Q 330 185 330 215" stroke="#8B5CF6" stroke-width="2" fill="none" stroke-dasharray="4,3"/>
  <line x1="330" y1="215" x2="330" y2="230" stroke="#8B5CF6" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="4,3"/>
  <text x="332" y="205" font-size="9" fill="#5B21B6">append ←</text>

  <!-- TURN 2 -->
  <text x="500" y="86" text-anchor="middle" font-size="11" font-weight="700" fill="#6B7280">Turn 2</text>

  <rect x="415" y="95" width="170" height="44" rx="8" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2" filter="url(#shadow)"/>
  <text x="500" y="113" text-anchor="middle" font-size="11" font-weight="600" fill="#1E40AF">User says:</text>
  <text x="500" y="130" text-anchor="middle" font-size="11" fill="#1E293B">"What's my name?"</text>

  <line x1="500" y1="145" x2="500" y2="170" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="400" y="175" width="200" height="118" rx="8" fill="#FAF5FF" stroke="#8B5CF6" stroke-width="2"/>
  <text x="500" y="192" text-anchor="middle" font-size="10" font-weight="600" fill="#5B21B6">messages[]</text>
  <rect x="410" y="200" width="180" height="20" rx="3" fill="#EDE9FE"/>
  <text x="500" y="214" text-anchor="middle" font-size="9" font-family="Menlo, monospace" fill="#5B21B6">{user: "Hi, I'm Alice"}</text>
  <rect x="410" y="224" width="180" height="20" rx="3" fill="#DCFCE7"/>
  <text x="500" y="238" text-anchor="middle" font-size="9" font-family="Menlo, monospace" fill="#166534">{assistant: "Hello Alice!"}</text>
  <rect x="410" y="248" width="180" height="20" rx="3" fill="#DBEAFE"/>
  <text x="500" y="262" text-anchor="middle" font-size="9" font-family="Menlo, monospace" fill="#1E40AF">{user: "What's my name?"}</text>
  <text x="500" y="284" text-anchor="middle" font-size="9" fill="#6B7280">length: 3</text>

  <line x1="500" y1="298" x2="500" y2="300" stroke="#64748B" stroke-width="1.5"/>
  <text x="530" y="285" font-size="9" fill="#6B7280">send →</text>

  <rect x="415" y="305" width="170" height="64" rx="8" fill="#F0FDF4" stroke="#22C55E" stroke-width="2" filter="url(#shadow)"/>
  <text x="500" y="324" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">Claude replies:</text>
  <text x="500" y="342" text-anchor="middle" font-size="11" fill="#1E293B">"Your name is</text>
  <text x="500" y="356" text-anchor="middle" font-size="11" fill="#1E293B">Alice."</text>

  <path d="M 585 185 Q 630 185 630 215" stroke="#8B5CF6" stroke-width="2" fill="none" stroke-dasharray="4,3"/>
  <line x1="630" y1="215" x2="630" y2="230" stroke="#8B5CF6" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="4,3"/>
  <text x="632" y="205" font-size="9" fill="#5B21B6">append ←</text>

  <!-- TURN 3 -->
  <text x="800" y="86" text-anchor="middle" font-size="11" font-weight="700" fill="#6B7280">Turn 3</text>

  <rect x="715" y="95" width="170" height="44" rx="8" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2" filter="url(#shadow)"/>
  <text x="800" y="113" text-anchor="middle" font-size="11" font-weight="600" fill="#1E40AF">User says:</text>
  <text x="800" y="130" text-anchor="middle" font-size="11" fill="#1E293B">"Thanks!"</text>

  <line x1="800" y1="145" x2="800" y2="170" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="700" y="175" width="200" height="158" rx="8" fill="#FAF5FF" stroke="#8B5CF6" stroke-width="2"/>
  <text x="800" y="192" text-anchor="middle" font-size="10" font-weight="600" fill="#5B21B6">messages[]</text>
  <rect x="710" y="200" width="180" height="20" rx="3" fill="#EDE9FE"/>
  <text x="800" y="214" text-anchor="middle" font-size="9" font-family="Menlo, monospace" fill="#5B21B6">{user: "Hi, I'm Alice"}</text>
  <rect x="710" y="224" width="180" height="20" rx="3" fill="#DCFCE7"/>
  <text x="800" y="238" text-anchor="middle" font-size="9" font-family="Menlo, monospace" fill="#166534">{assistant: "Hello Alice!"}</text>
  <rect x="710" y="248" width="180" height="20" rx="3" fill="#EDE9FE"/>
  <text x="800" y="262" text-anchor="middle" font-size="9" font-family="Menlo, monospace" fill="#5B21B6">{user: "What's my name?"}</text>
  <rect x="710" y="272" width="180" height="20" rx="3" fill="#DCFCE7"/>
  <text x="800" y="286" text-anchor="middle" font-size="9" font-family="Menlo, monospace" fill="#166534">{assistant: "Alice."}</text>
  <rect x="710" y="296" width="180" height="20" rx="3" fill="#DBEAFE"/>
  <text x="800" y="310" text-anchor="middle" font-size="9" font-family="Menlo, monospace" fill="#1E40AF">{user: "Thanks!"}</text>
  <text x="800" y="328" text-anchor="middle" font-size="9" fill="#6B7280">length: 5</text>

  <!-- Key callout -->
  <rect x="80" y="430" width="840" height="70" rx="10" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2" filter="url(#shadow)"/>
  <circle cx="110" cy="465" r="16" fill="#F59E0B"/>
  <text x="110" y="471" text-anchor="middle" font-size="16" font-weight="700" fill="white">!</text>
  <text x="140" y="456" font-size="13" font-weight="700" fill="#92400E">Claude is STATELESS — the API forgets everything between calls</text>
  <text x="140" y="474" font-size="11" fill="#78350F">Each request is independent. To fake "memory", your client code must send the FULL conversation history every turn.</text>
  <text x="140" y="490" font-size="11" fill="#78350F">The messages[] array grows by 2 per turn (one user + one assistant). Longer conversations = more input tokens = higher cost.</text>

  <!-- Bottom rule -->
  <rect x="80" y="518" width="840" height="62" rx="8" fill="#F1F5F9" stroke="#E2E8F0"/>
  <text x="500" y="540" text-anchor="middle" font-size="12" font-weight="600" fill="#1E293B">The golden rule of multi-turn</text>
  <text x="500" y="558" text-anchor="middle" font-size="11" fill="#475569">1. Append user message → 2. Call API with full messages[] → 3. Append assistant response → 4. Repeat</text>
  <text x="500" y="574" text-anchor="middle" font-size="10" fill="#6B7280">Strict alternation: user, assistant, user, assistant... The first message must be from "user".</text>
</svg>
