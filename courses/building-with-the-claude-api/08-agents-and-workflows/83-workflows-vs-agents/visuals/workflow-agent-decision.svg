<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="SF Pro Display, -apple-system, sans-serif">
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/></filter>
  </defs>
  <rect width="900" height="620" fill="white"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="20" font-weight="600" fill="#1E293B">When to Use Workflow vs Agent</text>
  <text x="450" y="60" text-anchor="middle" font-size="13" fill="#6B7280">Map your task on the Predictability vs Flexibility axes</text>

  <!-- Plot area -->
  <rect x="120" y="90" width="650" height="460" rx="8" fill="#FAFAFA" stroke="#E2E8F0" stroke-width="1.5"/>

  <!-- Grid lines -->
  <line x1="120" y1="320" x2="770" y2="320" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="445" y1="90" x2="445" y2="550" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- Axes -->
  <!-- Y axis: Predictability -->
  <line x1="120" y1="90" x2="120" y2="550" stroke="#1E293B" stroke-width="2"/>
  <polygon points="120,85 115,95 125,95" fill="#1E293B"/>
  <text x="90" y="120" text-anchor="middle" font-size="11" font-weight="600" fill="#1E293B" transform="rotate(-90 90 120)">High Predictability</text>
  <text x="90" y="540" text-anchor="middle" font-size="11" font-weight="600" fill="#6B7280" transform="rotate(-90 90 540)">Low Predictability</text>

  <!-- X axis: Flexibility -->
  <line x1="120" y1="550" x2="770" y2="550" stroke="#1E293B" stroke-width="2"/>
  <polygon points="775,550 765,545 765,555" fill="#1E293B"/>
  <text x="170" y="575" text-anchor="middle" font-size="11" font-weight="600" fill="#6B7280">Low Flexibility</text>
  <text x="720" y="575" text-anchor="middle" font-size="11" font-weight="600" fill="#1E293B">High Flexibility</text>

  <!-- Quadrant labels -->
  <text x="280" y="115" text-anchor="middle" font-size="14" font-weight="700" fill="#3B82F6">WORKFLOW zone</text>
  <text x="280" y="133" text-anchor="middle" font-size="10" fill="#6B7280">predictable, cheap, fast</text>

  <text x="610" y="115" text-anchor="middle" font-size="14" font-weight="700" fill="#8B5CF6">AGENT zone</text>
  <text x="610" y="133" text-anchor="middle" font-size="10" fill="#6B7280">flexible, open-ended</text>

  <text x="280" y="535" text-anchor="middle" font-size="11" fill="#94A3B8" font-style="italic">rigid + unreliable (avoid)</text>
  <text x="610" y="535" text-anchor="middle" font-size="11" fill="#94A3B8" font-style="italic">chaotic (harder to use)</text>

  <!-- Example points -->
  <!-- Data extraction (workflow) -->
  <circle cx="210" cy="180" r="10" fill="#3B82F6" stroke="white" stroke-width="2"/>
  <text x="226" y="184" font-size="11" fill="#1E293B" font-weight="500">Data extraction</text>

  <!-- Summarization (workflow) -->
  <circle cx="260" cy="230" r="10" fill="#3B82F6" stroke="white" stroke-width="2"/>
  <text x="276" y="234" font-size="11" fill="#1E293B" font-weight="500">Summarization</text>

  <!-- Routing (workflow) -->
  <circle cx="340" cy="200" r="10" fill="#3B82F6" stroke="white" stroke-width="2"/>
  <text x="356" y="204" font-size="11" fill="#1E293B" font-weight="500">Routing</text>

  <!-- Chaining (workflow) -->
  <circle cx="310" cy="275" r="10" fill="#3B82F6" stroke="white" stroke-width="2"/>
  <text x="326" y="279" font-size="11" fill="#1E293B" font-weight="500">Chaining</text>

  <!-- Parallel review (workflow) -->
  <circle cx="410" cy="250" r="10" fill="#3B82F6" stroke="white" stroke-width="2"/>
  <text x="370" y="270" font-size="11" fill="#1E293B" font-weight="500">Parallel review</text>

  <!-- Customer support agent -->
  <circle cx="540" cy="230" r="10" fill="#8B5CF6" stroke="white" stroke-width="2"/>
  <text x="556" y="234" font-size="11" fill="#1E293B" font-weight="500">Customer support</text>

  <!-- Research assistant -->
  <circle cx="620" cy="310" r="10" fill="#8B5CF6" stroke="white" stroke-width="2"/>
  <text x="636" y="314" font-size="11" fill="#1E293B" font-weight="500">Research assistant</text>

  <!-- Claude Code style agent -->
  <circle cx="700" cy="380" r="10" fill="#8B5CF6" stroke="white" stroke-width="2"/>
  <text x="580" y="395" font-size="11" fill="#1E293B" font-weight="500">Claude Code / coding agent</text>

  <!-- Multi-step debugging -->
  <circle cx="660" cy="240" r="10" fill="#8B5CF6" stroke="white" stroke-width="2"/>
  <text x="676" y="244" font-size="11" fill="#1E293B" font-weight="500">Multi-step debugging</text>

  <!-- Legend -->
  <rect x="780" y="120" width="110" height="110" rx="6" fill="white" stroke="#E2E8F0"/>
  <text x="835" y="140" text-anchor="middle" font-size="11" font-weight="700" fill="#1E293B">Legend</text>
  <circle cx="795" cy="160" r="7" fill="#3B82F6" stroke="white" stroke-width="1.5"/>
  <text x="808" y="164" font-size="10" fill="#1E293B">Workflow</text>
  <circle cx="795" cy="185" r="7" fill="#8B5CF6" stroke="white" stroke-width="1.5"/>
  <text x="808" y="189" font-size="10" fill="#1E293B">Agent</text>
  <text x="835" y="212" text-anchor="middle" font-size="9" fill="#6B7280">size ~ cost</text>

  <!-- Bottom decision rules -->
  <rect x="60" y="595" width="780" height="15" fill="none"/>
  <text x="450" y="605" text-anchor="middle" font-size="11" fill="#6B7280">Start with workflow. Move to agent only when the task genuinely needs open-ended reasoning.</text>
</svg>
