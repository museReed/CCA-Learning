<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" font-family="SF Pro Display, -apple-system, sans-serif">
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/></filter>
    <marker id="arrowG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22C55E"/>
    </marker>
  </defs>
  <rect width="900" height="540" fill="white"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="20" font-weight="600" fill="#1E293B">Parallelization Workflow</text>
  <text x="450" y="60" text-anchor="middle" font-size="13" fill="#6B7280">Sectioning (split task) + Voting (run N times) via asyncio.gather</text>

  <!-- Input node -->
  <rect x="370" y="90" width="160" height="60" rx="8" fill="#F0FDF4" stroke="#22C55E" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="118" text-anchor="middle" font-size="14" font-weight="600" fill="#1E293B">Input Task</text>
  <text x="450" y="138" text-anchor="middle" font-size="11" fill="#6B7280">e.g. review a PR</text>

  <!-- Fanout label -->
  <rect x="375" y="165" width="150" height="24" rx="12" fill="#DCFCE7"/>
  <text x="450" y="182" text-anchor="middle" font-size="11" font-weight="600" fill="#22C55E">asyncio.gather(...)</text>

  <!-- Fanout lines -->
  <line x1="450" y1="195" x2="150" y2="230" stroke="#22C55E" stroke-width="2" marker-end="url(#arrowG)"/>
  <line x1="450" y1="195" x2="340" y2="230" stroke="#22C55E" stroke-width="2" marker-end="url(#arrowG)"/>
  <line x1="450" y1="195" x2="560" y2="230" stroke="#22C55E" stroke-width="2" marker-end="url(#arrowG)"/>
  <line x1="450" y1="195" x2="750" y2="230" stroke="#22C55E" stroke-width="2" marker-end="url(#arrowG)"/>

  <!-- Parallel workers -->
  <rect x="60" y="240" width="180" height="110" rx="8" fill="white" stroke="#22C55E" stroke-width="2" filter="url(#shadow)"/>
  <rect x="60" y="240" width="180" height="28" rx="8" fill="#22C55E"/>
  <rect x="60" y="260" width="180" height="8" fill="#22C55E"/>
  <text x="150" y="260" text-anchor="middle" font-size="12" font-weight="600" fill="white">LLM Call 1</text>
  <text x="150" y="290" text-anchor="middle" font-size="11" fill="#1E293B" font-weight="500">Check: security</text>
  <text x="150" y="310" text-anchor="middle" font-size="10" fill="#6B7280">runs in parallel</text>
  <text x="150" y="328" text-anchor="middle" font-size="10" fill="#6B7280">independent context</text>

  <rect x="250" y="240" width="180" height="110" rx="8" fill="white" stroke="#22C55E" stroke-width="2" filter="url(#shadow)"/>
  <rect x="250" y="240" width="180" height="28" rx="8" fill="#22C55E"/>
  <rect x="250" y="260" width="180" height="8" fill="#22C55E"/>
  <text x="340" y="260" text-anchor="middle" font-size="12" font-weight="600" fill="white">LLM Call 2</text>
  <text x="340" y="290" text-anchor="middle" font-size="11" fill="#1E293B" font-weight="500">Check: style</text>
  <text x="340" y="310" text-anchor="middle" font-size="10" fill="#6B7280">runs in parallel</text>
  <text x="340" y="328" text-anchor="middle" font-size="10" fill="#6B7280">independent context</text>

  <rect x="470" y="240" width="180" height="110" rx="8" fill="white" stroke="#22C55E" stroke-width="2" filter="url(#shadow)"/>
  <rect x="470" y="240" width="180" height="28" rx="8" fill="#22C55E"/>
  <rect x="470" y="260" width="180" height="8" fill="#22C55E"/>
  <text x="560" y="260" text-anchor="middle" font-size="12" font-weight="600" fill="white">LLM Call 3</text>
  <text x="560" y="290" text-anchor="middle" font-size="11" fill="#1E293B" font-weight="500">Check: tests</text>
  <text x="560" y="310" text-anchor="middle" font-size="10" fill="#6B7280">runs in parallel</text>
  <text x="560" y="328" text-anchor="middle" font-size="10" fill="#6B7280">independent context</text>

  <rect x="670" y="240" width="180" height="110" rx="8" fill="white" stroke="#22C55E" stroke-width="2" filter="url(#shadow)"/>
  <rect x="670" y="240" width="180" height="28" rx="8" fill="#22C55E"/>
  <rect x="670" y="260" width="180" height="8" fill="#22C55E"/>
  <text x="760" y="260" text-anchor="middle" font-size="12" font-weight="600" fill="white">LLM Call N</text>
  <text x="760" y="290" text-anchor="middle" font-size="11" fill="#1E293B" font-weight="500">Check: docs</text>
  <text x="760" y="310" text-anchor="middle" font-size="10" fill="#6B7280">runs in parallel</text>
  <text x="760" y="328" text-anchor="middle" font-size="10" fill="#6B7280">independent context</text>

  <!-- Merge lines -->
  <line x1="150" y1="355" x2="450" y2="395" stroke="#22C55E" stroke-width="2" marker-end="url(#arrowG)"/>
  <line x1="340" y1="355" x2="450" y2="395" stroke="#22C55E" stroke-width="2" marker-end="url(#arrowG)"/>
  <line x1="560" y1="355" x2="450" y2="395" stroke="#22C55E" stroke-width="2" marker-end="url(#arrowG)"/>
  <line x1="760" y1="355" x2="450" y2="395" stroke="#22C55E" stroke-width="2" marker-end="url(#arrowG)"/>

  <!-- Merge / aggregator -->
  <rect x="330" y="400" width="240" height="60" rx="8" fill="#F0FDF4" stroke="#22C55E" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="427" text-anchor="middle" font-size="14" font-weight="600" fill="#1E293B">Aggregator</text>
  <text x="450" y="447" text-anchor="middle" font-size="11" fill="#6B7280">merge / vote / summarize</text>

  <!-- Two modes legend -->
  <rect x="60" y="480" width="360" height="40" rx="6" fill="#F1F5F9" stroke="#E2E8F0"/>
  <text x="240" y="497" text-anchor="middle" font-size="11" font-weight="600" fill="#1E293B">Sectioning</text>
  <text x="240" y="513" text-anchor="middle" font-size="10" fill="#6B7280">Different sub-tasks running in parallel</text>

  <rect x="480" y="480" width="360" height="40" rx="6" fill="#F1F5F9" stroke="#E2E8F0"/>
  <text x="660" y="497" text-anchor="middle" font-size="11" font-weight="600" fill="#1E293B">Voting</text>
  <text x="660" y="513" text-anchor="middle" font-size="10" fill="#6B7280">Same task run N times, majority wins</text>
</svg>
