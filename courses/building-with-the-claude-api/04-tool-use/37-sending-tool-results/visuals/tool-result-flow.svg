<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 640" font-family="SF Pro Display, -apple-system, sans-serif">
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/></filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6B7280"/>
    </marker>
  </defs>
  <rect width="900" height="640" fill="white"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-size="20" font-weight="600" fill="#1E293B">Sending Tool Results Back to Claude</text>
  <text x="450" y="62" text-anchor="middle" font-size="13" fill="#6B7280">Append a user message containing a tool_result block — the tool_use_id must match</text>

  <!-- BEFORE box -->
  <text x="200" y="100" text-anchor="middle" font-size="14" font-weight="600" fill="#6B7280">BEFORE — messages[]</text>
  <rect x="50" y="115" width="380" height="230" rx="10" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="2" filter="url(#shadow)"/>

  <!-- user message -->
  <rect x="65" y="130" width="350" height="50" rx="6" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1"/>
  <rect x="65" y="130" width="60" height="50" rx="6" fill="#94A3B8"/>
  <text x="95" y="160" text-anchor="middle" font-size="11" font-weight="600" fill="white">user</text>
  <text x="140" y="152" font-size="11" font-family="Menlo, monospace" fill="#1E293B">"What's the weather</text>
  <text x="140" y="168" font-size="11" font-family="Menlo, monospace" fill="#1E293B">in San Francisco?"</text>

  <!-- assistant message -->
  <rect x="65" y="195" width="350" height="135" rx="6" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1"/>
  <rect x="65" y="195" width="80" height="135" rx="6" fill="#3B82F6"/>
  <text x="105" y="268" text-anchor="middle" font-size="11" font-weight="600" fill="white">assistant</text>
  <text x="160" y="215" font-size="10" font-family="Menlo, monospace" fill="#1E293B">[</text>
  <text x="160" y="230" font-size="10" font-family="Menlo, monospace" fill="#1E293B">  TextBlock("Let me check"),</text>
  <text x="160" y="245" font-size="10" font-family="Menlo, monospace" fill="#1E293B">  ToolUseBlock(</text>
  <text x="160" y="260" font-size="10" font-family="Menlo, monospace" fill="#3B82F6">    id="toolu_01A...",</text>
  <text x="160" y="275" font-size="10" font-family="Menlo, monospace" fill="#1E293B">    name="get_weather",</text>
  <text x="160" y="290" font-size="10" font-family="Menlo, monospace" fill="#1E293B">    input={"city": "SF"}</text>
  <text x="160" y="305" font-size="10" font-family="Menlo, monospace" fill="#1E293B">  )</text>
  <text x="160" y="320" font-size="10" font-family="Menlo, monospace" fill="#1E293B">]</text>

  <!-- Arrow to AFTER -->
  <line x1="440" y1="230" x2="490" y2="230" stroke="#6B7280" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="465" y="215" text-anchor="middle" font-size="11" fill="#6B7280" font-weight="600">append</text>

  <!-- AFTER box -->
  <text x="700" y="100" text-anchor="middle" font-size="14" font-weight="600" fill="#6B7280">AFTER — messages[]</text>
  <rect x="500" y="115" width="380" height="440" rx="10" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="2" filter="url(#shadow)"/>

  <!-- user message -->
  <rect x="515" y="130" width="350" height="50" rx="6" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1"/>
  <rect x="515" y="130" width="60" height="50" rx="6" fill="#94A3B8"/>
  <text x="545" y="160" text-anchor="middle" font-size="11" font-weight="600" fill="white">user</text>
  <text x="590" y="152" font-size="11" font-family="Menlo, monospace" fill="#1E293B">"What's the weather</text>
  <text x="590" y="168" font-size="11" font-family="Menlo, monospace" fill="#1E293B">in San Francisco?"</text>

  <!-- assistant message -->
  <rect x="515" y="195" width="350" height="135" rx="6" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1"/>
  <rect x="515" y="195" width="80" height="135" rx="6" fill="#3B82F6"/>
  <text x="555" y="268" text-anchor="middle" font-size="11" font-weight="600" fill="white">assistant</text>
  <text x="610" y="215" font-size="10" font-family="Menlo, monospace" fill="#1E293B">[</text>
  <text x="610" y="230" font-size="10" font-family="Menlo, monospace" fill="#1E293B">  TextBlock("Let me check"),</text>
  <text x="610" y="245" font-size="10" font-family="Menlo, monospace" fill="#1E293B">  ToolUseBlock(</text>
  <text x="610" y="260" font-size="10" font-family="Menlo, monospace" fill="#3B82F6">    id="toolu_01A...",</text>
  <text x="610" y="275" font-size="10" font-family="Menlo, monospace" fill="#1E293B">    name="get_weather",</text>
  <text x="610" y="290" font-size="10" font-family="Menlo, monospace" fill="#1E293B">    input={"city": "SF"}</text>
  <text x="610" y="305" font-size="10" font-family="Menlo, monospace" fill="#1E293B">  )</text>
  <text x="610" y="320" font-size="10" font-family="Menlo, monospace" fill="#1E293B">]</text>

  <!-- NEW user message with tool_result -->
  <rect x="515" y="345" width="350" height="195" rx="6" fill="#F0FDF4" stroke="#22C55E" stroke-width="2"/>
  <rect x="515" y="345" width="80" height="195" rx="6" fill="#22C55E"/>
  <text x="555" y="448" text-anchor="middle" font-size="11" font-weight="600" fill="white">user</text>
  <text x="555" y="465" text-anchor="middle" font-size="9" fill="white">(NEW)</text>
  <text x="610" y="365" font-size="10" font-family="Menlo, monospace" fill="#1E293B">[</text>
  <text x="610" y="380" font-size="10" font-family="Menlo, monospace" fill="#1E293B">  {</text>
  <text x="610" y="395" font-size="10" font-family="Menlo, monospace" fill="#8B5CF6">    "type"</text>
  <text x="660" y="395" font-size="10" font-family="Menlo, monospace" fill="#1E293B">: </text>
  <text x="672" y="395" font-size="10" font-family="Menlo, monospace" fill="#22C55E">"tool_result"</text>
  <text x="756" y="395" font-size="10" font-family="Menlo, monospace" fill="#1E293B">,</text>
  <text x="610" y="410" font-size="10" font-family="Menlo, monospace" fill="#8B5CF6">    "tool_use_id"</text>
  <text x="700" y="410" font-size="10" font-family="Menlo, monospace" fill="#1E293B">:</text>
  <text x="610" y="425" font-size="10" font-family="Menlo, monospace" fill="#EF4444">      "toolu_01A...",</text>
  <text x="610" y="440" font-size="10" font-family="Menlo, monospace" fill="#8B5CF6">    "content"</text>
  <text x="675" y="440" font-size="10" font-family="Menlo, monospace" fill="#1E293B">:</text>
  <text x="610" y="455" font-size="10" font-family="Menlo, monospace" fill="#0F172A">      "72°F, sunny",</text>
  <text x="610" y="470" font-size="10" font-family="Menlo, monospace" fill="#8B5CF6">    "is_error"</text>
  <text x="680" y="470" font-size="10" font-family="Menlo, monospace" fill="#1E293B">:</text>
  <text x="690" y="470" font-size="10" font-family="Menlo, monospace" fill="#0F172A">false</text>
  <text x="610" y="485" font-size="10" font-family="Menlo, monospace" fill="#1E293B">  }</text>
  <text x="610" y="500" font-size="10" font-family="Menlo, monospace" fill="#1E293B">]</text>

  <!-- Field labels on tool_result -->
  <rect x="515" y="510" width="350" height="24" rx="4" fill="#DCFCE7"/>
  <text x="690" y="526" text-anchor="middle" font-size="10" font-weight="600" fill="#22C55E">role="user" (critical!) + content list with tool_result</text>

  <!-- Key points -->
  <rect x="50" y="370" width="380" height="185" rx="8" fill="#FEF2F2" stroke="#EF4444" stroke-width="1"/>
  <text x="240" y="395" text-anchor="middle" font-size="13" font-weight="600" fill="#EF4444">Key rules</text>
  <text x="70" y="420" font-size="11" fill="#1E293B">1. <tspan font-weight="600">tool_use_id</tspan> MUST match the id Claude</text>
  <text x="70" y="435" font-size="11" fill="#1E293B">   returned in the ToolUseBlock.</text>
  <text x="70" y="458" font-size="11" fill="#1E293B">2. The new message has <tspan font-weight="600">role="user"</tspan> even</text>
  <text x="70" y="473" font-size="11" fill="#1E293B">   though your app (not a human) wrote it.</text>
  <text x="70" y="496" font-size="11" fill="#1E293B">3. <tspan font-weight="600">content</tspan> is a string (or list of blocks)</text>
  <text x="70" y="511" font-size="11" fill="#1E293B">   containing the tool's output.</text>
  <text x="70" y="534" font-size="11" fill="#1E293B">4. Set <tspan font-weight="600">is_error=true</tspan> if the tool failed.</text>

  <!-- Bottom summary -->
  <rect x="100" y="575" width="700" height="50" rx="8" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1"/>
  <text x="450" y="598" text-anchor="middle" font-size="12" fill="#1E293B" font-weight="500">Call client.messages.create() again with this updated messages[] to get the final answer.</text>
  <text x="450" y="615" text-anchor="middle" font-size="11" fill="#6B7280">Claude reads the tool_result and synthesizes a response for the user.</text>
</svg>
