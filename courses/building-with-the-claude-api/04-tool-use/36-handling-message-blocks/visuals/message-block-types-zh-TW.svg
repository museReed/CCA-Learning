<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" font-family="SF Pro Display, -apple-system, sans-serif">
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/></filter>
  </defs>
  <rect width="900" height="580" fill="white"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-size="20" font-weight="600" fill="#1E293B">Claude 回應中的 Content Block 類型</text>
  <text x="450" y="62" text-anchor="middle" font-size="13" fill="#6B7280">response.content 是一個 list — 逐一檢查每個區塊的 type</text>

  <!-- Left column: TextBlock -->
  <rect x="60" y="90" width="380" height="420" rx="10" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="60" y="90" width="380" height="44" rx="10" fill="#3B82F6"/>
  <rect x="60" y="125" width="380" height="9" fill="#3B82F6"/>
  <text x="250" y="118" text-anchor="middle" font-size="16" font-weight="600" fill="white">TextBlock</text>

  <!-- Type label -->
  <rect x="100" y="150" width="130" height="26" rx="13" fill="#DBEAFE"/>
  <text x="165" y="168" text-anchor="middle" font-size="11" font-weight="600" fill="#3B82F6">type: "text"</text>

  <text x="250" y="198" text-anchor="middle" font-size="12" fill="#1E293B" font-weight="500">給使用者閱讀的自然語言</text>

  <!-- Code snippet -->
  <rect x="85" y="215" width="330" height="115" rx="8" fill="#0F172A"/>
  <text x="100" y="238" font-size="11" font-family="Menlo, monospace" fill="#E2E8F0">TextBlock(</text>
  <text x="120" y="256" font-size="11" font-family="Menlo, monospace" fill="#60A5FA">type</text>
  <text x="146" y="256" font-size="11" font-family="Menlo, monospace" fill="#E2E8F0">=</text>
  <text x="154" y="256" font-size="11" font-family="Menlo, monospace" fill="#FDE68A">"text"</text>
  <text x="192" y="256" font-size="11" font-family="Menlo, monospace" fill="#E2E8F0">,</text>
  <text x="120" y="274" font-size="11" font-family="Menlo, monospace" fill="#60A5FA">text</text>
  <text x="146" y="274" font-size="11" font-family="Menlo, monospace" fill="#E2E8F0">=</text>
  <text x="154" y="274" font-size="11" font-family="Menlo, monospace" fill="#FDE68A">"讓我查一下</text>
  <text x="120" y="290" font-size="11" font-family="Menlo, monospace" fill="#FDE68A">  天氣..."</text>
  <text x="100" y="310" font-size="11" font-family="Menlo, monospace" fill="#E2E8F0">)</text>

  <!-- Access example -->
  <text x="250" y="355" text-anchor="middle" font-size="11" fill="#6B7280" font-weight="500">Python 存取方式:</text>
  <rect x="85" y="365" width="330" height="30" rx="6" fill="#1E293B"/>
  <text x="100" y="385" font-size="11" font-family="Menlo, monospace" fill="#34D399">block.text</text>

  <!-- When -->
  <line x1="85" y1="415" x2="415" y2="415" stroke="#BFDBFE" stroke-width="1"/>
  <text x="250" y="438" text-anchor="middle" font-size="11" fill="#6B7280" font-weight="500">出現時機:</text>
  <text x="250" y="458" text-anchor="middle" font-size="11" fill="#1E293B">Claude 思考過程說明,</text>
  <text x="250" y="475" text-anchor="middle" font-size="11" fill="#1E293B">或回傳最終答案時</text>
  <text x="250" y="497" text-anchor="middle" font-size="11" fill="#3B82F6" font-weight="600">stop_reason: "end_turn"</text>

  <!-- Right column: ToolUseBlock -->
  <rect x="460" y="90" width="380" height="420" rx="10" fill="#FAF5FF" stroke="#8B5CF6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="460" y="90" width="380" height="44" rx="10" fill="#8B5CF6"/>
  <rect x="460" y="125" width="380" height="9" fill="#8B5CF6"/>
  <text x="650" y="118" text-anchor="middle" font-size="16" font-weight="600" fill="white">ToolUseBlock</text>

  <!-- Type label -->
  <rect x="500" y="150" width="150" height="26" rx="13" fill="#EDE9FE"/>
  <text x="575" y="168" text-anchor="middle" font-size="11" font-weight="600" fill="#8B5CF6">type: "tool_use"</text>

  <text x="650" y="198" text-anchor="middle" font-size="12" fill="#1E293B" font-weight="500">結構化的工具呼叫請求</text>

  <!-- Code snippet -->
  <rect x="485" y="215" width="330" height="115" rx="8" fill="#0F172A"/>
  <text x="500" y="238" font-size="11" font-family="Menlo, monospace" fill="#E2E8F0">ToolUseBlock(</text>
  <text x="520" y="256" font-size="11" font-family="Menlo, monospace" fill="#60A5FA">id</text>
  <text x="534" y="256" font-size="11" font-family="Menlo, monospace" fill="#E2E8F0">=</text>
  <text x="542" y="256" font-size="11" font-family="Menlo, monospace" fill="#FDE68A">"toolu_01A..."</text>
  <text x="636" y="256" font-size="11" font-family="Menlo, monospace" fill="#E2E8F0">,</text>
  <text x="520" y="274" font-size="11" font-family="Menlo, monospace" fill="#60A5FA">name</text>
  <text x="548" y="274" font-size="11" font-family="Menlo, monospace" fill="#E2E8F0">=</text>
  <text x="558" y="274" font-size="11" font-family="Menlo, monospace" fill="#FDE68A">"get_weather"</text>
  <text x="645" y="274" font-size="11" font-family="Menlo, monospace" fill="#E2E8F0">,</text>
  <text x="520" y="292" font-size="11" font-family="Menlo, monospace" fill="#60A5FA">input</text>
  <text x="552" y="292" font-size="11" font-family="Menlo, monospace" fill="#E2E8F0">=</text>
  <text x="562" y="292" font-size="11" font-family="Menlo, monospace" fill="#E2E8F0">{</text>
  <text x="568" y="292" font-size="11" font-family="Menlo, monospace" fill="#FDE68A">"city"</text>
  <text x="606" y="292" font-size="11" font-family="Menlo, monospace" fill="#E2E8F0">:</text>
  <text x="613" y="292" font-size="11" font-family="Menlo, monospace" fill="#FDE68A">"SF"</text>
  <text x="638" y="292" font-size="11" font-family="Menlo, monospace" fill="#E2E8F0">}</text>
  <text x="500" y="310" font-size="11" font-family="Menlo, monospace" fill="#E2E8F0">)</text>

  <!-- Access example -->
  <text x="650" y="355" text-anchor="middle" font-size="11" fill="#6B7280" font-weight="500">Python 存取方式:</text>
  <rect x="485" y="365" width="330" height="30" rx="6" fill="#1E293B"/>
  <text x="500" y="385" font-size="11" font-family="Menlo, monospace" fill="#34D399">block.id  block.name  block.input</text>

  <!-- When -->
  <line x1="485" y1="415" x2="815" y2="415" stroke="#DDD6FE" stroke-width="1"/>
  <text x="650" y="438" text-anchor="middle" font-size="11" fill="#6B7280" font-weight="500">出現時機:</text>
  <text x="650" y="458" text-anchor="middle" font-size="11" fill="#1E293B">Claude 希望應用程式</text>
  <text x="650" y="475" text-anchor="middle" font-size="11" fill="#1E293B">代為執行工具時</text>
  <text x="650" y="497" text-anchor="middle" font-size="11" fill="#8B5CF6" font-weight="600">stop_reason: "tool_use"</text>

  <!-- Bottom tip -->
  <rect x="100" y="530" width="700" height="40" rx="8" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1"/>
  <text x="450" y="555" text-anchor="middle" font-size="12" fill="#1E293B" font-weight="500">單一回應可同時包含兩種區塊 — 迭代 response.content 並依 block.type 分派處理。</text>
</svg>
